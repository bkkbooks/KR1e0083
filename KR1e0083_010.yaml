body:
  text: 春秋事義全考卷十明姜寶撰九年春王正月把伯來逆叔姬之喪以歸據經文言叔姬分明於把未絶若果出則豈肯逆其喪以歸乎故知左氏之說既非而胡氏以為姬不應出魯得以義責之者其說亦非也魯得以義責其終必亦得以義責其初必不至於見出矣公㑹晉侯景齊侯頃宋公共衛侯定鄭伯成曹伯宣莒子朱把伯桓同盟于蒲胡傳晉初下令於齊反魯衛之侵地而齊不敢違者以其順也齊既從之魯君親往拜其賜矣復有二命俾歸諸齊一與一奪信不可知無惑乎諸侯之解體也晉人不知反求諸己惇信明義以補前行之愆而又欲刑牲歃血要質鬼神以御之是從事於末而不知本矣特書同盟以罪晉也季氏私考馬陵之盟諸侯既同推晉為主矣而晉之所為不足以服諸侯豈特以汶陽田失信之故哉受孫林父之奔則非所以善鄰使欒書侵蔡則非所以威逺故諸侯皆二惟魯衛始終從晉而衛為尤親蒲為衛地則衛為地主要諸侯為此盟以推晉也公至自㑹二月伯姬宣公女歸于宋是為宋共姬夏季孫行父如宋致女晉人來媵胡傳致女者何女既嫁三月而廟見則成婦矣而後父母使人安之故謂之致也常事爾何以書致女使卿非禮也經有因貶以見褒者致女來媵之類是也按獻六羽未嘗褒胡氏之說非也故刪去一比伯姬賢行著於家故致女使卿特厚其嫁遣之禮賢名聞於逺故諸國爭媵信其無妬忌之行程氏以為一女子之賢尚聞於諸侯况君子哉秋七月丙子齊侯無野卒頃公卒子靈公環立晉人執鄭伯成晉欒書帥師伐鄭左傳楚子重侵陳以救鄭晉侯禮鍾儀使歸求成屬詞鄭伯私㑹楚公子成于鄧既㑹即朝于晉明非實叛晉者而晉人因其來㑹執之非矣高氏曰鄭伯雖與楚㑹而躬朝于晉是已乃因其來朝而執之豈有以禮來朝而反蒙執辱者哉又况鄭使伯蠲行成而殺之耶春秋所以深罪晉也又曰自邲之戰鄭之從楚者十年其後晉侯伐鄭更蟲牢馬陵之㑹然後鄭伯受盟及蒲之㑹所以尋前日之盟也而晉人乃執辱鄭伯又使欒書伐之明年又使衛侵鄭又㑹諸侯伐鄭方是時楚適備吳未暇爭鄭故鄭之在晉者亦五年及楚一求成於鄭而鄭伯甘心於楚者蓋追怒晉之不德弗恤小國之難而輕辱其君故與楚伐許侵宋同撓中國凡二十年間諸侯之師侵伐盟㑹曽無虛嵗諰諰然常以失鄭為憂實晉有以啓之也故稱人以執與執其君而伐其國皆直書而義自見矣冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒城之民潰楚人入鄆今青州府沂水縣即古鄆邑季氏私考莒在郯之東北界距郯約三百里而自楚至莒則又逺矣無所繫於必爭之利者也故楚自入春秋以來兵未有至於沂上者今特使貴卿帥師逺越淮泗而泝沂以伐莒且是時晉方執鄭伯以伐鄭楚之所宜爭也乃不之救而長驅東向以攻所不急此其䇿果安出乎蓋為備吳之計也郯兵稍強可以為用吳自七年伐郯而尋入州來江淮間與楚之國已皆震驚楚人懼吳連合郯兵以出淮泗則自汝以東非楚有矣此所以逺出郯北以爭諸侯郯之所畏者莫如莒故命貴卿帥大衆以臨之而其民遂潰入鄆稱人分一旅以收其與國也終成公之世莒不復見焉蓋已率其屬從楚矣莒服則足以制郯吳人豈敢挾郯南下哉此楚人伐莒之計也左氏不知此意區區論其城惡而何休氏但責中國無信同盟不能相救則經生之論而不知楚人兵計之所出爾秦人桓白狄伐晉白狄今延安府所屬其地也季氏私考秦自敗殽以來與晉爭兵者凡十二見矣晉本倚白狄以伐秦今白狄又為秦所得則晉復將何恃以抗秦乎十三年大㑹諸侯以伐秦為此故耳王氏經世云白狄介秦晉之間秦晉迭挾之以互相伐宣八年晉師白狄伐秦前者秦晉交兵各為其私曲直猶有所在而今也楚方撓晉爭鄭潰莒以牽其西而秦復與白狄戰其東幾於黨楚則秦之過又甚矣鄭人圍許戴溪氏曰鄭既被執被伐而遂圍許其恃楚而無憚於晉之情亦可見矣城中城中城者郭之內而宫之外也此舉蓋懲莒而備楚歟季氏私考按中城之城本以完舊義所得為時亦未失而春秋特書以其久廢不修而取急於一時耳胡氏之說蓋在德不在險之意非謂中城不必城也十年春衛侯之弟黑背帥師侵鄭季氏私考黑背不稱公子未為卿者也而特使帥師則以弟故寵之耳寵隆則必親信而權奸繫觀望矣至其子公孫剽為孫林父逐君而得篡得非黑背因寵而嘗市私恩於林父歟夏四月五卜郊不從乃不郊季氏私考五卜郊卜在四月也以十二月下辛卜正月上辛正月下辛卜二月上辛二月下辛卜三月上辛三月下辛卜四月上辛四月下辛卜五月上辛則不郊五卜不從魯已自知其瀆故不復再卜而遂不郊耳皇天不享其可畏也哉五月公㑹晉侯景齊侯靈宋公共衛侯定曹伯宣伐鄭屬詞晉人執鄭伯而鄭不急君景公有疾晉人立太子州蒲為君而㑹諸侯伐鄭歸鄭伯以求成急於得諸侯而悖其父子之教故不書公至又不得與他君討二同也齊人來媵媵伯姬於既歸宋之後且異姓來媵非禮也丙午晉侯獳卒景公卒太子州蒲五月先立以伐鄭秋七月公如晉此葬晉侯也而不書諱之也按成公在晉親送景公之葬魯人辱之故諱而不書不論諸侯在不在也還從傳為是季氏私考歷考晉之諸君其葬期恆速惟文公五月而葬其餘諸公則皆止三月又其國事之常也今景公之喪正當國家無警豈其幾及一年而始葬乎苟欲留公送葬則至季秋而事已畢矣何必又止五月邪蓋晉之留公乃善意也自晉反汶陽之田於齊其心不能無歉於魯而魯人事晉不改於初厲公新立鋭志報秦而孫林父獻謀又將圗狄欲合諸侯非魯不可故久留示好以致殷勤通情欵而服二闢逺之謀亦密以為託矣故公既歸而郤犨即來報聘其意豈有不善哉然以國君不能自立為人役而不知恥止之送葬則欣然獨留雖諸侯事天子未有是禮也故於葬晉景公沒而不書蓋魯史亦以為諱使若不為送葬留公者然而在外留連逸遊忘反其失亦具見矣冬十月十有一月春王三月公至自晉晉侯使郤犨來聘且蒞盟己丑及郤犨盟夏季孫行父如晉因晉厲新立報郤犨之聘且往蒞盟也秋叔孫僑如如齊季氏私考自蟲牢以來晉復與齊相厚故魯亦親齊而十四年如齊逆女之議始於此矣冬十月十有二年春周公出奔晉周公不繫之宰見其不兼冢宰而權輕也季氏私考是時尹子單子専政三公無權而周公又不能以禮立身猶將求利故為其所輕而至於見逐自周公奔而尹子單子劉子相繼出㑹諸侯肆無忌憚又不若蘇子時猶有畏心矣又云周公楚與伯輿爭政但所謂伯輿者不知為何人而周之政權方在尹單逼周公者必不在他族或結黨相排則未可知耳夏公㑹晉侯厲衛侯定于瑣澤家氏曰晉楚相成關係不細春秋略而不書豈無意乎蓋春秋所以外蠻荆者乃帝王御外之道猾夏則禦之無王則伐之未有舉中國之大而求與蠻荆為盟好者也齊桓之與楚討而服之晉文之與楚敗而却之而霸者之職舉矣晉自靈成君昏暗而臣惰偷以避楚為得計至是因俘纍以通意遂交聘而為成晉固苟求安佚而楚實怙其強大略無息肩之意後三年渝盟伐鄭無所恤也又其後宋向戌復持弭兵之說為盟而長楚遂使中國諸侯北面於荆楚之庭申之㑹冠屨倒置其禍端實兆於此故瑣澤之㑹書法如此不與晉為此㑹也王氏經世按左氏傳全然與經不合經之所書㑹于瑣澤者晉魯衛也傳之所載則宋合晉楚之成盟于宋西門之外者是晉人宋人楚人也而如晉聽成㑹于瑣澤者又鄭伯也非衛侯也魯又初不與也不知何年之事而左氏誤附焉其不足信明矣趙氏謂此若實事則無不告諸侯之禮經不應不書也蓋舊說有晉令鍾儀歸求成事竟不集左氏遂誤而附㑹為此傳耳西亭辨疑劉氏曰瑣澤之㑹本以合晉楚之成也今楚不至魯衛是㑹何邪且合晉楚者宋也宋亦不與又何邪按劉氏辨折左氏之誤是矣但不解此㑹何為蓋晉侯初立合魯衛于瑣澤將以伐秦也故明年使郤錡來乞師前目後凡知為伐秦必矣秋晉人厲敗狄于交剛是年交剛僖三十三年敗箕昭元年大鹵陳氏曰中國敗夷狄不書唯書晉者皆病晉也晉率天下以攘夷狄存中國也前年狄侵齊去年狄侵衛而晉不救於是伐晉蓋僅而勝之也高氏曰此狄蓋白狄九年秦狄伐晉此先敗狄而後伐秦是知報九年役也按左氏謂狄侵晉晉敗之然交剛乃狄地狄果侵晉而晉乃敗之於狄地即窮追能然耶陳氏謂晉區區爭地於羣狄自宣成間已然此與高說似近之而左氏之說非也冬十月十有三年春晉侯厲使郤錡來乞師按乞師乃晉自貶伯體本詞卑如此爾非春秋為之貶其詞如胡氏所云特書曰乞也季氏私考郤錡克之子晉卿也晉欲伐秦而卑辭下魯如此可見昔止公本善意晉每征伐常遣使徴兵不待求也厲公之時於魯屢言乞師者蓋晉失諸侯人心懈怠魯為人望苟有難意恐諸侯亦且有辭故特使貴卿卑辭以求之而於他國禮必執謙威令不及往日矣乞師於魯亦以東方諸侯託魯也是年郤錡十六年欒黶十七年荀罃十八年士魴屬詞凡徴師諸侯以伐叛討二乃伯者之義所得為晉至厲公諸侯每二於楚於是將伐秦伐楚恐伯令不足以風動列國故五年之中三遣貴卿乞師於諸侯悼公初立亦襲其禮蓋晉之伯業日卑矣三月公如京師季氏私考朝必於王見必以日如公朝于王所言日是也書三月公如京師而不言朝於王是過而不朝也若果朝王者則當於公如京師之下書某日朝于王矣諸侯至京師禮無不朝者必天子辭焉諸侯習為故常遂不入王城王靈益不振矣夏五月公自京師遂㑹晉侯厲齊侯靈宋公成衛侯定鄭伯成曹伯宣邾人定滕人文伐秦季氏私考遂者急於後事之辭云自京師則非至京師而始為㑹明矣其道由函谷關入東諸侯之便也秦至僖公時始與晉文公敗楚城濮而預於溫翟泉之盟然皆序於諸小國之下及文公卒而始與晉抗其後互相報復兵革相尋宣成之間秦勢漸盛故十一國盟蜀推楚主盟而秦則偃然序於宋陳諸國之上矣既而乘晉之衰遂與白狄伐晉此晉人之所痛心而未克逞志者也厲公初立鋭意報秦欲集人心則善魯以厚其禮欲資兵力則乞師以卑其辭經營二三年間亦唯伐秦一事而已然而內無用賢厚本之政外失反已息爭之方而徒欲以威制強國卒亦何以服秦哉曹伯廬卒于師宣公卒成公負芻立負芻欣時皆宣公庶子高氏曰非戰死也死于行爾榖梁以為閔之者非秋七月公至自伐秦孫明復曰不以京師至者明本非朝京師也冬葬曹宣公十有四年春王正月莒子朱卒即渠丘公卒犂比公密州立夏衛孫林父自晉歸于衛衛侯如晉晉侯強見孫林父焉又使郤犨送之以歸其挾晉令而歸乃事實為尤著者也王氏經世按林父此年歸國襄十四年逐衛獻公立公孫剽其冬㑹于戚而不能討二十五年獻公入于夷儀二十六年林父入于戚以叛晉㑹澶淵反為林父討衛疆戚田取衛西鄙懿氏六十以與孫氏此晉黨孫氏之本末也歸易詞也自晉奉之故也季氏私考林父奔七年矣而田祿未收故歸不稱復不惟宗強亦以晉之庇也然林父所以久不得歸者衛定公尚能為主不之聽耳是冬衛定公卒此時必已有疾故晉人奉之而歸強臣介恃大國而不知有君晉實為之也何以為盟主哉秋叔孫僑如如齊逆女公即位十有四年迄今始娶豈亦主娶齊女而待年未及歟鄭公子喜帥師伐許季氏私考許之棄晉從楚久矣鄭伯始因晉伐而伐許繼因晉執而圍許皆以許不圗救也至是鄭方從晉則遂恃晉而陵許矣晉霸失道而不知所以恤鄰服二許安得不遷葉以依楚乎又云鄭伐許而楚不救者是時楚方以備吳為急姑待而徐舉也故明年六月楚始伐鄭九月僑如以夫人婦姜氏至自齊按稱婦有姑之詞以是時宣夫人穆姜尚在也以者不待公逆而徑以之至於國也僑如以卿逆未為失禮但不待君迎於所館而輒以之至國此則為非正爾冬十月庚寅衛侯臧卒定公卒子獻公衎立秦伯卒桓公卒子景公立十有五年春王二月葬衛定公三月乙巳仲嬰齊卒胡傳嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊以弟後兄此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣劉炫曰仲遂受賜為仲氏故子孫稱仲氏是也啖助曰時有叔肸子公孫嬰齊此故稱仲以别之問書仲嬰齊與叔老無異矣何以見譏其為兄後乎茅堂胡氏曰嬰齊乃公子遂之子當稱公孫今魯人以之後歸父書曰仲見其以父字為氏可謂亂昭穆之序矣何氏謂不言仲孫明不與子為父孫也按魯自有仲孫蔑叔孫豹故叔彭生叔老不言叔孫則仲嬰齊宜亦不書孫矣季氏私考謂嬰齊乃歸父弟之子而遂之孫又謂歸父字子家其孫以王父字為子家氏本非無後者據君薨家遣之說東門氏逐之之說則歸父果已無後於魯矣以弟後兄自是魯人差失處胡傳說是不必更為鑿說也癸丑公㑹晉侯厲衛侯獻鄭伯成曹伯成宋世子成齊國佐靈邾人定同盟于戚季氏私考晉景之時諸侯已二厲公新立不能以德撫綏而即以伐秦為事大合諸侯逺勞師衆人心又解體矣故復合諸侯以盟戚焉戚衛地即孫氏之邑也孫氏出衛武公至林父八世則其受戚久矣去年林父歸衛晉即就戚而同盟亦以親林父也晉侯厲執曹伯成歸于京師季氏私考自晉文執衛侯外凡執人未有不歸京師者晉厲豈獨不能専治曹哉為王執也蓋晉侯伐秦諸侯雖不朝王然必私致禮焉曹宣公以疾卒禮不能備王必以此言於晉故厲公親執曹伯于㑹以歸京師曹宣已死責及嗣君此正周之失君道處直書而義自見矣曹伯不名無所屈辱之詞也按曹伯執而歸于京師之時諸侯將立子臧子臧為欲守節而逃則負芻殺太子事决無有有則子臧之讓國非宜矣以此知季氏私考執曹伯乃為王執理容有之而左氏殺太子之說非也今取西亭辨疑胡忠簡一段明其事如左西亭辨疑胡忠簡曰曹伯之罪於經無據左氏謂曹伯卒公子負芻殺太子而代之若然則負芻殺未踰年之君與齊商人弒舍罪均矣安得略而不書又曰㑹于戚討曹成公果討之安得更與同盟邪公至自㑹夏六月宋公固卒共公卒子平公成立楚子伐鄭傳遂侵衛及首止鄭子罕侵楚取新石季氏私考趙鵬飛氏曰前年鄭公子喜無故而伐許許楚之與也鄭晉嘗伐許而楚不問以鄭亦在楚耳今鄭從晉而伐楚之與國楚能不惡鄭乎故楚子伐鄭為許也鄭有以招之也秋八月庚辰葬宋共公季氏私考宋共公卒不書曰非訃也宋近於魯而共公又魯宣之壻何以不訃乎宋亂故也蓋宋昭公時華氏之族逐蕩氏而蕩山者意諸之子也故因共公之卒而與桓族謀逐華氏諸大夫不協國內不靖故不訃喪也然魯以共姬之親雖不來訃亦遣人吊之魯使往弔即已知其葬日而㑹者如期而往故葬則書日也三月即葬必共姬以嗣子幼弱羣臣交爭恐有他變而急於襄事如此喪禮之苟可知矣宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚宋殺其大夫山山即蕩澤司城意諸之子稱國以殺而山不書氏不書氏所以别其非無罪以不氏見其罪則稱國者有司法守之辭也魚石公子目夷曽孫胡傳元之出奔晉與歸于宋皆不省文者著其正也書之重詞之復必有美惡焉詞繁而不殺所以與之也以不賴寵而出奔以國人與晉皆許之討而後入正可知矣按魚石之自止元於河上也畏其挾晉援以討而桓氏皆無祀於宋也其既許元討山而終不免於去也為與山有親而嘗同惡恐見及也但所奔在楚而宋中國要樞為楚所欲爭致其助魚石入彭城釀成他日之大禍則魚石之罪大矣春秋所以不登叛人深罪之以此冬十有一月叔孫僑如㑹晉士燮齊高無咎固之子宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離季氏私考鍾離古嬴姓子爵國名晉屬淮南郡隋唐為濠州即今鳯陽府臨淮縣地故城在舊府城東六里西近州來杜元凱曰鍾離楚邑淮南縣蓋其地在淮南夀夢時吳楚是也以此為界杜佑所謂鍾離互為吳楚之邊邑吳以號舉本其夷狄之恆稱爾私考又云前此八年吳伐郯入州來聲勢已可畏而中國又方病楚故皆俯首親吳以鍾離為吳之界使楚畏敵緩於北爭雖屈於強夷而不計也晉霸之不振可知趙鵬飛氏曰晉欲得鄭當先制楚制楚當先結吳楚忌吳之斷其後必不敢長驅鄭郊此說得其意矣王氏經世按先儒因再書㑹而生外吳之說其實諸國之大夫先相約集而後㑹吳于鍾離春秋據事直書耳若曰外吳獨不外楚乎㑹楚何以不殊㑹也趙氏謂再㑹亦非是兩畨㑹合但只於此一地而先相約㑹然後㑹吳云爾許遷于葉王氏經世按許此年遷葉昭九年遷夷十八年遷白羽定四年遷容城皆避鄭也又二年卒滅于鄭十有六年春王正月雨木冰高氏曰雨著木而成氷上溫而下寒也後世此異多應在大臣夏四月辛未滕子卒文公卒成公原立季氏私考此滕子左氏以為文公然孟子時亦有滕文公不應祖孫同諡雖當時諡法已廢孫諡與祖同者容或有之然亦微有所别如晉文侯諡文而重耳亦諡文公是以公别於侯也魯齊姜諡齊而歸氏亦諡齊歸是以歸别於姜也今滕有二文公則其後世子孫將何以别稱謂乎左氏所傳必誤也鄭公子喜帥師侵宋傳楚子自武城使公子成以汝隂之田求成于鄭鄭叛晉子駟從楚子盟于武城夏鄭子罕伐宋宋將鉏樂懼敗諸汋陂鄭人覆之獲將鉏樂懼衛侯伐鄭至於鳴雁晉侯將伐鄭楚子救鄭季氏私考宋魚石在楚故鄭為楚侵宋將返魚石也高閌氏曰鄭服中國五年矣至是附楚為楚加兵於宋故書侵自是與楚同病中國諸侯之兵無寧歲矣六月丙寅朔日有食之晉侯使欒黶來乞師季氏私考左氏傳曰晉侯將伐鄭欒黶來乞師程正叔曰時以叔孫僑如將作難故師出後期高閌氏曰晉失霸主之義不足以令諸侯恐諸侯厭惡伐鄭之役特使卿來乞師實欲公親行耳今按晉之乞師託魯最重而欒黶之來執禮亦卑他國視魯以為進退則魯公之不至晉怒獨重矣甲午晦晉侯厲及楚子共鄭伯成戰于鄢陵楚子鄭師敗績胡傳不書師敗績以其君親集矢於目而身傷為重也當是時兩軍相抗未有勝負之形晉之捷也亦幸焉耳幸非持勝之道范文子所以立於軍門有聖人能內外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譖而誅三郤國內大亂聖人備書以見行事之深切著明也季氏私考鄢陵鄭之東南鄙也晉以孤軍越其國而與楚相接於此晉固未及伐鄭而楚亦未及救也蓋晉將伐鄭鄭人聞有晉師使告於楚晉師濟河聞鄭引楚師將至急趨爭利遂遇鄢陵勇於一戰晉吕錡射楚共王中其目而薄楚於險因以致勝耳晉伯中衰厲公敗楚鄭于鄢陵鄭猶不服三請王臣㑹伐鄭而鄭從楚益堅王氏經世按中國勝楚者城濮鄢陵二戰而已城濮之勝文公之治國訓武經營有年一戰而霸猶且不喜而憂知一勝之未可恃也厲公鄢陵之捷豈其成謀不愆於素哉亦幸而已一勝之後無以居之如後此聽僑如之譛而拒魯公舍行父聽公子茷之譖而殺三郤反不為晉國之福也范文子蓋知之矣楚殺其大夫公子側按楚共身在行間以罷卒致敗而殺司馬側異於秦穆之不替孟明矣嬰齊以令尹將左軍而與側相惡致有此敗殆亦不得無罪也故稱國以殺見君大臣同責云秋公㑹晉侯厲齊侯靈衛侯獻宋華元平邾人定于沙隨不見公胡傳沙隨之㑹晉不見公是魯侯之大辱深可恥焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂橫逆之至者也沙隨之㑹魯有內難師出後期所當恤者晉人聽叔孫僑如之譖怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎所以直書而不諱也季氏私考是時季孫行父當國而仲孫蔑以賢為輔故二卿皆以賢稱僑如忌之欲使得罪於晉故搆於君母將為內難以致師出後期因而譖之耳魯侯自反非有大咎晉聽僑如之譖不明甚矣春秋直書不見公以明曲不在公也公至自㑹公㑹尹子成公晉侯厲齊國佐靈邾人定伐鄭是役也晉猶以僑如之譛不使公與其事傳知武子以諸侯之師侵陳遂侵蔡諸侯遷於潁上鄭子罕宵軍之宋齊衛皆失軍季氏私考自此以後厲公凡三伐鄭而皆有王臣與焉以鄢陵之役徴兵不至故假王臣為重以脅諸侯耳然而諸侯之兵終不合一其末猶至於荀罃乞師非由厲公無服人之德哉曹伯歸自京師傳曹人復請於晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出公羊傳執而歸者名曹伯何以不名而不言復歸于曹何易也其易奈何公子喜時在內也公子喜時在內則何以易公子喜時者仁人也內平其國而待之外治諸京師而免之其言自京師何言甚易也蓋即曹伯歸之易所以歸其美於喜時也九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊僑如自此不經見蓋終于齊而不復返也高氏曰季孫得釋將與公偕歸故僑如懼罪而出奔魯人立其弟豹以為叔孫後是謂穆叔十有二月乙丑季孫行父及晉郤犨盟于扈高氏曰沙隨之㑹既不見公伐鄭之㑹又不得與而國之宗卿於是見執公倣徨於外以求自明於晉僅能使僑如見逐季孫受盟而公免於難焉方秋而出盡冬而歸始以伐鄭出㑹而不得與乎其事君辱臣執亦國之深恥也及公之歸不可以伐鄭致故託曰至自㑹以見公之不與於伐鄭也公至自㑹初行父之見執也公待行父偕歸焉既而行父從公歸故雖見執而以從公歸則不書至舉公為重也乙酉刺公子偃偃宣公之子而成公之弟也屬詞穆姜僑如之謀公子偃所不知雖加之罪而事不可書故但言刺而已穆姜指偃與鉏曰是皆君也蓋欲激公使逐二家非真有廢立之意季孫歸而殺偃遷怒也不及鉏鉏幼公不忌也十有七年春衛獻北宫括帥師侵鄭傳鄭子駟侵晉衛北宫括救晉侵鄭則此師蓋晉命也夏公㑹尹子單子晉侯厲齊侯靈宋公平衛侯獻曹伯成邾人定伐鄭傳楚子重救鄭師于首止諸侯還六月乙酉同盟于柯陵謀復伐鄭也秋公至自㑹伐鄭而以㑹致伐無功恥言之也齊高無咎出奔莒季氏私考高國既去崔氏則事權自己出矣然慶克者崔氏之黨也而無德以服之安得不致其譖害乎此高無咎國佐所以不能自保而崔氏於是復進矣九月辛丑用郊九月夏之孟秋不卜日不卜牲而強用其禮焉故曰用郊胡傳郊之不時未有甚於此者也故特曰用郊用者不宜用也屬詞用郊者用其禮以祈福而不為農事也成公以國有內難君臣外見執辱而頻年出師未已故竊天子類造之意用郊祀以告事而祈焉在魯郊中尤為僣妄此用郊之非禮也晉侯使荀罃首之子是為知武子來乞師冬公㑹單子晉侯厲宋公平衛侯獻曹伯成齊人靈邾人定伐鄭傳庚午圍鄭楚公子申救鄭師于汝上諸侯還孫明復曰鄭與楚比晉厲三假王命合諸侯以伐之而不能服中國不振可知也十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤蓋從公伐鄭還而道卒也十有二月丁巳朔日有食之邾子貜且卒定公卒宣公牼立晉殺其大夫郤錡郤犨郤至季氏私考郤錡郤克之子郤犨之從姪而郤犨則郤至之伯父也欒郤自傾危趙氏之後權勢日張而郤氏一族三卿尤為強盛不惟胥童惡之雖欒氏素為黨者亦忌之矣况厲公以寡恩輕聽之君讒言安得不易入哉故謗一至而胥童等遂奉君以攻郤氏蓋執之而治以國法也故稱國然郤氏雖多怨而未有必誅之罪也故不去其大夫左氏所載長魚矯等以戈殺三郤則是國人亂殺之辭非稱國以殺之意也孫明復曰君之卿佐是謂股肱厲公不道一日而殺三卿此自禍之道也誰與處矣故列數之以著其惡楚人滅舒庸楚敗鄢陵之後舒庸有異志於吳故楚滅之十有八年春王正月晉殺其大夫胥童克之子甲父之孫季氏私考胥童既致三郤於死遂欲併害書偃則生亂之道也故書偃得以亂國為辭而致胥童於國法王氏經世杜氏曰厲公以私欲殺三郤而三郤死不以無罪書書偃以家怨害胥童而胥童受國討文明郤氏失民胥童道亂冝其為國戮也吳澄氏曰殺胥童者書偃也而書國殺蓋二子當國而以國法殺之也然殺胥童書偃之私也故不去其大夫庚申晉弒其君州蒲屬詞告不以名氏故但稱國以弒必弒君者當國國人皆逆賊之黨故無能以名氏告者若欒書中行偃是也愚謂𫝊使程滑弒之使字誤蓋書偃執公將易置其位而滑遽弒之廢公是書偃意弒公非書偃意其來告也不具弒者名氏故魯史因而書國聖人亦因之為此若果使滑弒則豈可輕縱如此耶主張氏說為是張氏曰書偃晉之世臣以社稷為心可以行易位之權而程滑遽弒之故不言二卿分其惡於衆也廬陵李氏曰晉伯在靈成景厲之世其權卑於列國矣楚莊乘晉之衰其事進乎方伯矣然春秋書伯在晉不在楚者存中國也自文六年盡成十八年凡四十九年為靈成景厲之繼伯先儒李氏曰靈公政墮柄分無抗伯業之志成公力弱事淺無伯諸侯之權景公心勞謀舛無制中夏之略厲公外強中乾無服人心之道四君雖執夏盟非復文襄之舊矣靈公以少主蒞強卿上驕下肆楚始爭鄭蓋將嘗試晉政於是有狼淵之師此非細故也而救鄭之役止書晉人衛鄭欲介魯以求通蓋未忘晉德於是為沓棐之㑹此關大勢也而新城之盟晉侯不出扈之盟曰討齊難扈之㑹曰平宋難蓋君臣之大倫人道之不可廢此豈常變也或求賂以免或無功而還范山曰晉君少不在諸侯北方可圖也夷狄謀取其伯方且沈溺宴安厚斂以雕牆輕殺以愎諫欲不亡得乎故曰無抗伯業之志也成公若有其志矣內難甫靖履國未長四年而後始出偏師以侵陳黑壤與扈二㑹僅能再合列國而已黑壤以服鄭扈以服陳亦庶幾改物也然始之不能有為者凡數年外而楚人三嵗三伐鄭晉無攘却之謀內而鄭子家弒君晉無討賊之刑諸侯何所觀焉故曰無主諸侯之權也景公若能收其權矣規模失序徒勤諸侯不能首合與國大修同盟以治即異之黨使楚人得號令于辰陵乃且亟㑹櫕函求山後戎狄以為先務是孰緩孰急也不能謀少西氏之逆以誅陳之惡使楚得行方伯之事方且修房帷一笑之憾興大師以伐齊得已不已孰重孰輕也不能統一六師搜繕卒乘以一矢遺楚使邲不振旅為中國羞乃伐牆咎如滅赤狄哆然言功是孰害孰利也蟲牢馬陵于蒲晚年三㑹竟莫駕楚故曰無制中夏之略也厲公若有其略矣德薄而多大功慮淺而數得志觀厲公不特純以汰心行之亦假義飾譽者也歸于京師而後正曹負芻之罪請於王官而後進駕鄭之威此類可欺世自掩矣晉之所忌曰楚曰吳曰秦曰狄厲公自交剛敗狄而狄服㑹京師伐秦而秦恐戰鄢陵勝楚而楚弱㑹鍾離通吳則吳成四鄰無釁而諸侯反二是以沙隨辱魯猶未快也而求多季孫柯陵伐鄭猶未已也而再厪單子諸侯無患而蕭墻反危是以三郤之誅成而匠麗之難萌故曰無服人心之道也齊殺其大夫國佐西亭辨疑四明程氏曰按左傳齊殺其大夫國佐以榖叛故非也如國佐以榖叛則當書曰齊人殺國佐與晉人殺欒盈同一辭不得言齊殺其大夫矣且叛逆而立其後又寧有是理哉季氏私考國佐書大夫則左氏所謂棄命専殺以榖叛者乃當時文致之辭也若夫怙權賣直而為人所忌則誠有之耳李亷氏曰此為齊崔慶専國之始事也王氏經世按是時齊有慶克實通於聲孟子靈公入孟子巧言刖鮑牽逐高無咎既盟國佐而復之而又殺之故稱國以殺罪纍上也國勝何罪又殺諸清慶克死未正其討又秩其子刑賞如是宜乎慶封稔禍政歸陳氏也歟公如晉悼公立而朝之也夏楚子共鄭伯成伐宋宋魚石復入于彭城胡傳此伐宋以納魚石其不曰納宋魚石于彭城何也劉敞曰不與納也大夫失位諸侯納之非正也大夫不世也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是矣孫氏曰此楚鄭間晉之變伐宋取彭城與魚石守之以逼宋也其曰宋魚石復入于彭城者不與楚鄭伐宋取邑以與宋叛臣也故以魚石自入犯君為文王氏經世按楚為是舉非直納宋之叛臣其意尤在隔吳晉之道也晉之通吳蓋懼吳楚之合而為患于中國也是時楚方張而吳亦始大楚莊之世嘗盟吳越非直欲服屬之亦以已爭衡于中國而虞其為患於後也而吳人之氣不為楚下故晉用申公巫臣之計因而離之教之乘車教之叛楚吳楚爭強中國之利也吳既通晉明年遂興鄢陵之師大敗楚鄭吳興楚之肘下楚氣奪矣晉得吳不附楚晉得氣矣夫晉齊諸國不但中夏禮義聲名文物之所在亦自古形勝之區武勇強力之地也而顧患吳楚者諸夏處極盛之後文繁物夥漸生驕惰豢養之積雖強勇變為脆弱而蠻夷戎狄崛起僻陋鼓其全鋭以乘中國之衰所以能為吾敵也荆楚地大人悍與中國襟帶相接故窺便乘利為患最劇若吳則阻隔江海非中國引之豈能長驅於中國哉中國用吳牽制楚後實為得算惜不善用之而晉悼之後中國道消遂至以所以長楚者而長吳也宋天下之樞居晉楚吳三強之間楚今有事於宋非慮及此而欲以杜吳晉相通之道歟公至自晉晉侯使士丐燮之子是為范宣子來聘即位而拜朝也襄陵許氏曰公朝始至而聘使繼至晉悼之下諸侯肅矣此列國之所以睦而叛國之所以服也秋把伯來朝問晉故公以晉君語之把伯於是驟朝于晉而請為婚後晉以悼夫人故合諸侯城把又使魯歸把侵田於是把文公來盟屬詞把君始終稱伯把君自貶抑之意稱於他國皆然其間或稱子者為魯人所卑也然把自桓公而後稍能自強既昏於晉世從盟主征伐雖不朝魯而終春秋六君魯皆㑹其葬不敢侵暴之矣八月邾子宣來朝邾宣既立故來朝築鹿囿盛暑為此其縱欲勞民可知己丑公薨于路寢廬陵李氏曰成公在位十有八年自鞍戰以後汶陽未歸之前魯事晉甚謹自汶陽歸齊之後魯之於晉嫌郤已主然方其事晉也東讎於齊南屈於楚丘甲作而兵政變四卿將而公室弱魯已無一事之可取矣及其得罪於晉也㑹葬而見止來聘而及盟沙隨困苕丘執而辱於外僑如讒夫人失德而亂於內魯自隱公以來未有如是者也及其末年幸悼公之興國家無事而又一時諸臣如季文子孟獻子子叔聲伯臧宣叔臧武仲皆賢智之資故能維持協贊以綏內難不然魯蓋不可為矣先儒李氏曰四卿得志於齊僅能免二鄙之侵而十年三朝三聘於晉不能免沙隨苕丘之辱如京師似可求尊周之名而㑹盟于蜀莫掩背華之失成公得不救失而不知其非也斯言信哉季氏私考成公柔弱之君也以世適嗣位四鄙未嘗被兵國亦可謂無事矣特以季孫行父當國聽其與叔孫僑如比周始則倚晉以報齊既而從楚以背晉既又事晉以致諸侯憚於強而不能自立者也故韓穿之言汶陽唯唯承命而卒歸于齊為國如此何以善後所賴仲孫蔑賢臣夾輔而季孫亦漸信向焉故二卿卒為僑如所忌而郤犨之譛幾於危國非有子叔聲伯委曲營救則僑如不以罪廢而魯政將盡移矣子叔聲伯之賢亦蔑之徒歟自是専意向晉而中國亦多賴之成公所以國體無失而正寢克終者安得不謂蔑之賢所致哉冬楚人鄭人侵宋傳晉侯師于台谷以救宋楚師還季氏私考楚本欲圗宋者也恃彭城有魚石無擬其後者則又與鄭侵宋矣晉侯使士魴士㑹子士燮弟來乞師季氏私考李廉氏曰晉厲公乞師三郤錡為伐秦欒黶為戰楚荀罃為伐鄭厲公不德人心未服矯以求諸侯也晉悼之乞師一士魴為救宋悼公初興霸事未定謙以接諸侯也十有二月仲叔蔑㑹晉侯悼宋公衛侯獻邾子宣齊靈崔杼同盟于虛朾屬詞晉悼公初立楚納宋魚石于彭城又侵宋悼公㑹諸侯于虛朾以謀救宋時成公薨未葬故魯獨以大夫往齊以遠故使崔杼季氏私考曰悼承厲之衰人心方散曹滕諸國多不至晉皆懷柔之而已但即見在者推晉主盟然悼有成伯安強之志是以雖當衰弱之餘而諸侯復合伯業復興焉丁未葬我君成公春秋事義全考卷十
