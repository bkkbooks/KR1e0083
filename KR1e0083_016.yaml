body:
  text: 春秋事義全考卷十六明薑寶撰哀公名蔣定公子蓋定姒所生恭仁短折曰哀元年春王正月公即位楚子陳侯隨侯許男圍蔡王氏經世杜氏曰隨世服於楚不通中國吳之入楚昭王奔隨隨侯免之卒復楚國楚人德之使列於諸侯故得見經定六年鄭滅許此復見者蓋楚封之也按入郢者吳也壞宗廟徙陳器撻其父之墓處其宫而欲妻其母者亦吳也不能報吳而釋憾於蔡楚既非矣乃胡傳謂蔡宜得報而楚之復讐為可恕不亦悖乎且誘殺侯般而滅其國用隱太子於岡山以一裘之故拘昭侯於南郢數年而後歸蔡之讐楚豈下於入郢使若所為者蔡人親為之始可謂楚宜得報而蔡之復讐為可恕今事出於吳蔡無與也蔡不能報楚而假手于吳出乎爾者反乎爾正可以為強而無道之戒乃以復讐恕之孰謂春秋有是法哉康侯之言為髙宗不復金讐而發也然宋則蔡也金則楚也欲勸其君復讐於夷狄而反恕夷狄之遷虐於中國義則踈矣書圍蔡則圍者之罪自見其稱爵乃國君自將之恆稱以為恕楚非也鼷鼠食郊牛改卜牛夏四月辛巳郊汪氏曰定公之薨未及小祥而僣行天子之郊禮釋凶服而從吉則為不孝於親矧郊之祭也喪者不敢哭凶服不敢入國門今在喪而蕆事則為不敬於天一舉而犯三不韙焉春秋書郊之失禮未有甚於此者也宣三年匡王未葬而不郊猶三望雖曰廢郊其罪與哀公等爾秋齊侯衛侯伐晉伐夷儀不書書次五氏伐河內不書書次垂葭公會齊衛于牽帥狄師襲晉戰于絳中猶不書也諸侯之無伯春秋誠有不忍書也必於是而後書春秋蓋將終焉是故春秋之初諸侯無王者齊鄭宋魯衛也春秋之季諸侯無伯者亦齊鄭宋魯衛也季氏私考齊衛五氏垂葭蕖蒢之次本為懼晉出師之故及晉師不出而遂伐之霸統亡矣許翰氏曰晉為盟主而諸侯至於合從以伐之春秋特書以著中國之無霸也冬仲孫何忌帥師伐邾髙氏曰觀定公之末邾之事魯至矣去嵗邾子來奔喪今逾年而遽伐之蓋魯人謀邾利取其田不復知有禮義也季氏私考何忌當孔子用魯時觀其盡力於公室多合禮義及孔子去魯此年遂伐邾六年復伐強家擅兵貪利不能以禮義自克其習非一日矣何忌亦無能改於其德昔之學於仲尼者何如哉二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹季氏私考漷東沂西田在繹山東南蓋邾城在繹山之陽即今鄒縣也句繹繹山之曲也杜元凱曰邾地定公之薨邾子來奔喪何忌何為而伐之蓋三家之中季氏最強叔孫附之邾子所事者二家仲孫氏必有所不悅故何忌因哀公即位邾子不賀執此辭以伐之也夫邾豈誠善事二家者不得已耳而二家貪利之私不能不因何忌之舉而動故三卿同伐邾也其所取漷東沂西田則三家所議共分者也然漷東沂西之田近於季氏之費邑而叔孫之郈在魯西鄙仲孫之成在魯北鄙去邾田為逺懼季孫之強而專其田也故叔仲二家獨與邾子盟於句繹而季孫不與焉其盟邾子亦如後世之立劵約耳先儒以為各盟所得而季孫獨無非也蓋近費之田季孫所利豈以專國強臣肯讓二家而不取乎故邾田之分三家之所同利也沂西言及者蓋魯先取邾田自漷水則漷東之田最所切近本其所欲得也而因以及沂西耳夏四月丙子衛侯元卒靈公卒蒯聵之子輒立季氏私考衛靈公無道之君也主威不立而盜得以殺其兄家政不修而妻得以逐其子事無名而每興逺役行無信而屢召敵兵觀孔子因其問陳而明日遂行其不足與有為可知矣然而不至於喪者以有仲叔圉治賔客祝他治宗廟王孫賈治軍旅三子皆非純臣徒以其才足任使令而可具臣數故倚之以苟自逸然有一蘧伯玉而不能用豈真能任賢者哉其不亡幸爾滕子來朝哀公新立故也晉趙鞅帥師納衛世子蒯聵于戚胡傳趙鞅帥師以蒯聵復國而書納者見蒯聵國人之所不受也國人不受而稱世子者罪衛人之拒之也所以然者緣蒯聵出奔靈公未嘗有命廢之而立他子及公之卒大臣又未嘗謀於國人數聵之罪選公子之賢者以主其國乃從輒之所欲而君之以子拒父此其所以稱世子也納于戚內弗受也輒拒父也後十二年而蒯聵入于衛衛侯輒來奔則是輒以拒父而奔也世子正也屬辭比事則輒罪萬世不可掩矣時晉卿方內叛故趙鞅不能伐衛而納于衛邑與弗克納同季氏私考蒯瞶本奔宋而趙鞅納之者必因靈公卒而至晉求納也衛人已立輒故蒯聵不得入而但居于戚耳孫明復曰其言于戚者為輒所拒不得入於衛也按定十四年衛世子蒯聵出奔宋今靈公既死輒又已立猶稱曩日之世子見蒯聵當嗣孔子正其名而書之也書之所以為君臣父子之大經也不然貪國叛父之人接踵于世矣髙閌氏曰靈公卒衛人以世子在外遂立其子輒使輒知己之得立者以父為世子故因逆其父而還以位則子道得而亂息矣奈何他人納其父而反拒之耶秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐵鄭師敗績鐡丘名今開州有鐵丘即此季氏私考按左氏齊人輸范氏粟鄭罕達送之士吉射逆之趙鞅禦之遇于鐵如此則是鄭人為齊致粟於范氏也夫鄭雖與齊合黨盟鹹然安甫一會之後鄭亦不與齊通觀鄭罕達伐宋而齊不知宋皇瑗侵鄭而齊不救則可見矣且齊苟有粟欲輸范氏何不遣兵徑致朝歌主衛以為防護而乃使鄭越疆代送邪蓋鄭本叛晉幸其有范中行之亂或將以兵助二逆而趙鞅者范中行之仇也聞有鄭師則邀擊而敗之耳鄭不量力而欲與霸國爭雄且以黨叛名其敗宜矣按趙鞅此師即納蒯聵之師也遇鄭師于鐵知其助范中行而來故邀擊而敗之季氏之説是也冬十月葬衛靈公十有一月蔡遷于州來避楚仇也蔡殺其大夫公子駟王氏經世初武王封叔度於汝南上蔡蔡叔以叛被誅成王復以封其子及平侯卒徙于新蔡至昭侯乃徙九江下蔡即州來是也季氏私考州來本楚屬國而為吳所滅則吳邑也蔡欲恃吳以抗楚故遷州來則遷州來蔡之本意也左氏以為吳人如蔡納聘而師畢入則當書吳人襲蔡蔡亦不當以自遷為文矣然先王封國當效死弗去棄而從吳豈謀國之善哉公子駟議必主於不遷未為失䇿也乃以其志在從楚而置之死故不去其大夫三年春齊國夏衛石曼姑帥師圍戚胡傳主兵者衛也何以序齊為首罪齊人與衛之為惡而黨之也屬詞蒯聵在戚而國夏曼姑圍戚齊人助子圍父也故雖有齊卿主兵而不繫戚於衛以蒯聵居戚故也戚不繫衛則輒不當有國父不可圍而齊人黨逆之罪重矣自夫子為正名之論當時髙弟如子路猶不能無疑修春秋時蒯聵猶在戚也蓋靈公嘗欲立郢而卒不立者知蒯聵在晉晉人必將納之郢雖立猶不立也而衛人立輒以拒父衛為無父之國矣是故蒯聵出入皆稱世子而戚不繫衛以鄭世子忽宋彭城鄭虎牢三特筆比而觀之春秋之法明矣髙氏曰曼姑為子圍父逆亂人倫莫甚於此齊國夏帥師助之故為惡首齊於晉為仇若蒯聵入則衛從晉矣此齊所以助輒也夏四月甲午地震五月辛卯桓宫僖宫災胡傳桓僖親盡矣其宫何以存季氏者出於桓立於僖世專魯國之政其諸以是為悅而不毁歟季氏私考桓僖祧久矣而不祧三家之意也三家尊桓而德僖宜毁而不毁而天譴以災非譴桓僖也譴三家也季孫斯叔孫州仇帥師城啓陽季氏私考啓陽漢避景帝諱改為開陽汪克寬氏曰沂州臨沂縣有故開陽城臨沂即今沂州也按水經開陽在祊之東南沂水流徑其東故鄅國也昭十八年邾人襲鄅鄅子從帑于邾然則啓陽者鄅之别名如虢之為下陽荆之為楚然非邑也其地在邾之東鄙今沂州南也然祊之西北為費則近於費而季氏之所欲也是時魯方討邾既取漷東沂西之田則邾人不得不以啓陽讓魯矣故城之然猶懼其有變也故二卿帥師並出而以兵威脅焉季氏以叔孫附已故與同城而啓陽之地則實季孫得之矣西亭辨疑魯伐邾取漷東沂西之田雖與邾盟猶懼其來伐故城啓陽以防邾也宋樂髠喜之裔帥師伐曹季氏私考曹伯陽奉樂大心入蕭以叛宋方有亂故且從齊盟洮而未暇致討今間齊景公之耄而怠無畏於齊而修曹之怨樂髠之師宋景志也曹陽背晉故晉不救自是疲於奔命身為虜囚尚誰懟哉秋七月丙子季孫斯卒斯卒而肥乃庶長子卒後嫡室南孺子生子焉公臣正常以告公使視之則或殺之矣朱子謂康子奪嫡即此蔡人放其大夫公孫獵于吳季氏私考獵既駟黨不附遷議則與蔡昭侯相忤者也故以國法放之于吳所以媚吳也冬十月癸卯秦伯卒惠公卒子嗣是為悼公叔孫州仇仲孫何忌帥師圍邾季氏私考季氏雖與叔孫同城啓陽而實專有其地叔孫必所不悅而季氏費邑在魯東鄙易於制邾必復以其所分叔仲二家漷東沂西之田并收焉邾人但知從強者之令稅之所入惟於季氏不復知有二家矣故州仇何忌乘季孫之新立復共圍邾責其背句繹之盟也按季氏未必并收二家田稅要是邾以二家私邑相去之逺而漷東沂西之稅惟季氏是勤而二家者或不如也故二家不悅責其背盟而圍之爾四年春王二月庚戌盜殺蔡侯申西亭辨疑豐氏曰蔡文公名申卒于宣十七年是也昭公文公之曾孫也豈同其曽祖之諱乎及觀石經申作由二字形相近或當以石經為正按蔡侯實翩弒而以盜殺赴國史因而書之左氏以為凡弒君稱君君無道也悖謬矣春秋凡言弒君不以君有道無道異詞所以正弒逆之罪也古今自湯武外君孰可弒弒君者亦孰可輕縱乎胡氏謂蔡侯無以守身而自衛夫人得而害之説亦未然謂盜得而害之則可蓋因其以盜殺赴而書即借盜殺以警為君如蔡侯者爾蔡公孫辰出奔吳季氏私考蔡昭公之弒雖不知主名而公孫辰為正卿必蹤迹可疑者也故因成公欲討而奔吳陳傅良氏曰書盜殺蔡侯申蔡公孫辰出奔吳則辰與聞乎殺矣葬秦惠公宋人執小邾子宋以小邾事魯而執之蓋因齊景圖伯無成而亦有志於爭權也夏蔡殺其大夫公孫姓公孫霍季氏私考蔡成公討弒父之賊而以公孫姓公孫霍為同謀也然姓霍皆國卿罪狀未明而殺之豈足以服人心乎故不去其大夫晉人執戎蠻子赤歸于楚晉主夏盟為日久矣不競至此春秋所惡故書歸于楚為楚執之之詞蠻子不名則屈服之詞而晉稱人則使人執之之詞所謂直書而罪自見者也胡氏罪之外之京師楚之説俱未然屬詞楚雖敗亡之餘羣臣能輯睦以事其君晉外失諸侯而強臣內訌自知非楚敵也是以執蠻子歸于楚城西郛備晉也六月辛丑亳社災亳社殷社也諸侯有之以為廟屏所以戒亡國亡國之社有屋使不得上通於天所謂不受天陽也以屋故災秋八月甲寅滕子結卒項公卒子隱公虞母立冬十有二月葬蔡昭公國亂故緩葬滕頃公五年春城毗備晉也夏齊侯伐宋汪氏曰定十四年齊侯宋公會于洮距此六年未有釁端而景公忽興師以伐宋豈以宋人伐曹執小邾恃強凌弱故託是討之以圖霸歟晉趙鞅帥師伐衛家氏曰蒯聵以父伐子晉趙鞅為之伐衛若私于蒯聵必求其入亦非春秋所許也况實以范氏之故而納蒯聵以為名乎秋九月癸酉齊侯杵臼卒張洽氏曰景公在位五十八年前有晏嬰後有孔子晏嬰告之以陳氏將竊其國孔子告以君君臣臣父父子子公亦知説而從之矣而卒不能用及大臣以未有太子告之反使之姑謀樂而勿憂無君卒致死肉未寒子弒國亂曾未十年陳恆弒簡公而移其社稷真范祖禹所謂治愈久而政愈弊年彌進而德彌退者景公之卒葬書于春秋豈不為享國日久而曽無逺慮者之戒歟季氏私考當時稱晏子以其君顯至其晚年興兵結怨大異往時意晏子必已老不在位自會夾谷之後亦遂謝世邪然則景公之善惡係於晏子之存亡者也難以言自立矣冬叔還如齊弔且會葬也閏月葬齊景公荼以非次而立故速葬六年春城邾瑕季氏私考瑕邾邑也故繫之邾按後漢志任城亢父注縣北有邾瑕城今考亢父在濟寧州南六十里當近泗水其東則漆閭丘之地也邾瑕謂之瑕必與魯負瑕連界而得名負瑕即瑕丘蓋在今兖州府滋陽縣東南界上而邾瑕在其南豈漢時割入亢父邪汪克寬氏曰邾瑕如魯濟之類魯有負瑕故稱邾以别之髙閌氏曰瑕邾邑魯未嘗取於邾而遽城之見魯之迫邾也晉趙鞅帥師伐鮮虞先是鮮虞納荀寅於柏人今鞅之伐蓋治范氏之亂也吳伐陳髙氏曰陳楚與也吳之入楚使召陳侯陳侯不來吳人怨之元年侵陳今復伐陳修怨也陳自是與吳成夏齊國夏及髙張來奔襄陵許氏曰陳乞將立陽生乃先逐國髙國髙奔而後陳乞弒君之謀得肆矣叔還會吳于柤以吳在柤故往會之始結吳好也秋七月庚寅楚子軫卒髙氏曰昭王委政囊瓦寵費無極使賢人誅戮諸侯怨叛入郢之禍宫汙冢發幾不免其身迄得反國而卒于位者國有一申包胥也廬陵李氏曰左氏載楚昭有死讐之志及其命公子啓為王與不肯移禍於令尹司馬等亦足見昭王之賢又載子西子期子閭之讓國不立亦足見三子之賢故楚不終衰又曰楚子疾卜曰河為􅑂王弗祭曰三代命祀祭不越望江漢睢漳楚之望也孔子曰楚昭王知大道矣此足以證諸侯不當三望之事齊陽生入于齊齊陳乞弒其君荼胡傳陽生曷為不稱公子非先君之子也景公命荼世其國已則篡荼而自立是自絶於先君豈復得為先君之子也陽生不子則曷為繫之齊陽生之不子其誰使之然也不有廢長立少以啓亂者乎父不父則子不子以陽生繫之齊著亂之所由生也王氏經世以天倫言則陽生長荼幼以父命言則荼受命陽生不受命直諸天王則國陽生之國也此所以以國氏也不直諸天王而自為篡奪則是不有其先君之命也不有其先君之命是自絶於先君而不得為先君之子也此所以不稱公子也里克中立所以成亂而非始謀觀從召比雖始禍而非當國陳乞兼之况身弒荼而其子田常再弒簡公終盜齊國豈常弒比乎髙郵孫氏覺曰陽生入齊而陳乞弒君則是陽生與聞乎故也不以陽生首惡者陽生之入陳乞召之荼之弒陳乞為之加陽生以弒君之罪則乞廢立之迹不明書陽生之入而陳乞弒君則乞之惡著而陽生與有罪焉冬仲孫何忌帥師伐邾季氏私考前三年何忌已與州仇並將圍邾意邾田之利仲孫氏所獲不及二家而邾方恃齊事魯多闕故何忌以為名而伐之宋向巢成之曽孫帥師伐曹髙氏曰樂髠伐之猶未服且為入曹起也七年春宋皇瑗帥師侵鄭季氏私考黃震氏曰齊景既沒宋妄意圖霸故既伐曹而又侵鄭報罕達之師且求諸侯也晉魏曼多絳曾孫帥師侵衛輒拒其父至今六年矣猶未納也晉不以此致討而為范中行氏加兵焉因五年伐而未服故又侵衛夏公會吳于鄫季氏私考鄫近邾吳夫差至此必略地也故公親往會之然邾亦吳之與也會吳甫罷而即伐之此邾人之所以奔告于吳而魯遂被伐歟秋公伐邾八月己酉入邾以邾子益來伐邾乃季孫肥之意時公制於三家非有君將之實也屬詞邾本魯之附庸入春秋已強天王命列於諸侯魯屢渝盟伐之故儀父閲魯三世弗一來朝瑣亦不朝于莊其後世婚于齊每恃齊以抗魯僖公伐邾者三文公伐邾者一定公以魯宣事齊之故朝魯者再世宣公朝魯者亦再世齊景公立齊魯之好復通邾子亦來朝至隱公益來朝來奔喪事魯愈謹而三家侵奪之不已至此入邾以邾子來則以齊景無能為以死而邾日以弱故也魯既歸邾子吳人執之而立太子革邾子復來奔又奔齊卒在春秋後王氏經世按伐邾者三家也公雖在行而無與於其事獲則三家享其利討則公受其惡春秋以諱不在公是以直書而不諱也舊説諱為隱其惡若隱其惡何名為直筆乎蓋諱避之諱也避其名而遜其辭以示尊敬云爾今言他人之遇屯否罪戾死喪恥辱則正言之至於所尊所敬則婉順言之此人之情春秋之意也魯自作三軍分公室而季孫宿帥師救台遂入鄆權不在公也搜于紅不書公兵不在公也襄公還自楚聞季氏取卞至於欲適諸侯地不在公也故納叛人叛邑凡內惡悉書而不諱矣以諱不在公也至於入邾則先言公伐邾下但言入邾猶為遜其辭耳遜其辭而不隱其實聖人待父母國之道也胡氏謂書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也其義迂矣宋人圍曹冬鄭駟𢎞公孫夏曾孫帥師救曹髙氏曰曹伯姦宋是以致討然宋之伐曹數矣今又圍之亦已甚矣故貶而人之苟將卑師少豈能圍之乎鄭與曹疏所以救曹非志於義也欲報皇瑗之師也八年春王正月宋公入曹以曹伯陽歸季氏私考宋人圍曹以鄭救不得志故景公親入其國而以其君歸暴虐甚矣左氏以為遂滅曹執曹伯以歸殺之按經不書滅書殺恐實未嘗滅未嘗殺也吳伐我凡外兵直逼國都言伐我後國書伐同家氏曰吳伐我以救邾而書法無褒辭者春秋之貴救貴義也茅成子之請救于吳也動吳子以利吳子悅於利而動是以率師造于魯之城下不責魯以存邾遽受盟而返何救之足言其後吳責報于邾者不已執其君而擾亂其國存亡國者顧如是乎汪氏曰哀公即位七年加兵於邾者五而且入其國俘其君自入春秋魯恃強陵弱未有若是之甚也此年書吳伐我比事以觀則魯之受伐蓋有由矣前此書侵伐必言四鄙見魯之國都猶足為守也至於是年吳兵直抵魯之城下則魯之四竟藩屏蕩然而國不足為國矣哀公之經兩書伐我若曰我能入邾吳能為邾而伐我我能會吳伐齊齊能興師而伐我雖據事直書而詳味書法亦有反已自咎之意焉按盟于城下經不書恐未必有此事魯服而後吳退師則有之吳之來伐稱伐我曲在我也言因吳之伐而我當有以反諸已此春秋之旨也夏齊人取歡及闡歸邾子益于邾歡在汶北非魯本封闡在汶南則魯封內地也及者有别之稱今寧陽縣有剛城屯即闡也秋七月冬十有二月癸亥把伯過卒僖公卒子閔公維立齊人歸歡及闡按左氏以邾子益為齊出則齊之取歡闡家氏所謂要魯以存邾是也魯重於失歡闡而歸益於邾也此歸邾益之後歡闡所以既失而復得也齊歸歡闡雖非心服而歸然於理為順而歸也此所以雖不書來歸而書歸也左氏以取歡闡為季姬未歸之故與益為齊出之説既已自相矛盾而季氏私考又謂齊取歡闡為欲得邾從已而非真念甥舅之情皆非矣以益來而取我歡闡歸益而亦即歸我歡闡非念甥舅之情而何此亦是人情之常胡氏以為遷善之優改過之大而春秋不諱入邾云云亦過矣九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍丘今把縣季氏私考雍丘把地界於宋鄭之間者左氏以為圍宋雍丘誤矣趙伯循曰取悉俘之也李亷氏曰自定十五年以來宋鄭結怨久矣故皇瑗悉力取雍丘之師罕逹悉力取嵒之師蓋不勝忿怨以至於此也夏楚人伐陳陳即吳故也秋宋公伐鄭汪氏曰鄭雖不義宋覆其師而盡取之亦云憯矣而又君親帥師以伐其國明年偏師再伐十二年向巢又伐十三年鄭人復取宋師然則宋鄭之喪師皆其自取之也冬十月十年春王二月邾子益來奔季氏私考邾子益嘗為魯囚何為又來奔邪蓋邾又見迫於齊也齊為邾故與魯為仇及邾益歸而歡闡復則齊又責報於邾而邾之強臣歸罪其君無所容身矣故來奔所以訴也公會吳伐齊三月戊戌齊侯陽生卒季氏私考公伐齊為邾子益之來奔也邾方附吳而魯怨既釋故公為之會吳以報齊也齊之訃亦以國喪告而罷魯吳之師也按齊陽生實係自卒非弒也請師于吳者乃邾茅夷鴻以為齊請齊辭者亦非也夏宋人伐鄭許氏曰既取其師伐而又伐惡其修怨不已也晉趙鞅帥師侵齊季氏私考髙閌氏曰齊帥諸侯以二晉可以討矣然趙鞅加兵於有喪之國聖人弗與也故書侵異乎士丐矣五月公至自伐齊季氏私考髙閌氏曰齊魯接境而公會夷狄犯之既聞其喪則遂班師可也所以久而不歸者公之進退制在吳故也葬齊悼公三月而即葬國亂懼有變也衛公孟彄自齊歸于衛輒方假齊以拒父彄蒯聵之黨也亦假齊命以歸國與以君命復者異矣薛伯夷卒惠公卒秋葬薛惠公冬楚公子結即子期昭王次弟帥師伐陳吳救陳季氏私考趙汸氏曰楚比嵗伐陳爭陳於吳也故吳救陳吳非能以存中國為義者利陳之私於我而已十有一年春齊國書帥師伐我胡傳春秋之記斯師特曰伐我者欲省致師之由也垂訓之義大矣季氏私考此報去年春會吳伐齊之役也魯之會吳伐齊起於邾子來奔則齊宜以邾為討顧邾方事吳魯必助之且以勝邾不武故尋兵於魯耳專務兵爭不義甚矣卒至見獲於艾陵其自取之哉按定公以前凡伐我者皆言四鄙見疆場猶有警備外兵不易至於國都也自陪臣執命法弛民玩而四境之備不嚴矣夏陳轅頗出奔鄭季氏私考陳轅頗濤塗四世孫轅頗之奔在楚伐陳吳救陳之後其必志在向楚為衆所惡而見逐也五月公會吳伐齊季氏私考趙鵬飛氏曰魯再會吳伐齊招夷以戕中國為惡大矣然公與會不與戰吳強魯弱也甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書艾陵齊地蓋在嬴博之北國書獲時未必已死秋七月辛酉滕子虞母卒其後不可考矣冬十有一月葬滕隱公衛世叔齊出奔宋季氏私考世叔齊即太叔疾乃世叔儀之孫而申之子也左氏載孔文子使疾出其妻而妻之疾通於初妻之娣文子怒將攻之訪於仲尼仲尼不對命駕而行疾奔宋文子使疾弟遺室孔姞是以疾為文子所逐也文子嘗以敏而好學不恥下問為孔子所稱不宜黷倫敗禮如此觀疾適宋即臣向魋則必悖逆之臣而不可以奪妻逐出之罪誣加文子也十有二年春用田賦胡傳魯自宣公初稅畝後世遂以為常而不復矣至是二猶不足故又以田賦也先王制土籍田以力而砥平其逺邇賦里㕓以入之多寡而量其有無使出軍旅之賦是賦出於商賈之里㕓而未始及於農也今用田賦軍旅之征非矣夫二猶不足而用田賦是重困農民而削其本何以為國書曰用田賦用者不宜用也用田賦者以田多寡出軍賦也王氏經世用田賦蓋托以軍用加斂於田計田而出貨財也大約稅畝多乎什一田賦又多乎稅畝矣稅畝私田始有征也用田賦者私田又加征也李氏曰田主出粟而賦則出於商賈之里㕓今魯以商賈所當出之賦而令農民供之則非古人重本抑末之意矣按魯於是時因逺交強吳役繁費多故又計田而斂取民財以充軍國之用如今田上之軍需也非是以商賈所當出之賦令農民代出之如李氏困農民而寬啇賈之謂也胡氏議弛商賈之征一段説亦欠明計丘而出兵車乃賦之常法今不計丘而計田以兵車之名斂貨財故曰用田賦夏五月甲辰孟子卒胡傳昭公不謹於禮欲結好強吳以去三家之權忍取同姓以混男女之别不命於天子以弱其配不見於廟不書於䇿以廢其常典禮之大本喪矣其失國也宜書孟子卒雖曰為君隱而實亦不可掩矣公會吳于槖臯槖臯吳地在淮南逡遒縣東南逡遒在今廬州府城東北七十里廢梁縣南三十里季氏私考吳既敗齊魯以為德將為之合諸侯以親之故公親至槖臯而與之為會非吳請尋盟也秋會衛宋于鄖意正為此秋公會衛侯宋皇瑗于鄖鄖吳地即發陽今揚州府之泰州在古有發繇亭其地也季氏私考此魯致衛宋以從吳也齊景公末年宋衛既皆背齊而魯亦與齊為仇矣魯為吳合宋衛所以為擯齊計爾左氏載子木子貢之言皆虛夸之説也衛人必不敢殺吳行人與辭吳盟而况會止三國惡得云會吳邪宋向巢帥師伐鄭季氏私考趙鵬飛氏曰宋鄭之怨於是十三嵗矣雖其兵端起於鄭罕逹然六年之間宋四伐鄭明年鄭罕逹遂取宋師于嵒逞兵不戢亦可戒哉冬十有二月螽十有三年春鄭罕達帥師取宋師于嵒孫明復曰報雍丘之師也宋向巢伐鄭圍嵒故罕逹圍宋師而取之夏許男成卒元公卒公會晉侯及吳子于黃池按黃池之會吳未嘗主盟中國當時晉與吳因魯以結好蓋吳之欲通上國將以雄長諸侯是其夙心晉以諸侯多叛而因吳以為重亦所欲也故魯請而二國從之以為會吳爭長於晉誠有之彼為久已稱王周室又於已為長其勢力又方強盛於晉故實有此意晉董褐復命於吳謂吳奄王東海以淫名聞於天子有短垣而自踰之以此彈壓吳是矣然吳本伯爵晉侯爵晉當先吳而晉自顧勢力則終不能駕吳也故寧遜於吳公許吳先歃晉亞之其實如此而春秋立文則不可先吳以紀又不可泯其實而紀也故書會晉及吳言會而及則兩大之形昭然而於事亦未為失此所以為春秋之文也公羊以為兩伯孫氏以為主在吳恐皆非季氏私考以為吳不爭而讓晉非也西亭辨疑謂吳欲因魯以交中國晉欲交吳以弭兵革之患説得之然以為吳有慕晉求會之意而非抗中國亦非也此當從國語先吳之説為長左氏謂為先晉者亦未然國語吳王夫差既勝齊殺申胥乃起師北征闕為深溝通於齊魯之間北屬之沂西屬之濟以會晉公午於黃池越王句踐乃命范蠡率師沿海泝淮絶吳路始率中軍泝江以襲吳入其郛焚其姑蘇徙其大舟吳晉爭長未成邊遽至以越亂告夫差於是用王孫雄之謀卒得先歃而歸楚公子申帥師伐陳子西昭王弟髙氏曰楚畏吳之強無如之何故乘吳之出會而伐陳於越入吳胡傳曾子曰戒之戒之出乎爾者反乎爾老氏曰隹兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣春秋初書於越入吳在柏舉之後再書於越入吳在黃池之後皆因事屬辭垂戒後世不待貶絶而見深切著明之義也而可廢乎秋公至自會晉魏曼多帥師侵衛髙氏曰蒯聵在戚十有二年矣晉人不能以此討衛乃以范中行故而數興師故書侵廬陵李氏曰晉事止於此先儒李氏曰讀隱桓之春秋而知王澤之竭也讀昭定之春秋而知伯烈之壞也晉伯復盛於悼公浸衰於平昭而遂廢於頃定夫晉以奕世九君之業豈無積纍之功著在中夏至頃定一壞而不可復收嗚呼廢興存亡未有無故而然者也嘗原晉事之顛末而察其所由失矣或曰晉之微也大變在夷狄有楚弗攘有吳弗抑二強並立伯權遂弱自召陵擁十八國之衆不能振旅至于戎蠻之執晉俯焉北面而事楚以京師之禮自吳滅巢滅徐伐陳伐齊晉不能誰何迄乎黃池之會吳哆然操方伯之令而下以列國命晉春秋由是絶筆焉則晉之失伯實夷狄之張也曰中國苟合夷狄豈能間乎其端在諸侯之先二當時以齊景衛靈宋景之君其國皆強戮力周旋何畏於吳楚今也齊景公有抑晉代興之志宋衛魯鄭之君無非攘臂以從齊者也蓋晉執行人叔孫婼與邾大夫坐而失魯執宋仲幾樂祁犂而失宋涉他成何詬衛而失衛荀寅辭蔡而失蔡假羽旄於鄭而失鄭是以齊得以盡取諸侯鄭則與齊盟于鹹會于安甫矣衛則與齊盟于沙次于五氏矣魯則與齊會于牽宋則與齊會于洮矣終而齊侯衛侯且伐晉矣則晉之失伯乃諸侯之離也曰晉國苟治諸侯安得背乎其原在大夫之先叛使六卿諸臣如先大夫之肅皆盡忠以輔公何憂乎齊衛今也強家多門各求封殖而削弱之禍獨歸宗國自趙鞅取衛貢五百家動晉陽之甲自韓不信執宋命卿不顧踐土之盟自魏舒南面涖政敢干政以命大事而趙籍魏斯韓虔為諸侯之萌已成矣則晉之失伯乃大夫之擅也曰晉之禮義素明則大夫豈得擅乎利勝而義微此上下之所以不奪不饜也范鞅請冠而魯使蒙執趙鞅受楊楯而宋卿賈禍邯鄲爭貢而三卿亂國或取季孫之賄而昭公弗納或求蔡侯之貨而伐楚之師徒出或索十牢而吳人藉為口實孟子曰上下交征利而國危矣晉伯之衰又誰咎歟此春秋所以謹義利之辨察天理人欲之分正君臣上下之位而示後世以防微杜漸反本澄源之道也頃公自昭二十一年即位至是凡三十一年至哀公二十年卒葬許元公九月螽冬十有一月有星孛于東方季氏私考文十四年星孛北斗昭十七年星孛大辰皆言孛之所加今東方不言所加之宿者公羊子以為見於旦似矣而未盡也蓋雖旦見必有宿可言今曰東方則所加非一宿日久遍歷東方諸宿不可以宿名也盜殺陳夏區夫季氏私考夏區夫陳卿蓋夏齧之後必主於從吳而不欲從楚者也盜者刺客之名蓋楚使人刺之十有二月螽十有四年春西狩獲麟今兖州府嘉祥縣本巨野澤地世傳獲麟即此季氏私考左氏傳曰西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人孔子曰麟出而死吾道窮矣今按周衰道廢人欲橫流亂臣賊子接迹天下撥亂反正以振頺綱此孔子之志也故曰如有用我者吾其為東周乎道苟不行亂將奚極然鳯鳥不至河不出圖方有吾已矣夫之嘆而祥麟一踣明王將不復興矣於是重有感焉乃作春秋以明王法蓋文雖有感於麟而志則不在是也雖無感麟春秋固將作矣孔子之卒近在獲麟後二年苟非平日所嘗用心則隱後二百餘年之間多有傳聞不實之事豈一朝一夕所能詳哉故制作三年文成致麟之説元凱既斷其妖妄而後儒之辨亦詳兹不復論矣若必謂其感麟而始作則理亦有未盡焉按夫子欲身見道之行於天下始焉未暇為著述事晚知道終不行也於是刪詩定禮正樂序書贊易兾以垂世教於將來而今遇獲麟麟死則所謂吾已矣夫之歎蓋又當有甚於前日矣而魯史其所嘗得於傳聞睹記之真嘗有慨於其心謂其所載之行事乃王法所可寓以垂戒後世者也於是因麟死知王者之不作而修以為經焉杜元凱謂感麟而作是已胡文定乃云經成而麟至本之何休范寧之説以為信然誤矣夾谷相禮而三田來歸以為聖人自序其績然則春秋成而麟至亦謂聖人自述其作經經成之瑞應乎此失春秋之旨為甚故不得不為之辨如此按謂春秋感麟而始作誠有未盡蓋其平日嘗究心於此而當時史官如左氏輩必嘗與夫子往來論議如魯樂官之相與論樂得以習聞習見其所記之行事與夫䇿書簡牘之大凡必嘗筆之以為書而至於獲麟麟死之時始於一兩年間遂成而出之今之從事著述者每嘗留意於所纂之一書未就也就亦未即出也一旦困有所感取而成之成而遂出之兾以傳之於其身後亦往往有然者何獨於聖人而疑之乎故謂聖人感麟而始作春秋不可謂聖人感麟而始成春秋則無不可也資中黃氏謂左丘明非傳春秋者傳春秋者蓋姓左而失傳其名爾春秋事義全考卷十六
