body:
  text: 春秋事義全考卷十二明薑寶撰二十年春王正月辛亥仲孫速會莒人犂比盟于向髙氏曰向本莒邑宣四年取之者莒魯結好自是十五年不交兵速代父為卿未練祭而從政無復三年之喪也夏六月庚申公會晉侯平齊侯莊宋公平衛侯殤鄭伯簡曹伯武莒子邾子悼滕子薛伯把伯小邾子盟于澶淵今大名府開州齊成也以晉不伐其喪遂感而受盟焉修德來逺豈誣也哉王氏經世按齊靈公之不道諸侯圍之而不服士丐帥師伐之聞喪而還晉有禮矣加以莊公初立亦欲求成以自定是以為此盟也然感不伐喪之義居喪而出盟不已亟乎考於經服異則書同盟此齊成而盟不言同者六月盟于澶淵方至自會而仲孫速已帥師伐邾諸侯之志其不同可知矣秋公至自會仲孫速帥師伐邾季氏私考許翰氏曰祝柯之會既執邾子又取邾田報亦足矣而復伐之譏已甚矣且澶淵在彼何以盟為今按孟莊子父喪甫踰五月而即會莒盟向又汲汲於伐邾不可以為善政矣孔子稱其不改父政不知何指豈以三家之中獨忠公室而貢賦未嘗闕邪蔡殺其大夫公子燮蔡公子履出奔楚胡傳楚人使蔡無常公子燮求從先君以利蔡謀國之合於義者也國人乃不順焉而殺燮此何罪矣故稱國而不去其官公子履其母弟也進不能正國退不能逺害懼禍而奔從於夷狄書者罪之也王氏經世按燮蓋嘗為鄭所獲者欲舍蠻夷而之中國正也追先君之志而成之順也楚政無常求寬其民忠也用事者安楚弗欲而殺之故稱國而不去其官言殺無罪也履其母弟不奔中國而奔於楚不與其兄同志書者罪之也陳哀侯之弟黃出奔楚季氏私考陳黃之奔左氏以為慶寅慶虎訴其謀叛楚也如此則黃何為又奔楚乎使其往訴二慶則二慶本謀從楚亦何畏於罪而反以叛致討也楚使屈建圍陳經所不載可見原無此事且陳黃出奔楚必殺二慶而始得歸及其歸也又因楚力而歸而謂之自則公子黃者固楚之黨而與二慶有所不協者也蓋陳袁僑之會晉雞澤必君臣合謀而後行慶氏專執國政豈不與知而黃以母弟貴寵權勢相傾必慶氏譛之於君以致奔楚黃既至楚則以從晉之罪委於慶氏此陳侯所以畏楚而殺二慶而黃藉楚得歸遂秉陳政也歟故黃之奔罪陳侯信慶氏之讒不能安其弟而黃從楚以陷二慶罪亦豈在其下哉慶氏之讒虎實為之寅無預焉觀二十三年殺慶寅書及可知矣西亭辨疑凡書弟者譏其兄不兄弟不弟爾陳果不道黃當有以諫今棄之而逃之夷狄亦豈得無罪哉傳以黃稱弟得弟道故不貶恐未當叔老如齊屬詞成公自鞍戰後齊頃屬同盟會故僑如請修前好齊復叛晉見伐魯亦會晉圍齊齊怨深矣而齊莊新立同盟澶淵故叔老聘齊釋怨修好也冬十月丙辰朔日有食之季孫宿如宋十五年宋向戍來聘宿如宋報戍之聘也二十有一年是年十一月庚子孔子生春王正月公如晉屬詞晉平為魯故合諸侯同圍齊執邾子削其田以歸魯故今年公如晉拜師及取邾田邾悼庶其以漆閭丘來奔漆邾邑今鄒縣東南平鄉有漆亭閭丘邾邑今鄒縣南有閭丘亭於是公猶在晉季孫宿納之也胡傳庶其邾大夫小國之大夫接我以利欲則特書其姓氏謹之也漆一邑閭丘一邑而不言及者庶其之私邑所受於君而食之者也此叛臣何以不書叛書名書地而竊邑叛君之罪見矣夫棄夷狄從諸夏其慕義之心疑可與也然有據城以求援者君子猶以為不可受而况鄰國乎書來奔而魯受叛臣納其地之罪亦見矣王氏經世按昔莒僕以寶玉來奔季文子使出諸竟今宿乃自受庶其之奔蓋納莒僕者宣公也故行父假公義以匡君而實隂以攬權焉今已作三軍分公室則納叛人與其邑皆季氏之有爾故不復顧前日之言矣自受庶其其後莒牟夷邾黑肱接踵而至曲阜之地遂為盜藪然皆非公意也襄公如晉而庶其以漆閭丘來昭公如晉而牟夷以牟婁防來昭公在乾侯而黑肱以濫來為盜藪者實季氏也季康子患盜子曰苟子之不欲雖賞之不竊盜與季氏其所取不同而其欲同季氏以百乘之家而猶患貧患寡至富於周公而不知足彼小人貧而不勝其欲以至于竊又何怪焉孔子告康子之言則春秋書三叛人以戒為國者不可見利忘義之意也夏公至自晉秋晉欒盈出奔楚季氏私考欒盈者書之孫黶之子晉卿也欒書在晉專執政權嘗滅趙宗害郤氏而厲公見弒於國人實書所主書雖尋沒而黶之汰虐已為同列所忌矣第悼公寬厚坦懷故得免於禍爾及平公時趙武用事盈為公族大夫不相能于范鞅而盈好施得士尤其君之所疑也故州賔一謗而身遂無所容矣凡此皆欒書專權怙勢之所致也又云君子違不適讐國楚晉之讐也盈之楚欲因楚力以復國爾此則盈無君之罪也盈雖奔楚而楚實無意於盈不久而即奔齊豈非悼公餘威之及楚者猶未泯邪九月庚戌朔日有食之石氏曰日食之變起於交有雖交而不食者春秋二百四十二年而食才三十六有頻交而食者此年及二十四年三年之內連月而食者再也諸儒以為厯無此法或傳寫之誤然漢時亦有頻食者髙帝三年及文帝前三年十月晦十一月晦是也冬十月庚辰朔日有食之季氏私考家鉉翁氏曰日月行於天各自有道雖云朔相遇而道有表裏若月光在裏依限而食者少自漢以來厯家每以百七十有三日為一交會未有頻月交會者而襄二十一年九月十月二十四年七月八月頻月頻食漢髙祖即位之三年十月十一月頻食以後千有餘年未有頻月頻食者故知天度有時而變其常兹所以為異也曹伯來朝武公嗣位三年喪畢以魯能事晉而來朝修舊好也公會晉侯平齊侯宋公平衛侯殤鄭伯簡曹伯武莒子犂比邾子悼于商任杜元凱曰地闕趙鵬飛氏曰一大夫出奔動天下諸侯以錮之盈亦何能為哉蓋懼其挾楚以入爾王氏經世盈奔楚必歷諸國還而求入亦必歷諸國晉知盈必求入故預約諸國使皆勿容其蹤迹所向以杜其還爾二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒子叔齊子也冬公會晉侯平齊侯莊宋公平衛侯殤鄭伯簡曹伯武莒子犂比邾子薛伯把伯孝小邾子于沙隨在今開封府寧陵縣西北七里胡傳按左氏會于商任錮欒氏也會于沙隨復錮欒氏也晉不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉則亦過矣自蕭魚以來楚猶未競盈至楚恐其不受而將適齊時蓋未至於齊也故復為此會以錮之齊莊公陽與晉會而隂即納盈則齊晉之讐復興矣是以明年伐衛遂伐晉也汪氏曰自欒賔以靖侯之孫傅桓叔至貞子枝佐文公霸業枝之子盾事靈公將下軍盾之子書是為武子事成景厲悼有功公至自會楚殺其大夫公子追舒追舒即子南也按令尹子南之寵人觀起未益祿而有馬數十乘小失爾以此轘諸四竟而并殺子南焉過矣况先告其子棄疾而後殺之恐非人情傳所載似不足信也然則子南之見殺無乃謂其為令尹而不圖中國故借此以殺之歟稱國殺而不去其官殆為此也二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒孝公卒弟文公姑容立孝公晉平公母舅也悼夫人喪之平公不徹樂非禮也夏邾畀我來奔畀我殆以見逐而來未必與庶其同叛此與昭二十七年邾快奔同葬把孝公陳殺其大夫慶虎及慶寅按慶虎雖譛黃於君而致其出奔然亦罪不至死故虎稱國殺而不去其官寅書及見虎纍寅寅本無罪也陳侯哀之弟黃自楚歸于陳歸易詞書自楚歸罪黃既奔夷狄之國又藉夷狄之力以歸自此遂當國用事黃之去就於是皆不正矣晉欒盈復入于晉入于曲沃胡傳欒氏晉室之世臣故盈雖出奔猶繫於晉復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故聞語欒孺子者則或泣或歎以為得主而為之死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在於錮之甚急使無所容於天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉王氏經世按納欒盈者齊也不稱所自譬如盜賊潛入之爾盈將不利於宗國非晉臣矣而猶繫於晉彼晉之世臣逐非國討而出於柄臣范鞅之私意也曲沃欒氏邑也然則曷為不言叛非叛者也劫衆以敵君直亂而已矣彼先入于曲沃帥曲沃之甲以入絳至於乘公門矢及君之屋敗於范氏之徒而旁失魏氏舒之助然後奔于曲沃則其先書復入于晉而後書入于曲沃何也曲沃非其有也入于曲沃則入于晉矣故自齊入曲沃自曲沃入絳而惟書復入于晉自晉奔曲沃而後書入于曲沃也曲沃人願為之死則其入于絳也曲沃有奉焉其退而奔也曲沃有受焉書曰入深惡之也曲沃即沃桓叔所封嘗以傾晉而其民為之隱曰我聞有命不敢以告人今為欒氏之私邑復感其私恩莫知有君臣之分逆順之理當是時強家得衆皆以厚施於民使知有私家而不知有公室晉欒氏之曲沃魯季氏之費衛孫氏之戚春秋所書以為後世戒其亦深切著明矣秋齊侯莊伐衛殤遂伐晉林堯叟此其書遂何齊始伐盟主也自袁婁以來齊世從晉於是始叛則晉伯衰而諸侯二矣晉之衰諸夏之憂也髙氏曰此齊侯背澶淵商任沙隨之盟因晉有欒氏之亂而助之以報十八年之役也十八年諸侯同圍齊者魯之故也齊之所以數伐魯者衛之故也故先伐衛以試之晉不之問於是遂伐晉齊莊既伐同盟又伐盟主禍亂之成著於此矣八月叔孫豹帥師救晉次于雍榆雍榆晉地今衛輝府淇縣東有雍城淇縣即古朝歌朝歌在今淇縣之西本衛地後乃兼併於晉爾林堯叟次而後救匿其救之之形也救而先次宣其救之之聲也屬詞書救晉者為次雍榆言故實不成救也按朝歌尚在衛東去晉甚逺次而不進本畏齊強也其意則欲以遏齊歸師自文爾己卯仲孫速卒仲孫速孟莊子也幼子羯奪其兄秩而嗣立是為孟孝伯汪氏曰魯自仲遂殺適立庶公室於是乎失政魯卿自季孫宿以私意廢長立幼於是家臣效尤孟氏之豐點廢秩立羯叔孫氏之竪牛殺孟丙而立舍皆托廢立以擅其權而三桓微矣作俑之禍其流弊可勝言哉冬十月乙亥臧孫武仲紇出奔邾季氏私考臧孫紇許之庶子是為武仲奪嫡臧為而立魯之姦邪也當時季孫宿之賢不及仲孫速而紇為季孫所愛仲孫所惡則其人之不善可知矣速特以父時同列之臣不加黜逐孔子稱孟莊子之孝不改父之臣此其一也故臧孫亦曰季孫之愛我疾疢也孟孫之惡我藥石也石猶生我疢毒滋多孟孫死吾亡無日矣及仲孫速卒而孟氏之家臣果譛於季氏而以亂逐之紇本小人見逐宜也仲孫羯父死甫兩月而忍于害父同列其有愧于莊子多矣私考又云臧孫紇奔邾之後自邾如防以求為後魯人不立其子而立其兄臧為紇既不得所請則遂致防奔齊魯之處此於國體未失也故自防奔齊不書杜氏曰阿附季氏為之廢長公鉏立少以取奔亡書奔罪之家氏曰季孫之納邾盜也臧紇所與言者賞盜之説為何如今乃以媚道自結於季孫亦何異於盜季孫自亂已之嫡庶復亂人之嫡庶又蔽罪臧紇而逐之紇固有罪宿之恣睢不度亦甚矣晉人殺欒盈此與後此良霄之殺皆稱人以其稱兵犯國非士師之所能治而必以國人討之也皆不書大夫以其在位而復入為亂非其大夫也齊侯莊襲莒因伐晉還襲莒以十八年莒子同諸侯圍齊故也二十有四年春叔孫豹如晉賀克欒氏也仲孫羯帥師侵齊莊為晉報焉以前此救不力懼晉見疑也夏楚子伐吳自會向後中國不與吳會者十年見諸樊不及其父為楚所輕嗣位以來於是兩見伐矣秋七月甲子朔日有食之既齊莊崔杼帥師伐莒汪氏曰齊莊之襲莒身傷臣獲未伸其志故雖與莒平而復伐之然已既失信將何以保人之信於己乎大水八月癸巳朔日有食之公會晉侯平宋公平衛侯殤鄭伯簡曹伯武莒子犂比邾子悼滕子薛伯把伯小邾子于夷儀夷儀本邢地衛滅邢後遂為衛邑髙氏曰自盟于柯陵之後齊有輕晉之心會齊侯環卒而光新立乃受盟于澶淵及商任隨沙之會晉失其令齊於是復二明年乃伐衛遂伐晉又再加兵於莒晉侯為是故會于夷儀帥十二諸侯之師將以討齊然會而不伐是有畏也國勢不競衆志不一也曰水不克者特辭不能伐爾下書崔杼伐我西鄙蓋知晉之無能為也冬楚子康蔡侯景陳侯哀許男悼伐鄭以救齊也廬陵李氏曰蕭魚之後楚兵再至鄭而無功則以悼公之餘澤也按楚之無功於伐鄭也非由子産當國事能有備歟公至自會陳針宜咎出奔楚陳討慶氏之黨故宜咎奔楚宜咎陳大夫針子八世孫也其後在楚為針尹宜咎叔孫豹如京師是時榖洛鬪毁王宫而齊侯叛晉求媚於天子故為王城郟於是豹如京聘且賀焉屬詞自成至哀五君惟襄是年豹一如京昭末年叔鞅一葬景王而止中國無伯則諸侯復散不復知有王室而王室亦絶意於諸侯矣然説春秋者惟知朝聘不行為有罪抑豈知聘問亦非諸侯事天子之禮乎蓋聘問者上之所以交乎下非下所以事上也大飢胡傳是年秋有隂沴之災而冬大飢蓋所以振業之者有不備矣故書之以為戒二十有五年春齊崔杼帥師伐我北鄙以報孝伯之師也夏五月乙亥齊崔杼弒其君光髙氏曰崔杼不能防間其妻以淫于家反不絶其妻而行大逆於君齊莊背諸侯之盟數行侵伐崔杼因民之忿遂以宣淫之故弒之公會晉侯平宋公平衛侯殤鄭伯簡曹伯武莒子犂比邾子悼滕子薛伯文小邾子于夷儀胡傳晉本為報朝歌之役來討及會夷儀既聞崔杼之弒則宜下令三軍建而復斾聲於齊人問莊公之故執崔杼以戮之謀於齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云孫氏曰莊公背澶淵之盟加兵晉衛信不道矣晉再合諸侯將伐齊齊人弒莊公以求成逆之大者晉不能討之以定齊國之亂曷以宗諸侯哉宜乎大夫日熾自是卒不可制也故書崔杼之弒以著其惡髙氏曰晉會諸侯以伐齊齊以莊公既弒為解因納賂以求成焉故不書伐夫以義會諸侯而以姦終之有以知晉平之不競矣六月壬子鄭公孫舍之帥師入陳左傳初陳侯會楚子伐鄭當陳隧者井堙木刋鄭人怨之故子展子産入陳髙氏曰去秋夷儀之會楚與陳蔡許三國同伐鄭今嵗復會于夷儀鄭慮楚之復來也故先帥師入陳以奪其心觀左氏所載入人之國未有若子展子産之有禮者也故春秋無貶辭秋八月己巳諸侯同盟于重丘今東昌府茌平縣有重丘即此齊成故也胡傳崔杼既弒其君矣晉侯受其賂而許之成故盟于重丘特書曰同公至自會衛侯獻入于夷儀杜氏曰晉愍衛衎失國使衛分之一邑胡傳衛侯蔑其冢卿失國出奔固不為無罪矣然有世叔儀以守有母弟鱄以出或撫其內或營其外有歸道焉則其義猶未絶也故止書其爵而不名及寧喜弒剽復歸于衛然後書名此聖人俟其改過遷善不輕絶人之意也楚屈建帥師滅舒鳩舒鳩偃姓子爵國楚不能制吳而委罪於舒鳩有導吳殘我之意也而滅之其罪難免矣冬鄭公孫夏帥師伐陳先是入陳陳示服而鄭還師然未得成也故再伐之必得成乃已季氏私考是嵗公孫舍之既入陳而公孫夏又伐陳蓋子産用事而示之以強也去年楚子率蔡陳許三國伐鄭而陳尤為楚致力左氏所謂當陳隧者井堙木刋是已夫楚之侮鄭以其不敢敵耳於時子産方強政治以為鄙我亦亡故以報陳為事一嵗而再加兵焉雖兵出於忿而亦謀國自強之術自是楚雖不能無討而亦以服鄭為難不得不從弭兵之議矣王氏經世按晉為盟主得陳而不能保復棄之於楚而使鄭修其怨興兵以再伐其國私取平焉鄭之憤則泄矣伯主之義安在乎子産對晉之辭皆曲而強為文飾不類其平日之言恐傳者傅會之過也陳侯鮑卒而陳亂公子他殺太子免而代之他即五父然則五父篡賊爾鄭莊公奉而立之是助篡賊也其又可以為功乎諸侯伐而不討征伐之權出於天子諸侯奉其命而行敵國無相征之義而以唯罪所在各致其辟為先王之命何其無忌憚也大國之地多數圻矣信非侵小不至然則皆欲效之可乎又以戎服授捷為城濮之命定王於鞏朔之獻齊捷也則曰蠻夷戎狄不式王命王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今鄭無王命擅興以侵小而以其捷私相獻其為姦先王之禮又大矣且鄭文公戎服輔王以受楚捷而子産今以將事于晉是以王事晉也乃自謂不敢廢王命不亦重誣乎左氏乃謂士莊伯不能詰非不能詰也是時晉政偷矣趙文子謂武也知楚令尹若敬行其禮道之以文辭兵可以少弭蓋志於合和南北以苟無事非復昔者同外楚之心故於鄭之伐陳聽其所為而已觀春秋一嵗再書伐陳而諸侯之散已見於此矣十有二月吳子遏伐楚門于巢卒遏即諸樊也巢吳楚間小國廬江六縣有居巢城祭諸樊卒弟餘立胡傳巢南國也其言門于巢卒者吳子將伐楚引師至巢攻其門而使之啓巢人射諸城上矢中吳子而卒非吳子之自輕而見殺也門于巢者攻其門而使之啓也按入其門乃攻其門使之啓爾非既入其門而巢人射之也何氏假道之説榖梁飾城請罪之説皆非二十有六年春王二月辛卯衛寧喜弒其君剽殤公弒獻公復歸衛衎豈成剽者乎其不葬宜也胡傳奕者舉棋不定不勝其耦况置君乎於衎則殖也出之喜也納之於剽則殖也立之喜也弒之是奕棋之不若也不思其終亦甚矣故聖人特正其為弒君之罪劉氏曰不與剽之立則其曰寧喜弒其君剽何寧氏君之寧氏殺之是以稱弒焉出衛君而立剽者寧殖也則何為於喜加弒焉見喜之受命於殖而殺剽也衛孫林父入于戚以叛晉人以兵戍之衛人攻戚殺晉戍三百人屬詞衛侯衎無禮不君定薑知其必敗衛國故卒見出于貴戚大臣而剽之立也晉人又為戚之會以定之湨梁以來無役不從也既而晉侯又使人逆衎於齊使衛與之夷儀此剽之所以弒歟夫剽列於諸侯之會七則其弒史固以君書與鄭子儀異矣故衛侯之歸特謹其日辛卯至甲午間二日而一弒一歸則書日之義豈不著乎以衛臣弒君納君之罪不可不討而晉為盟主不能正名討罪以定宜為君者惟始終置力於孫氏使君臣之教不明其事不可不詳此其所以書弒書歸與鄭之皆不書者異也髙氏曰獻公之奔也林父實逐之今寧喜弒剽將納獻公故林父懼而入于戚以叛叛甚於奔前此諸大夫有不利於己則奔而已未有若林父之叛者故書叛自林父始是時林父以戚入于晉晉人戍之不書以戚入于晉者正名其惡也甲午衛侯衎復歸于衛胡傳按左氏孫林父以戚如晉書曰入于戚以叛者著其據土背君之罪也臣之祿君實有焉專祿以周旋戮也衛侯出奔齊入于夷儀皆以爵稱今既復歸而得國矣乃書其名何也衛侯淹恤在外十有二年困於心衡於慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其強於為善之意也夏晉侯使荀吳來聘荀吳荀偃之子晉為孫氏故召公將討衛也公會晉人鄭良霄宋人曹人于澶淵澶淵近戚地蓋以討衛而疆戚田也屬詞凡公與外大夫盟君臣同歃故諱公以逺耻若會則君臣各在其位故直書以見其失而已家氏曰晉自悼公奬大夫以伉其君而下陵上替之禍幾遍於中原晉亦坐受其弊今林父據邑叛君而止獻公取衛田以益林父平固甚愚亦何利而為此由晉之諸臣各為私計羽翼諸侯之大夫使之交起為亂以為彼剖分宗國之地而其君不悟良可喟也秋宋公殺其世子痤胡傳譛言之得行也必有嬖妾配嫡以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意家氏曰宋寺人伊戾內連宫禁外結大臣共造讒而殺太子宋平公尋知其子之無罪僅烹一伊戾而芮棄之寵愛向戍之權任不為之衰更立棄之子為太子此人道之大變春秋謹而識之榖梁所謂目君以著其惡者也傳者稱痤美而狠佐惡而婉婉者巧於自結狠者踈於內交佐日以親痤日以疏以至於死故居近君之地者自處為難隋煬所以傾勇其事似之勇則痤也楊素則左師也獨孤后惡其子楊素從而陷之及隋文疾革乃悟則已無及由明不足以察姦內外相煽而為讒故也晉人執衛寧喜蓋執于會非討其弒君討其攻戚而殺晉戍也家氏曰喜可執坐林父之訴而執之則悖矣八月壬午許男寧卒于楚靈公卒子悼公立許靈公如楚請伐鄭曰師不興孤不歸矣八月果卒冬楚子康蔡侯景陳侯哀伐鄭汪氏曰蕭魚而後楚三伐鄭十八年公子午不得志於鄭二十四年諸侯救之此年諸侯不救楚得以逞蓋是時晉平昏庸大夫專恣霸業怠矣楚是以知晉之不在諸侯而復為此舉也鄭雖未服於楚明年晉楚為成而中國諸侯皆朝楚矣棘澤之役四國之君皆至今此許獨不與者靈公卒於楚國弱不能以兵會也葬許靈公二十有七年春齊侯使慶封克之子來聘景公即位通嗣君也晏嬰雖欲輔景公為政而未可以有為故先勸其君以息爭修睦使崔慶悅於和衆安民此慶封之所以聘魯也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋陳氏曰晉楚始同主夏盟也以諸侯分為晉楚之從而交相見於是始則是南北二伯也天下之大變也髙氏曰此會楚意也楚人患吳而結諸夏也諸侯之大夫不詳其故始徇其弭兵之名遂會于宋而與之盟自是蠻貊莫辨而諸國俯首兩事晉楚桓文數十年之功業一朝而壞之百姓雖暫免於兵革之苦而天下之大勢遂大潰而不可收矣彼向戍者又豈足知天下之大計哉王氏經世按是時晉楚皆厭兵矣故向戌得迎兩國之意而和合為此舉也告于小國而喜躍勇赴告於齊秦而齊秦許之是可以見人情之所在矣戰國之世衡人專搆諸侯使相攻伐而從人則合東方六國為從以擯秦從人之意向戌之意也季氏私考趙武朔之子盾之孫也是為文子趙武始用蓋在晉悼公初年以韓厥欲為趙氏立後也夫趙盾弒逆之賊其世宜絶而武其嫡孫何以得立蓋趙衰之勳不可無後而趙宗得罪同括子孫必無有存者故復立武耳於衰則賞延於世於盾則罰不及嗣之意也况悼公初年當大臣危疑之時烏得不以此安巨室之心乎屈建字子木屈瑕之後與屈完同族公孫歸生字子家石惡買之子孔奐其孔寧之後歟衛殺其大夫寧喜王氏經世按使衎出非得罪於民歸為國人所納則舉無不順首誅孫氏次問寧喜可也今乃舍孫之在戚而患喜之專昧輕重之所在矣畔政由之信棄納我之惠其所為不足道也或曰孫氏挾晉以抗君獻公因無如之何曰使衎出非得罪於民國人思之國人納之出入不制於強臣則命討亦不制於大國矣當時使寧喜因國人之欲納公也為公弒剽公討之可也今也政由寧氏祭則寡人由是以得歸也寧喜專公患之由是以行殺也微寧子不及此吾與之言矣公亦自知其不直也故春秋之書法如此髙郵孫氏曰喜弒剽而納衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣衛侯之弟鱄出奔晉今舊滄州西北四十六里中有大樹名木門即鱄所託處按稱弟罪衛侯是也取榖梁之説以為鱄之去合乎春秋則恐不然此説王氏經世得之其説以為當時寧喜不願盟而願得子鮮之一言則宜審於義以言求可復於後可也乃從公政由寧氏祭則寡人之言言不近於義矣後來公卒殺喜固政由寧氏之一言為之也至於兄弟無絶道魯叔肹所以見取於春秋子鮮初決於去以兾公之感悟或勸公立寧氏後以求無負於喜而與世叔儀等夾輔公庶公之能改也乃再三留而不止至於坐亦終其身不向衛也不亦甚乎故知叔肹所以見取於春秋則知鱄之去未合於春狄矣書名書奔殆亦非美詞也秋七月辛巳豹及諸侯之大夫盟于宋胡傳此一地也曷為再言宋宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南向而朝楚及申之會蠻夷之君篡弒之賊大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐吳滅賴無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也故會盟同地而再言宋者貶之也季氏私考晉自夷儀再會諸侯皆擕澶淵之會僅得魯宋鄭曹四國而已趙武新執晉政計無所施而向戌者宋大夫之達於政者也以為晉霸無為則宋受楚患幸已善於楚令尹屈建則欲有以紓之故為弭兵之説以告於晉適契趙武之謀而楚欲與晉為匹重違向戍之議亦見許焉是以晉楚同主夏盟也魯衛曹宋者晉之從也蔡陳鄭許者楚之從也會分二主而其從交相見焉晉霸不競授楚以同主諸夏之權自是中國諸侯南向朝楚而楚亦遂自主會于申其勢益強莫敢違矣然則宋之會盟中國之衰而晉之罪也其先晉據實也説者以為楚人衷甲爭先而晉惟以信為本故以晉為先則誤矣汪氏曰説者稱于宋弭兵蓋是時晉楚皆怠於出師是以偶有六七年之安靖然楚人衷甲苟非伯州犁之言則趙孟為宋襄之執矣况魯帥師而取鄆晉帥師而敗狄兵亦未嘗戢也楚圍既讀舊書未幾篡國大合諸侯伐吳滅賴安在其能弭兵也哉冬十有二月乙亥朔日有食之二十有八年春無氷夏衛石惡出奔晉石惡寧喜之黨石惡衛之世臣已預諸侯之事而其父石買嘗為孫林父立剽之故而伐曹者也衛侯既殺寧喜有後言此衛侯之所忌者而惡又以用事之臣宗強黨附尤衛侯之所深疑者也是以見逼而奔耳左氏以為討寧氏之黨則何待於二年之久意者以其嘗黨孫林父而猶懷二心乎邾子來朝邾自晉執其君魯取其田益微弱矣至是悼公來朝秋八月大雩仲孫羯如晉仲孫羯即孟孝伯告將為宋之盟故如楚也冬齊慶封來奔家氏曰盧蒲癸王何莊公之幸臣也殺慶舍逐慶封而戮崔杼莊之弒也幸臣與之俱死者十人今為之討賊亦幸臣也身為國君以幸臣為羽翼莊固可鄙矣而卿大夫無能為君討賊復讐者而幸臣乃能之亦卿大夫之恥也季氏私考是時崔氏亡矣崔杼何以不書死自縊也其子崔明何以不書奔未為大夫也慶封者崔杼之黨崔氏亡則慶宗無所恃矣然非慶則不能亡崔故欲亡崔者必先間慶慶封荒淫嗜酒剛愎寡謀為蒲盧嫳所愚而不知尋自及也夫蒲盧嫳者蒲盧癸之族而癸則莊公之黨不忘報讐者也嫳寵於慶而癸得行其謀矣故因其家亂以慶攻崔崔氏安得不亡乎嫳謂杼為君讐天棄則封必不肯以君讐自居而癸復得歸為慶所用此嫳謀所以為出於癸也癸既事慶因嬖報讐於是慶氏亦繼崔氏而亡矣夫癸本莊公私昵小人特假此以為名爾而癸之謀晏嬰亦似與聞焉不然其事近於國亂無政當景公之世何恃而敢為乎故嫳伐崔而國人助之癸伐慶而陳鮑助之則以晏嬰有足恃焉故也乘亂去姦不勞已力期年之內二族皆亡可謂善於謀國矣但杼封二逆未嘗明正典刑則亦不得為討賊耳然封至魯不久畏齊奔吳非晏嬰以正治國則亦安能杜其復入之望哉十有一月公如楚諸夏之君旅見於楚始於此屬詞是時晉楚合成盟于宋請晉楚之從諸侯交相見公遂朝楚而及陳鄭許送楚康之葬于西門之外自是晉霸日衰而華夷相亂矣十有二月甲寅天王崩靈王崩景王立乙未楚子昭卒康王卒子熊麇立是為郟敖胡傳甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月明殺恩之非禮也二十有九年春王正月公在楚胡傳外為夷狄所制以俟其葬而不得歸內為強臣所逼欲擅其國而不敢入故特書所在以存君也屬詞榖梁謂吳楚之君不書葬避其僣號也蓋以為筆削之旨今知不然者當時諸侯雖屈於楚亦以小事大而已魯號秉周禮何至書其僣號韓宣子觀於太史氏見易象與魯春秋曰周禮盡在魯矣使書吳楚僣號謂之周禮可乎由此知胡文定所謂恐民之惑而避其號是聖人削之者非也按左氏楚人使公親襚説恐非先是公行及漢聞楚喪欲還則康王卒在公未至前公至當已殯禭所以衣尸既殯豈容又使公親禭乎要是止公送葬則有之左氏又載公親襚時使巫以桃茢先祓殯此以君臨臣喪之禮魯亦豈敢行此故知左氏之説皆非也屬詞古者諸侯嵗正月朔日以禮祭于宗廟謂之朝正其或公在外不得行禮而大臣攝行必以公在外告于廟而史書于䇿故今公在楚傳曰釋不朝正于廟此魯史之法也魯君屢以正月在晉而經不書者魯君朝伯主而在中國猶云可也襄公正月在楚以諸夏之君而朝夷狄昭公正月在乾侯以國君而見屈於強臣皆人道之變故特書之此筆削之義所謂略常以明變也夏五月公至自楚庚午衛侯衎卒獻公卒子襄公惡立閽弒吳子餘祭餘祭卒弟夷昧立改名餘昧胡傳左氏以為伐越獲俘焉以為閽使守舟吳子觀舟閽以刀弒之亦邇怨之失也家氏曰春秋所以書言禍生於所忽也吳之諸君往往輕以蹈禍遏卒於巢餘祭死於閽僚死於專諸春秋之書良以垂戒示後焉耳仲孫羯會晉荀盈罃次子齊髙止厚之子宋華定弱之弟衛世叔儀子太叔之後鄭公孫段子豐之子曹人莒人滕人薛人小邾人城把晉平公為其母悼夫人故也胡傳晉平公把出也故合諸侯之大夫以城把古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為次也晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍于母家周人怨思焉揚之水所以降為國風不得列于雅也城把之役亦不待貶絶而可見矣季氏私考把在雍丘即今開封府把縣也其地東近於宋西近於鄭西南近於陳許今陳許以南既皆服楚而宋鄭之地則楚之所爭也把在二國之間足以通往來之路苟為楚得則南連陳許楚可長驅北方矣夫把國小城惡城未繫於必爭故楚之所急常在宋鄭而把又以王者之後於宋尤親宋猶自強足以交楚而把亦依以為安焉盟宋之後宋既事楚則把無所庇不可不慮矣晉平因而城之則把得恃以固終春秋後乃始與宋俱亡得非有賴於兹城歟故把之城本為中國計或者念母私情亦屬其間爾然晉平公不能修德睦鄰攘夷安夏使楚人畏懼不敢北轅而區區以城把為務則亦末矣晉侯使士鞅來聘士鞅即范獻子拜仲孫羯之如且拜城把也把子來盟季氏私考把子來盟又欲降而稱子也左氏以為晉使司馬女叔侯來治把田非也是時晉平公合諸侯城把而把人因欲降從子爵仍附魯貢故來請盟魯襄公既許之矣然明年澶淵之會猶使把自列於諸侯則以魯責賦之厚故也故昭六年益姑之卒猶稱把伯至十三年平丘之會晉昭公亦不聽其稱子而自是終春秋之世把復稱伯矣書此見把之不能自強也而魯人不能庇把以恤所無使困於供貢焉徒盟亦何益哉吳子使札來聘屬詞吳子餘祭欲窺上國故來聘未至魯而吳子弒於閽魯後雖服於吳然有職貢而無聘季氏私考自夀夢之卒至王僚之弒凡四十七年皆季札所厯之嵗也則札當夀夢時尚甚年少而諸樊餘祭皆輕死為勇者也故一則取死於伐一則見弒於閽而國威不振者終二君之世要其行事似非知禮義者所為未必肯讓札也况又不能正終必非先有遺命其次傳及弟蓋由國家多難羣臣議立長君爾及夷末初季札始用猶未為卿未能有勞於國惟導其君以通好上國言辭有文故季札以知禮稱而溢美歸之矣夫夷末之死札辭為君亦或有之但久居臣位事僚終身則未見其有強立固避之狀而諸樊子光亦未見其有爭心也故王僚代父夷末以立而得遂成為君者十有二年觀弒僚稱國則大臣不服而與國人共廢之之辭也其時人心欲推立札札必不肯自污而延陵之逃實在於此是札之辭國以此而得名矣札既不立則位必之光此羣臣之所為也而光何預於弒乎若札者即其潔身獨善亦一清修之士也然以貴戚舊臣人望所屬國亂而不能定人君弒而不能討賊徒知守節竟廢大倫非所謂輕千乘之國而蹈道則未者邪此固春秋之所不與也但來聘不稱公子者未為卿也其稱名者大夫之恆辭爾胡康侯乃謂因其辭國生亂而貶之則過矣夫札之辭國在聘魯二十九年之後而貶之於二十九年之前無乃加非其罪而輕於絶人與西亭辨疑春秋之法中國事常詳外夷事常略其不稱公子者略也傳以為貶過矣按札之讓國繫一事之可否吳之入聘關夷夏之盛衰春秋之志謹其大者而已程氏端學曰季札讓國在聘魯三十年後孔子安得預去公子而貶之邪春秋即此事而論此事之義未嘗因此事而論他事之善惡也秋七月葬衛獻公齊髙止出奔北燕髙止髙厚子也北燕姬姓之國召公奭之後今燕國薊縣是也北燕始見經即今順天府季氏私考崔杼死而止始與政事使從城把之役必其人貪欲專功故因其歸而去之左氏傳曰髙止好以事自為功且專故難及之是已蓋晏嬰為政明於用舍能去不肖而立賢也止去而立敬仲之曾孫偃傳曰良敬仲也敬仲即髙徯則用賢之效可知矣冬仲孫羯如晉報士鞅之聘也三十年春王正月楚子使薳罷來聘楚知吳已聘魯其報公之朝而來聘懼失魯也因公如楚楚康卒郟敖立今薳罷來聘以聘報朝也夏四月蔡世子般弒其君固景公弒靈公般立季氏私考蔡般弒父遂立為君矣訃以疾卒故魯人會葬如常左氏所載景公淫而不父之事無以考其必然但般本意實欲急於得國爾春秋時凡臣弒君子弒父必關利害乃動邪心或以奪位或以專權或以見疑或以被逼皆非有權力者不敢為也及其弒也非遇忠臣死節亦未有不諱其事者如其事情隱微形迹稍密則遂以疾訃不使人知或稍彰聞不能自掩則或加以淫或加以虐或云遇賊竊殺或云遇急自縊皆以邪説文姦若謂其君當死然者諸侯苟聞其事則亦以文姦之説歸惡於君而人亦不以為非矣五月甲午宋災宋伯姬卒按伯姬歸宋在成九年至是已四十年併其未嫁之年而數之計已不下六十宜亦知所輕重矣當夫火勢剝膚以生為重奚必聽於傅姆而後避哉宵雖下堂於義亦無害也况經文書宋災而曰宋伯姬卒則災乃在其國中而非後宫迫切之地如僖二十四年之西宫災也何以必其為逮火而死乎當時蓋以伯姬為賢因附會其説而後儒遂妄傳其事爾故程端學氏曰死適與災同日榖梁之説妄意之也此論得之矣天王殺其弟佞夫佞夫靈王子景王弟莊二十二年殺王子頺僖二十五年殺王子帶皆不書二王子之亂其殺之必告諸侯史無不書之理而孔子削之以天子討亂臣而罪人斯得矣不書可也靈王崩儋括欲立王子佞夫佞夫不知也景王立而殺侫夫失親親之義矣故特書之王氏經世云靈王崩儋括欲立佞夫佞夫不知景王立儋括圍蒍佞夫不預則佞夫無罪也王之恩素篤罰有章而尹劉諸人敢以無罪殺其介弟乎且括亂而免則是所忌在佞夫爾故書王殺以見忍親失刑雖天子不免焉而况其下乎王子瑕奔晉屬詞桓十八年周公黑肩欲弒莊王而立王子克王殺黑肩王子克奔燕既以天子討有罪不書則子儀出奔以非其罪也儋括欲立佞夫佞夫不知而景王殺之瑕括廖奔晉瑕廖蓋與括同謀者故殺佞夫既以非其罪書則瑕書奔者以佚賊也景王之討罪有愧於莊王矣季氏私考靈王之崩王子瑕之徒多附佞夫者至是景王疑佞夫之植黨而殺之書殺其弟見其無親親之恩也王子瑕者蓋必靈王之弟儋括之叔先儒以為景王子非也若謂瑕為景王之子豈有儋括欲立佞夫而瑕反背父以黨逆之理乎儋括既為罪首與瑕同時奔晉何為經舍首惡而獨録瑕也果為儋括欲立佞夫則殺佞夫不當遲至二年之久而括亦不得免於戮矣求之於經理有不可通者故傳注之説不可盡信而直以王子瑕為佞夫之黨可也奔不書出者蓋失職之臣非居祿位而奔也而瑕覬覦非望以陷佞夫於死罪亦著矣秋七月叔弓如宋葬宋共姬鄭良霄出奔許自許入于鄭鄭人殺良霄季氏私考良霄汰侈嗜酒則害於國政宜去者也雖與公孫黑有爭為其所惡然必亦當國者主之而後能逐公孫黑必不敢因其醉而攻之也故子皮推亡固存之語當在伯有未奔之前非因既奔乃始聚謀也蓋奔者有罪見逐之名則出於當國者所主可知許者鄭之讐適讐國將以因其力也自許者許有奉焉不言復者未絶其位也不言叛者但與同列爭權求復其位未至於叛君也良霄見逐於國本無大訶而田里未收義猶可復今乃藉讐兵以復國不既為亂乎此則國有常刑矣故其殺也不稱大夫蓋先絶於仕籍以罪討爾稱人以殺者駟氏乘良霄之亂即率國人急攻而殺之不待歸獄於國也此與晉人殺欒盈義同是時子皮當國故其政事如此此子産所以不主強直也歟子皮即罕虎左氏序此抑揚亦或太過以經正傳斯可矣當時良霄因爭而去位尚未絶求復當自有道今結許而來用兵以入焉則非矣故直書鄭人殺良霄見其為衆所欲殺亦所當殺也胡氏謂將以滅國則斷之過矣季氏説近是冬十月葬蔡景公蔡君前此如哀如穆如莊多不葬而蔡景弒於子昭十一年靈公般戕於楚哀四年昭公申殺於盜彼能禮葬其君則魯皆會其葬而不敢忽時蔡方從楚畏楚故重其與國如此也西亭辨疑三十年夏蔡世子般弒其君固至是始葬諸侯見弒而不書葬者或因其國亂或不以葬期來告或告而不往會也是時蔡屬楚魯方事楚因往會葬而史書之以此知公羊傳謂賊不討不書葬者非矣晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故既而皆無歸於宋胡傳蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可謂知務乎叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至於淪絶無父與君是禽獸也禽獸逼人雖得天下弗能一朝處矣今世子弒君三綱淪絶禽獸逼人則與之同羣而不恤有國者不戒于火自亡其財苟其來告弔之可也則合十二國之大夫駐于澶淵而謀更其所喪尚為知類也乎以為未之察也可謂不智苟察此而不謀則亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言會之所為以垂戒後世其欲人之自别於禽獸之害也可謂深切著明矣或曰夫穆叔趙孟向戍子皮皆諸侯之良也而所謀若是何也世衰道微邪説交作以利害謀國家而不知本於仁義也久矣是以至此極孔子所為懼春秋所以作乎季氏私考澶淵之會城把之諸國也因宋災而謀更所喪爾魯不與者叔弓已往弔也前此鄰國有災皆未嘗謀而於宋災獨謀者以宋起弭兵之議而中國賴焉故也弔災恤鄰諸侯常禮遣一使往焉足矣而大合十二國謀之不亦過乎當時蔡般弒君未嘗謀討而獨謀宋災先儒以為不知類者此也趙武方執晉政而所謀於諸侯者如此意其為人必仁厚有餘而才智不足者也霸業自此而益衰其有以夫三十有一年春王正月夏六月辛巳公薨于楚宫廬陵李氏曰襄公在位三十一年當其初立外則晉悼之伯方務綏睦親鄰內則季孫行父仲孫蔑叔孫豹皆賢大夫故魯國自事伯外皆無他虞奈何自五年季文子卒後武子繼之專權肆欲城費而私邑張作三軍而公室卑入鄆而君命不行於是諸大夫則而象之城成郛而孟氏強矣城防而臧氏亦強矣悼公既沒齊邾交伐魯之不振益甚蓋以兵權分於三家故也至其末年乃俯首南面而朝於楚雖晉伯之失使然而魯之人望亦末矣孔子曰祿之去公室五世矣政逮於大夫四世矣蓋宣成以來已然而實甚於襄公也先儒李氏曰仲孫之用事者五叔孫之用事者四季孫之用事者十則三卿專政之形成齊人伐我者七邾人伐我者二莒人侵我者四則鄰國交爭之禍起雖享國長久倚晉為重已階削弱之端此襄公生亂而不悟其變也斯言得之矣王氏經世何休曰公朝楚好其宫歸而作之故名之云爾按左氏言公作楚宫穆叔曰君欲楚也夫故作其宫若不復適楚必死是宫也此非人臣之言且公淹恤於楚豈得已哉何欲楚之有作其宫不過慕其制而效之爾然楚宫必詭異非所當作也秋九月癸巳子野卒西亭辨疑左綿趙氏曰公薨而子野卒此與莊公薨而子般卒文公薨而子赤卒何異均未成君均不書地均不書葬而子般子赤俱以為弒而子野獨以為毁何也于時季氏之專尤非慶父公子遂之比此必子野賢季氏忌之弒野而立昭以毁言于朝而世不察爾不然不地不葬文與般赤同文同則其義不應異也己亥仲孫羯卒冬十月滕子來會葬癸酉葬我君襄公十有一月莒人弒其君密州此傳趙匡以為之字誤作以字展輿因國人之攻莒子弒之乃立而左氏則謂展輿因國人以攻莒子之作以左氏誤矣昭元年展輿出奔傳胡氏以為為弒君者所立立乎位而不能討賊故展輿不稱爵今但言莒人弒皆實録也傳不可信直當考據經文為是春秋事義全考卷十二
