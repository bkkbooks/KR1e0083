body:
  text: 春秋事義全考卷三明薑寶撰莊公名同桓公子母文薑諡法勝敵克亂曰莊元年春王正月不書即位屬詞謂以繼弒君不行即位禮故也閔僖同三月夫人孫于齊胡傳夫人文薑也桓公之弒薑氏與焉孔季彥曰文薑與弒魯桓春秋去其薑氏傳謂絶不為親禮也夫絶不為親即凡人爾孫者順讓之辭使若不為人子所逐以全恩也哀薑去而弗返文薑即歸于魯例以孫書何也與聞弒桓之罪已極有如去而弗返深絶之也然則恩輕而義重矣單稱薑氏則疑于妾媵而其罪不彰故不曰薑氏而書夫人汪氏曰書孫雖不曰奔使若自知愧耻而去然亦可見其無所容則其絶之也至矣季氏私考孫者退讓不居之名不稱薑氏者魯方絶齊不與為親也若猶未絶乎文薑逮繫之夫人見魯人之義孫齊之後託齊求助則恥心遂亡故今以絶齊示義絶齊所以責文薑之不與絶也夏單伯逆王姬單畿內邑成王封蔑于單邑故以為氏伯字也蓋周世卿單子之後以天子命而仕魯為卿者也據左氏單伯是周大夫而命魯以為卿者蓋其見國史魯實無單伯也故奉王命命魯為主婚自魯還逆王姬逆將至魯而後築館焉二傳以為送王姬又以單伯為魯大夫者非也黃氏説同秋築王姬之館于外屬詞魯與齊為不共戴天之讐又喪未畢而主其婚王姬至魯而齊侯有疑不敢親迎故為築館于外比事考之則當時之情可見也以為知其不可而築館于外者非冬十月乙亥陳侯林卒莊公卒宣公杵臼立陳莊公與桓王同名王使榮叔來錫桓公命榮榮公采邑今鞏縣西有榮錡澗周畿內地也末世諸侯喪畢不朝有請命者而後有來錫命有生不請命者而後有追錫之命追錫桓公命者莊王也桓不朝聘天子而王追錫之者桓身戕于齊而天子使魯主王姬之婚夏王姬至魯其事聞于王故王追錫桓公命以恤之亦因命魯主婚而用此以寵魯也胡傳啖助曰不稱天王寵篡弒以瀆三綱也桓公弒君篡國而王不能誅反追命之無天甚矣與葬成風引為夫人使妾並嫡無以異故其文一施之按王不稱天以見其不克若天如此若以為貶王不敢也王不可貶貶王非春秋之旨也王姬歸于齊王姬桓王之女嫁于齊襄公者即召南何彼穠矣之詩所稱之王姬也胡傳魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讐之義明矣齊師遷紀郱鄑郚郱今青州府屬縣地鄑在北海郡都昌縣西訾城都昌今平度州昌邑縣也郚在今臨朐境安丘東南胡傳郱鄑郚者紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人強暴用大衆以迫之為已屬也徙三邑之民於别所而取其地魯桓既沒紀于是遂不支矣黃之盟魯平齊紀才二年今又遷紀三邑齊襄志在滅紀矣魯豈足以保紀乎二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘慶父莊公庶兄次先莊公為孟而字以仲行諡曰共為共仲於餘丘今兖州府滋陽縣東南界上杜氏曰莊公時年十五於發語辭猶云於越汪氏曰餘丘小國蓋其後屬邾以為邾邑者非也以其與邾通也故伐之是時莊幼在喪慶父專兵假詞以侵小直書而罪惡見矣秋七月齊王姬卒王姬齊襄公夫人也魯人以我主其婚故因齊來告喪為之服欲以説齊而史書其卒同內女後齊桓王姬亦魯主之而卒不書可見主婚修服之非禮而齊桓不可以非禮説故弗為也十有二月夫人薑氏會齊侯于禚禚齊地季氏私考曰文薑往會齊侯必多從侍女因王姬既卒而以淫欲導襄公也是時羣臣方歸咎文薑而顯然出會如謀國事然亦可謂無忌憚矣此年會禚四年享祝丘七年會防冬會穀屬詞時莊公不知有不共戴天之讐夫人因得託國事會齊侯內以愚其子外以遂其姦魯之臣子軋於強齊之勢而不敢議此敝笱載驅之詩所由作也金氏曰慶父叔牙季友皆桓公子而友之祥慶父之材皆不在人下故齊襄殺桓而以立莊為德文薑又挾舅氏之援立以固莊莊而讐齊制母焉則三公子皆君也是以莊俯首唯徇母之欲蓋制于其母以立已為齊之德而不之讐也乙酉宋公馮卒莊公卒子閔公健立三年春王正月溺會齊師伐衛髙氏曰衛朔奔齊齊欲納之然天王已絶朔而立黔牟魯輒興兵會仇讐之人抗天子之命納不義之君其罪大矣由此知溺不稱公子以貶溺貶溺以見魯此舉之非亦所以貶公也見魯之非是矣若以為貶公亦非春秋之旨也夏四月葬宋莊公五月葬桓王杜氏曰以桓十五年崩今七年乃葬髙氏曰承諸侯背叛王師傷敗之後力益不足也若曰改葬則聖人必明書之矣此説是其以著天下臣子之罪則似不然也以為罪周臣子之慢則可秋紀季以酅入于齊酅紀邑在齊國東安平縣東安平今在臨淄東一十里蓋紀之西鄙而接壤于齊者也胡傳大夫不得用地公子不當去國盜地以下敵棄君以避患非人臣也紀季所以不書奔者有紀侯之命矣所以不書名者天下無道強衆相陵天子不能正方伯不能伐屈已事齊請後五廟其亦不得已而為之者非其罪也所以無貶乎入云者難詞也當時齊欲盡得紀地季雖止欲存酅而齊亦難之也蓋閔之也以酅入齊者非但以地入于齊而已也蓋使季以酅降附于齊請立紀廟於此以存宗祀爾冬公次于滑滑衛南鄙地今大名府滑縣是也季氏私考是次也公穀以為欲救紀而不能紀在魯東北而滑在魯西南相去甚逺以救紀之兵而次于此是猶北轅而入越也是時魯莊方幼以甥事舅惟齊是從大異桓公是矣豈復有謀紀之志乎故滑之次非為紀也蓋滑在衛南鄙其必奉齊命以俟諸侯納朔而不至者歟五年之伐衛已張本於此矣書此見公之輕舉也不言所俟期諸侯者齊也非魯所得知爾此説有理從之四年春王二月夫人薑氏文薑享齊侯襄于祝丘祝地魯胡傳享者兩君之禮兩君相見享于廟中禮也犧象不出門嘉樂不野合非兩君相見又去其國而享諸侯甚矣享禮最重飲酒如燕禮之多食物如食禮之備三月紀伯姬卒夏齊侯襄陳侯宣鄭伯遇于垂季氏私考此鄭厲公求齊釋輔魯援紀之怨也厲公之入櫟也宋衛陳蔡之怨既釋而齊怒獨深尚賴魯桓為助桓既沒莊又以甥故從齊則厲公失恃而懼齊甚矣此其所以因陳為介即垂地以求見齊襄也歟此説是髙氏以為齊恐陳鄭救紀而為會以止之者非也紀侯大去其國今兖州府鄒縣東南二十五里嶧山之陽有紀城地志以為紀侯遺邑且有紀子墓焉豈即紀侯避居之地耶屬詞紀侯不忍殘民以爭必亡之國又不忍五廟之不祀故使季以紀事齊而已獨委國而去之與國滅不死社稷者不同是故不書出奔而特異其文書去其國其所寓之國不足志矣大者紀侯之名從史文也六月乙丑齊侯襄葬紀伯姬胡傳葬紀伯姬不稱齊人而月其君者見齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之罪著矣葬伯姬似仁惡似而非者惡莠恐其亂苗也目齊侯葬胡氏説是其不書我葬如後遣叔弓如宋我不會也秋七月冬公及齊人襄狩于禚王氏經世曰按齊市援立之恩強公子伺圖嫡之釁當時之習為而不怪者也季友之祥慶父之材皆非人下同無齊援將不得立矣此所以惟齊是從而今又與之狩也季氏私考以猗嗟之詩觀之則莊公善于騎射者也故齊襄選其國人以從公狩蓋將使公率以伐衛而先教之練習爾以國君之重踰境而與他國之人馳射順舅情而失君禮不可以為能自立矣劉原父曰齊人者齊之微者也其言公及之非公之去南面而下與微者狩也若夫忘親釋怨則豈待今日而後貶乎此説是然則狩指練兵非專謂從禽也五年春王正月夏夫人薑氏文薑如齊師胡傳曰會曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮于微慮患于早之意也王葆氏曰前此會禚享祝丘皆歷日而返故書月至此歷月而返故書時秋郳黎來來朝郳曹姓出自邾始封君挾之後挾七世孫夷父顔有功于周封其次子友于郳為附庸國地在今嶧縣界按子服景伯以邾莒為蠻夷而郳又其陋者邾莒非夷狄彼蓋陋之之辭郳非夷狄附庸明矣他年宋仲幾云滕薛郳吾役也郳蓋宋附庸其非夷狄附庸益明矣春秋繁露曰附庸字者方三十里名者方二十里郳國小故與介同稱名介亦未必夷狄附庸也介葛盧來亦是來朝但不能如黎來之成朝禮耳故彼曰來而此則兼曰朝冬公會齊人襄宋人閔陳人宣蔡人哀伐衛臨川吳氏曰三年齊師會魯伐衛以納朔而不克納故今又會四國之兵以納之胡傳穀梁子曰是齊侯宋公也其曰人何也逆王命也桓公十六年衛侯朔出奔齊經書其名者以王命絶之也又黨有罪以納之故貶而稱人按諸侯以納朔而貶公會諸侯其當貶亦自見矣人諸侯以人公之説似未妥六年春王正月王人子突救衛時齊人合諸侯抗王命以納朔魯亦與焉於是救衛之令始及于魯史乃得而書之屬詞諸侯與大夫略其恆稱則稱人皆未有稱人而又稱字者此王人兼稱字乃特筆也衛侯朔得罪于天子天子命立黔牟而出朔齊襄乃合諸國抗王命以伐衛而納之其事甚逆于是王人救衛救黔牟也故雖非卿特字以尊異之見王人救衛為正則朔與諸侯之罪明矣夏六月衛侯朔入于衛趙氏録疑云書入重逆王命上上數傳皆是此意五國伐為逆王命以伐衛子突為奉王命以救衛朔入為抗王命以入衛公至亦為逆王命黨惡附姦而至皆重在王命上説秋公至自伐衛胡傳入有二義一難詞也一逆詞也朔藉諸侯之力連五國之師距王官之微者以復歸于衛其勢宜無難矣而書入者逆王命也朔逆王命以復國故書名書入以著其惡王人書字書救以著其善外則諸侯書人內則莊公書至而春秋之情見矣螟冬齊人襄來歸衛俘胡傳俘者二傳以為寶言齊歸衛寶則知四國皆受朔之賂矣春秋特書此事結正諸侯之罪也文薑請于齊襄以説魯也結正其罪言前此之所以為惡者歸在于欲貨而已王氏經世俘軍所獲也公榖作寶所獲重器也朔之奔也齊侯容之其入也齊連諸侯納之故以寶賂齊而齊以分于四國焉故主齊言之七年春夫人薑氏文薑會齊侯襄于防防魯地夏四月辛卯夜恆星不見夜中星隕如雨胡傳恆星者列星也如雨者言衆也人事感于下則天變動于上前此者五國連衡旅拒王命後此者齊桓晉文更霸中國政歸盟主而王室遂虛其為法度廢絶威信凌遲之象著矣屬詞星隕如雨傳曰不及地尺而復蓋所隕者星之光魄故雖多而不見在地之形説者謂積氣消散所致比他異尤重蓋王運至此終矣桓莊之際諸侯無王伯者出而天下大權歸於齊晉人情絶望于周此王室一大變也秋大水無麥苗胡傳書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也周之秋是夏五月斗建午之月也當是水與雨會故麥熟未得斂而四月已種之穀其成苗在田者亦為水所漂既無麥又無苗春秋二百四十二年惟此年一見所以為異此年不書飢者何蓋水亦旋退更種他榖之故也資中黃氏冬夫人薑氏會齊侯于穀今東阿縣南十二里有穀城後為管仲采邑胡傳防魯地也穀齊地也初會于禚次享于祝丘又次如齊師又一歲而再會焉其為惡益逺矣明年無知弒諸兒其禍淫之明驗也八年春王正月師次于郎以俟陳人宣蔡人哀王氏經世按諸家以書及之例謂取郕為魯志魯素弱國莊又童昏豈能造取國之意兼強鄰之兵而齊又豈肯為之役哉此必齊欲取郕以其利誘魯共伐魯動於利而往胡氏所謂書及者親仇讐是也郕降于齊齊賣魯而專取郕經文自明經書春正月師次于郎以俟陳人蔡人至秋師還本為一事蓋齊欲與魯陳蔡三國伐郕而推魯使主兵昔鄭國伐許以齊主兵今齊圖郕以魯主兵其詐一也魯為齊先出師于郎又為齊約陳蔡久俟不至而魯師進止之命聽于齊故不敢還而治兵于郎夏乃及齊師圍郕而降之爾甲午治兵胡傳此治兵于郎也俟而不至暴師露衆役久不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也夏師及齊師圍郕郕降于齊師胡傳書及齊師者親仇讐也圍郕者伐同姓也於是莊公之惡著矣秋師還季氏私考郕在濮州雷澤東南距魯僅三百里解圍在夏計日可歸乃逡巡一秋而始克返見勞師日久部署不收也故特書師還以病之冬十有一月癸未齊無知弒其君諸兒齊無知弒其君諸兒總是一句不當作兩句分解無知不稱公孫而以國氏固見僖公寵弟而私及其子以為亂本若襄之見弒自是其禍淫之驗所謂直書自見者也略徒人費等死節意輕九年春齊人殺無知胡傳殺無知者雍廩也而曰齊人者討賊之辭也弒君之賊人人之所惡夫人之所得討故稱人人者衆辭也無知不稱君已不能君齊人亦莫之君也公及齊大夫盟于蔇蔇齊地在今嶧縣東八十里蓋欲迎子糾也齊亂無君來者非一人故稱齊大夫汪氏曰莊公素無報讐之念自以為出于齊倚齊為援故于襄之死從齊大夫盟于蔇而謀立糾以為君為植黨市恩之計初非以德報怨實欲以德報德也使莊幡然悔悟思其父之所以弒因無知之亂伸大義而伐之斫其棺而暴其罪謀於齊衆擇僖公之賢子而立之豈不為桓公之孝子為春秋之賢君也哉于齊大夫盟書曰公及蓋深疾其懵于理而不能勇于事也夏公伐齊納糾齊小白入于齊資中黃氏及新安趙氏主左傳以書子糾為是謂子糾毋魯女其班序當在桓母衛姬之上糾固應立者也子路子貢其疑而問也亦謂當時公論不直桓公故爾夫子直取管仲之功而不責其不死蓋公子無為君之道師傅先君所設不可純以臣禮律之有患難則相與周旋既以宣力效勞而偶脫虎口者亦在所可恕如仲是也此事須按經文為正以後書取子糾者可槩見矣愚按程氏以桓為兄黃趙以糾為兄此不必深辨但據魯納糾糾為魯女出似可信糾既為魯女出則母貴應立又似可信也糾小白皆僖公子襄公弟納者得入不得入未可知入者逆辭也非難辭也蓋桓分不當立故為逆桓之才足以有齊故不為難也此與唐建成世民之事正相類秋七月丁酉葬齊襄公杜氏曰九月乃葬亂故也八月庚申及齊師戰于乾時我師敗績時水名在樂安縣界攴流旱則涸故曰乾時杜氏曰小白既定而公猶不退師歷時而戰戰遂敗季氏私考謂當戰敗之時公喪戎路傳乘而歸當時魯以為恥國中皆諱言公不與戰春秋亦不過據其自諱之實爾屬詞據左傳伐齊納子糾上既書伐齊納子糾則義已直雖戰而敗績非所諱也其説非為與讐戰雖敗亦榮之説尤非書及在魯見齊人本不欲戰而魯決求一逞以致喪師辱國固自取之也惟如此則魯之失見矣九月齊人取子糾殺之胡傳取者不義之辭書殺糾復稱子者明不當殺也糾雖爭立越在他國置而勿問可也必請于魯殺之然後快于心其不仁亦甚矣冬浚洙水經注曰洙水出蓋縣西北臨樂山西經新泰縣西南流于卞城至魯東北流經孔里此謂洙泗之間也又曰北為洙瀆南則泗水二水交于魯城東北十七里自城北南經魯城西南流而東南入淮今按蓋與新泰魯之北鄙近齊者也屬詞洙水在魯城北下合泗乾時戰敗故深之以􅊀齊洙在魯北齊伐魯之道也魯雖殺子糾猶有畏齊之心故浚洙胡傳書浚洙見勞民于守國之末務而不知本為後戒也十年春王正月公敗齊師于長勺魯莊挾不能納糾之憤因齊師來伐而逞其狙詐以敗之非待敵之道也經故書敗以見魯之非他處言詐戰皆未為陳此獨非也蓋齊人三鼓則既陳矣當時自一鼓至于再鼓皆齊師成列而欲戰也而曹劌以為不可必俟其三鼓之後彼竭我盈而後克之此則所謂詐謀取勝爾若視其轍亂望其旗靡此又是逐奔之法非詐戰也三月公侵宋屬詞時宋與齊合魯有齊怨而掠宋境實一國之私而已故不書至三月宋人閔遷宿宿故國在今宿州而所遷之地則在今宿遷公之侵宋自沂取道于宿以出其不意宋人以宿為通于魯也故遷之髙氏以宿介宋魯之間屬于宋而親魯宋人以為二于魯而遷之蓋移入其封內以為附庸也自是宿不復見則亦亡矣所謂不再貶而惡見者也戰乾時取子糾敗長勺次郎敗乘屬詞齊既敗魯乾時即遣大夫帥師臨魯脅殺子糾又乘其再克以伐魯長勺戰敗則又以公嘗侵宋而挾宋師次于郎齊之加于魯太亟矣故通前後為一事以譏之見桓公既得國即圖伯宋既從次當服魯而魯以子糾故不容遽絀于齊桓公不能釋魯以為後圖而亟戰喪師非始伯經逺之略也亦所謂直書而義自見者也夏六月齊師桓宋師閔次于郎公敗宋師于乘丘説見前乘丘魯地在今曹縣界內歸按郎在單州魚臺縣蓋齊宋至此魯伺其分兵將誘而敗之則乘丘宜在今曹縣近單父之地秋九月荆敗蔡師于莘蔡地以蔡侯獻舞歸莘在今裕州莘縣荆州名即楚始封以為國者至成王頵改號稱楚楚芊姓顓頊之後其後有鬻熊事周文王早卒成王封其曾孫熊繹于楚以子爵居丹陽丹陽在南郡枝江縣十六傳而至熊通始自立為武王武王十九年魯隱公之元年也武王居鄒鄒南郡江陵縣北紀南城是也按一統志南郡今為荆州府而紀南城在府城北一十里即楚徙都之鄒也屬詞荆始猾夏以蔡君歸夷夏之大變也屬詞莊四年武王熊通卒子文王熊資立今年敗蔡師虜獻舞始見于經十三年入蔡十六年伐鄭傳記其十九年伐黃而卒子成王頵立季氏私考楚兵至蔡詐誘蔡師而敗之所敗者蔡師也蔡侯不與焉特因敗而出降爾出降而以之歸國與戰陳中擒獲者不同故不書獲按史記楚文王虜蔡哀侯以歸留九年死于楚蓋楚欲服蔡故留之觀蔡哀侯之卒不見于經其去而不返可知矣李亷曰楚文王立于莊之四年方是時承武王之烈內有鄧曼為之母外有令尹鬭祁莫敖屈重等為之臣為會漢汭而隨人不能乘其喪鄧不血食而三甥無以謀其暴於是楚勢不可遏矣齊桓方謀魯以圖伯于東而荆亦執蔡以爭強于南其不知者以為伯事成而中夏盛其知者則以為王道消而夷狄長矣故執君之禍滅國之禍皆始于此年天下無王齊為之天下無中國楚為之也冬十月齊師滅談談子奔莒談子爵國今濟南府東七十里有談城按談地處齊西界而小白之奔莒在齊東南非所由之道謂談不禮焉者非事實也齊之滅談不過為兼國廣地計爾屬詞入春秋楚滅漢陽諸姬在齊桓未伯前書滅耿霍魏在桓伯後告命皆不及于魯故史不書而齊桓滅談滅遂在經為滅國之始蓋告命及故書之王氏經世齊桓圖伯之初滅談滅遂降鄣遷陽專以威力虐小侮弱其後雖能存三亡國而功不足以掩罪矣春秋書荆敗蔡師于莘以蔡侯獻舞歸齊師滅談談子奔莒荆之所為齊亦為之不待貶絶而惡自見矣王氏謂此為管仲攻瑕之計非也是時管仲雖舉尚未得君故桓公始謀貪暴如此後二年滅遂同然則管仲相齊不在齋祓見桓之日而尚在脫縳三年之後也歟十有一年春王正月夏五月戊寅公敗宋師于鄑鄑魯地宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑秋宋大水胡傳凡外災告則書告為得禮不可以不弔凡志災見春秋有謹天戒恤民隱之心王者之事也張氏曰比歲交兵怨不廢禮蓋古意之猶存而未泯者也冬王姬歸于齊魯主婚歸此王姬必亦桓王季女也桓王女一襄公一歸桓公襄桓本兄弟姊妹歸之何害黃震氏以為皆莊王女者非也張氏曰王姬即齊侯之夫人也魯於齊為讐然已易世故齊侯來逆不書止書王姬之歸而已王姬下嫁無異於侯女適人者蓋夫婦之道乃三綱所繫不可以不早正故因其始嫁而一之于諸侯女歸之辭焉以此見王姬雖貴其當執婦道與公侯庶人之女固無以異也十有二年春王三月紀叔姬歸于酅胡傳莊公四年紀侯去國叔姬至此始歸于酅者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在酅歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸于魯所謂全節守義不以亡故而虧婦道者也魯人髙其節義恩禮有加焉是故其歸于酅其卒其葬史册悉書夫子修經存而弗削使與衛之共薑同垂不朽為後世勸汪氏曰叔姬雖伯姬之娣然諸侯夫人既卒則次妃攝治內事故叔姬雖媵妾當奉紀之祭祀而歸于酅夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧桓公御説立南宮萬本宋有力人乘丘之戰為魯所獲既而得反于宋為大夫萬有南宮牛等為助其黨之盛勢必見疑于閔公而弒之公羊謂因一時博戲之言殆非也胡傳君弒而大夫死于其難春秋書之者其所取也夫仇牧可謂不畏強禦矣永嘉吕氏曰孔父乃穆公所屬殤公者也荀息乃獻公之屬其子者也孔父荀息存則殤公卓子與之俱存亡則與之俱亡殤公卓子已弒而孔父荀息尚存則督克不得而全矣仇牧雖非屬受于先君然聞君弒趨而至遇于門手劍而叱之是仇牧生而存則萬不可以生仇牧死然後萬得以奔陳爾非能與君存亡何以如此吳澄氏曰萬有力無德戰敗免罪已幸矣又以之為大夫宋閔用人如此其遭弒自取之也冬十月宋萬出奔陳胡傳賊已討矣曷為不書陳人殺萬而葬閔公乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書萬出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣陳人始不以為賊而納之後又因以為利而始殺之是其黨賊而失刑也故書萬出奔陳而不書陳人殺萬以罪陳汪氏曰春秋書逆賊出奔一以責國人之失賊一以責鄰國之不當受也陳人既受賊及貪賄而後以狙詐戮之則非天討矣胡傳少責國人一意還當從此十有三年春齊侯桓宋人桓陳人宣蔡人哀邾人儀父會于北杏北杏齊地胡傳或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也李亷曰齊桓得管仲于鮑叔而任之首懲襄公田獵畢弋之戒于是管仲得以盡行其術制國以為二十一鄉工商之鄉六士鄉十五與國髙各帥五鄉焉作內政而寄軍令興鹽策以盡海王之利春搜秋狩有士三萬人以方行天下而又以三選擇賢始于鄉長之推繼于官長之選復親自資相于是民各安其居正封疆重聘幣號召天下之逰士以犀甲贖罪擇其淫亂者而先征之反棠濳于魯使為南伐之主反臺原漆里于衛使為西伐之主反柴夫吠狗于燕使為北伐之主故齊國之境南至陶隂西至濟北北至于河東至于紀酅有革車八百乘即位數年東南多亂者萊莒徐夷吳越一戰帥服三十一國是雖伯者之事然規模次第亦有自矣左傳于桓公多略故具于此按胡氏以宋襄晉文楚莊秦穆交主夏盟則是以此四君與齊桓為五伯他説亦有然者矣屬詞引齊國佐之言有曰五伯之伯也勤而撫之以役王命楚莊乃中國大義所當攘却而所謂勤而撫之以役王命者于宋襄秦穆亦何取焉傳言穆伯西戎孟子亦言其用百里奚而伯要是止伯西戎伯乃當時矜尚之詞而非能以尊奬王室如桓文為伯主也杜氏謂夏伯昆吾商伯大彭豕韋與桓文共稱五伯為是不然何以孔子亦但曰其事則齊桓晉文而已耶臨川吳氏曰是時管仲為政四年矣教齊桓糾合諸侯以圖伯而始為此會也陳氏曰春秋非主兵皆序爵于是序齊于宋之上而獨爵齊將豫齊以伯也四國稱人意當帶説不重蓋四國稱人而齊以爵書時因楚僣王虜蔡侯宋萬弒君而列國諸侯漫無統紀春秋為王室諸夏憂將豫齊以伯故如此夏六月齊人桓滅遂遂舜之後子爵國漢濟北國蛇丘有遂鄉蛇丘在今兖州府寧陽縣西界而遂在蛇丘西北當在今濟南府肥城縣南界蓋北近齊而南界于魯其西南則亦去衛與曹皆不逺者也遂人不會北杏罪未至可滅也桓遽滅之要之滅談滅遂不過假公義為拓土開疆之計又示威以滅小國將以脅大國也故春秋深責之季氏私考齊稱人將卑師少也自此至閔二年遷陽凡齊兵未有不稱人者雖以不欲勞民之故亦見其兵精而不貴于多也秋七月冬公會齊侯盟于柯柯齊邑在今東平州東阿縣魯北境地資中黃氏以糾乃僖公之子不得稱世讎惜魯力不足以納爾小白既立以魯納糾之故交兵互有勝負既而為柯之盟以平自此不當復相讐矣夫罪止在襄而糾小白皆僖之子故柯盟無所諱者此也公與齊侯皆書其爵以為可以平者此也屬詞齊桓結諸侯以圖伯師次于郎而魯不服既會于北杏公始會之盟則柯之盟齊志也李亷曰當時修伯非得魯則不足為重故如公羊所稱曹子之事捐小利用伯術以收魯容或有之魯亦知齊欲以信求諸侯故因盟以求地而公羊遂夸大之爾蓋魯自長勺乘丘之勝國勢稍振齊不敢以待談遂之術待魯而多方以求之屈己于歸田之請遷延于姻好之成示威于三國之伐耀武于戎捷之獻而魯自是不敢有從違之心矣九合之盛亦原于此公不及北杏之會桓公既滅遂懼其見討故與之盟于此十有四年齊人桓陳人宣曹人莊伐宋按北杏之會齊桓以宋萬弒閔公而為會以定宋桓之位所謂定宋亂者是也宋大國上公見齊桓一旦欲專征在其上且不謂其伯業果成也雖受其定位之惠而心尚不服所謂背北杏之會者意蓋如此胡傳諸侯伐宋其稱人者將卑師少也齊自管仲得政滅談之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐蓋以制用兵而賦于民薄矣故能南摧強楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣按內政之法五鄉一師萬人為一軍比之周制萬二千五百人為軍者誠簡便矣故曰桓文節制之師張氏曰陳曹皆宋之鄰不動逺國亦簡便之規模也夏單伯會伐宋齊桓之興欲假王命以示大順故請師于周而王命魯遣單伯會伐宋取成于宋而還宋自此從齊獨固伯業所賴居多焉胡傳宋人背北杏之會合諸侯而伐之者齊桓公也會伐者無貶焉故其辭平秋七月荆即楚文王入蔡荆以蔡侯歸為欲服蔡也而北杏之會蔡人從齊是以荆入之蔡哀侯為莘故繩息媯以語楚子致楚子滅息以息媯歸又以息媯生堵敖及成王焉而未言事由哀侯滅息也遂伐蔡而入之楚熊資興兵以悅婦人誠非矣然息之亡蔡之入則皆哀侯致之也季氏私考左氏好紀異聞喜談女德故以蔡禍盡委之于息媯殊不知蔡者楚所由病中國之要道也苟非得蔡不能長驅中原此天下之大形勢齊桓豈有不知顧威望尚輕無以濟目前之急爾蔡不能支安得不南向而從楚乎王氏經世李亷曰蔡為周室宗盟之長近於楚而長受楚禍中國之力有不及焉故自北杏之後齊之盟會蔡不復與矣蔡之始録于經則會鄧以懼楚終録于經則遷州來以避楚楚之始見于經曰敗蔡終録于經曰圍蔡齊晉之伯其極盛則侵蔡以伐楚其極衰則會召陵以救蔡而不能終于柏舉之戰吳操中國之權又以蔡故焉原一蔡之始終而中國消長之形荆楚強弱之變皆可見矣冬單伯會齊侯宋公衛侯鄭伯于鄄鄄衛地今濮州東有鄄亭衛朔入國不通諸侯者九年鄭突自遇垂不通諸侯者十一年今皆不敢不至宋服故也子是齊伯略定矣齊桓公修伯業合諸侯假王命以示大順以平宋亂而宋人服從欲歸功天子故以單伯會諸侯是年鄭殺子儀鄭厲公復國會鄄即鄭厲公也十有五年春齊侯桓宋公桓陳侯宣衛侯惠鄭伯厲會于鄄踰年再會懼諸侯之離也張氏曰傳謂齊始伯指諸侯始定而言然魯未信服是後宋猶主兵衛鄭未免復叛蓋齊伯駸駸而諸侯之心猶未一也夏夫人薑氏如齊以莊不與鄄之會故如齊以解之然自此不復如齊而遂再如莒矣以齊桓惡其行拒絶之也張氏曰文薑不如齊八年矣至此復如齊桓公欲求魯好以定伯業而不之拒也夫文薑播惡于襄公之世桓公絶之義也奈何以欲求魯之故而不鑒覆車之轍乎春秋特書以纍桓也秋宋人桓齊人桓邾人伐郳郳即小邾不欲從宋而專向魯齊桓助宋爭郳以脅魯至僖公時魯既親齊則進郳為小邾子而仍使服魯可以見伯者之用心矣張氏曰郳宋之附庸不服宋齊桓為宋伐之此役為宋而興也故宋序齊上胡傳伯者之先諸侯專征也非伯者而先諸侯主兵也此齊桓之師何以序宋下猶未成乎伯也二十七年同盟于幽天下與之然後成乎伯鄭人侵宋張氏曰間諸侯伐郳而侵宋不誠服齊以背二鄄之會鄭之反覆于齊楚之間蓋始于此故書侵以惡之冬十月十有六年春王正月夏宋人桓齊人桓衛人惠伐鄭孫氏曰鄭背鄄之兩會侵宋故齊桓帥諸侯伐之齊序宋下與伐郳同許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋蓋自是與齊為一宋親而中國諸侯定矣秋荆伐鄭荆患自蔡及鄭矣李亷曰鄭桓公始寄帑于虢鄶得十邑而國之前莘後河左濟右洛實春秋要領之國而南北之樞紐也楚禍及鄭始此而終春秋為伯主之輕重焉冬十有二月會齊侯宋公桓陳侯宣衛侯惠鄭伯厲許男滑伯滕子同盟于幽滑國在河南偃師縣南二十里有古滑國近在洛陽王城之東鞏縣之西去鄭汜水不逺與公次之滑不同屬詞公既盟齊侯于柯而二鄄之會不至此同盟于幽諸侯皆在而魯猶以微者行是以有公子結之盟三國西鄙之伐臨川吳氏曰齊自北杏以後屢合諸侯皆有會而無盟以諸侯之心未一也至此以鄭服始合九國為此盟此桓糾合諸侯一匡天下之始自入春秋以來所未有之事也然猶未敢專主盟之權故曰同盟至僖二年盟于貫齊始為盟主而自此以後不復書同矣按此説是蓋由諸國同詞以推崇伯主而為盟想載書亦自有同心推戴之言故書同若魯鄭之未同心是後來事不書公公實未親往以為惡失信者非也邾子克卒邾子瑣立時克卒距隱元年計五十二年矣儀父與盟若有二三十歲不應若此髙夀以此知克乃儀父子而儀父自是名非字也十有七年春齊人執鄭詹鄭不朝齊齊人以伯令召而執之也按召詹至齊而執之是矣不朝齊之説似未必然蓋侵宋之事起于詹鄭伯盟幽言其故故召而執之爾胡傳書齊人執詹惡齊之詞也鄭既侵宋又不朝齊詹為執政蓋用事之臣也其見執宜矣而以惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁此春秋待齊之意也夏齊人殱于遂胡傳殱盡也齊滅遂使人戍之遂之餘民飲戍者酒而殺之齊人殱焉春秋書此者見齊人滅遂恃強凌弱非伐罪弔民之師遂人書滅乃亡國之善辭上下之同力也臨川吳氏曰齊桓伯事方興而以強大吞弱小滅遂而慮遂之遺民不服故遣齊之民戍守其地以無罪滅遂固已失遂人之心矣而齊之戍者或又凌虐其民故遂人積怒而盡殺之胡傳上下同力下與上同力于此舉上見上與下同力則在滅遂上見即滅遂謂之上下同力亦可也秋鄭詹自齊逃來詹時在齊胡傳穀梁子曰逃義曰逃逃者匹夫之事詹之見執不能以理自明也而反效匹夫之行遁逃苟免越在他國不亦賤乎特書曰逃以著其幸免而不知命之罪也齊桓始霸同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以罪魯也屬詞齊桓同盟于幽鄭伯在焉而改歲即書執鄭詹必鄭人于桓公伯令有未盡從者既又不能正名其罪而緩之使逸豈非創伯之初人情未協有難以深罪者乎故經書之見以力服人者有時而窮也不然桓公管仲為政而罪人得越境以逃乎當其時魯侯未至而戍人殱于遂則筆削之意可識矣季氏私考詹見齊之始伯魯猶懷疑故逃來以相託書自齊逃來見魯不當叛齊以為逋逃主也齊自此治魯而不治鄭以阻撓伯事者在魯爾此可見魯不服齊之驗矣冬多麋五行志劉向以為麋蓋牝獸之淫者時莊公將娶齊之淫女其象先見如此十有八年春王三月日有食之夏公追戎于濟西濟水之西胡傳此未有言侵伐者而書追戎是不覺其來已去而追之也為國無武偹啓戎心而不知警危道也春秋之意其必未雨而徹桑土間暇而明政刑魯之失不在于追戎之時而在于追戎之前故春秋譏之示弭患于未然之道也秋有蜮蜮名短狐含沙射人水中影中輒病者江淮間多有之孔氏曰蜮如鱉三足南越婦人多淫其地多蜮時公取齊淫女為夫人故其象如此冬十月十有九年春王正月夏四月秋公子結媵陳人宣之婦于鄄遂及齊侯桓宋公桓盟結蓋惠胡傳遂者專事之詞媵程伊川謂鄄之巨室嫁女于陳人結自以其庶女往媵之也屬詞公子結以送女于鄄遇齊宋將伐魯遂與二君盟以求緩師然不免輕以失人矣故卒不免于伐夫人薑氏如莒莒必魯之外姻故托故而往冬齊人桓宋人桓陳人宣伐我西鄙胡傳奉詞曰伐其稱人將卑師少也結方與二國盟則其來伐我何也齊桓始霸責魯不恭所謂失已與人以招冦也吳氏曰結送已女為媵而遂與伯主大國盟不恭也是以見伐陳亦以結媵其國人之婦而輕慢伯主故與齊宋同來伐結不知禮而為私為公兩失歡好禮之不可不謹也如是凡外兵加魯四境言某鄙後同此二十年春王二月夫人薑氏如莒汪氏曰文薑以桓三年至自齊至是蓋年六十矣淫姣之行老而彌甚比歲如莒備書不削雖國惡不容諱也夏齊大災天火以夏書連月有災也其志彼來告此往弔也秋七月冬齊人伐戎季氏私考戎在魯西南而為魯患齊為魯伐戎示以威而懷以德其亦服魯之術歟家氏曰是時周有子頽之亂齊桓為盟主若罔聞知鄭虢以兵討亂殺子頽王入于王城而齊不能預去年伐魯今年伐戎大率逐利以自私于王室何有二十有一年春王正月夏五月辛酉鄭伯突卒厲公卒子文公捷立張氏曰篡弒竊國之人而春秋終始君之且復記其卒于位所以著亂賊得終王法不行為世之所由亂也秋七月戊戌夫人薑氏文薑薨黃震氏曰文薑之惡極矣春秋終始以夫人之禮書之實書其事而善惡自見爾冬十有二月葬鄭厲公八月乃葬緩二十有二年春王正月肆大眚按書稱眚災肆赦眚過誤也大過誤當赦者也季氏私考以莊公幼年嗣位制于文薑羣臣以不協其國人以拂意而陷于大過誤者多矣至是文薑既沒公論漸明于是肆赦大眚焉書蓋豫之之辭第以為由于齊令則未必然也胡傳譏失刑之説恐非癸丑葬我小君文薑王氏經世按周人以諱事神名終將諱之故易之以諡末世滋蔓降及匹夫爰暨婦人無外行于禮當繫夫之諡取其夫諡冠于姓之上詩稱莊薑宣薑共薑春秋宋共姬即其義也婦人法無諡也生以夫國冠之韓姞秦姬是也死以夫諡冠之莊薑定姒是也末世别為作諡如景王未崩后稱穆后皆非禮也魯文薑弒逆淫亂之人得罪宗廟國人之所不容今不誅而死縱以子母之故不忍棄絶葬之足矣又别為之諡曰文而不復繫于桓公可乎自是魯國從而效尤哀薑成風聲薑敬嬴齊薑穆薑齊歸皆别立諡不復繫于夫矣且妾母當之不正益甚矣陳人殺其公子御寇季氏私考公子御寇陳國卿也是時陳從齊伯每與會盟而御寇以貴卿當國必勸其君以急于趨事者但人習怠心憚于供億其徴求未免過嚴此御冦所以取怨而為豪強之所欲殺也故胡氏以為國亂無政衆人擅殺而不出于其君則稱人與張氏謂御寇自處失其道劉氏謂御寇為人足以殺其身説不合者殆如此夏五月秋七月丙申及齊髙傒盟于防齊桓以魯莊請婚而先以髙傒盟公于防沒公而不書諱之也及髙傒盟防納幣觀社遇穀盟扈如齊逆女初莊公內有所嫌為納糾重于從齊至是以請婚故每屈己以求齊如盟髙傒親納幣觀社遇穀盟扈親逆女婚好既合而後與齊同盟于幽齊桓亦以非致魯不可以成伯因婚好之合委曲調順凡十有餘載而後致公子會其務在得魯如此既又會于城濮而後伐衛遇于魯濟而後伐山戎且躬來獻捷以魯人望其汲汲于得之者誠為已欲圖伯不專為婚好而親魯也冬公如齊納幣胡傳盟不言公諱與髙傒盟也來議結婚娶仇人女大惡也娶者其為吉下主乎已上主乎宗廟以為有人之心者宜于此焉變矣公親如齊納幣則不待貶也莊公受制于母年長而不得娶母既死急于娶故于喪制中屈己與齊大夫盟而求婚焉齊之許未堅故公自如齊納幣二十有三年春公至自齊為取讎女而行歸而亦飲至于廟也故書至祭叔來聘屬詞祭叔者祭公之弟不言天王使則非王命矣祭畿內諸侯故得以聘書志其實也夏公如齊觀社程子曰婚議尚遲故公以觀社為名再往請議後一年方逆蓋齊難之當時齊于婚議亦何疑想齊女年尚未笄欲少待爾改疑為遲以此此見齊俗之社非公之所當觀諸侯之祀非諸侯之所當會所謂君舉必書書而不法後嗣何觀者此也吳氏曰齊俗每因祭社則搜軍實以夸示威衆而聚人觀之故莊公得託此為名以如齊按齊社聚人觀遊如後世里社祭賽陳百戲以觀于人之謂也公至自齊荆人來聘屬詞楚成即位欲窺上國故來聘使介辭命未能成禮魯不廟受故稱人齊桓方有事于楚故魯不報公及齊侯遇于穀莊公急于得偶數相會盟齊故與之從簡禮而為此會蕭叔朝公資中黃氏曰蕭叔本朝齊因公在穀故就朝蓋前此未嘗相見故行朝禮又齊與魯遇蕭叔在焉自不得不見又遇禮簡易諸侯體敵可用遇禮蕭是附庸雖邂逅于理應朝秋丹桓宮楹楹柱也冬十有一月曹伯射姑卒莊公卒子僖公立在明年即戎所立之赤也十有二月甲寅公會齊侯盟于扈扈齊地孫明復魯人其以為齊地必有所據矣杜氏謂鄭地乃文宣時會盟之扈爾公既如齊納幣齊猶難之而未許以期及與齊侯遇穀以要結之而猶未可必公與齊侯盟以信要之而後許焉則扈之盟魯志也亦齊志也莊公三十六而尚無內主是不能裁以義三十六而尚無繼體是不能合乎禮以社稷之事則曠焉莫與任之以宗廟之祭則闕焉莫與主之其為不孝也不亦甚乎春秋所以詳書以戒後也二十有四年春王三月刻桓宫桷刻鏤也桷椽也于礱斫之外又加刻鏤之工也刻是重加彩畫畫亦謂之刻若云雕刻則非矣蓋椽不可加雕刻也按文薑將祔桓公廟故丹桓宫之楹而刻其桷蓋新其廟以便主入而祔祭爾胡傳以為新娶之哀薑將見廟故為盛飾以誇示之非矣果爾則祖廟亦當見者也他公廟更久于桓必尤當新曷為他廟不新而獨新桓廟乎御孫以侈為惡之大亦未必指忘讎為言隱諷之如此也葬曹莊公夏公如齊逆女秋公至自齊胡傳穀梁子曰親迎常事也不志此其志何也不正其親迎于仇人之國也王氏經世按納幣遣大夫者也而公如齊親迎或于境或于館禮之節也而以納幣既如齊則親迎自不容不再至齊矣委宗廟社稷之重僕僕于齊在常婚猶為非禮辱身而况所求以自配者乃殺其父者之女乎八月丁丑夫人薑氏入胡傳何以不致不可見乎宗廟也薑氏齊襄公之女入者不順之辭以宗廟為弗受也婚義以正始為先而公不與夫人皆至薑氏不從公而入已失夫婦之正弒閔孫邾之亂兆矣莊公不勝其母越禮踰時俟仇人之女薦舍于宗廟以成好合卒使宗嗣不立弒逆相仍幾至亡國故春秋詳書其事以見莊公之不孝為後戒也按莊公為娶仇女既數數然汲汲然要結之夏如齊逆至秋八月踰時乃至彼此皆不能正始甚矣書逆女以病公書入見其不順以惡哀薑亦所以譏齊桓也戊寅大夫宗婦覿用幣宗婦同宗諸大夫之婦胡傳禮夫人至大夫郊迎明日執贄以見宗婦大夫之妻也公事曰見私事曰覿見夫人禮也曷為以私言之夫人不可見乎宗廟則不可以臨羣臣故以私言之也覿用幣何以書男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告虔也今男女同贄是無别也公子牙慶父之亂兆矣春秋詳書正始之道也忘父子之親故見夫人書覿見其非義亂男女之别故覿用幣特書見其非禮二意俱見莊公之非汪氏曰男女有别人倫之本也莊公使大夫宗婦同贄俱覿而致哀薑通共仲卒有弒君之禍春秋書娶夫人惟此最詳自盟防納幣于始至宗婦覿用幣于終見于經書其事十有四以其禮之非常故辭繁而不殺如此大水冬戎侵曹曹羈出奔陳赤歸于曹赤戎之外孫曹僖公也胡傳杜預謂羈蓋曹世子也曹伯已葬猶不稱爵者以微弱不能君故為戎所逐爾赤者曹之庶公子歸易詞也宋人執鄭祭仲而忽出突歸權在宋也戎侵曹而羈出赤歸制在戎也使鄭忽曹羈明而能斷雖有宋戎之衆突赤之孽何緣而起以國儲君副不能自定其位于誰責而可故雖以國氏皆不書爵為居正者之戒桓公始伯嘗一伐戎而戎侵曹不能治故戎制諸夏廢置人君亦以病齊桓也郭公季氏私考春秋時别無郭國疑即東虢也武王封文王弟虢仲于虢謂之東虢即今滎陽縣地滎陽之西今為汜水虎牢皆虢封內而京制二邑處乎其間春秋初虢君失德而二邑為鄭所有左氏所謂制巖邑虢叔死焉者即此虢叔雖死而故國尚存至是始亡虢亡而其地盡入于鄭矣叔死制者君之字當時别有一西虢蓋仲之弟胡傳此郭公也義不可曉而先儒或以為郭亡者于傳有之齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至于亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事謂之郭亡理或然也夫善善而不能用則無貴于知其善惡惡而不能去則無貴于知其惡未之或知者猶有所覬也夫既或知之矣不能行其所知君子所以髙舉逺引小人所以肆行而無忌憚也然則非有能亡郭者郭自亡爾二十有五年春陳侯宣使女叔來聘女即汝周畿內地今汝州是也周大夫之采邑而因以為氏女叔者王命仕于陳以為卿者也始結陳好也汝氏叔字夏五月癸丑衛侯朔卒惠公卒子懿公立不葬齊桓方假王命伯諸侯而衛人伐周以立子頽故魯不敢復親衛觀齊桓將伐衛而先會公于城濮意可見也六月辛未朔日有食之鼓用牲于社胡傳周官鼓人救日月則詔王鼓大僕凡軍旅田役贊王鼓救日月亦如之諸侯用幣于社伐鼓于朝退而自責皆恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣惟天子得鼓于社蓋社隂之神天子以尊臨卑責神之縱隂以侵陽也諸侯鼓于朝以朝已之所居義惟責已不敢同于天子也伯姬歸于杞胡傳書歸以志不親迎之失也伯姬莊公女公年三十七始娶哀薑當時割臂盟公如孟任輩必先有所出矣歸把為德公一作惠公夫人二十七年德公將來朝而先之以伯姬虞不敬也於是始降而稱伯秋大水鼓用牲于社于門國門社與國門非所以致水災者自古豈有伐鼓用牲救水災之禮乎周宣王救旱雖云靡神不舉然必以側身修行為之本非泛然求諸祈禳之末而已也冬公子友如陳報女叔之聘也屬詞齊桓始伯魯與陳皆同盟于幽而陳相原仲與季友有舊故是年春陳女叔來聘而冬友即如陳報聘傳曰始結陳好也春秋初惟二國之聘得邦交遺意二十有六年春公伐戎戎嘗侵我公追之濟西而未能報也公從伯既定乃親伐之夏公至自伐戎曹殺其大夫季氏私考曹大夫不名殺者非一人也義見文七年宋人殺大夫下曹赤因戎得立國事遂制于戎諸大夫之所不服也必有隂以其事訴魯者魯有濟西之怨本欲報戎故因戎侵曹而遂致伐焉曹所以敢于殺其諸大夫者為戎故也而赤與戎為黨殘忍不君之罪著矣屬詞陳氏謂曹赤篡而殺其大夫必有不義其君者蓋赤之所殺必忠于羈于赤無君臣之分者也赤既君曹以討罪告故稱國以殺黃氏震曰魯伐戎曹大夫之不與赤者預聞其謀故赤殺之秋公會宋人桓齊人桓伐徐徐伯益之後嬴姓子爵國故城在今泗州北五十里胡傳按書伯禽嘗征徐戎則戎在徐州之域為魯患舊矣是年春公伐戎秋又伐徐者必戎與徐合兵表裏為魯國之患也故雖齊宋將卑師少而公獨親行其不致者役不淹時而齊人同會則無危殆之憂矣汪氏曰宋先于齊而公書會則宋主兵明矣時魯治戎黨特事起于魯而邀齊以同事爾蓋宋地比魯尤近徐戎亦志于伐者也時則齊桓伯業未盛亦若伐郳伐鄭之先宋也明年盟幽而後授之諸侯故二十八年救鄭宋序齊下冬十有二月癸亥朔日有食之二十有七年春公會把伯姬于洮洮魯地胡傳伯姬莊公之女非事而特會于洮愛其女之過而不能節之以禮此春秋之所禁也故書屬詞伯姬以前二年歸把至此會公于洮冬乃歸寧皆為把伯來朝先為之地也説者但譏莊公出會其女而不知大不字小之失一至于此夏六月公會齊侯桓宋公桓陳侯宣鄭伯文同盟于幽季氏私考宋桓公懼人心之未一乎齊也故復合諸侯而為此盟自此并推為伯而齊桓遂專征伐矣胡傳前此鄭伯嘗二于齊矣至是齊桓強盛有伯中國攘夷狄之勢諸侯皆歸之鄭伯于是焉有畏服之心其得與于盟所欲也故特書同穀梁子所謂于是而後授之諸侯是也其授之諸侯齊侯得衆也視他盟為愈矣凡伯者之盟皆稱會伯者為盟而公會之也此後伯者合諸侯之盟二十一皆同此後幽同盟魯與而鄭服諸侯不復携二矣要之亦是同心同詞推戴齊桓為盟桓尚未主此盟也貫以後則皆桓主盟無事于諸侯之同矣是時魯宋鄭皆至而衛獨不來故明年伐衛秋公子友如陳宣葬原仲原周畿內邑今濟源縣西北一十五里有原城仲字本原大夫而王命仕于陳以為卿者也此公子友之私事而請于君以行也王氏經世按直書公子友如陳葬原仲不待貶而義自見者也胡氏謂通季子之私行而無貶者乃春秋端本之意謂王臣私交乃始亂而末流至于大夫交政于中國恐非經本旨季氏私考謂是時慶父專掌國政與公子牙比周友必有不合于心而託此以去遂不復歸書此所以為季子來歸張本爾冬把伯姬來胡傳左氏曰歸寧也禮父母在歲一歸寧春會于洮矣冬又歸魯故知其不當來也來而必書春秋于男女往來之際嚴矣伯姬固不當來然因伯姬之所以來為把伯來朝之地則公之所以待把者亦似少恩禮矣于伯姬之來見把非禮于伯姬之所以來亦見公之少恩莒慶來逆叔姬胡傳莒慶莒大夫也叔姬莊公女也不曰逆女而曰逆叔姬叔蓋字也何以稱字大夫自逆則稱字為其君逆則稱女尊卑之别也何以書諸侯嫁女于大夫而公自主之非禮也傳中何以稱字是尊卑之别何以書是譏公失尊卑之别而自主婚也把伯來朝髙氏以為致伯姬非也蓋因伯姬之來先為之地故敢來朝前是恐魯責其不能備禮為不恭也季氏私考把伯為莊公壻且屬于魯此其所以來朝歟杞伯不能自強求庇于魯使其妻先來通問非以禮正國者矣把始封為公不可考入春秋以來初稱侯今稱伯後又稱子實為朝覲貢賦不能供其費而漸以伯與子之禮從事故聖人因其自稱而稱之如此公會齊侯于城濮城濮衛地按幽再同盟大會也而衛懿不與齊于衛不可不圖矣今為城濮之會蓋齊以魯衛兄弟之國而使魯説之來歸爾衛竟不至所以齊于次年伐衛聲衛立子頽之罪要亦是假之之辭以為謀伐衛者亦似非蓋會衛地而謀伐衛既無是理公既與謀而不從行恐亦無是事然則以為謀伐衛者非也二十有八年春王三月甲寅齊人桓伐衛懿衛人及齊人戰衛人敗績戰不地于衛都也王氏經世按衛立子頽其罪固不容誅然已越十年而衛君又易世矣當其時桓公方圖伯事乃不能討及鄭伯納王至是王錫齊侯命使討而後行焉此已晚矣乃又為義不究取賂而還是得為天討乎考之去年同盟于幽衛已不至桓公母亦本有忿衛之心因假王命以伐之耳春秋書曰齊人伐衛衛人及齊人戰衛人敗績衛之敢抗伯主而即以甲寅來伐之日與之戰假王命以修已怨無亦齊自有闕焉所謂直書而義自見者也然則書及之義不過為志乎是戰而已凡書戰皆譏也春秋固疾衛而亦未見其豫齊也夏四月丁未邾子瑣卒文公蘧蒢立秋荆伐鄭李亷曰此為齊桓安攘之始事齊宋將卑師少而公獨親行公亦善于佐桓矣是時楚文王卒國有內難楚兵不至中國者十年今子元又以嘗試齊而伐鄭公不顧荆人一聘之私而勇往于伯主之義亦春秋所豫也公會齊人桓宋人桓救鄭程氏曰齊桓伯主魯望國宋王者之後此救鄭制楚之始蓋天下大勢所在也胡傳按左氏楚令尹子元無故以車六百乘伐鄭入自純門是淩弱暴寡之師也故以州舉狄之也鄭人將奔桐丘諸侯救之楚師夜遁是得救急恤鄰之義也故書救鄭善之也齊宋稱人將卑師少桓公主兵攘夷狄安中國之事見矣趙汸氏曰齊侯以莊公能師者也故伐齊救鄭皆請公自將以為功而齊人宋人屬焉桓公可謂善用諸侯者矣冬築郿郿邑當在鄆城西北范縣界上與秦臺相近北近齊南近曹即濟西地也而郿秦二邑近鄆其為此築豈以戎嘗出沒其間欲設備而然歟屬詞凡城必有郛郭樓櫓之制郿下邑非要害制不備故曰築與築囿同然非飢歲之所當為也大無麥禾此麥禾乃公家藏之倉廩者也胡傳麥熟于夏禾成在秋而書于冬者莊公惟宮室臺榭是崇是飾費用浸廣調度不充有司會計歲入之多寡虛實然後知倉廩之竭也故于歲杪而書曰大無麥禾大無者倉廩皆竭之詞民事古人所急食者養民之本不敦其本而肆侈心何以為國故下書臧孫告糴以病公而戒來世為國之不知務也臧孫辰告糴于齊是為文仲公子彄之曽孫也彄食邑于臧因以為氏胡傳劉敞曰不言如齊告糴而曰告糴于齊者言如齊則其辭緩告糴于齊則其情急所以譏大臣任國事治名而不治實之蔽也魯人悅其名而以急病讓夷為功君子責其實而以不能務農重穀節用愛人為罪臧孫急病讓夷有愛民之名而不能務農重穀是無愛民之實也國語文仲以鬯圭與玉磬如齊齊人歸其玉而與之糴當時若不遇齊桓則魯之民必至轉于溝壑矣二十有九年春新延廏莊公好武欲養馬故新延廏胡傳言新者有故也何以書古之君人者必時視民之所勤民勤于力則功築罕民勤于食則百事廢大無麥禾告糴于齊冬築郿春新延廄以其用民力為已悉矣府謂之長欲財之有餘廄謂之延欲馬之富也夏鄭人文侵許張氏曰許鄭世讐也然許自盟幽之後不與齊桓之會鄭人侵之或齊之命歟自後許始從中國鄭之侵許豈以去年荆伐鄭得許人為嚮導歟秋有蜚蜚青色蟲非中原所有南越盛暑男女同川而浴淫風所生為蟲臭惡蓋亦娶齊淫女之徴應也冬十有二月紀叔姬卒莊公以為姑而為之服大功之服與伯姬同春秋以叔不為國亡變其所守特録之以勸後世如此城諸及防諸即今青州府諸城縣季氏私考以諸城在莒東北距魯五百餘里魯安得有此逺邑以為諸乃紀邑為齊所併而以近莒控制為難齊桓久欲得酅而賢叔姬不可使喪祭無主乃使魯先受諸以為紀存宗祀于此其實以諸易酅也故叔姬方卒而魯即城諸為此防在齊南魯北境上因城諸并城防乘齊善意為之因得以備齊爾左氏以為時在夏時十月固不為不時然當大無麥禾告糴之時則自有非其時者而不當例于常例農隙之時為時也三十年春王正月夏師次于成穀梁此次以為欲救鄣杜氏以為齊將降鄣故設備按鄣乃紀之附庸必齊約魯圍鄣公不忍于齊命又不敢違佯為待命于成而頓兵次止爾秋七月齊人降鄣齊太公支孫封于章今東平州東三十里有章城即此蓋在遂西而北鄰于齊者也胡傳鄣者紀之附庸齊人不道肆其強力脅使降附不書鄣降而曰降鄣者以齊之強故罪之深如此也當時未嘗加兵于其國但遙以兵威脅使降附爾家鉉翁曰魯齊降郕郕降于力既屈之後齊降鄣降于兵未加之前是也八月癸亥葬紀叔姬胡傳滅國不葬此何以葬賢叔姬也紀侯既卒不歸宗國而歸于酅所謂秉節守義不以亡故而暌婦道者也故繫之于紀而録其卒葬先儒謂賢而得書是也賢而得書所以為後世勸也屬詞娣卒葬史不書此以國亡君沒無為主後故魯君為服姑姊妹之服而弔喪會葬皆用殊禮史書于策以明叔姬婦節之髙見莊公恤典之厚如此也九月庚午朔日有食之鼓用牲于社冬公及齊侯桓遇于魯濟謀伐山戎也以其病燕故也濟水歷齊魯界在齊界為齊濟在魯界為魯濟今曰魯濟地在濟寧州巨野縣魯濟之西謂之濟西而在東阿以北者即齊濟矣齊人伐山戎北狄即古無終也今薊州遵化縣有古無終縣地自此至永平府地方皆山戎地胡傳齊人者齊侯也其稱人譏伐戎也桓不務德勤兵逺伐不正王法以譏其罪則將開後世之君勞中國而事外夷捨近政而貴逺略困吾民之力爭不毛之地其患有不勝言者故特貶而稱人以為好武功而不修文德者之戒也季氏私考當時山戎未見為患中國若邉境尋常冦盜或有之此何足煩逺征乎蓋齊桓無因而伐託以病燕為辭也伐山戎非齊所急特為諸侯尚多未服欲立奇功以恐動中國爾其稱人亦以示兵精而不勞餘力則諸侯將必懼此伯者以力服人之計也後此躬來獻捷亦是此意史記山戎伐燕桓公救燕遂伐山戎至于孤竹命燕君納貢于周諸侯聞皆從之三十有一年春築臺于郎胡傳何以書厲民也去國築臺于逺而不緣占候是為遊觀之所厲民以自樂也徐氏曰郎泉臺也未成為郎臺既成為泉臺夏四月薛伯卒魯之薛邑蓋與薛相近地將築臺于其近地而因其告喪故往弔不然薛自朝隱之後未嘗與諸侯會盟魯輒有此先施何耶張氏曰薛始稱伯蓋降班而告終也築臺于薛魯地六月齊侯來獻戎捷還師經魯而親來獻捷焉齊雖下魯其實將以威魯也胡傳齊伐山戎以其所得躬來誇示書來獻者抑之也屬詞齊桓欲身下諸侯以成伯業故假獻捷至與國以成兩君之好苟非齊侯身來成禮安敢直書齊侯來乎史亂名實應不至此秋築臺于秦魯地今東昌府范縣南有秦亭冬不雨三十有二年春城小穀魯因齊來獻捷有以威脅之之意故城此以備齊也此魯邑非齊邑也杜預云穀城縣城中有管仲井據此又以為仲私邑非也按孫明復謂曲阜西北有小穀城明復魯人其考此必詳矣夏宋公桓齊侯遇于梁丘今兖州府城武縣東有梁丘城齊為楚伐鄭欲謀鄭而請會于諸侯宋公請先會齊不以伯主自居以梁丘近宋而先之也秋七月癸巳公子牙卒公子牙慶父同母弟僖叔也是為叔孫氏季氏私考慶父握兵三十餘年而牙與為黨將擁立焉必聲勢相倚者也友季弟得政未專烏得而鴆之萬一牙就友鴆慶父豈肯容友乎况友時已出逰于陳故牙實自卒非鴆殺也此説是使當時果有此事亦豈得不見于經乎然則謂季友鴆叔牙以存魯與胡氏之説皆非也屬詞牙莊公庶弟公孫兹牙之子叔孫得臣牙之孫諡莊叔叔孫豹得臣之子僑如之弟八月癸亥公薨于路寢廬陵李氏曰魯十二公得終于路寢者三公莊宣成而已又曰莊公在位三十二年乃無志不立之君也春秋自九年以前書逆王姬會伐衛次于滑狩于禚及圍郕盟蔇納糾皆罪其忘復讐之義也自十年以後齊桓方興國事未立故長勺之役魯勢稍振兩敗宋師劫齊歸地齊桓亦屈意納魯以成伯業故數年之間魯國無事正當明其政刑以貽後嗣而乃受制文薑娶仇女以續宗祀三年三至齊庭遇穀盟扈皆為姻好而出未聞秉禮之君若是也故自二十四年以前書納幣觀社丹楹刻桷逆女用幣皆為一經之特筆然多麋有蜮大水日食之迭見天意未忘乎魯荆人祭叔蕭叔把伯之迭至人心尚歸乎魯幽之盟城濮之會魯濟之遇伯主亦有資乎魯宜可以有為也而乃勤民縱欲築郿新廄城諸防城小穀一歲而三築臺焉坐置其國于宴安沈酣之域欲無危得乎至于亂本之成始于文薑成于哀薑而孟任之嬖女公子之侮家道泯然矣豈特慶父之得兵權而已哉故張氏謂春秋罪其為風教之本而不免于首惡之誅也得之矣冬十月己未子般卒按子般與閔公皆一娶九女中媵所生而僖公則生在哀薑未娶之先其母成風微賤而名不正與孟任同故僖雖長而未得立莊公之薨也立子般般未踰年之君故稱子般卒立閔公閔弒于是成季因國請復已也始自陳來歸而立僖公焉以子般為孟任出非也以般之卒為慶父弒恐亦非蓋內君未踰年而遇弒者不日以見其弒今般卒書日其非弒可知矣慶父因莊薨嗣子弱與叔牙比周而萌覬覦之念誠有之然謂使圉人犖賊般則或未必然也使果有此則豈不懼齊見討而敢公然如齊于後日乎季氏説是般非嫡子然受命于父為太子當立者也公子慶父如齊季氏私考慶父如齊以閔公幼弱無寵于哀薑而欲謀自立也齊桓不肯曲徇而聽魯竟立閔公此可見桓公知義不以私意專制諸侯之事明矣胡傳以為書如齊見慶父主兵自恣國人不能制非也是時齊桓主伯方以大義正天下觀他日哀薑與聞子弒猶不敢如齊而卒因討縊亦可見矣慶父既弒子般豈敢公然如齊以犯桓公之討乎故子般之卒非慶父弒也乃自卒爾狄伐邢狄在中山以南連亘巨鹿之墟中山者今真定府之定州巨鹿者今順德府平鄉縣在衛之北而邢又其東北二面之衝者也邢邢侯爵國周公庶子所封其國地今順德府臺縣是也戎侵曹一狄侵十二衛鄭齊宋伐三邢晉鄭圍一衛滅一溫救一齊屬詞皆中國有伯後事齊桓始伯嘗一伐戎而戎侵曹不能治既伐山戎又親伐北戎而揚拒泉臯伊洛之戎入王城不能救狄為邢衛患桓公有存亡國之功然邢潰而後遷邢衛滅而後戍衛甚至滅溫以侵畿甸而不能討晉文代興亦治不及狄焉蓋以荆楚之禍有大于戎狄者二君既盡力于彼則于此有不及圖也春秋既豫齊晉以伯而詳書狄患如此亦所以責之備歟齊嘗平戎于王又平戎于晉晉至悼公亦和諸戎以成三駕之功焉若襄以薑戎敗秦師猶曰禦冦也宋辭蟲牢之會晉人亦以伊雒之戎陸渾戎蠻氏侵之豈盟主服與國之道乎故經略而不書為中國諱也赤狄伐晉以先穀之召不書苟有召之者則夷狄在蕭墻矣若戎入王城狄伐京師雖魯史不忍書也晉自文公奔狄君臣皆納隗氏遂與狄為婚姻而赤狄最強能服役衆狄其後衆狄叛之而服于晉晉因得以盡滅赤狄之族白狄惟一從秦伐晉晉伐秦而止宣成而降諸戎羣狄少衰矣春秋事義全考卷三
