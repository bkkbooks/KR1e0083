body:
  text: 春秋事義全考卷六明姜寶撰十有八年春王正月宋公曹伯衛人邾人伐齊屬詞齊桓長衛姬生武孟即無虧少衛姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍無虧最貴且長桓公嘗屬孝公於宋襄公又許立武孟既而五公子皆求立桓公不能定桓公卒國人立無虧孝公奔宋於是宋公以諸侯伐齊而齊人為之殺無虧書伐者為齊人立無虧也書戰者無虧既殺而四公子復與宋師戰也夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊宋襄公以諸侯伐齊齊人殺無虧則師救是救無虧而不勝也四公子之徒與宋戰則狄救是救四公子也胡傳伐齊之喪奉少奪長其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣書狄救齊者許狄也許狄則罪諸夏矣凡伐者為客受伐者為主今齊人受伐以宋為主者曲在宋也凡師直為壯曲為老書齊師敗績者責齊臣也或曰桓公管仲嘗屬孝公於宋襄公以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公君臣乃欲以私愛亂長幼之節其可哉春秋深罪宋公大義明矣秋八月丁亥葬齊桓公胡傳桓公九合諸侯不以兵車威令加乎四海幾於改物雖名方伯實行天子之事然而不能慎終如始付托非人柩方在殯四鄰謀動其國家而莫之恤至於九月而後葬以此見功利之在人淺矣春秋明道正義不急近功不規小利於齊桓晉文之事有所貶而無過褒以此冬邢人狄人伐衛臨川吳氏曰邢周公之𦙍衛武之穆皆嘗亡於狄賴齊而存今衛以桓從邢請於淮之㑹以為抑已而伐齊喪固有罪矣然為宋所驅非首惡也狄既救齊而又責衛伐齊喪之罪以狄為之亦可傷中國之無人矣敵國不相征凡興師以伐人者皆不義况邢小國尤不當黨異類伐同姓或者逼於狄而不得已也歟其後衛竟滅邢其怨讐未必不基於此上云邢人下不當云狄云邢人狄人自是文法當如此以為進之者非也伐衛所以救齊之說未必然王氏經世桓公在狄已嘗侵衛侵鄭今乘齊亂又以救齊為名而興師窺伺其國詐益甚矣宋襄在當時奉少奪長伐齊之喪而反使狄得以為辭而圖中國益可慨也救齊而又伐衛伐衛而與邢俱見狄之為謀深矣邢衛皆嘗亡於狄賴齊而存齊伯漸衰狄即侵衛齊桓既亡而又伐衛邢忘讐棄親而聽其驅以伐兄弟同難之國春秋書之所以傷列國之無人見狄人之益橫以為小國不能自强於禮義之明戒也或者反謂善其救齊大失春秋之㫖矣十有九年春王三月宋人執滕子嬰齊以威求伯也王氏曰宋以滕子久不與齊盟故執之以威諸侯然非有德義以服人心肆已之暴所以終於無成也啖氏曰春秋時以强暴弱故執諸侯皆稱人亂辭也兼胡傳不歸京師與執非其罪兩意說始備若嬰齊之書名則杜氏云書名不書名皆從赴此蓋亦從赴而已夏六月宋公曹人邾人盟于曹南季氏私考曹邾皆從宋之國而去年宋所與伐齊者宋公圖伯而僅能合此二國見大國之不從也曹南范寧以為曹之南鄙宋公親至於此以要盟去曹不逺而曹伯不親㑹乃以人從則見曹亦有厭心矣按曹南之盟宋襄稱爵蓋猶以北杏望齊桓之意望襄既而襄失德不足以繼桓故圍曹盟鹿上皆人之不豫宋以伯矣鄫子㑹盟于邾鄫不及曹南之盟其來也諸國既罷矣故就邾子而與之㑹盟於邾若宋公亦與盟則邾人執殺鄫子之時宋安在乎時未聞有宋公在故知邾盟宋公初未嘗與也己酉邾人執鄫子用之季氏私考邾服宋而與鄫鄰鄫為魯壻則邾所讐之國也為宋致鄫乃邾私意鄫畏宋有伐齊執滕先聲不敢不往但至邾而聞邾子不親赴曹南之盟則姑就邾以盟而邾國人亂殺用以祭神本邾子之謀也是時宋方威劫諸侯而邾或附勢以為宋討鄫為名然則宋罪亦不可掩矣按鄫子見執於邾邾用之以祭社蓋邾鄫世仇因附宋之勢承其意而肆虐如此故直文以見其實惡邾亦惡宋也秋宋人圍曹此宋襄因曹伯不親㑹曹南而討之也按襄公欲圖伯業當人心不我信從之時須反其仁智方可今乃不能內自省德嬰齊急於執之曹南急於為盟及曹不服却又急於圍曹鄫子不及㑹小失爾却亦急於加罪使邾虐用之其操心如此何以能集事乎春秋書此數端自見襄之不能成伯而致楚執伐敗傷蓋自取也衛人伐邢以報莵圃之役也冬㑹陳人蔡人楚人鄭人盟于齊胡傳楚人之得與中國㑹盟自此始也桓公既沒中國無伯鄭伯首朝于楚其後遂為此盟故春秋沒公人陳蔡諸侯而以鄭列其下蓋深罪之也季氏私考宋襄暴虐諸侯皆有挾楚以抗之之心是以陳蔡為楚致魯以為此盟地以齊君亦預焉殆不顧辱先君矣張氏曰齊桓既沒宋襄欲圖伯而諸侯不服故楚假不忘桓德之說求參預中國之盟㑹陳蔡及鄭皆近楚而素服之者故先受其謀齊孝公親見其父極力攘楚聽其甘言納之國都而與之盟僖公亦忘是懲之志偕之同歃楚因是以行其志於中國春秋諱公而人諸侯所以謹其始也王氏經世或者皆知合南北之成自向戍始而不知此㑹已為之權輿矣陳合齊楚之成而楚執宋公宋合晉楚之成而楚爭為長楚人衷甲冦不可啓漸不可長此之謂也梁亡梁嬴姓伯爵國柏翳之後也其地在夏陽梁山今同州郃陽縣東四十里蓋即梁山南地界於秦晉之間者也胡傳陸淳曰秦肆其暴取人以國沒而不書其義安在曰乘人之危惡易見也滅人之國罪易知也自取亡滅者其事微矣春秋之作聖人所以明微也梁本侯國魚爛而亡何哉梁君好土功輕民力湎於酒淫於色心昏而出惡政其亡可立而待矣左氏此曰秦取梁文十年曰秦伐晉取少梁少梁蓋與梁密邇地以為即梁地者非也二十年春新作南門胡傳書新作南門譏用民力於所不當為也按天子諸侯皆南面聽治其門皆南向而曰南門天子五門臯庫雉應路魯三門庫雉路然庫門僣臯門雉門僣應門制二門制既同於天子惟路門仍舊故僖公因其弊而斥大之杜氏云此魯城南門也今猶不與諸門同夏郜子來朝郜文王之子聃季之弟後不知所終故郜國蓋嘗為宋滅而别封之以為附庸郜地隱取郜鼎桓取皆於宋郜蓋附庸王氏以為郜分南北皆附庸於宋者是也郜子蓋知宋之不足恃而來朝以依魯也鄭人入滑滑在今偃師縣南滑叛鄭而服於衛故也季氏私考畿內之滑距衛稍逺無服衛之理必以滑本頺叔之黨而倚勢以陵虐鄭故鄭報之桓沒而中國無伯鄭首從楚稱兵周疆無忌憚甚矣西宫災何氏曰禮夫人居中宫少在前右媵居西宫左媵居東宫少在後家氏曰小寢也人君燕私之地也人君之過不在朝路臨蒞之時而常在深宫燕處之際天之示譴豈徒然哉秋齊人狄人盟于邢為邢謀衛難也齊桓逐狄以存邢而齊人與狄盟于邢齊孝公於堂搆有忝矣狄稱人非進之自是文法當如此蓋不可云齊人狄盟故也與邢狄伐衛同冬楚人伐隨隨以漢東諸侯叛楚楚伐隨取成而還李亷曰自莊以前楚兵加隨及江漢間諸國皆不經見蓋未有告命也今齊桓既卒中國無伯于齊以後遂為同盟之國於是假告慶之䇿書以為恐動中華之計矣二十有一年春狄侵衛為邢故因邢之盟也王氏經世有他國則狄同稱人無他國則狄還本號而止稱狄以此見進之之說非也宋人齊人楚人盟于鹿上宋地後漢志濟隂郡乘氏有鹿城鄉為盟鹿上處乘氏在今兖州府金鄉縣菏水之南宋北鄙也宋公將以求諸侯于楚也初襄欲圖伯為曹南之盟僅能脅服至近之曹至小之邾其餘諸國更無從之者况曹復懷二而楚合陳蔡鄭以至齊魯亦與之盟此襄所欲而不可得者也今求之於楚欲借楚之令使諸侯從已楚豈肯甘心許之哉此所以不免於執辱春秋皆稱人以貶之也夏大旱􅔦卯辰巳之月皆旱旱久矣旱所以言大也屬詞言旱不言饑嵗猶有入也秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋胡傳執宋公者楚子也何以不言楚子執之分惡於諸侯也諸侯皆在㑹而蠻荆執其㑹主拱手以聽而莫之敢違其不勇於為義亦甚矣故特列楚子於陳蔡之上而以同執為文宋公欲繼齊桓之烈而與楚盟㑹豈攘戎狄尊王室之義乎故人宋公於鹿上之盟而盂之㑹直書其事而不隱所以深貶之也胡氏曰前有鹿上之盟後有使宜申獻捷之事楚君皆稱楚人獨此稱楚子者蓋謂執宋不可稱執宋人宋公既爵則陳蔡鄭許曹皆須爵否則疑若君與大夫㑹五國既稱爵則楚不得不稱爵此春秋之筆也屬詞宋公一㑹而虐二國之君又不度德量力而致楚子于盂於是見執而國受兵蓋不知有出爾反爾之戒者也於楚曷足議焉王氏經世宋襄一㑹而虐二國之君先為中國諸侯之所共嫉故楚得以乘間而諸侯莫違凡執凡釋實楚與諸侯之所同不可謂諸侯一無所與也若但書楚子執宋公以伐則其義淺矣又使蠻荆得以加中國今惟曰執宋公以伐宋以諸侯同涖為辭非徒以抑强楚而存中國亦以見德義尊則人聽制命於已德義賤則已聽制命於人求諸侯志將以為雄也而其道一失非惟強楚得而加之陳蔡鄭曹許皆得而加之矣此春秋書法之意也其義深逺矣鹿上之盟固楚人將誘而致之未容有他亦恃有齊在焉今之盟齊不至事可疑矣陳蔡鄭許皆楚之黨而曹又宋之讐也其見執烏乎疑冬公伐邾為邾執用鄫子怨之也邾附宋未敢伐今宋為楚所執伐故乘間而伐邾楚人使宜申來獻捷王氏經世按楚執宋公以伐宋而魯不與故獻捷以威之晉景公使鞏朔獻齊捷于周天子猶責其姦先王之禮况以蠻荆陵暴中國而可受其捷乎魯義不能自强以遏楚之橫禮不能正辭以拒楚之使則有懾伏聽命而已直書不待貶而義自見者也不言宋捷者杜預謂秋伐宋冬來獻捷事不異年從可知矣此說是也公羊謂為襄公諱胡康侯謂為魯諱皆過矣十有二月癸丑公㑹諸侯盟于薄釋宋公薄史記作亳亳有三宋州榖熟西南為南亳即湯都北五十里䝉城為景亳因景山為名湯所盟處偃師為西亳宋州即今歸德府楚子伐宋進至於此必其地在孟之北張氏曰僖公脅於獻捷之威與五國為㑹求盟於楚以請宋公而後得釋正中楚人詭計春秋不書㑹楚子而曰㑹諸侯不書宋公歸而曰釋宋公蓋其執其釋皆制於楚而聖人全中國之體故諱之罪魯與諸侯之無能為也為魯諱不與楚專釋之說皆未然是時楚子於宋公執而未出境故因魯請而釋之二十有二年春公伐邾取須句王氏經世按左氏謂須句國也邾滅之公伐邾取須句反其君焉若是則須句乃子爵國而奔因成風魯事也國滅而興君奔而反皆事之大者且有關於魯而經不書其本無此事可知也趙鵬飛氏直以須句乃邾邑是已公本以邾恃宋害鄫故乘宋公見執而伐之伐而因取其邑爾至文公七年又書伐邾取須句須句嘗復取於邾而文公又伐取也伐國取邑失之逞忿而貪得蓋直書而自見矣夏宋公衛侯許男滕子伐鄭按宋公以鄭啓楚㑹盂而至於身見執國見伐也故伐鄭宋不自反而必於報鄭是又挑楚釁矣泓之敗非宋自取之歟秋八月丁未及邾人戰于升陘魯地胡傳邾人以須句故出師公卑邾不設備戰于升陘我師敗績邾人獲公胄縣諸魚門記稱諸婁復之以矢蓋自戰于升陘始也魯既敗績邾亦幾亡輕用師徒害及兩國亦異於誅暴禁亂之兵矣故諱不言公而書及內以諱為貶冬十有一月己巳朔宋公及楚人戰于泓宋師敗績泓宋水名汪氏曰宋以三國伐鄭而泓戰止書宋公者蓋夏首伐鄭之師既歸及秋楚救鄭不及因遂伐宋宋公帥師往逆之而與戰欲雪盂之耻而不度其力之不能也宋公身傷而不言宋公敗績猶為中國諱辱若楚君敗績則直書之矣按宋公見執於楚欲雪其耻方懷必勝之心惟患無間可乘爾豈暇愛重傷二毛為此迂闊之論乎世儒見其寡謀致敗遂因左氏之說而附益之不知宋襄之急功利更有甚於他人而決不能為此胡傳之說殆非也二十有三年春齊侯伐宋圍緡緡在菏水之南今兖州府金鄉縣之南界其地也王氏經世此舉蓋受指於楚也宋襄公爭伯陵弱雖不義奉少奪長雖不順然於齊孝公不可謂無私德矣况鹿上之盟昭如也今乘其敗於楚而背之且㑹盂不來盟薄不與執宋公而齊坐視釋宋公而齊無力焉則齊之負宋也多矣于時荆楚之勢方張既無尊中國攘夷狄以纘父遺烈之志又無恤災患畏簡書以申固鄰好之心乃受指於人伐國圍邑春秋所惡也故書以著其罪家氏曰齊侯書爵以其背大惠而忍於為不義故目其人而罪之書伐書圍皆所以貶也夏五月庚寅宋公茲父卒襄公卒子成公臣立傷於泓故也張氏曰時僖公已有志于附楚故不㑹宋公之葬春秋於曹南宋公書爵與北杏城濮主諸侯之詞無異蓋未嘗不豫以伯跡其從來所為未嘗一有事於王室徒伐喪以奪長仁悖之甚致夷以謀夏義隳之大然則襄非特無功而又階亂伯將何賴焉雖欲圖伯實不足為伯也按伯者謂其有功於尊王乃可以稱焉如夏昆吾氏當太康時身為盟主誅不從命以尊王室及殷之衰大彭豕韋氏復纘其緒所謂王道廢而伯業興者也齊桓定王儲明王禁晉文納襄克帶皆可謂其人矣宋襄秦穆楚莊曽謂有一事之善上及於尊周安可並稱於五伯之烈乎孔子言其事則齊桓晉文孟子謂五伯為三王罪人則固兼夏商周以稱五伯而未嘗一及於此三君也然則宋襄不得為伯明矣秋楚人伐陳左氏曰討其二於宋也吳氏曰曹南之盟陳不從宋伐鄭之役陳亦不從宋盟齊則陳從楚㑹盂執宋公伐宋則陳從楚考之經惟見陳之服於楚不見陳之二於宋今楚討陳之二蓋以伐宋之後鄭畏而朝楚而陳未朝楚即誣以二於宋伐之而取其二邑由此而言則左氏討其二於宋之說非也季氏私考楚方强盛中國畏之頓在陳南尤迫楚患其勢不得不從楚矣然頓本屬陳陳猶責禮焉蓋頓訴於楚而楚伐陳也觀楚城頓而還則伐陳信乎為頓而陳自此怒頓甚矣故李廉氏曰陳頓之爭始此冬十有一月把子卒成公卒弟桓公姑容立按聖人作春秋以道名分決無貶把稱子之理胡傳之說非也又有以為時王升降伯主升降者亦非也當時把自以力小降而從子以供職貢等費故於其卒也亦照生前稱子以赴史承告遂書之爾况用夷禮者乃把成之子桓公又豈有因子後來用夷禮而先貶其父之理哉二十有四年春王正月夏狄伐鄭西亭辨疑云鄭在畿內王所倚毗頽叔桃子將欲叛王故先啓狄伐鄭此蓋為叔帶謀也據左氏謂鄭人入滑王使如鄭為滑請鄭不聽王怒遂以狄師伐鄭取櫟按入滑事在二十年夏五月王曷不於本年伐之而至是始出狄師耶伐鄭果出王意是年冬王出居鄭夫伐鄭而又依鄭無是理也秋七月冬天王出居于鄭凡人君失位未有不由强臣逼逐而然者王之適鄭必為頺叔等惡黨所逐而太叔帶或其所挾以拒王者爾左氏載王納狄后太叔遽通之而王遽廢之又遽致狄師之攻王則俱不可信也季氏私考當時頺叔嘗隂致狄女納王宫而因寵以竊權及召狄伐鄭與王遂不相能而因失權以生變或有之出居于鄭亦是直書而義自見書出以見王不能正家故致此以為貶恐亦未必然出而稱居如所謂天子適諸侯莫敢為主焉者則宅其所有之說得之矣晉侯夷吾卒惠公卒後文公入而殺懷公於髙梁不告及文公定位而後以惠公卒來告則亦不得以禮㑹葬可知矣二十有五年春王正月丙午衛侯燬滅邢資中黃氏曰凡蔣邢茅胙祭皆周公之胤成王以周公有大勳勞於天下既封伯禽於魯又封其支子六人所以答公之勳勞今邢為衛滅矣邢與魯同出自周公則邢之存亡於魯亦甚相關衛既忍於滅周公之後魯不能為之請於天子請於大國請於衛復存其社稷以篤親親之恩春秋書衛侯燬滅邢雖罪衛侯而亦繫於魯也屬詞云二傳知衛與邢為同姓而不知魯與邢為同宗知衛滅同姓為伐本而不知魯不救同宗為無親春秋滅國復興者多矣豈齊桓能存亡國而晉文獨不能哉當衛侯鄭之再執也魯之君臣以同姓故且為之請於王與晉侯而歸之使念其同太祖之國而以存亡繼絶請晉文方有討於衛宜無不從者魯又不知出此此邢之所以滅而不復興也按黃氏與屬詞皆謂罪魯不能恤其同宗於胡傳外更推立斷案如此蓋滅同姓之罪在衛不能免而不恤同宗之罪魯亦不得而辭也夏四月癸酉衛侯燬卒文公卒子鄭嗣是為成公宋蕩伯姬來逆婦胡傳公失禮下主大夫之昏是慢宗廟卑朝廷姑自逆婦其失明矣張氏姑自逆婦公不使大夫主之皆非禮也兩譏之季氏私考莊公女已有把伯姬矣僖公女亦有一伯姬卒矣安得一公所生而有二伯姬乎故知其為公族女非公女也宋殺其大夫季氏私考宋成公以襄公之敗由羣臣不忠所致故懼人欺已過疑其臣而盡殺其大夫蓋追咎其在先君時有辱國之罪也然暴虐甚矣傳至昭公而卒以輕去羣公子見弒豈非貽謀不臧之所致歟秋楚人圍陳納頓子于頓頓偃姓子爵國漢為南頓縣在今陳州項城縣界頓迫于陳而出奔楚故楚圍陳以納頓子胡傳圍陳納頓子也納云者不與納也夫陳先代之後不能以禮安靖鄰國保恤寡小中國諸侯又不能修方伯連率之職而使楚人納之是夷狄仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正國自治之意也王氏經世按楚圍陳納頓子于頓蓋一事爾夫頓小弱而介於陳楚陳欲迫而並兼之故前年楚伐陳城頓而還此年納頓子以保恤寡小示恩以大義責陳而攝服之皆爭主夏盟之意也直書而義自見矣葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮王氏經世莒以元年獲拏之故怨魯而未嘗通衛文公將平之未及而卒成公為洮之㑹以平莒於我成父志也然莒子不至以慶如㑹慶魯壻故也蓋平之之意出於衛莒疑魯之未肯平故以大夫聽命至明年向之盟而始成焉衛成公稱子喪未踰年也二十有六年春王正月己未公㑹莒子衛寧速盟于向速即莊子俞之父吳氏曰衛本欲平魯莒之怨洮之盟莒子不親至僖公必欲與莒子盟故復為此㑹王氏經世莒今知魯肯平故莒子親來衛知魯莒已可平故在喪不再行而使大夫齊人侵我西鄙公追齊師至酅弗及酅非紀季所入若季所入則在齊臨淄東而侵兵之歸當自魯東鄙矣鄭漁仲謂為博州而汪克寬氏以為今東昌博平縣北則地在齊西南近魯西鄙者也討洮向二盟也衛齊讐而魯與相結故齊以為討胡傳書人書侵書師罪齊也書追書至酅弗及罪魯也潜師入境曰侵少則稱人衆則稱師前書齊人是見其弱以誘魯也後書齊師是伏其衆以邀魯也其為諼明矣酅者齊地至者言逺也弗者遷辭也有畏而弗敢及之也齊魯皆私憤之兵而非正也故交譏之按衛與邢有怨而邢之盟齊為邢謀衛難衛卒滅邢今洮向之盟魯又黨乎衛齊魯所以為私憤也夏齊人伐我北鄙以魯人展喜受辭於展禽而犒其師故未入境而去衛人伐齊洮之盟故也吳氏曰衛平莒魯齊何與焉洮向二盟雖瀆其過在魯非齊所當問也齊孝公乃連興侵伐之師非義甚矣其致衛之伐與魯之伐皆自取之也李廉曰魯助無虧者也孝公怨之尚宜宋衛納孝公者也亦不能固其交孝公之墜先業宜哉公子遂如楚乞師公子遂是為襄仲居東門因號東門氏按齊伐我北鄙而展喜奉展禽之辭命以却之齊已服而退矣魯但宜用展禽為政自可以折衝勝難於方來也何至外乞楚師而臧文仲為之介聖人竊位之歎殆因此而發歟魯之以蠻夷殘中國其為國無謀而用兵非義也直書而罪自見矣秋楚人滅夔以夔子歸夔芉姓國楚君熊摯之後今荆州府歸州東二十里有故夔子城當時夔祖熊摯固不得逺祀其上祖也按夔子爵而不名為其無罪見滅不當去其爵斥其名胡氏之說是也若楚之書人則由楚子頵名未登於春秋故爾蓋楚自武王始見於傳文王始見經猶以州舉至成王而後書楚人盂之㑹以法當目其君嘗書楚子矣而後復人之頵之名非遇弒不登於春秋也此安得以為待夷狄之體耶蓋滅同姓之罪直書而自見矣固不在書名不書名也冬楚人伐宋圍緡宋成公忘其父盂執泓戰之讎前年與楚平而往朝之非矣今而即晉蓋知文公之可依賴而然可謂能從義者雖不免於今之伐而見圍而後此之仗晉以得解也終賴之矣若楚之暴則不待貶也公以楚師伐齊取穀公至自伐齊胡傳楚强魯弱而能用其師進退在已故特書曰以以者不以者也夫背華即夷取人之邑為已有失正甚矣患之起必自此始其致危之也二十有七年春把子來朝成公弟桓公也其來朝猶用子禮公卑把把不共也以禮幣之從子爵力不給爾魯以是為不共故卑杞非謂其用夷禮也夏六月庚寅齊侯昭卒孝公卒弟昭公潘殺其子而立許氏曰孝公不能繼桓以興間楚之勝而困宋襄又侵伐魯不已有以知其為謀之不逺矣秋八月乙未葬齊孝公三月而葬速矣乙巳公子遂帥師入把責無禮也晉汝叔侯曰把夏餘而即東夷以爵尊國貧雜用夷俗事或有之然魯所謂不共無禮直以其玉帛之將不備爾屬詞把雖先代之後蓋微於滕薛其後非齊桓城緣陵以遷之國幾亡於淮夷矣豈有資財可以為禮者其來朝魯將以庇社稷也而魯反以兵入其國魯豈能庇杞者乎冬楚人陳侯蔡侯鄭伯許男圍宋季氏私考魯與曹衛陳蔡鄭許既皆南向宋以父讐義不屈於楚而獨不從此楚所以圍宋也歟其合陳蔡鄭許者皆楚道之所由也曹衛於道少迂則不與圍蓋為之遙應以絶宋通晉之道也魯以絶其北道不使通齊既而僖公親㑹諸侯盟宋則所以困宋之謀至矣使非晉文侵曹伐衛以決救宋之䇿則宋將何所恃而不亡乎按是時楚子親自圍宋既而見晉勢之盛身始去之而獨留子玉於宋爾公之㑹諸侯盟于宋為楚子在宋而往㑹之蓋感其乞師之恩而然非為宋也楚自盟齊以來伐陳圍陳伐宋無不稱人諸侯雖稱爵直書從楚圍宋而其罪自見矣人楚子所以人諸侯之說乃得之榖梁似不必然十有二月甲戌公㑹諸侯盟于宋楚圍宋而公㑹諸侯盟宋其從楚之罪亦直書而自見者也二十有八年春晉侯侵曹晉侯伐衛按當時觀浴與塊晉文於曹衛雖有怨然其所以侵曹伐衛則自為破楚之黨與以屈楚而成伯爾即如齊桓之伐楚而侵蔡也豈專為蔡姬蕩舟之故哉故知胡氏譏復怨之說未盡王氏經世再舉晉侯自是文勢當然侵曹一事也伐衛又一事也不可云晉侯侵曹遂伐衛又不可云晉侯侵曹伐衛故也當時晉文之䇿莫急於救宋救宋莫先於治曹衛是時楚深入千里頓兵宋堅城之下而吾不即近以乘其弊攻其所必救以致其來以逸待勞以主待客以收萬全必勝之功而欲親帥三軍逺造陳蔡之國都討其從夷之罪且以扼楚人之歸路可謂愚矣公子買戍衛不卒戍刺之買莊公之子僖公庶弟也屬詞晉文之興魯欲與楚故戍衛其殺公子買懼晉也曰不卒戍乃欺楚之辭史實其誣而罪自見矣楚人救衛按晉侯伐衛僅率孤軍楚謂其易與也其大衆尚背酅而舍而聊遣一旅救之晉正欲楚如此當時特以齊秦之兵未至故不與交鋒爾吳氏曰蓋楚人分圍宋之兵以救衛也狐偃已先料其必然矣王氏經世晉文不許衛之請盟所以必致楚也蓋若許衛之盟楚或知難而退解宋之圍全師而去則無以大創之而絶其再來故不許衛之盟而攻之益急衛楚之婚也衛急矣楚近在宋而不能救則楚弱矣楚豈能但已乎此狐偃所以坐䇿其必來也抑文公是來專為救宋也向使直趨宋郊楚鋒方鋭而我迎而與之角非萬全之道也孫臏曰夫解雜亂紛糾者不控捲救鬬者不摶戟批亢搗虛形格勢禁則自為解耳今梁之輕兵鋭卒竭於外而老弱疲於內若引兵疾走其都彼必釋趙而自救是我一舉解趙之圍而收弊於魏也此即晉文之術也三月丙午晉侯入曹執曹伯畀宋人吳氏曰晉之用師於曹衛也實欲致楚而與之戰先以假道而啓衛之釁衛既不許則還師自南河濟略侵曹境不深治曹也移師伐衛責其不假道之罪取其邑衛服罪請盟而猶不許以致其君出避魯戍逃還則楚人不得不救衛矣楚既救衛猶恐其大衆先歸則又移師臨曹入其國而執其君又以曹君畀受圍之宋多方以激楚之怒則楚人不得不與晉戰矣季氏私考楚率四國圍宋晉欲救之必須西連秦東連齊而以宋為內應乃克有濟晉文蓋已定計如此特以宋圍方急而齊秦未來則不得不親出偏師且以孤軍示弱庶楚有玩心而易為力曹近宋出其不意侵掠之彼必奔告於圍陳蔡鄭許聞之皆有攻所必救之恐雖欲不解圍先去得乎四國既去則楚必退軍而宋師方可出而與晉合矣竊謂宋圍當解於此時宋圍解而晉文猶必欲致楚一戰於是又親自正名伐衛楚得簡書度必分兵來救則可以牽制而邀擊之此皆誤楚之計也然所以相持不決者為楚大衆背酅而舍與救衛之兵尚相聮屬而晉之客兵未集進未可輕爾及齊秦將至晉乃入曹以絶楚人之後使其兩軍相離不能進退且執曹伯畀宋人以激楚衆之怒蓋楚之背酅而舍者其地亦近於曹不可舍前軍而去故得而牽之也楚為所牽志將急鬬似可以戰矣晉文却又遷延以待其惰自三月丙午至四月己巳厯二十四日之久楚志怠矣而後卒然與齊宋秦三國之師欲合以擊楚而分兵之救衛者以決戰於城濮誘楚易視之而少豫得臣以師此又聲東擊西避堅攻瑕之計也楚人後應不及安得不敗而大衆聞之驚惶而失措一日之間遂皆望風奔潰矣故城濮書法於楚戰曰人而敗曰師其以此歟凡此皆以見晉文之譎如此也王氏經世按楚方救衛晉遽舍衛又出曹之不意入其國執其君分其田畀其讎所以怒楚藉秦陽告楚楚必不許又所以怒齊秦也張氏曰自晉侯侵曹至此春秋著文公致楚與戰之由也胡氏節節為之論今不取夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績城濮當在鄄洮之問曹衛界上地也按自宋被圍告急於晉也晉以宋天下之樞又上公欲圖伯不可不救宋而楚之强未易以敵也於是因曹伯以致楚於城濮楚敗而晉文之伯圖啓矣就晉致楚而言誠用謀為多然亦兵家之常且能雪宋執伐之耻解宋倒懸之困使强楚不敢內侵者十有五年文之功偉矣及者以尊及卑以此及彼之詞蓋直書城濮戰勝以至踐土㑹朝河陽㑹朝皆紀晉文攘夷尊王盛事與齊桓伐楚召陵首止葵邱㑹盟同胡氏以為誅其意罪其詐力與桓伐楚之以稱遂而譏其專皆非也季氏私考楚人即救衛之楚人也楚以晉兵易退故少與之師而得臣之大衆則在曹南背酅而舍不盡行也晉文本欲示弱故以孤軍誘楚救衛而仗齊宋與秦之師夾攻城濮蓋齊宋者楚方為患之國而秦師則穆公練習之兵也齊宋必能用命而秦師又敢死之士故合此三國以兾一戰取威而楚人正墮其計至此雖欲避而不戰而不可得矣及力不能支兵皆奔北晉遂乘勝追逐大衆盡摧而得臣亦倉卒不能為謀然則晉所與戰者楚救衛之人而敗則盡其大衆皆敗矣故戰書楚人而敗書楚師以此楚殺其大夫得臣胡傳得臣信有罪矣而楚子知其不可敵不能使之勿敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也故稱國以殺而不去其官衛侯出奔楚胡傳諸侯失國出奔未有不名者衛侯何以不名著文公之罪也初齊晉盟于斂盂衛侯請盟晉人不許是塞其向善之心雖欲自新改轍而其道無由也春秋於衛侯失國出奔不以其罪名之而重文公之咎蓋端本議刑責備賢者之意也楚既敗曹衛可復矣而猶不許之復衛侯見曹伯之執以畀宋而未釋也故懼而出奔於是晉侯為已甚矣五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土按踐土臺在今滎澤縣西北豫嘗分守河南由洛陽東經偃師鞏縣汜水滎澤凡三百餘里而至其地襄王既於僖二十五年還入王城則由王城東出三百餘里至踐土下勞晉侯不為不逺諸傳未見明言苐榖梁有此說而胡氏信之爾左氏但云晉侯自城濮還至衡雍作王宫於踐土以待王至獻楚捷於王當是晉侯勝楚之後作宫於踐土謀納王而因獻捷焉王自是合王子虎與諸侯盟始還王城取太叔于溫殺之于隰城而賜晉侯以陽樊溫原攢茅之田其後晉以溫為其所有地㑹諸侯于此請王出而臨之因王講武而就朝蓋自嫌强大不敢擁衆入京以震驚宫闕此則再煩王出是實事是兩番事西亭辨疑以為河陽乃王還王城所必由之道故因便講武而諸侯就朝因納王若然則須過河北復還河南始可入于王城非便道矣殆王孫未嘗出外不知所當經行與否而意想以為當然爾今從其踐土納王之說而于溫河陽則仍從諸傳然諸傳以為召王亦非也叔武受盟亦是衛侯出奔之時使元咺奉以聽命于㑹非晉文廢置諸侯也此盟晉文以攘楚納王而遂主盟中夏春秋直書于䇿見其功之可豫如此初未有罪之之意也陳侯如㑹杜氏曰陳本與楚楚敗懼而屬晉來不及盟故曰如㑹屬詞僖二十八年盟踐土朝王所晉文城濮之功尊王定伯不侯再舉視齊桓有光故踐土之盟書日同於葵丘而其㑹不書至桓文並稱蓋以此若後以圍許至則齊桓致伐之例也公朝于王所按王將還入王城因晉獻捷而受諸侯之朝諸侯因王在而朝於天經地義皆為當然皆無所不可胡氏從榖梁之說以為非其所者非也天王以王室有難而出居於外即就諸侯之朝而動以為非然則勤王之義廢而凡為大君者亦難矣此決非春秋之㫖也六月衛侯鄭自楚復歸于衛衛元咺出奔晉按叔武始反衛侯未有立乎其位之意也衛侯懼而奔楚晉文廢之而立叔武事亦未有明傳元咺之立叔武亦或者訴之之詞而未必實然如此此其所以因叔武被殺自以為寃而訟之於晉也以臣訟君誠大不可然寃則誠然寃矣當時衛侯未曽親殺叔武苐因聽或人之言而殺咺之子角又先期而入也其前驅探知公意所在遂迎其㫖殺叔武爾實與公殺之同然猶以殺叔武之時枕之股而哭之且殺􅞰犬焉則或猶自艾之心也故春秋猶意其誤而望其能改不然豈有弟而可以誤殺而猶待再及公子瑕而後絶之深耶春秋恕待衛侯故雖書名而稱復歸以此陳侯欵卒穆公卒子朔立是為共公屬詞陳既與楚而踐土之盟穆公獨後㑹期其薄於弔贈無疑共公背殯出㑹諸侯于溫遂圍許明年春還又即㑹翟泉則穆公之葬不㑹賔主皆有所不暇也秋把伯姬來釋怨謝過而求平也公子遂如齊是年遂如齊與文元年敖如齊雖事晉猶不忘齊好且求婚也張氏曰把伯姬來而入把之怨釋公子遂如齊而取榖之憾解中國貴於伯權之立如此此邵子所謂功之首也冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫溫即今溫縣其驛今為河陽驛云天王狩于河陽㑹溫說見前按當時晉以許不㑹踐土欲討許衛侯為元咺所訟欲討衛又以溫為王所賜地會諸侯於此以謀討二而即欲王至其地一藉寵靈焉自嫌强大不敢入京師之意晉容有之自以地小力薄不足以待諸侯因晉侯之請有出而就之之意王亦容有之此春秋所取也故書諸侯㑹溫天王狩于河陽公朝王所若曰諸侯自相為㑹王適以狩而至而諸侯因相與朝王云爾如此則王與諸侯兩無嫌兩皆可取之詞也惟主召王而言故當為王諱又當為晉解今既明晉侯之未嘗召王則王何用於諱晉亦何用於解而全之耶溫主邑言河陽主方言大天子之狩故言方而不定其地今溫縣河陽驛其實溫即河陽也壬申公朝于王所晉人執衛侯歸之于京師王氏經世是時諸侯沒于寵利往往戕害骨肉未聞有以為人倫之大不美而欲問其罪者至文公始治衛侯殺叔武之罪且執以歸于京師春秋不與豈非以啓君臣之訟其所傷反多耶且雖歸之京師而實專聽其獄囚諸深室使醫鴆之皆晉侯之意未嘗取決于天王而輕重付之公論也則安得而與之哉故稱晉人以受臣之訴而執其君同之以強暴弱執諸侯皆稱人之辭而不殊也衛元咺自晉復歸于衛元咺訟其君於伯主復歸而立君挾晉令也王氏經世國語晉侯執衛成公歸之于周請殺之王曰不可夫君臣無獄今元咺雖直不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又為臣殺其君其安庸刑布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後也不然余何私于衛侯按王之言至言也據外傳晉之歸衛侯以王之言也諸侯遂圍許王氏經世㑹溫本為討衛許也故於是遂圍許許之淪於楚深矣欲其自拔也難矣故以蕞爾之國合十一國之衆逾時閲嵗而不能成功抑晉侯是時霸業成矣是後當休兵息民增修其德以服諸侯之心而禮繁威黷外騖不已踐土之盟血未乾又徴㑹城濮之大勞甫息又圍許諸侯亦罷於應命矣諸侯強從而非心樂晉伯之所以遂衰也與胡傳謂討其不朝于王所蓋誤曹伯襄復歸于曹遂㑹諸侯圍許胡傳曹伯襄何以名其歸之道非所以歸也晉侯有疾使其竪侯獳貨筮史曰以曹為解晉侯恐於是反曹伯夫以賂得國而春秋名之比於失地滅同姓之罪以此知聖人嚴於義利之别以正性命之理其說行而天下定矣豈曰小補之哉按晉始執曹伯畀宋今歸實出於晉侯而非宋所得與專執而罪之與專釋而歸之又逼使即㑹諸侯圍許晉於是專恣甚矣春秋書此不但罪曹伯而已也二十有九年春介葛盧來介地在今萊州府髙密縣西南書來不能乎朝也公至自圍許王氏經世前年書公朝于王所諸侯遂圍許不以王所致而致圍許亦猶成十三年如京師㑹伐秦不以京師致而致伐秦皆所以著其本心不在於尊王也夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉襄王雖復辟猶恐羣小之心未協也故為此盟胡傳按左氏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟于翟泉則皆列國之貴大夫與王子而公與㑹也其貶而稱人諱不書公何也翟泉近在洛陽王城之內而王子虎於此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而於此上盟子虎是謂下陵而無君之心著矣故以為大惡諱公而不書諸國之卿貶稱人而王子亦與焉者此正其本之義也尋踐土之盟王氏經世曰盟不寒則不必尋也踐土之盟有齊宋蔡鄭及後至之陳今齊宋陳蔡皆在而鄭獨不至鄭已怠於從晉矣文公於此盍亦姑自反乎衛既歸而復執曹納賂而後歸諸侯之不心服宜矣卒之圍許而竟不能服許圍鄭而竟不能得鄭故曰以力服人者未有能服人者也五伯假之也功烈之所以卑而不足道也屬詞禮卿不㑹公侯豈有列國大夫上盟王子之理翟泉之盟下陵上替之始也故皆變文稱人以尊王室而沒公不書秋大雨雹胡傳雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日久季氏世卿公子遂專權政在大夫萌於此矣冬介葛盧來以未見公故復來朝三十年春王正月夏狄侵齊晉文之伯齊既從之矣狄侵齊而晉不能救此見文之老而懈矣胡傳左氏曰晉人伐鄭以觀其可攻與否狄間晉之有鄭虞也遂侵齊詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭此直書其事而義自見者也秋衛殺其大夫元咺王氏經世云以外傳晉侯請殺衛侯而王不可推之則知必無使醫衍鴆之之事晉侯雖鷙忍既不專殺之又豈隂行鴆之哉納玉於王與晉侯皆十㲄此亦誣當因侯獳貨筮史而聮飾之耳曹事容有之晉侯必不親受賂而釋衛侯也叔武君命奉之以受盟故稱衛子公子瑕乃元咺僞立之而咺實自秉國權瑕固未如君春秋亦不與咺君之也瑕因咺而一誅故言及故公子爾故稱公子趙氏謂以君殺大夫之辭言之而反在元咺下以咺罪重於瑕也此言是也及公子瑕瑕能守節未如文定所稱已當為君而但稱公子不豫咺奉以為君王明逸之言是也前殺元咺稱國罪衛侯與其大臣今以咺故及瑕其罪固當一施之矣衛侯鄭歸于衛衛侯鄭書名與曹伯襄書名同一以行貨一以賊恩其事不同而為有罪一也至於罪晉文意則胡傳未及焉當從屬詞為是蓋以專執而專釋為晉侯之罪大意與歸曹伯同然以為受曹衛之貨而然則恐未必然也晉人秦人圍鄭於是秦伯私與鄭盟戍鄭而去之秦晉之怨自此始王氏曰翟泉之盟實謀討鄭而鄭不請服故是春晉人侵鄭侵之而猶不服故晉文復偕秦以圍之王氏經世鄭二於楚無乃晉德猶有所闕乃覿武不已既失之於鄭矣秦西州之競國也齊桓之所不能致而晉以甥舅之好土壤之接得其同力以挫强楚此計之最得者也况穆公之賢可以義動晉不能以信義固其親而常以詐諼啓其二城濮之役齊秦之未肯戰無亦晉義之有未孚乃使宋隂賂之而激之使戰今與秦圍鄭而秦伯私與鄭盟蓋亡鄭以倍鄰闕秦以利晉晉之心人皆窺見之矣我信之不足而彼亦背我不難固其所也齊桓公不從鄭子華之請而鄭伯受盟今晉文公乃以鄭公子蘭從於伐鄭何以訓乎無怪乎秦伯之先叛而又何以責鄭為也胡傳晉侯秦伯貶稱人者晉文以私忿勤民動衆圍人之國秦伯惟利為向背從燭之武之言不以義舉也而二國結釁連兵暴骨原野自此始矣介人侵蕭介再來魯而次年遂侵蕭求援而後舉兵也冬天王使宰周公來聘公子遂如京師遂如晉始聘晉文也如京師報宰周公既命聘周又命自周聘晉故曰遂遂繼事之辭也胡傳冢宰上兼三公其職任為至重而來聘于魯天王之禮意莫厚焉魯侯既不朝京師而使公子遂往又以二事出夷周室於列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聽者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡屬詞隱桓之世王室來聘者五來賵者一來求者二錫桓公命者一而魯君臣三世不享覲於王庭至僖公二十八年因晉文盟㑹始兩朝王所又是年王使宰周公來聘而魯始聘京師遂聘晉是魯之朝聘天子皆以晉故也三十有一年春取濟西田濟水自滎陽東過魯之西入于巨野經鄆城至壽張西安民亭南東合汶水入于海巨野之西為鄆鄆之西北為范皆濟西也壽張與今東平州汶上縣接壤而濟水流經其西則為濟東而地名魯濟矣魯濟西之田嘗見侵入于曹晉侯執曹伯而反諸侯之侵地魯於是乎取之胡傳不繫國者吾故田也復吾故田而謂之取何也春秋之法不以亂易亂晉不禀命於王還以與魯魯亦不請於王而取諸曹皆不能無罪公子遂如晉拜曹田也夏四月四卜郊西亭辨疑按竹書紀年平王四十二年魯惠公使宰讓請郊廟之禮王使史角如魯諭止之以此知郊之僣自僖公始故魯頌所述皆僖公事其不本於成王明矣孔子曰魯之郊禘非禮也周公其衰矣衰者壞周公之法也孰謂成王盛時而遽壞周公之法乎不然入春秋已歷四公幾百年而郊祀之事不一見何也明堂位所載出於漢儒附㑹安得舍聖經而從記者之說先正清江張元德左綿趙企明仁山金吉父皆謂魯之郊不自伯禽始必有所據也魯無冬至之郊只有孟春祈榖之郊當在周之春三月乃夏之正月也今四月卜之乃是夏之二月卜者卜其日之吉否上卒不吉則卜中辛中辛不吉則卜下辛有三卜無四卜也以時則不時以卜則不敬夫魯僣王禮不勝書矣而又重有此失焉春秋所以因禮之變而書之也屬詞孟春之月天子以元日祈榖於上帝孟春謂夏正建寅之月元日謂上辛上帝大微之帝也郊後望祭四方謂之四望魯僣郊禮唯祀蒼帝而三望不敢用上辛同常祀三卜不從則不郊蓋雖僣而猶不敢盡同於天子也其禮牛卜吉則為牲牛傷則改卜帝牛有變卜稷牛稷牛唯具是為卜牲卜三月上卒不吉則卜中辛卜中辛不吉則卜下辛三卜皆不吉則不郊是為卜日不郊則卜免牲卜吉則免不吉則繫而待來年具牲時卜用是為卜免牲蓋卜牲與免牲皆周禮也因卜日以決郊之從否故卜郊者卜日之吉凶非卜郊之可否也宣成襄定哀各郊祀同不從乃免牲卜日不吉為不從卜免牲從故免牲猶三望胡傳魯不郊而望故特書曰猶猶者可以已之詞泰山在魯西海在魯東河在魯北故望而祭之然河海非魯所封也秋七月冬杞伯姬來求婦按僖公號賢君曽不念姑姊妹篤舅甥之好有以恤把而伯姬又來求婦當時小國之自結于大國類如此亦可哀矣於是僖公女叔姬歸把為桓公夫人而伯姬之卒亦不弔魯之薄可知矣狄圍衛十有二月衛遷于帝丘帝丘城在滑縣東北七十五里今滑縣在開州西南界上衛都朝歌在今淇縣之西左脅正受狄衝故徙居東南帝丘之地以避之胡傳帝丘東郡濮陽顓頊之墟亦衛地為狄所圍其遷于帝丘避狄難也而中國衰微狄人强盛衛侯不能自强於政治晉文無郤四裔安諸夏之功莫不見矣吳氏曰狄去年侵齊今又圍衛若無晉伯然豈以晉文居狄之久而狎之歟張氏曰自齊桓即世衛文忘齊之大德從宋襄伐齊殺冡嗣而立不正於是狄人乃假義伐衛衛人忘恩而啓狄之冦蓋始於此自晉文興不復侵伐相攻矣今復迫衛致其遷都此胡氏所以罪晉文也季氏私考衛成公自歸國之後用寧俞以為政徙帝丘以圖安氣象一新非復前日故三十年間國家安靖則强於政治之效也而衛文公不能及矣孔子嘗稱寧俞邦有道則智邦無道則愚而說者以文公為有道成公為無道失指矣三十有二年春王正月夏四月己丑鄭伯捷卒文公卒子蘭嗣是為穆公文公之卒不書葬屬詞始鄭二於楚晉人秦人圍鄭秦伯背晉使大夫戍鄭而去鄭既不事晉又受秦戌葬不得以禮㑹諸侯故不書也衛人侵狄秋衛人及狄盟自是衛無狄患者十餘年吳氏曰衛畏狄之强遷都以避之今乘其亂始敢以兵侵其境言侵不言伐不敢聲其罪而討之也胡傳按左氏狄有亂衛人侵狄狄請平焉衛人及狄盟其不地者盟於狄也再書衛人而稱及者所以罪衛也盟㑹中國諸侯之禮衰世之事已非春秋之所貴況與戎狄豺狼即其廬帳刑牲歃血以要之哉冬十有二月己卯晉侯重耳卒文公卒子歡嗣是為襄公廬陵李氏曰晉文以二十四年入國至二十八年戰城濮始主伯迄三十二年凡五年李氏曰晉有二文之業蓋文侯文公也書録文侯之命捍王于艱錫以秬鬯為東周賢侯春秋詳文公之伯蓋文侯家法也文公之興其事易於齊桓固有自來矣文公既入國而事之不載於經者凡四年雖以納王之懿功削而不見至二十八年一簡之中乃五挈晉侯不以為繁何哉蓋自武公以支代宗並吞專立讀無衣之詩雖晉之臣民不能自安也春秋為是黜晉不書文公奔而復國內何所承上何所禀經復略之勤王固為大美然特以求諸侯之利心而為之豈真知有君臣之義哉至二十八年晉楚之事乃關夷夏之盛衰非係一國之得失春秋抑楚之深故與晉之亟則晉亦不為無績於中國矣此其與桓公並稱歟大抵桓文雖並稱而文固非桓匹也桓公二十餘年蓄威養晦始能問罪於楚文公一駕而城濮之功多於召陵桓公屢盟屢㑹遲廽晚嵗始㑹宰周公文公再合而溫之事敏乎葵邱桓公終身與諸侯㑹鄄失魯盟幽失衛首止失鄭葵邱失陳文公三㑹而大侯小伯莫有不至其得諸侯又盛乎桓公而曰文非桓匹何也文公之功多於桓公者罪亦多於桓公也事速就乎桓公者義尤壞乎桓公者也名盛乎桓公者實衰乎桓公者也春秋不以功蓋罪不以事掩義不以名誣實此其非桓匹歟桓公得江黃而不用於伐楚文公謂非致秦則不可與楚爭楚抑而秦興矣此桓公之不肯為也桓公㑹則不邇三川盟則不加王人文公㑹畿內則伉矣盟子虎則悖矣此桓公之不敢為也桓公寧不得鄭不納子華懼其奬臣抑君不可以訓文公為元咺執君則三綱五常於是廢矣此又桓公不忍為也夫子正譎之辨獨不深切著明哉三十有三年春王二月秦人入滑滑在偃師縣南秦為襲鄭興師不虞鄭以弦髙使遽告而覺也故滅滑而還書入蓋國近於鄭雖滅之而不有其地也齊侯使國歸父來聘報公子遂之聘也夏四月辛巳晉人及姜戎敗秦于殽姜戎姜姓之戎戎子駒支之先也殽地在𢎞農澠池縣西今陜州東硤石關蓋晉河外虢略之東境也秦晉七十二年之爭始於殽而終於十三國之伐胡傳晉襄親將絀而不稱子者俯逼葬期忘親背惠墨衰絰而即戎其惡甚矣視秦猶狄其罪云何客人之館而謀其主因人之信已而逞其詐利人之危而襲其國越人之境而不哀其喪叛盟失信以貪勤民而棄其師狄道也夫把子先軫之謀偷見一時之利徼幸其成自以為功者也二君皆過聽焉而貪其利春秋人晉子而狄秦所以立人道存天理也陳氏曰外相敗不書秦晉之搆怨自是始經三君交戰無虛嵗曽不十年晉遂不競而楚興故特書之按秦欲襲鄭而滅滑非晉門庭之冦也晉襄何得援伯禽故事以吉禮從金革乎屬詞專罪秦而不責晉非也或謂晉棄親為讐卒不競於楚以失秦殽之役為之專責晉亦非也還從胡傳並責秦晉為是謂秦穆敗于殽歸而作誓言者非也誓言蓋作於封殽尸之時文公實嘗感秦納之之恩而襄不顧是謂忘親此與背惠俱主待秦上說癸巳葬晉文公屬詞晉文五月而葬葬書日伯業既成且嘗請隧其厚葬有由矣狄侵齊吳氏曰三十年狄侵齊傳以謂間晉之有鄭虞此年狄侵齊傳以為因晉喪狄未嘗無畏晋之心也晋縱狄而莫之攘是為可罪焉爾公伐邾取訾婁邾地秋公子遂帥師伐邾胡傳按左氏公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之此皆不勝忿欲報怨貪得恃強凌弱不義之兵也直書其事而罪自見矣按升陘之役十嵗矣報怨之說亦無謂晉文方沒秦晉交兵魯不過乘之以虐小而利其土地焉爾晉人敗狄于箕今太原府太谷縣東三十五里有箕城按狄伐晉及箕此則門庭之冦也襄敗之宜矣然猶不為春秋所取以此舉當命郤缺諸臣自足以破狄不當自以吉禮從戎也故亦稱人李亷曰晉襄初立伯業未定秦之窺鄭齊之聘魯皆有志於爭伯也晉襄惟外患是憂而置齊魯之交於度外故不踰年而伯事復盛春秋書敗秦敗狄如齊伐許於一年之間其晉伯絶續之㑹三强睥睨之秋歟冬十月公如齊十有二月公至自齊屬詞晉文伯業甫定而卒故僖公未嘗朝晉晚年一朝齊昭復修齊好也蓋公嘗間晉虐邾兹因齊聘而朝之以自託也乙巳公薨于小寢胡傳左氏曰即安也周制王宫六寢路寢一小寢五君日出而視朝退適路寢聽政使人視大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也君終不於路寢則非正矣廬陵李氏曰僖公在位三十三年實為魯之賢君當其初嵗內用公子友臧文仲外則堅事齊桓故能去慶父之姦蠧使魯國既危而復安自十七年以前除從齊㑹盟征伐外魯事之見經者甚少觀詩之所頌如務農重榖則勤於為民也春秋享祀則謹於奉先也立閟宫復泮宫克淮夷牧坰野雖一時誇大之辭有過其實然禮樂政事之修明君臣上下之協治槩可想矣但盟柳未返遽有邾師之敗葵邱稍怠遽肆陽谷之樂則公豈真能以禮信輔齊耶厥後宋襄繼起雖其伯事有不足以得魯然與其南向以從楚孰若尊奬先代協贊姻鄰以為中國之重乃乞師蠻荆導之以伐齊宋其失大矣蓋自十六年季友卒後臧文仲之竊位公子遂之專權如㑹楚之失備見於經向非晉文肇造一戰勝楚則中原左袵之禍僖公何以逭其責哉先儒曰棄夏盟而即楚則有從狄之非先晉室而後周則無敬君之節須句之功不足掩升陘之辱取榖之師不足洗至酅之恥此僖之不得全為賢侯也况乎季友受費而季孫氏始公孫兹帥師而叔孫氏始公孫敖帥師而孟孫氏始三桓之基皆肇於僖公之編則僖公亦魯國功之首罪之魁也歟隕霜不殺草李梅實胡傳哀公問於仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而況君乎其論隕霜不殺草李梅冬實蓋除惡於微慮患於早之意也屬詞周十二月夏之十月霜當重而不能殺草李梅再花而實周十月夏之八月霜不當重而殺菽皆非常之災許氏曰僖公寬仁過厚其失也豫而文公以暗弱繼之三桓之盛自僖公始卒以專魯咎徴著矣晉人陳人鄭人伐許許乃文公所不能致而襄能伐之於敗秦敗狄之後可謂勤於承先業矣然而忘喪毒衆非春秋之所取也故稱人趙鵬飛氏曰晉文之伯獨許不至溫之㑹以諸侯圍之然卒不至故翟泉之盟許亦不預今襄公以三國伐之而許終不服蓋恃楚也春秋事義全考卷六
