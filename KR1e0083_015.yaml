body:
  text: 春秋事義全考卷十五明姜寶撰定公名宋襄公庶子昭公弟安民大惠曰定元年春王三月晉人執宋仲幾于京師西亭辨疑公榖欲發定無正之義乃分春王二字為一節晉人執宋仲幾為一節胡氏因之致使經義反晦况定公即位于六月戊辰此時位尚未定春秋豈可預責其罪邪蓋是年正月無事三月適有執宋仲幾事故書之其義責晉非責魯二節合看自明按定公無正似難以不書正月上見蓋正月無事則連至三月有事而始書定不承國於先君自是其無正處然聖人未必借不書正月以發其義如此也王氏經世按周衰諸侯不享覲天子之在者唯號與祭僅存城成周諸侯之大夫猶相帥以從王事得變之正者也晉人執宋仲幾于京師猶以王事討有罪亦變之正者也其歸諸王吏與自治皆不可知但既執于京師則不可復云歸之京師以大義而論則以王事執有罪固視其他之擅命者不同矣春秋不應舍仲幾而專苛責晉人也然則稱人蓋全之也稱君則不在㑹稱臣則嫌於與之專執也夏六月癸亥公之喪至自乾侯戊辰公即位胡傳昭公之薨已越葬期猶未得返至于六月癸亥然後喪至而定之即位乃在是月之戊辰蓋遲速進退為意如所制不得專也春秋詳書非為後法乃見諸行事為永鑒爾季氏私考昭公既薨魯羣臣必當即議立君矣以左氏考之則昭公生務人及公衍二子從在乾侯雖有其人則亦季氏之所忌不敢復入矣公子宋以昭公母弟雖亦從公在外然於季孫無忌子家羈所謂貌而出者也故喪至壞隤而宋先入正為國久無君也意如必欲抑使聽已所為故不以時定位意如之於昭公禮皆從薄如葬則太速祔則太遲是也豈為喪紀而君宋於五日之後哉况昭公喪自外歸殮事已畢何待五日而後殯乎不過假此以持宋而市已掖立之恩耳秋七月癸巳葬我君昭公昭公薨半年餘始以其喪歸歸及踰月而遽葬魯臣子既無禮且無恩矣當時如仲孫何忌學禮於聖門而亦聽意如專制如此可慨也立煬宫胡傳煬公伯禽之子其曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立季氏先禱於煬宫求君不入至此又謂煬公以弟繼考公猶定公以弟繼昭公也蓋既欲報己之私而又欲掩己之失故立煬宫其非禮固不待言也冬十月隕霜殺菽胡傳榖梁子曰菽舉重也舉難殺者而言他苖亦傷可知未可以殺而殺舉重可殺而不殺舉輕其象則刑罰不中之應二年春王正月夏五月壬辰雉門及兩觀災王氏經世孔氏曰雉門公宫南門之中門也釋名云觀謂之闕周禮象魏鄭衆云象魏闕也劉熙釋名云闕在門兩旁中央闕然為道也崔豹云蓋為二臺於門外作樓於上然則其上縣法象其狀魏魏然髙大謂之象魏使人觀之又謂之觀也是觀與象魏闕一物而三名也觀與雉門俱災則兩觀在雉門之兩旁矣何氏曰門為主觀為飾季氏私考雉門象魏之門兩觀在雉門外之兩旁禮天子五門雉門當中其外為庫門而臯門在庫門之外其內為應門而路門在應門之內魯有庫雉路三門殺於天子周禮閽人疏曰魯有三門雉門有兩觀為中門陳祥道氏曰諸侯有臺門無兩觀魯有兩觀為周公故也明堂位曰庫門天子臯門路門天子應門正以魯之庫門臨外當天子臯門之位路門在內當天子應門之位未嘗言門制之僣天子也而疏以為二門制似天子非矣魯門之僣天子特在多立一雉而又旁設兩觀耳秋楚人囊瓦伐吳經書楚吳七止此左傳桐叛楚吳子使舒鳩氏誘楚人許為伐桐於是囊瓦伐吳吳敗之獲楚公子繁冬十月新作雉門及兩觀胡傳書新作者譏僣王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其內為應門而路門在應門之內是天子之五門也子家駒以設兩觀為僣天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僣君必書者必正之意也使定公遇災而懼革其僣禮三家陪臣雖欲僣諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主矣故特書新作以譏之也王氏經世書新作侈而大之也災自雉門延及兩觀魯人修之理合先門門者出入處也乃及兩觀門飾各據實而書公榖强生義以為主災者兩觀以為災自兩觀始殊妄矣三年春王正月公如晉至河乃復意如以公初立使事晉晉為來者薄而往者厚也故嘗辭公公以晉人辭之故明年因㑹而請盟于臯鼬二月辛卯邾子穿卒莊公卒子隱公益立夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔邾子益新立求好於魯故何忌與之盟邾以先君時嘗與何忌同城成周今求盟蓋亦將有托焉四年春王二月癸巳陳侯吳卒惠公卒子懷公栁立三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚胡傳按左氏書伐而經書侵楚者楚為無道慿陵諸夏為一裘一馬拘唐蔡二君三年而後遣蔡侯既歸請師于晉晉人請命于周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶幾哉王者之師齊桓晉文之功褊矣有荀寅者求貨于蔡侯弗得遂辭蔡人晉由是失諸侯無功而還書曰侵楚陋之也永嘉吕氏曰召陵之㑹晉可以復伯而失其機也夫蔡陳鄭許頓胡蓋服役於楚者也而皆與於㑹則病楚而歸晉也晉自平丘以來不能㑹諸侯者二十四年今而上致劉子下合十七國之君以為此㑹齊桓之師不如是之盛也然齊桓之師書曰伐楚盟于召陵晉定之師書曰㑹于召陵侵楚侵淺事也晉合十七國之君以㑹于召陵徒能侵楚而已是不足與有為也晉自是無復宗諸侯之望矣王氏經世陳氏曰是役劉子為之也劉子定內難復辟于周而楚納子朝故合諸侯以侵楚也明年王人殺子朝于楚不可謂之無功然而書侵者侵淺事也不敢深犯紀實耳夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之胡傳蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃强殺之能無公孫翩之及哉故書滅沈書殺之以著蔡罪王氏經世按沈不㑹于召陵者與楚故也與楚故不受晉令而晉使蔡逞忿焉夫求貨於蔡而蔡攜假羽旄於鄭而鄭二大合諸侯以伐楚不能損楚之毫毛而潜踪略境事既陋矣又肆虐於逺弱之小國蔡屢為楚所滅不思己之視楚猶沈視蔡也而藉晉威以肆為不道又如此故書滅書殺以著其罪也五月公及諸侯盟于臯鼬今襄城縣東南有成臯城即此非汜水縣之成臯也胡傳定公之立上不請於天王下不告於方伯而受國於季孫意如故三年朝晉至河而復今㑹諸侯求為此盟書公及者內為志也召陵之㑹必序不序十有八國之諸侯則無以見侵楚之陋臯鼬之盟序與不序非義所繫則以凡舉可也程子曰公受國於季氏因不獲見于晉而懼則此盟公意也故書公及把伯成卒于㑹臯鼬之諸侯即㑹伐楚之諸侯召陵為伐楚而盟而不言卒于師者不成乎伐楚也六月葬陳惠公許遷于容城此與葉夷白羽凡四遷畏鄭逼也秋七月公至自㑹不致侵楚譏無功而還也劉卷卒劉卷即劉蚠屬詞劉文公㑹諸侯于召陵故來赴往弔蓋其身佩周室安危繫諸侯之合散與王子虎同其報送之禮有不容己者不可以常禮論也葬把悼公楚人圍蔡召陵侵楚由蔡昭公所為而又滅沈以剪楚與故楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞孔圉即孔文子仲叔圉也王氏經世召陵之役荀寅謂無損於楚而失中山故兹蔡圍不救而伐鮮虞葬劉文公廬陵李氏曰天子三公稱公曾為三公而有土為畿內諸侯者亦曰公皆以其地配公字言之若祭公周公州公之類是也天子卿大夫有封為畿內諸侯者皆曰子溫子劉子單子尹子之類是也然周末畿內諸侯卒皆諡公如成肅公單平公皆然春秋因劉文公之葬特書以志其僣耳生稱劉子卒稱劉卷葬稱劉文公皆聖人謹嚴之筆也而何氏注公羊乃以其稱公之故而謂劉子本外諸侯入為天子大夫故上繫采邑下繫本爵其說無据不可從冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭季氏私考楚人者圍蔡之楚人也蔡圍已解故蔡侯得去國而以吳子遇於柏舉戰不在蔡矣故不言救蔡戰言楚人而敗言楚師蓋楚聞吳兵將至而使囊瓦帥師出禦及見圍兵先敗而大衆遂奔囊瓦因懼誅而奔鄭左氏序此以唐侯為預伐囊瓦為預戰則與經文不合何足信哉囊瓦即子常時為令尹公子貞之孫也貞字子囊故瓦以王父字為字按吳書爵見吳子親行書以吳子見請于吳之易以形請于晉之難胡傳此意是但謂稱子為善伐楚解蔡圍成伯討之功則過矣不稱救以戰于楚地非為救蔡而戰故不言救亦非為救大矣而不以豫吳也庚辰吳入郢郢是都今荆州文王所遷屬詞凡入國曰國入邑曰邑未有入國而言邑者此入國矣而言邑何也中國諸侯皆王者所封無自號其國者自號其國者必外域也是故赤狄嘗自號其國曰潞以歸稱潞子得從其自號以配爵滅稱赤狄潞氏不得從其自號以名國故滅不言潞言滅潞則與三代建國無辨矣此史氏之法也戰稱楚人敗稱楚師入稱郢特筆之義蓋取諸此楚之先熊繹事周至成王始以子男之田封諸荆山入春秋至莊公末年猶稱荆僖元年伐鄭始稱楚蓋荆其本號楚乃僣王後所自改之號也春秋書楚事凡所以謹華夷之辨者無不致其嚴矣惟始終稱楚無異詞蓋非入滅皆得以號舉也於是蔡侯以吳子戰敗楚師書入郢而不言入楚以其叛周自立僣天子大號以爭諸侯不得與三代建國無辜見入者同文也是故吳子得稱子楚囊瓦書人而入書日許蔡侯以復世讐而吳之入郢亦不與陵弱暴寡之師例論也春秋别內外至是無遺法矣屬詞楚為中國患有自來矣而始終受其荼毒者唯蔡為甚自齊桓晉文之盛而不能加兵於其國都雖劉文公合十八國之師于召陵而不能一問其罪卒之攄中國神人之積忿者吳也是以聖人特詳焉戰言吳子而入舉號者一役再有事則從其恆稱也雖然此一役也如所謂漢陽諸姬滅國可興惜乎吳無君臣不足以居其功而晉衰已甚劉卷既卒無能起而收之者春秋徒致意焉而已爾按此說是也胡氏順天命奉天討之說似未妥蓋一事而兩有豫奪若自相矛盾然恐非春秋之㫖也五年春王二月辛亥朔日有食之夏歸粟于蔡蔡侯與諸侯同盟于臯鼬而能以吳子敗楚師入郢時吳尚在楚魯以同盟故歸粟于蔡將以悅於吳也於越入吳季氏私考越與楚通故昭三十二年吳伐越以治楚黨至是吳入楚而越亦乘虛入吳髙閌氏曰吳伐楚越乃乘其士卒罷敝掩入其國至十四年又敗吳哀十三年再入吳若為楚復讐者是以君子惡之六月丙申季孫意如卒胡傳內大夫有罪見討則不書卒意如何以書卒見定公不討逐君之賊以為大夫全始終之禮也定雖受國於季氏苟有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室强矣今苟於利而忘其讐三綱滅公室侵陪臣執命宜矣故意如書卒主人習其讀而問其傳則未知己之有罪焉耳秋七月壬子叔孫不敢卒不敢婼之子即成子也子州仇嗣是為武叔冬晉士鞅帥師圍鮮虞以前此伐而不服故今又圍之六年春王正月癸亥鄭遊速子太叔吉之子帥師滅許以許男斯歸斯執元公成立屬詞晉之世伯而許服於楚至是吳入郢鄭人因楚敗而滅許哀元年許男從楚圍蔡蓋楚復封之也二月公侵鄭公至自侵鄭自宣之季年凡伐不言公魯無君將者八十年矣至是書公侵鄭則以公山不狃侯犯陽虎之専也蓋陪臣方以三桓之専兵為口實而亦欲竊取兵權爾故諸卿不復帥師而自是恆以公將本非公室能張以陪臣專恣故每託公以出師也夏季孫斯仲孫何忌如晉季桓子為獻鄭俘陽虎强使孟懿子往報夫人之聘晉人兼享之秋晉人執宋行人樂祁犂晉為宋人不來聘而執宋使其實以晉政多門而貨賄讒慝汩昏於其間故也胡傳稱人以執非伯討也祁犂聘于晉主趙簡子飲酒焉獻楊楯六十執非無名何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三家分晉而靖公廢為家人豈一朝一夕之故哉冬城中城汪氏曰是時蓋陽虎欲去三家故託於懼齊鄭將挾公以自固耳季孫斯仲孫忌帥師圍鄆何忌不言何闕文也髙氏曰昭公三十年鄆潰遂二於齊至是二卿圍而欲復取之蓋陽虎欲傾季氏以謀政也季仲圍而曰陽虎者虎專季氏季氏專魯也仲何為哉七年春王正月夏四月秋齊侯鄭伯盟于鹹季氏私考是時齊鄭皆與魯為讐齊鄭盟鹹將致衛以危魯也而衛人不至則兩君特相盟而已見諸侯散而不能為主也齊人執衛行人北宫結以侵衛季氏私考齊鄭盟于鹹徴㑹于衛而衛不至蓋齊人讓之而衛使行人北宫結往謝齊遂執之是時景公耄而妄動亦晏嬰已去位而用事非其人爾不然豈得謂以其君顯耶齊侯衛侯盟于沙今元城縣有沙城地近水者曰澤逺水者曰沙大雩齊國夏惠子帥師伐我西鄙髙氏曰齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆九月大雩冬十月八年春王正月公侵齊公至自侵齊趙鵬飛氏曰非苟報西鄙之伐亦以鄆之在齊也二月公侵齊三月公至自侵齊再侵以為未得志故也曹伯露卒靖公卒子伯陽立夏齊國夏帥師伐我西鄙此報公春之再侵也公㑹晉師于瓦今衛輝府胙城縣東北有瓦亭胡傳按左氏晉士鞅荀寅救魯則其書公㑹晉師何也春秋大法雖師次于君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也故棐林之㑹不言趙盾而言晉師瓦之㑹言晉師而不書士鞅於以見人臣不可取民有衆專主兵權之意陳氏厚施於齊以移其國季孫盡征於魯以奪其民皆王法所禁也春秋之義行則不得為爾矣季氏私考定公因齊伐西鄙親至於瓦以待晉師之救比其至也則齊兵已退故晉救不書夫魯大國也三家合力豈不足以禦齊特以此時政在陪臣制於陽虎故門庭之冦不能即却而使公逺出境外求晉出師已非謀國之道矣况晉方好賄霸業已隳師出後期無濟於事又何足恃以為安乎則不若與齊平之為善矣按晉卿來救魯公逆而㑹之於瓦救不書齊師已去也公至自瓦秋七月戊辰陳侯栁卒懷公卒子閔公越立晉士鞅帥師侵鄭遂侵衛去年鄭始叛晉盟齊于鹹衛始叛晉盟齊于沙於是侵鄭衛又明年及齊平雖魯亦叛晉矣葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛晉故也冬衛侯鄭伯盟于曲濮二君欲叛晉故同為此盟以固其謀從祀先公盜竊寶玉大弓不言從祀為誰見事由陽虎而不可詳若曰於從祀先公之時而盜遂竊取分器云爾按此舉杜氏以為正閔僖之位次馮氏以為昭公始得從祀於太廟又有謂桓公以隱為攝皆當有以正之謂從為順而季氏私考至謂孔子仕魯誠足以感季桓子得禮正先公之祀皆非也此說惟西亭辨疑得之謂宗廟之祭卿大夫從先公非一公也魯自昭公去國意如實攝行廟祭其家臣陽虎輩得從祀焉因從祀時見有先世所藏寶玉大弓遂竊取之後知不可且無益而復還於公所謂得之於堤下是也按從祀即今制五品以上得陪祭之謂陽虎雖陪臣而久以大夫自處其得從祀者此也因從祀而竊寶玉大弓既而還於公故又得寶玉大弓三句實一串事諸說紛紛皆支離之論也謂之盜謂之竊聖人蓋難於明言而既有以指斥之卑鄙之矣九年春王正月夏四月戊申鄭伯蠆卒獻公卒子聲公勝立得寶玉大弓六月葬鄭獻公秋齊侯衛侯次于五氏晉地在今廣平府邯鄲縣季氏私考白盟沙以來衛人叛晉晉志不忘討衛而衛與齊合將欲備之此所以有五氏之次歟任氏曰此伐晉也不書伐而書次者晉實大國未敢輕伐始盟于沙中次于五氏又次于垂葭又次于蕖蒢至哀元年而後伐其欲有所逞也久矣秦伯卒哀公卒子惠公立冬葬秦哀公十年春王三月及齊平平前再侵之怨我志也夏公㑹齊侯于夾谷公至自夾谷夾谷山在今濟南府淄川縣西南三十里山陽即齊魯㑹處季氏私考魯既及齊為平於是定公至夾谷而與齊為㑹善魯之能睦鄰也左氏載萊人劫魯之事此理所無蓋孔子相魯其所施為必先有以感格其君臣豈必臨時有待於用武邪劫㑹未見於前時况兩國講好在孔子為相之日乎世儒欲誇孔子之功故附㑹其說耳按何休氏載晏嬰謝過之言理或有之但考晏嬰自襄二十五年崔杼弒君時已用事於齊至是又四十八年則嬰不勝其老矣觀孟子載齊景公為晏子作君臣相悅之樂則似言無不聽者當時稱晏子以其君顯必非偶然然景公自定七年之後結黨稱兵侵伐魯衛類非賢臣輔佐者所為豈嬰時已老不用事而復因孔子以勸齊平魯邪然考左氏以及穀梁家語史記諸書序夾谷事皆盛稱孔子而不及嬰惟何休乃一言之疏以為本於晏子春秋則亦未可信其必然也晉趙鞅帥師圍衛季氏私考趙鞅復圍衛必欲其離齊黨也而卒不能服徒足以堅齊之從晉衰可知矣齊人來歸鄆歡龜隂田季氏私考鄆濟西田也此田昭二十五年為齊所取歡汶陽田也此田成八年魯歸于齊龜隂龜山之隂也龜山在今兖州府泗水縣東北五十里漢為博縣北一十五里其北為嬴縣地所謂嬴博之間也㳊水自泰安州萊蕪縣西南出焉龜隂之東北為漢泰山郡牟縣地古根牟國也牟汶出焉牟汶蓋即小汶地志在泰安州新泰縣東北三十里源出龍池西南流百里餘入汶河今泰安州西南四十里有徂徠山汶水流經其北小汶水流經其南而西與汶水合於泰山之南流經魯北以至於歡是為汶陽田矣魯在汶南龜隂又在小汶之南即二水之所從出自泰山以南徂徠山以東嬴博之間似皆非魯本封內地蓋小國見侵而齊魯之所互爭者也觀其上猶有根牟國在焉其下鑄亡而後以蛇丘名歡焉亦可見矣詩所謂泰山巖巖魯邦所詹者亦據後人尊以為望而言耳然則龜隂未歸之前其田嘗為齊得何以不見於經耶疆場之民自相據奪互爭未决不以國事録也今魯與齊講㑹夾谷兩相修睦故歸三田亦中分其地以息爭而已蓋濟西之田鄆范之界也汶陽之田歡棘之界也龜隂之田嬴博之界也鄆歡博之近魯者則以來歸而范棘嬴之近齊者則為齊有此歸田之意也大抵齊魯之爭多起於疆場之事田分而爭息矣又按鄆在魯西歡在魯西北龜隂在魯東北相去頗逺而左氏俱以為汶陽田非也凡書歸者皆因請而送歸之辭如齊人歸公孫敖之喪齊人歸我濟西田齊人歸歡及闡是也書來歸者皆不期而至之辭如鄭伯使宛來歸祊齊人來歸子叔姬季子來歸之類是也鄆歡龜隂之田齊人心所欲歸者也故書來左氏載孔子使兹無還劫反汶陽田之語此霸者末流之事也惡得以亂聖人純王之學哉胡康侯以為自序其績亦非也上文未有言孔某所為者而何以見其自序績邪凡此類皆據實直書而使人比觀以見義者也叔孫州仇仲孫何忌帥師圍郈季氏私考侯犯宰郈公山不狃宰費皆倚城以自固而陽虎與之為黨所恃以亂魯者也孔子用於魯季桓子信之革心改行陽虎既不能安其位矣則郈費之叛勢所必致也孔子所以處此亦得仲孫何忌之力蓋仲孫氏叔季二家之親信者也何忌方受學於孔子能以聖人經國尊君之意諭使信從故先以兵助季孫而處費中間所以感格侯犯與不狃者亦多術矣此孔子之作用也不然叔季二家且不相信安能使叛臣避邑而墮城耶秋叔孫州仇仲孫何忌帥師圍郈胡傳郈叔孫氏邑也侯犯以郈叛不書於䇿書圍郈則叛可知矣再書二卿帥師圍郈則强亦可知矣三家專魯為日已久至是家臣爭叛亦其理宜矣春秋制法本忠恕二三子知傾公室以自張而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣宋樂大心出奔曹初宋公使大心盟于晉大心辭以疾公信子明之譛謂其不肯適晉將作亂也於是逐桐門右師右師即大心也季氏私考宋景公寵用桓魋諸卿皆有離心君臣之迹睽矣故聞子明譛大心將亂而遂逐之景公不能禮遇大臣信讒猜忌固有罪矣而大心以國卿之重挾詐不忠亦安保其不為亂哉書出奔罪之也宋公子地出奔陳地抶魋而不忌君其罪也故以有罪之詞書出奔冬齊侯衛侯鄭遊速㑹于安甫此與十四年㑹于洮皆叛晉以後之事此㑹以衛有晉難故也叔孫州仇如齊屬詞夾谷之㑹齊來歸田侯犯之叛齊又致郈故州仇如齊其後叔還葬景公蓋景公末年更結魯以叛晉也宋公之弟辰暨仲他石彄出奔陳胡傳按左氏宋公子地有白馬四公以與桓魋地怒抶魋奪之魋懼將走公泣之母弟辰曰子為君禮不過出境君必止子地出奔陳公弗止辰為之請弗聼辰曰是我誑吾兄也吾以國人出君誰與處書曰宋公之弟辰暨仲他石彄出奔陳其弟云者罪宋公以嬖魋故以失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得己之詞又以見仲他石彄見脅於辰不能自立無大臣之節也季氏私考仲他石彄本無去志但辰以桓魋之逼脅使去國而他彄亦與之同忿故併逐之書曰暨以見弟辰所欲而有强於他彄也先儒多以仲他石彄脅辰為說則不當以辰為首惡矣十有一年春宋公之弟辰及仲他石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭胡傳出奔陳則稱暨入于蕭以叛則稱及及非不得己之詞得已而不己者也夫事君者可貧可賤可殺而不可使為亂今不得已而輕於去國猶之可也得已不已而果於叛君則無首從之别其罪一施之故不稱暨而稱及四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入于蕭入逆詞也書自陳自曹者結鄰國以入叛陳與曹之罪亦著矣季氏私考稱自者因其力也辰他彄地因陳力而入蕭則從叛可知陳方附楚曹方奸宋故亂臣往依之書自陳自曹而陳與曹之罪亦著矣左氏曰辰他彄地大心大為宋患寵向魋故也得其情矣宋景公不能正身修德民無則焉馴至哀公末年桓魋慿寵效尤而不免於亂矣按暨之不得已在仲他石彄及之得已而不已四人同蓋暨者以此强彼我所欲之辭及者以此及彼兩相欲之辭也冬及鄭平季氏私考此平六年侵鄭之怨也昔魯親晉而鄭附齊鄭睦於齊者也魯與齊平而鄭亦平矣既平然後蒞盟竊謂平齊之後魯不復與鄰國爭此孔子用魯而勸之以盡修睦之道也豈為樹黨哉叔還如鄭涖盟還叔詣曽孫十有二年春薛伯定卒襄公卒子比立夏葬薛襄公叔孫州仇帥師墮郈墮毁也郈叔孫氏之邑也叔孫州仇主郈季孫斯墮費以是為二家之願也則以孔子之相魯也季氏私考按侯犯既避邑奔齊則郈可不假仲孫之力而墮矣然州仇必親帥師者恐餘黨有他變也衛公孟彄帥師伐曹彄縶之孫此因曹不從齊而衛為齊伐之也季孫斯仲孫何忌帥師墮費季氏私考公山不狃以費叛者也何以不圍觀不狃初欲召用孔子蓋猶有善意焉故從容調護姑不急攻而先以仲孫何忌助叔孫州仇攻郈圍而又圍及郈墮而後何忌乃助季孫斯以兵臨費則不狃聼命費遂不待圍而墮矣此見不狃猶賢於侯犯也左氏謂仲由為季氏宰將墮費而公山不狃叔孫輒帥費人襲魯而攻公仲尼命申句須樂頎伐之二子奔齊遂墮費夫仲尼所以默運於其間者以有何忌也使叔季二氏而無何忌通焉雖子路亦無可為而况於申句須樂頎哉以此知左氏之說非也王氏經世何氏曰郈叔孫氏所食邑費季氏所食邑二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長數叛者坐邑有城池之固家有甲兵之藏故也季氏說其言而墮之書者善定公任大聖復古制弱臣勢也不書去甲者舉墮城為重也蘇氏曰此孔子之所以聖也孔子以羈旅之臣得政數月而能以治世之禮律衰世之臣墮名都出藏甲而三桓不疑其害已此有不言而信不怒而威者矣按當時只二家不能制其家臣問於仲尼所墮亦只兩都未嘗墮三都胡氏以為墮三都非也以禮為國可以己之此說則是秋大雩冬十月癸亥公㑹齊侯盟于黃季氏私考黃之盟齊魯睦也蓋因孔子用魯政化大行有所感焉而為此然忌而沮之之意已存乎其間矣女樂之歸其在此盟之後歟屬詞齊景結魯以叛晉既㑹于夾谷而公又㑹之盟卒叛晉則黃盟齊志也十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成朱子曰費郈之叛荐為叔季害故叔季自欲墮之公斂處父在成方有功於孟氏則孟之不肯墮宜矣季氏私考郈費墮而魯治定及女樂之沮而孔子行於三日不朝之後矣季桓子叔孫武叔相比不欲使孟懿子獨存成城也於是以圍成强公公惑焉而躬圍之夫郈費之墮以其勢强而叛非以其有城也城以保民何害乎當時三家惟孟氏為公臣如獻子莊子僖子以至懿子皆賢大夫也雖以成為私邑而修職不闕公室賴焉成實不叛何以圍為圍之者叔季二氏之私也不當圍而圍則孟氏有辭矣此成之所以卒不克墮歟書以見定公之輕動也李亷氏曰按史明年孔子由司冦攝相事至十四年然後行則恐未必然故胡宏氏曰聖人色斯舉矣安有明年由大司冦攝相之事所以必知其無者考據經文明年無更敗起廢之事而築囿大搜絶與墮都之意不侔故也此說似得其實故魯世家亦以攝相與聞國政歸女樂孔子行皆為十二年事也王氏經世仁山金氏曰按孔子生長於魯至是五十餘年天下之士多從之者魯之君臣豈有不知其賢者而未嘗能用孔子也定公之十年一旦起而用之莫有知其由者論語左氏皆不言其故獨孟子稱孔子于季桓子見行可之仕也而論語謂季桓子受女樂不朝孔子行是孔子此時之行藏係季桓子為用舍也何哉魯自三家四分公室而季氏取其二季氏專魯而魯公無民久矣使魯君而欲用孔子豈能遽奪季氏之權以畀孔子季氏亦豈肯遜己之權以與孔子哉自定公初年季平子卒其家臣陽虎始用事五年執桓子囚之而專魯政辱之於晉陷之於齊師且盟且詛九年又將享桓子而殺之僅而獲免當是時非惟魯國不可為而季氏亦自不可支矣霜降水涸涯涘自見桓子於此亦謀所以為靖亂興衰之計故舉孔子於公而試用之已而政聲四達齊歸侵地於是攝行相事墮三都夫三都者三家强邑也當是時公山弗擾在費而郈侯犯之亂未久也三家之有三都已非公室之便而三都之為三都至是亦非三家之便也故叔孫氏始墮郈繼而季桓子墮費已而孟孫氏不肯墮成也公斂處父之言曰無成是無孟氏也然則無費是亦無季氏也而墮之當是時桓子之心未敢自計其私也夫三都已墮其二則成之不墮固亦未害然亦豈終不克墮哉夫子久之必有處矣既而魯國方治而齊人歸女樂以沮之夫孔子上下之交方固桓子之志未移則一女樂豈足以間之齊人素善謀功利者歸女樂而謂足以間魯之用孔子寧不幾於兒戲乎是殆必得其間矣季氏權臣也桓子舍已權以聽孔子而墮其名都以彊公室其中豈無介介者顧以衰敗之餘藉之振起為是降心以相從也今紀綱既定外侮既却魯既治矣桓子豈甘於終絀者縱桓子甘之季氏私人必有以為不利者故其信任之意必已漸衰特未敢驟舍孔子而孔子顧亦無隙可行爾故齊人歸女樂以促之夫齊何懼於我而歸女樂於事可疑於禮不正有國者固不可啖此為鄰所覘也使桓子而猶孔子之聽豈其受此受之已非矣而又君臣荒淫其中三日不朝此其心術蠱壞不復可與有為而其心固亦已無孔子矣故孔子去之然考之孟子與史記蓋為膰肉不至而行也而論語則以為因受女樂蓋孔子之行决於此而特發於膰肉爾夫郊之必致膰於大夫禮也孔子何此之待哉待遇之衰必有日矣惟孔子於父母之邦不若是恝又不欲顯其君相之過已知其必不致膰且猶兾其能悔而致膰也既而膰果不致矣使其致膰猶可也而不致是昭然踈郤之也於是而行復何俟哉此夫子出處之本末事情也十有三年春齊侯衛侯次于垂葭垂葭衛地一名郥氏髙平巨野縣西南有郥亭巨野今屬兖州府其西南為曹地衛蓋懼曹召晉出兵而與齊次以備之且以遙制曹也夏築蛇淵囿今兖州府定陶縣界有蛇丘城即此在今寧陽縣北歡田歸而築囿於其地見孔子去魯而君臣志荒矣此與受女樂事相類决非孔子為政時大搜于比蒲髙氏曰魯既叛晉三桓日懼人之圖已故數搜衛公孟彄帥師伐曹伐而曹未服今再伐猶前志也秋晉趙鞅入于晉陽以叛晉陽即太原别名本晉封後為趙氏所據趙在平陽府趙城縣林氏曰十年鞅圍衛衛懼貢五百家鞅置之邯鄲今欲從午取之而舍諸己邑中也王氏經世鞅之欲歸衛貢五百家于晉陽也封殖私邑之計也而邯鄲午慮絶衛親奉命不速鞅以午荀寅之甥荀寅范吉射之姻也疑午有二心焉因是而遂殺之二家始禍蓋亦有執言矣鞅苟有人臣之禮聽君大夫平其曲直可也而遽入私邑以叛罪豈容誅乎冬晉荀寅士吉射入于朝歌以叛季氏私考荀寅吳之子是為中行文子吉射士鞅之子是為范昭子荀氏本封於荀鄭漁仲曰荀邑在絳州正平縣唐絳州治也士氏本居於范鄭漁仲曰其地在濮州范縣今按濮州乃衛地范之始封不應在此意士氏初本居隨地當近晉而范亦其别名邪蓋荀士二氏之私邑在此矣朝歌在今淇縣西二十二里本衛地後服於晉故自朝歌以北皆謂之衛貢但邑非逼取而自服者春秋恆不書耳則朝歌者公邑也胡康侯以為二子所食之私邑則非矣朝歌逺晉不能為亂特欲自保耳非若晉陽之可以為國患也廬陵李氏曰晉六卿二荀氏荀寅中行氏也荀躒知氏士氏即范氏也韓氏魏氏趙氏荀士二家自此亡知氏春秋後亡故止韓趙魏三家分晉晉趙鞅歸于晉胡傳書歸者易詞也韓魏為之請晉侯許之復而寅與吉射去國出奔則無有難之者故其歸為易矣三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸于晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡始禍晉國之載書既不能致辟於鞅奉行天討以警亂臣又亢不衷狥韓魏之請而許之復無政刑矣其能國乎薛弒其君比比弒子惠公夷立又名寅胡傳稱國以弒者當國大臣之罪也啖氏曰稱國以弒自大臣也胡氏說本此十有四年春衛公叔戍來奔衛趙陽出奔宋胡傳公叔戍將去南子之黨夫人訴曰戍將為亂故公叔來奔趙陽北宫結皆戍黨也故亦出奔而靈公無道不能正家以喪其大臣之罪著矣戍又以富見惡於衛侯此亦所以來奔也季氏私考公叔氏戍名公叔文子之子也趙亦氏蓋本晉人而仕於衛者按南子固為淫亂而三子不能以義匡君從容開導乃欲謀去其黨是真有挾君為亂之心者也况戍本以富見惡於衛侯則其不得志也久矣故曰凡書奔者皆罪也二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸頓欲事晉而絶陳好故也季氏私考家鉉翁氏曰楚為中國患百有餘年至是始戢諸侯無從楚者而陳也從之不替頓本楚之與國嘗與夏盟召陵之㑹頓子在焉去夷而即華正也陳以盛德之後當荆楚既衰猶此而從之滅國是亦楚而已矣春秋書楚結陳他人連兵滅頓誅楚而罪陳也夏衛北宫結來奔結公叔戍黨五月於越敗吳于檇李吳子光卒今嘉興府西南有檇李城屬詞夷狄相敗經不書此為吳子光卒見其以敗卒也吳越深謀相報復而越卒亡吳蓋於是始當時吳子輕於伐越玩兵以滅其身越禦吳於檇李檇李吳地蓋逺追吳及於此而又用詐謀以敗吳皆不為無罪所謂直書而自見者也公㑹齊侯衛侯于牽今濬縣東北有牽城季氏私考范中行入朝歌以叛衛之所深幸也而朝歌近在衛西不無隂結之情矣衛方有內難懼晉討朝歌或將生變故合齊魯以㑹于牽蓋察其虛實耳而晉實未嘗有兵至朝歌則三國亦遂退矣左氏謂晉人圍朝歌公㑹齊侯救范中行氏經文未嘗書圍書救安可遽謂三國為是而㑹哉公至自㑹秋齊侯宋公㑹于洮季氏私考家鉉翁氏曰自齊景圖霸衛鄭魯既與之同盟宋猶未忍絶晉至是始及齊為此㑹蓋始從於齊也天王使石尚來歸脤脤爼實也腥曰脤熟曰燔歸脤猶今云頒胙也周魯之交止此衛世子蒯聵出奔宋季氏私考蒯聵衛靈公夫人南子之子也其稱世子立嫡之恆稱也嫡子已立而可輕出乎此靈公之罪也棄父出奔蒯聵預有貶焉蓋南子淫亂蒯聵所羞不能為親隱惡以道諭之而憤激過中施為無序迹亦不能無涉於亂也不惟南子惡之雖靈公亦有所不安矣當時羣小畏誅豈無媒孽之者乎故南子譖其將殺已而靈公信之此蒯聵所自取之禍而非有殺母之心然靈公所以信南子者亦由溺於寵愛之私不疑其有淫行如此也傳謂其為南子召宋朝則又過矣張洽氏曰臨江劉氏曰左傳序蒯聵事曰蒯聵欲殺夫人豫謂蒯聵雖不善謀安有此事且殺夫人蒯聵獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈大反不知可羞乎蓋蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥己之淫則啼而走言太子將殺余以誣之靈公惑於南子所言必聽從固亦不難逐蒯聵矣此其真也不當如左氏所記及蒯聵出乃奔宋使真有其事宋南子家也蒯聵負殺南子之名又走入其家敢乎哉常山劉氏曰蒯聵出奔春秋不去其世子者衛侯之辜也靈公聽南子之譖謂蒯聵欲殺其母不能為辨明以致其出奔豈非靈公之罪乎自古讒婦之誣其子多矣觀此言足以知左氏所記乃南子之讒言而非當時之實録也衛公孟彄出奔鄭彄蒯聵黨靈公以蒯聵故疑而併逐之宋公之弟辰自蕭來奔書宋公之弟罪辰失弟道宋公以寵桓魋故失待弟之道見其恩義之兩失自者因其力書自蕭亦所以罪蕭也大搜于比蒲按比蒲地多沛澤故於此三搜焉搜以國事舉故雖公在而不書公若觀棠狩郎則公自遊觀而非以國事舉矣以公在故邾子來㑹公當時權在三家搜本三家為數軍實而舉然未嘗不奉公以行而邾子之來㑹必比蒲地近邾也邾子來㑹公城莒父及霄魯從齊而不從晉懼晉討故城二邑十有五年春王正月邾子來朝以來㑹未成禮故復來朝鼷鼠食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸胡傳胡子豹乘楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也故胡子豹名季氏私考楚之滅胡與滅頓同家鉉翁氏曰召陵之㑹頓胡之君皆在曰以侵楚也是後楚有吳患不能報去年滅頓今年滅胡所以報召陵之怨蓋不能報之於中國而吞噬小國以快其宿憾也按楚子親帥師滅胡故書楚子非是有取於此舉而書爵以豫之乃君親將之恆稱若胡子豹名則以胡子亦有罪云爾夏五月辛亥郊壬申公薨于髙寢季氏私考路寢正寢也小寢燕寢也在路寢之後而髙寢又在小寢之後亦燕寢也以其下有臺基而制頗髙故謂之髙寢髙寢之後則為後宫矣後宫之中夫人之所居也謂之中宫左為東宫世子居之右為西宫妾媵居之諸侯寢內之制似當如此廬陵李氏曰定公在位十有五年當其初立受國於季孫意如而不能正其罪其異於桓宣者無幾矣故春秋於元年即不書正月以示正始之義而於意如之卒特書日以著定公尊奬亂臣之惡其辭嚴矣然當其初年陪臣執命國事分崩固無足言但陽虎既奔之後三桓亦微孔子為政綱紀粗立正可以有為之時然竟不能使夫子得遂行其道則魯何賴哉先儒李氏曰㑹于夾谷而致侵田之歸行乎季孫而有墮都之謀雖僅能明禮義之教雉門兩觀之作而僣禮莫之改寶玉大弓之竊而分器莫之保惛於女樂政歸彊家此定公有聖人而不能用也其言得之矣至其末年㑹牽洮城莒父城霄無非助亂勞民之舉魯之益弱宜哉鄭罕逹虎之孫帥師伐宋杜氏曰宋公子地奔鄭鄭人為之伐宋欲取地以處之齊侯衛侯次于蕖蒢宋地謀救宋也不果救故書次邾子來奔喪秋七月壬申姒氏卒妾辭也此哀公之母不稱夫人以其時哀尚未君又以哀之嫡母在也然則定有嫡夫人其娶與薨皆不見於經其娶在未即位之前薨在春秋絶筆之後歟八月庚辰朔日有食之九月滕子來㑹葬丁已葬我君定公雨不克葬戊午日下乃克葬按葬日虞所以寧親也敬嬴日中克葬葬後猶可虞若日下而葬則失虞之時矣故當為雨具而不為雨止可也若不為雨具而雨不克葬也則寧有待焉葬而虞可也日下而葬失虞之時不可也辛巳葬定姒冬城漆漆邾庶其以來奔邑城漆蓋疑漆二於邾也王氏經世昭公之世政在季氏待邾無道亟受其叛人與邑自定公為拔之盟邾好復修終其世無犯焉邾人德之故來㑹來朝又奔其喪禮雖過而情則真大之庇小末世所難定公行之而邾子奔喪滕侯㑹葬推此以往為善而人不悅附者未之有也定公既薨三桓復啓釁此年兩大喪之後亟城漆元年伐邾二年取其田七年俘其君卒致吳人來伐齊取歡闡利未得而害隨之謀國如此三桓之罪哀公之昏也魯欲不削得乎春秋事義全考卷十五
