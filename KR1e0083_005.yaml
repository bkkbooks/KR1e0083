body:
  text: 春秋事義全考卷五明姜寶撰僖公名申莊公子般及閔之庶兄也諡法小心畏忌曰僖元年春王正月按僖亦以國亂而立不行即位之禮故不書即位說見前齊師桓宋師桓曹師昭次于聶北救邢聶北地在邢南胡傳三國稱師見兵力之有餘也聶北書次譏救邢之不速也按救不當次况兵力有餘何難於郤狄以救邢而乃為聶北之次以致邢之遷潰蓋直書而自見者也臨川吳氏曰莊三十二年狄伐邢閔元年齊救邢蓋齊師進而狄退故不言戰狄師雖不逼邢然兩年之間以兵蹂踐邢衛之境二年冬破衛則狄勢愈張既入衛又移師于邢故桓率諸侯次聶北救邢邢不能支狄衆潰而出奔就諸侯之師諸侯遂以師逐狄人而退之夏六月邢遷于夷儀夷儀在邢臺縣西一百四十里其地有夷儀山自東遷西將依山以為固遷者邢之志而城者桓之功也三國既城之後邢自此無狄患矣按當時狄師為諸侯逐退時則邢衆已潰而遷夷儀矣攻伐之餘不復可以立國而又無力自城故桓公命三師為之板築使足以復存而自守邢欲遷非諸侯遷之也故不曰遷邢而曰邢遷又再叙三師見春秋以來悉力存亡惟此一舉蓋救而次則三師為貶救而城則三師終有賴矣此亦直書而自見者也齊師桓宋師桓曹師昭城邢胡傳書邢遷于夷儀見齊師次止緩不及事也然邢以自遷為文而再書齊師宋師曹師城邢者美桓公志義卒有救患之功也秋七月戊辰夫人姜氏薨于夷齊人以歸今莒州東北髙密縣有夷安城即此豈夫人知慶父在莒故往從之而莒人使之避於夷也歟按夷齊東鄙小國名而南近於莒言薨于夷蓋桓公召至自夷而縊殺之也齊人以歸者既殺之於夷而以其尸歸復命於齊也待魯請而後歸其喪故死在秋七月而喪歸在冬十有二月爾齊人以歸如胡傳以其喪歸于魯之說則齊魯鄰壤其在途何待一百七十日而始至乎故知胡氏之說非也楚人伐鄭此成王頵時事鄭即齊故也按荆乃州名楚其封國之號前此稱荆以州舉至此改而稱楚其自改也人則春秋人之爾孫氏曰以其兵衆地大漸通諸夏故自此十數年侵伐用兵皆稱人廬陵李氏曰荆自莊十九年文王卒子堵敖立堵敖幼弱數年之間兵患不起二十二年熊頵殺兄而立是為成王二十三年來聘漸有事於中國矣而母壯子少子元專權尚不能逞至三十年鬭班殺子元鬭穀於莵為令尹自毁其家以紓楚國之難於是楚勢復强張氏謂其始改號曰楚以交於中國疑亦得之八月公㑹齊侯宋公桓鄭伯曹伯邾人于柳今陳州西北有柳亭九月公敗邾師于偃偃邾地蓋魯至邾而敗其出禦之師也左氏虛丘戍歸之說未必然按西亭辨疑云楚人伐鄭凌駕中國之意日甚矣桓公合諸侯于柳以謀之未幾而盟江黃又未幾而舉次陘之師此舉蓋謀伐楚非謀救鄭也當是時楚兵已退鄭已在㑹何救之有哉按夫人孫邾而公敗邾師于偃將以雪先君之恥亦未為非苐當以邾受姜氏之罪請於㑹而討之不當既㑹而敗其師爾胡氏以為志同謀協後乃責公無安攘之誠似未然冬十月壬午公子友帥師敗莒師于酈獲莒拿酈地當在魯之東鄙僖公因是而賜友以費或者酈即費間之地歟至謂賜友以汶陽之田刖誤矣季氏私考慶父當桓伯方興之時常懼見討幸而得亡豈敢復至齊魯之境哉公羊所記齊人不納奚斯入請之言其亦不察於人情矣蓋慶父之死死于莒也莒人欲冒以為功故求魯賂魯弗與故來加兵莒在東夷肆行無忌如此此其所以敢容慶父也歟按莒納慶父魯君臣已愧憤不平矣又以求賂而興師友帥師敗之亦以雪先君之恥即殺莒君之弟拿不為太甚要亦直書而義自見者也以友主此戰而責之備意亦恐未然大夫生死皆曰獲獲者擒人於戰陳中之名十有二月丁巳夫人氏之喪至自齊不稱姜蓋齊絶之不許氏其姓爾按魯請于齊即死所而葬之可也請而葬之以小君之禮他日又將祔廟焉不可也胡氏以為不稱姓者殺于齊不去氏者受于魯然則殺之者是請而受之者非矣譏桓公之說恐亦非二年春王正月城楚丘按屬詞以城楚丘為以內詞書非也劉氏以為桓城而獨書魯者以彼之未足為功亦非也孫氏曰此㑹柳之諸侯城楚丘也說近之不謂之微謂之略如城邢之再書三師則不謂之略矣邢衛把三國之被患有淺深而皆不謂之滅其救而城之也即楚丘亦不得謂之封故王氏經世云專封之說起于公羊以今論之昔未有國今始有國者封也周公之封魯太公之封齊宣公封其母弟于鄭是也若三國其建國舊矣今為夷所侵陵雖都邑殘破而人心未散桓但因而修捍為之改營焉此乃救患之事安得謂之封乎蓋伯者欲自侈其說以為其恩比于再造故自謂之封而齊魯相因亦眩於其名實曰不與諸侯專封文不與而實與如此也按詩稱王命仲山甫城彼東方又曰告成于王故髙氏以為凡城必由天子及其成也又告于王乃可以此斷桓不請王命而自為衛城失之專為罪則無詞矣若城邢之為美則以邢實自遷而三師苐為之興板築焉可無專命之嫌如衛之野處渡河其事功之大有同於再造則不可不請命也夏五月辛巳葬我小君哀姜此莊公之正配僖公之適母也喪既至則不得不以小君之禮葬之然非也虞師晉師滅下陽虞公爵泰伯無子武王封仲雍之後為之後今解州平陸縣東北十里有故虞城即武王封仲雍曽孫周章之弟虞仲以為泰伯嗣之地也晉唐叔虞封國其地本在晉陽十一世孫曲沃武公併晉都絳又從新田復命為絳今平陽府降州之絳縣是也張氏曰下陽與上陽對在陜州平陸縣上陽在陜縣今陜州靈寶縣南有虢城虢所都也虞周太王子仲雍所封虢文王弟虢叔之後屬詞虢公者天子三公下陽其所封國邑也畿內之地天子所制以祿公卿大夫士謂之采邑言不得有其土地人民惟采取其租稅而已此不可與列國相爭奪者同文故變伐取言滅與夷狄執天子之使變執言伐同虞晉之罪大矣屬詞五年晉滅虢遂襲虞滅之經皆不書蓋畿內諸侯食天子之邑與列國不同故晉滅虞虢不書諱諸侯滅三公封國同叛王室也秋九月齊侯宋公江人黃人盟于貫江黃皆嬴姓國江顓帝𤣥孫伯益之後今光州息縣西南一十里有江亭黃陸終之後今光州定城廢縣西二十里有黃亭貫宋地梁國蒙縣西北有貫城蒙縣地在今歸德府北五十里張氏曰齊桓謀楚先服此二國二國皆迫近楚之境者所以逺交而孤楚之勢此桓公服楚之規模也唯宋與盟不煩諸侯也啖子謂春秋㑹盟皆據實書之無舉逺以包近之例胡氏所謂諸侯皆在獨言逺國者非也季氏私考江黃近楚之國為楚所逼者也故齊桓使宋招徠與之為㑹蓋二國在楚東北境可出兵以絶齊後者也齊得江黃則師無左顧之憂而楚失出奇之利矣此桓公逺交之計也宋自㑹鄄以來從齊獨固故齊以服江黃之事密託之而他國不與焉先儒以為諸侯皆在失之矣冬十月不雨匝一月皆不雨故書言不雨之久也楚人侵鄭張氏曰楚自莊三十年楚頵已長殺子元用子文為令尹兵勢浸强故比年侵伐鄭三年春王正月不雨夏四月不雨胡傳按詩稱僖公儉以足用寬以愛民務農重穀則誠賢君也其有志乎民審矣故冬不雨而書春不雨而書夏不雨而書以著其勤也徐人取舒舒郾姓臯陶之後楚東境小國地在今廬州府舒城縣舒羣舒之總名也文宣時有三種曰舒蓼曰舒庸曰舒鳩雖各有君長部落而要之皆此舒也故今總謂之舒按舒楚與也此舉蓋受命於齊為齊開伐楚之徑也春秋以其效順於中國故得稱人六月雨言匝一月雨亦未必日日皆雨謂此月雨多若一月皆雨然爾胡傳雨云者喜雨也閔雨與民同其憂喜雨與民同其樂此君國子民之道也髙氏曰建巳之月萬物始盛待雨而大古者以是月雩而祈雨則六月之雨其可喜可知秋齊侯宋公江人黃人㑹于陽穀家氏曰齊宋同盟已久猶未敢聲楚人之罪必江黃至而後定計出師去年盟江黃今年㑹江黃皆為伐楚計也諸侯之師當其前江黃之師擬其後楚將腹背受敵有不戰戰必勝矣季氏私考陽穀在齊之西非江黃便道也宋致二國逺至於此蓋就桓為謀亦欲密其迹爾專託宋與盟貫同以為大㑹末言者非前與江黃定其交今此乃申伐楚之約冬公子友如齊涖盟凡涖盟皆盟其君後此敖如莒婼如齊還如鄭同此齊桓為公不㑹陽穀來尋盟故友如齊盟焉趙氏以為聽伐楚之期是也楚人伐鄭汪氏曰楚師連年加鄭齊桓不救而孔叔猶有勤我之言蓋知于柳于貫于陽穀皆為謀伐楚謀伐楚皆亦所以謀救鄭故也四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘今許州偃城縣東四十五里有召陵城而陘在召城之南今其地有陘亭按齊桓謀楚恐不能勝未可明言伐楚而蔡為楚與罪當討齊距楚數千里道當由蔡而涉其境然恐蔡知而為備則楚亦得以知而為備也故假蔡姬被嫁之故以加兵於蔡而潛師以侵之使楚不知即蔡亦不能預知所謂兵之竒使楚不能為備蓋奇於伐楚也此桓得用兵之法也蔡既震潰於是遂伐楚是時楚聚而保險已無及欲出而求戰知弗敵矣然猶以楚衆方强若不持重而輕進深入則勝負未可知故又次于陘修文告之詞以待其自來屈服所以為節制之師合於不戰而屈人兵兵之善者也桓之善於制楚如此遂只繼事之辭罪用兵之專其例已見隱公中鄭人伐衛傳矣此處只見桓制楚之善若譏其專意直書而自見不當以遂字既為繼事之辭又以為專輒而罪之也王氏經世荆楚僭王罪之大者也包茅不入罪之小者也昭王之不復則非其罪矣管仲乃舍其大而問其小且及於事之久逺不明而非其罪者仗義執言固當如斯而已乎吁此其所以為霸者之師也齊桓之霸所謂以力服人而已內嬖如嫡同産不嫁內之失德多矣滅談滅遂遷陽降鄣外之失義多矣楚大國也僭王其大惡也我以大惡責之彼肯弭然受責者哉必斥吾之惡以對方八國之師雲集而為敵人指數其惡豈不為諸侯羞攻之弗克圍之弗下將何辭以退師乎故舍其所當責者而及其不必責者庶幾楚之為辭也易不盡力以抗我我之服楚也亦易不勞師而有功嗚呼此其所以為伯者之心也夏許男新臣卒王氏經世許男春在陘而夏卒師未退不言卒于師故先儒以為歸國而卒未見非正之意劉氏之說刻矣楚屈完來盟于師盟于召陵來盟是楚人原有來求盟之意桓退舍召陵乃始與之盟爾胡傳桓公帥八國之師侵蔡而蔡潰伐楚而楚人震恐兵力强矣責包茅之不貢則諾問昭王之不復則辭徼與同好則承以寡君之願語其戰勝攻克則對以用力之難然而桓公退師召陵以禮楚使卒與之盟而不遂也於此見齊師雖强桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事矣故春秋之盟於斯為盛而揚子稱之曰齊桓之時緼而春秋美召陵是也按楚屈完來盟于師盟于召陵通次陘以下一直看總見桓之善上句是桓善於致楚下句是桓善於待楚蓋桓為兵形厚集出其不意攻其無備而又按兵以修文告楚不得不來屈完之來非是君不使之亦謂可盟不可盟之權付之於完聽其臨時權事之宜爾其實來盟意完已預辦矣故曰來盟于師只見桓之善于致楚如此而嘉服義意似不重若退舍禮與之盟其善於待楚處直書盟于召陵自見也序績之說亦未確姑置之齊人執陳轅濤塗蓋執于師治其罪而即釋之故不稱以歸按師濵海而陷于沛澤之事惟公羊有之其實未然也左傳稱濤塗與申侯言如此因言於齊桓桓雖許而未行以申侯謂出東方必遇敵而止乃執濤塗執濤塗亦不專為此齊自為欲定陳從齊爾王氏經世說是經世云齊實未嘗濵海而歸安從有陷師沛澤之事秋及江黃伐陳八月公至蓋因歸師以伐之江黃皆汝旁國近陳齊自伐楚歸就率與伐陳則路由陳鄭明矣濤塗之言雖私其國然不聽則已何至勤師以討蓋陳蔡二國終以近楚常有二心今不欲齊師之反而由已有厭苦之之心齊人以為此叛齊即楚之漸故還師以威之堅其意耳觀再侵而陳乃成則陳初未肯服也陳不心服桓再興師得其成而後已蓋定陳之從齊非專以濤塗故也秋及江人黃人伐陳此舉蒙上文齊人而言以為魯及之非也王氏經世江黃雖從齊然不敢明出師以助伐楚故陘之師江黃不與順小國之情且使整旅保境以待事也至有討陳之舉而後用之然齊桓管仲之計失於是矣凡欲圖敵而深入其地非得其附近之與國則不足以便軍而恣所有事此齊之所以汲汲於撫江黃也然小國但可使為椅角之勢詗敵情導軍道耳使之侵伐結怨深讐而我救或不能及則反以快敵而負小國效順之初心矣八月公至自伐楚穀梁云後事小則以前事致何氏以為危之說皆非此舉原為伐楚伐陳乃乘便為之故以伐楚致吳氏謂重大其事且以師出三時見久役之勞此則是也葬許穆公按許穆公未嘗卒于師其以衮斂葬之加一等者要是同盟重其從伐楚也過以加等之禮褒之爾冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳公孫兹叔牙子即叔孫戴伯也張氏曰是時大兵之後復以師出重困諸侯况兵以憤興則後有當討者應之必怠人亦悔之故楚終不服鄭伯逃盟以至弦滅而不能救皆怒陳之過致之也按伐楚稱爵執濤塗伐陳侵陳皆稱人以桓始在戎行後不親在戎行也然其是非褒貶自可見何必另求意義乎至於侵陳書侵自為潜師掠境而然爾胡氏以為深責之之意在於稱侵上見者非也五年春晉侯殺其世子申生左氏傳曰晉獻公娶于賈無子蒸于齊姜生秦穆夫人及太子申生又娶二女於戎大戎狐生重耳小戎狐生夷吾驪戎女以驪姬生奚齊其娣生卓子驪姬譛于公而殺申生又譛二公子曰皆知之重耳奔狄夷吾奔梁胡傳內寵並后嬖子配適亂之本也驪姬寵奚齊卓子嬖亂本成矣是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂適庶之位縱人欲滅天理以敗其家國者知所戒也陳氏曰太子縊於新城則其斥殺何春秋之法苟有讒而不見則其君之罪也是故申生以驪姬之譖自殺直稱君殺而已矣把伯姬來朝其子伯姬歸寧成風因見其子於公時子年十歲按德公欲朝嗣君而懼不見禮故使伯姬以子代朝欲託其子於魯是年德公卒魯不弔伯姬所朝之子立是為成公終身不敢朝魯卒又降而稱子矣或云奉母命而來朝未必與母偕來也夏公孫兹如牟牟自來朝後屬於魯齊桓事從簡便不令小國與㑹而貢賦則助大國供事魯今以從齊征伐㑹盟之故使兹如牟取貢賦之助焉然亦見魯之征求及於小國為其政令之無常也左氏謂兹以私娶行恐非公及齊侯宋公桓陳侯衛侯鄭伯許男曹伯㑹王世子于首止杜氏以首止為衛地即今睢州之首鄉此去洛陽七百里恐世子不能逺出如此也季本氏謂必近周疆地姑闕之胡傳及以㑹尊之也以王世子而下㑹諸侯則陵以諸侯而上與王世子㑹則抗春秋抑强臣扶弱主撥亂世反之正特書及以㑹者若曰王世子在是諸侯咸往㑹焉示不可得而抗也此聖人尊君抑臣之㫖也張氏曰初惠王娶陳媯為后生太子鄭後母惠后生叔帶王愛叔帶欲立之齊桓公以其廢長立幼將啓亂階遂率諸侯㑹王世子於首止示天下戴之以為天下之二所以尊國本絶亂階也秋八月諸侯盟于首止胡傳無中事復舉諸侯㑹盟同地再言首止者書之重詞之復其中必有大美惡焉首止之盟美之大者也王將以愛易世子桓公有憂之控大國扶小國㑹于首止以定其位太子踐阼是為襄王一舉而君臣父子之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到于今受其賜微管仲吾其被髮左衽矣中國之為中國以有父子君臣之大倫也舍是則無以國矣故曰首止之盟美之大者也無中事當云㑹王世子秋八月盟于首止若有中事則當云㑹王世子於首止秋八月諸侯盟髙氏曰㑹者辨上下之禮修和好之道而王世子與焉猶之可也盟者以不相信故也若王世子亦與焉則是以所不信者加之王世子與約束諸侯無異故齊侯不敢盟世子而與諸侯自盟諸侯自盟欲相與同心翼戴乃所以定世子也鄭伯逃歸不盟胡傳首止之盟善也犯衆不盟是以為貶故特書鄭伯逃歸逃歸者匹夫之事以諸侯之尊下行匹夫之事雖悔於終病而乞盟如所喪何其書逃歸不盟貶之也髙氏曰當是時諸侯未有從楚人之心而惠王由嬖孽之私棄理義之正撫鄭從楚惎間中國自是楚復與中國爭衡夫齊之復楚所以營圖之非一日矣才踰年而惠王已導鄭伯以叛之故知中國不競非獨强楚與諸侯之罪王室實有以啓之也楚人滅弦弦子奔黃今光山縣故弦國地王氏經世左傳江黃道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡按召陵之盟楚非誠服也侵陳之役諸侯有叛心矣觀鄭伯以不朝於齊疑於見討而懼則其生心久矣故一聞撫女以從楚之言遂喜於王命而逃歸不盟自是竊與楚通矣楚窺此間遂滅弦以嘗齊江黃道柏者齊之睦而弦之姻也滅弦者圖四國之漸也齊將僕僕然亟救之乎彼處南海吾處北海彼滅之旦夕耳而吾救在千里之外豈所能及不救則盟楚之功墮矣齊桓之失在於積義不以平素而假其一二以為名故無以充其類而不在於滅弦不救之日也張洽氏曰黃弦同壤而受弦子之奔楚滅黃亦自此始矣九月戊申朔日有食之冬晉人執虞公屬詞虞公天子三公雖失地不名從史文也晉獻公襲執天子三公而滅其封國罪大於相執齊桓伯略不及西莫能正也汪氏曰或以虞公嘗為天子之三公故稱公執天子三公其罪重於滅國故不言滅虞特書晉執又貶而人之此說與屬詞同當從者也六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城鄭新密即今鈞州之密縣是也討鄭逃首止之盟也伐而不服故圍新城以待其服秋楚人圍許諸侯遂救許冬公至自伐鄭不以許救致師本為伐鄭而出也胡傳齊自召陵之後兵服四夷威動諸夏今合六國之師圍新造之邑宜若振槁然圍而不舉有遺力者矣及楚人攻許即解新城之圍移師救許是又得討罪分災救急之義也故特書曰楚人圍許諸侯遂救許凡書救者未有不善之也其曰遂救許善之尤者也善之尤則何以致久也蓋自其解新城之圍而不迫鄭之從則可以謂得討罪之義自其移伐鄭之師而救許之急則可謂得分災救急之義伐鄭義也救許亦義也王氏經世按左傳載蔡穆侯將許僖公見楚子面縳銜璧夫楚本圍許以救鄭諸侯救許鄭已解圍楚師亦退許有何懼乃隨蔡侯為滅國之禮乎若爾許已從楚齊何故不伐許乎八年許男即㑹盟于洮豈既嘗降楚而又即齊如是之速也左史楚人辭多右楚夫之誣明矣况面縳者圍急而出降之事也秋救許楚子已還至冬則圍解在數月之後乃無故而行此乎且引微子面縳尤妄也紂之末年微子行遁商書有明文矣謂之出迪謂之行遁則去于商未亡之前其踪跡必不可物色矣周師至而面縳銜璧亦非微子之事也七年春齊人伐鄭胡傳將卑師少稱人聲罪致討曰伐鄭伯背華即夷南與楚合而未離也故桓公復治之張氏曰鄭未服故復伐鄭齊力足以制之故不煩諸侯也夏小邾子來朝齊嘗輔宋爭郳今則進郳為小邾子而仍使附魯故來朝即前此之郳黎來也朝我以後凡伯主盟㑹征伐無役不同矣杜氏曰郳黎來始得王命而來朝邾之别封故曰小邾何氏曰齊桓公請天子進之也鄭殺其大夫申侯申本國名而邑於楚以國為氏者也侯者名也胡傳孔叔言於其君請下齊以救國鄭伯曰吾知其所由來矣姑少待我於是殺申侯以說于齊稱國以殺者罪纍上也不知自反內忌聽讒而擅殺其大夫信失刑矣如申侯者其見殺何也專利而不厭則足以殺其身而已矣王氏經世申侯申出也故楚臣自楚文王時奔鄭而久用事於鄭鄭伯之欲從楚蓋申侯有謀焉故於齊來伐而欲以申侯說于齊說之云者以逃盟從楚歸罪於申侯欲以自解於齊也申侯之貪利則楚文王已戒之矣秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧母今魚臺縣有母亭地近曹左氏以為謀鄭非也鄭方殺申侯以求通若果為鄭而謀鄭當即自請盟何復遲疑至於盟洮時乎季氏私考謂曹伯有危疾而桓為此盟為之謀定其後鄭伯懼干齊怒先使子華求通以為已謝過之地故子華來求與此盟而因奸命以請於齊未可知也季氏又謂子華實已與盟齊侯辭焉之說未必有竊恐許之盟而因有此請然後從而辭之亦未可知也廬陵李氏曰此㑹以齊侯辭鄭世子之事觀之則與首止相類蓋首止正天下之人倫而此正一國之人倫也以諸侯官受方物之傳觀之則與邢丘相類蓋此明王室之貢而邢丘亦改命朝聘之數也正義曰周禮大行人云侯服貢祀物甸服貢嬪物男服貢器物采服貢服物衛服貢財物要服貢貨物王室盛明之時每國貢有常賦天子衰諸侯惰慢故伯主總帥諸侯量其國之大小號令所出之物以貢於天子也曹伯班卒曹昭公班僖公赤之子也卒在莊三十二年而班代立今班卒子襄嗣是為共公公子友如齊聘伯主也汪氏曰甫盟寧母而又使友修聘所以勤伯國之好也冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟鄄城即今濮州南界於曹則洮當在曹州之北境古曹地也是時惠王疾惠后主叔帶故王人使齊求援而齊㑹諸侯以謀之胡傳王人下士也以王命行雖下士之微序乎方伯公侯之上不以其賤故輕之也然則班列之髙下不在乎內外特繫乎王命爾聖人之情見矣尊君之義明矣乞者卑遜自屈之辭欲與是盟而未知其得與否也始而逃歸今則乞盟於以見舉動人君之大節不可不慎也吳氏曰王人本不當與盟蓋以所謀者王室之事王人特為此而來故亦與盟至冬王崩而襄王得安其位者齊桓之力也王臣書㑹諸侯盟者一于洮與盟不書一踐土同盟者三柯陵雞澤平丘與㑹不書一黃池屬詞周禮巡狩則有方嶽之盟不巡狩則有殷同之盟王官臨之而已王官猶不盟况卿士乎夫盟以結信非所以施於尊者是以葵丘之盟齊桓盛時也宰周公不與臯鼬之盟晉弗伯久矣劉子不與其次則黃父之盟王叔桓公臨之以謀不協猶為近之經書王人與諸侯盟自洮始天子將崩世子近懼子帶之難逺懲子頽之禍王臣出盟諸侯事非得已不必諱也晉文一戰而伯作王宮致天子天子命為侯伯猶不能自信於諸侯而親屈王臣於踐土襄王策命晉侯專征猶不能委任方伯而復使大臣盟諸侯于王所是以天子與斯盟也故經沒王子虎不書使若諸侯自相與盟者為王與晉侯諱之也傳言王子虎實盟諸侯故於翟泉釋曰尋踐土之盟也使踐土之盟而王子不與則翟泉尋盟王子何與焉柯陵晉久不競而厲公有鄢陵之績雞澤悼公初興而未集平丘晉不復伯其請王臣出㑹猶曰假公義以建盟主而立中國庶幾天下知有王室而已雖皆與盟不足諱矣至於黃池魯君㑹晉侯及吳夫差而單平公與焉則未知何以為禮何以為辭乎故經沒單子不書為周室諱也蓋春秋於是終焉夏狄伐晉報采桑之役也吳氏曰齊桓嘗存邢衛而未能挫狄師故狄無所忌而伐晉春秋傷齊伯之不能攘狄也秋七月禘于太廟用致夫人屬詞哀姜通於慶父與弒閔公齊人取而殺之不可祔於宗廟也既越八年僖公用禘而致之既僣王禮為常祀又用以致不當祔之夫人其罪非一端矣所謂直書而自見者也胡傳恐非冬十有二月丁未天王崩惠王崩子鄭嗣是為襄王按左氏祕不發喪之說非也叔帶乃襄王親弟豈容以此相欺耶又以為難故是以告緩亦非吳氏謂惠王前年冬有疾而今年歲終乃崩者是也九年春王正月丁丑宋公御說卒宋桓公賢君也而齊桓始伯能與之同心以致諸侯僖與同盟接壤然不㑹其葬以宋襄方出㑹諸侯故葬禮簡而諸國皆不及往㑹爾其不葬魯不㑹也趙汸氏曰蓋迫於葵丘之㑹不及以禮致諸侯之送葬也夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘文王都豐分𡵨周故地為周公旦召公奭之采邑即今鳳翔府𡵨山縣至平王以西都與秦故二公别於東都受采仍有周召之名而已非西周矣今絳州垣曲縣有召亭蓋召公邑亦東周畿內地而周地無聞焉豈亦近於成周者耶周為采邑起於周公旦其元子伯禽既封於魯采邑當以其次子世守則春秋中凡言周公者皆公旦之裔矣葵黃在今臨菑縣西二十里杜氏以為陳留外縣非也尋洮之盟且修好禮也汪氏曰宰孔出㑹諸侯陳五禁使諸侯既知尊王室而且知畏王法則有功於周室者也故諸侯雖與之㑹而不敢與之盟然惠王之喪適當同軌畢至之際襄王方居諒隂百官總已以聽於冡宰之時桓公不率諸侯㑹于京師反致宰孔于葵丘而春秋無譏焉豈桓能弭王室之大難而功可掩過歟抑㑹葬既畢而修禮于葵丘以明王禁歟按諸侯不敢與宰孔盟自是齊桓不敢以約束諸侯之事施及於尊者而葵丘之來當由襄王以桓嘗定已大位故遣孔來修好禮於桓而錫命桓為牧伯得專征伐桓因孔在遂相與申明五禁以尊奉王法事亦當出於桓非孔能陳禁以喻衆也㑹葬既畢而㑹以明禁之說經無明文不可從宰周公不殊㑹自是記事之體當然爾謂與王世子殊㑹相形發議論春秋本㫖恐亦未必然也僖元年㑹柳五年㑹首止盟首止盟寧母盟洮㑹葵丘㑹醎屬詞僖公與齊桓大盟㑹者六皆不書至㑹于柳謀救鄭而弗果鄭比歲受兵亦以見桓之重伐楚也召陵屈完來盟而中國之勢安首止殊㑹世子而天下之本定辭子華寧母而鄭伯請服王人盟洮而襄王以寧桓可謂有大功於當世矣故其盟不日其㑹不致所以别於後之主夏盟者穀梁曰桓之盟不日葵丘何以日美之也胡氏亦曰葵丘之盟美之大者也蓋桓之𢎞規逺略至此甫定又與前日之求諸侯服叛國而為㑹謀王室而為盟者不同故特書日以别之㑹于醎致戍於周而謀把也秋七月乙酉伯姬卒屬詞魯女未嫁書卒者為其已許嫁諸侯故服其本服書其卒不書葬者在室葬不以夫人禮也九月戊辰諸侯盟于葵丘言諸侯盟宰不與可知胡傳㑹盟同地再言葵丘何也書之重辭之復其中必有大美惡焉葵丘之盟美之大者也初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好以是為盡禁矣諸侯咸喻乎桓公之志蓋束牲載書而不㰱血也是故㑹盟同地而再言葵丘美之也觀孟子所載此盟初命之辭則知桓公翼載襄王之事信矣甲子晉侯佹諸卒公卒而國亂不得以禮㑹葬可知也故不書葬冬晉里克殺其君之子奚齊穀梁子曰其君之子云者國人不子也西亭辨疑云晉侯方卒奚齊未立里克殺之故曰殺其君之子奚齊不得與踰年君同稱也十年春王正月公如齊屬詞七年公子友如齊是年公如齊十三年公子友如齊十五年公如齊合傳三歲而聘五歲而朝之法蓋齊桓霸業既成之後㑹于寧母始定其制以為諸侯朝伯主之禮與尚書周官六年五服一朝相類不自知其僣也僖十七年桓公卒故僅再朝而已其不致朝桓安之與他國異也狄滅溫溫子奔衛溫子爵國已姓顓帝裔孫封於蘇鄴西蘇城是也今在彰德府臨漳縣西二十里其地南近衛而東界於狄狄利其近已故滅之左氏謂蘇忿生以溫為司寇則指㑹溫之溫矣非也何以書吳澄氏曰狄於閔之季年伐邢入衛齊桓雖存邢衛而不加兵於狄蓋其時方急圖楚故未暇及狄狄因此愈肆前年伐晉今又滅溫亦伯圖之有闕也晉里克弒其君卓按西亭辨疑云奚齊乃驪姬出卓子姬之娣出卓又少於奚齊國人乃君之何耶蓋卓立踰年上下之分已明故書君書弒胡傳以為里克君之者似非蓋奚齊亦克君之者故也由是見聖人一無容心當書君之子則書君之子當書君書弒則書君書弒克之罪固著於弒君至於殺君之子亦豈得為無罪乎以前為國人不之君後乃成其君臣之名者亦非也及其大夫荀息胡傳荀息者奚齊卓子之傅也君弒而死於難書及所以著其節書大夫不失其官也按息之傅奚齊卓子也時則申生死矣重耳奔蒲夷吾奔屈矣君命為之傅已於君之將終有約言焉是安得不繼以死謂其從君於昏庸足取者非也栁子厚謂進息以甚苟免之惡者亦非也聖人之權衡素定豈有其人本不足取而姑取之以愧他人者乎息不但不食其言其節亦本自可取故春秋與孔父仇牧並取之朱子謂息死君之難以其始終一節為可取者真知春秋之㫖者也夏齊侯許男伐北戎此自是北戎一種謂為山戎北狄者皆非也薛氏曰當是時患有大於北戎者晉之滅虢滅虞狄之入衛逼邢伐晉滅溫楚之滅弦圍許也桓舍强圖弱不務德而勤逺略况許方患楚而驅以伐戎非用人之道也晉殺其大夫里克張氏曰里克在獻公父子則為賊惠公幸奚齊卓子之死而得立初未嘗有討克之心獨以其志在重耳而不在已懼其又將以已為奚齊卓子是以殺之蓋其事與專殺大夫者無異故稱國以殺而不去其官不以討賊之辭書之也秋七月冬大雨雪冬不言月即酉戌亥三月皆周之冬也據夏正酉戌亥三月皆非大雨雪之時也故以為尤異而書十有一年春晉殺其大夫㔻鄭父胡傳按左氏㔻鄭言於秦伯請出晉君則鄭有罪矣曷為稱國以殺而不去其官惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也按鄭之謀召重耳雖懷二心然以私意殺里克致之則非矣胡傳罪用事大夫不能格君心之非此語殊無當其稱國蓋若國亂無政而殺之之詞爾前殺里克稱國同夏公及夫人姜氏㑹齊侯于陽穀此㑹陽穀後㑹卞皆稱姜氏說者以為聲姜而魯頌稱曰令妻僖公娶于齊明矣然不經見意者僖公長而後立其娶當在未即位之前亦未可知也薛氏曰夫人齊侯之女也歸寧可也為㑹而從夫于外非歸寧之禮也季氏私考以聲姜為齊公族之女非桓公女也以近族故亦得為㑹按聲姜令妻非文姜比也然兩君相見而婦人與焉亦豈有安攘之實者哉此其所以為荒且怠而直書以見其失也齊桓葵丘以前再盟幽而諸侯協獻捷追戎存邢衛却狄盟召陵帖楚而中國安盟首止于洮而王室寧葵丘以後陽穀之㑹與僖公聲姜肆于寵樂城把之功不若城邢救徐之師緩於救許伐黃不恤謀鄫無成由其心有勤怠之殊是以其功有盛衰之漸如此秋八月大雩冬楚人伐黃季氏私考滅未有書伐者兵一至而即滅也今年冬伐黃而明年夏始滅之蓋伐兵既退又往滅也其非一時事明矣黃人不歸楚貢故楚伐之然未嘗遣大將用大師姑以試齊爾當滅弦時先已芟夷黃黨矣而桓無戍黃之圖至是伐又不救則楚何有於齊哉黃亦失所恃矣書伐於前而書滅於後所以罪桓公之負黃也按胡傳稱此時管仲已死故楚伐黃而桓不能救蓋當盟貫之時仲固嘗慮及久逺以伐而當救為言知黃後來必受楚禍也桓不聽而與之盟則徒欲濟已之成而不顧遺彼之患當其時已自有忍心矣此君子所以惜仲之死而憫黃之不幸也左氏據平戎於王之說謂仲尚未死者非十有二年春王三月庚午日有食之夏楚人滅黃黃效死以守而待中國之救救不至故卒見滅胡傳國滅死於其位是得正而斃焉者矣於禮為合於時為不幸若江黃二國是也其書滅者見小國之弱見荆楚之强責方伯連帥之不修其職使小國賢君困於强暴不得其所公羊子所謂亡國之善詞上下之同力者也季氏私考是時管仲死矣齊桓之不能慎終自失仲始穀梁以為仲死而楚滅黃是也左氏於此序齊使仲平戎於王事不惟仲之不死無所據而平戎之說其妄誕亦甚矣果有此則王子帶召戎伐京師事莫有大於此者而春秋可以不書乎秋七月冬十有二月丁丑陳侯杵臼卒宣公卒子穆公欵立十有三年春狄侵衛胡傳齊桓公為陽穀之㑹是肆于寵樂其行荒矣楚人伐黃而救兵不起是忽于簡書其業怠矣然後狄人窺伺中國今年侵衛明年侵鄭近在王都之側淮夷亦來病把而不忌也伯益戒于舜曰無怠無荒四夷來王此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書于策其義則游聖門者默識於言意之表矣故曰仲尼之徒無道桓文之事者張氏曰楚既滅黃而莫之恤狄侵衛之師所以肆行也自勝楚之後春秋所以責桓公者皆此意也晉文之事據後此狄侵齊小注吳氏曰㑹溫以圍許而許竟不服盟翟泉謀伐鄭而鄭亦不畏至三十年之夏狄敢於乘間而侵齊故晉文自城濮踐土而下伯業浸衰矣猶不圖攘狄而乃圍鄭可以見伯謀之不逺也夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹季氏私考鹹衛地而東界於齊即叔孫得臣所嘗敗狄之地在今開州東南六十里杜氏以為東郡濮陽東南有鹹城是已季氏又以左氏謂為淮夷病杞之故為不考而證以把都雍丘即今開封府把縣淮夷在今淮安府東境淮水之南北距把踰千里苟欲病之必東越郯宋西越徐陳諸國之境然後能至於勢為難而謂當時淮夷未嘗為中國患其病杞事無證據說亦似有理然左氏則既詳載其事諸家傳注盡從之而存三亡國之說開載左傳甚明當時三國雖未必亡以存亡國雖為張大之詞然三國者則既明指邢衛把為言矣獨奈何創為此說見前有狄侵衛事而鹹為得臣所嘗敗狄處遂以為謀備狄乎况自淮至杞亦未必果踰千里而淮夷病把事未可謂為必無㑹鹹謀把亦未可謂為必不然今且從舊說而季說姑識之以備再考可也秋九月大雩冬公子友如齊鹹之㑹謀城緣陵也必已預戒事期矣友如齊其亦為此而受命於齊也歟十有四年春諸侯城緣陵季氏私考諸侯者㑹鹹之諸侯也一事而再見則以凡舉爾又以齊衛接壤而狄當其北三國所交界處是為沙鹿而緣陵蓋沙鹿間華夷雜處之地其為此城殆即蒙恬於河南地霍去病於令居西各築城而徙人充實之計歟緣陵於齊衛最切而亦宋魯諸國通狄之要道也故諸侯同役而自此狄兵不敢犯衛者十八年又以杜氏謂緣陵為把邑而據前漢志北海營陵注謂齊所封營丘為營陵即春秋之緣陵以為把都雍丘距營丘千二百里而乃使把逺遷於此既非所以便把而齊亦決不肯輕棄先祖故都以為把所遷地說則然矣然以緣陵為沙鹿間華夷雜處地要之亦是臆說而河南地令居西恬去病所築乃漢虜界築之以扼虜衝其地當為我所有而緣陵築以備狄境不聞屬之於誰要之亦臆說爾季氏據漢志營丘即營陵營陵即緣陵之說以為然恐未必然緣陵畢究是把邑地考姑闕之不若且從舊說謂為城以遷把而於季說姑識之亦以備再考可也又按當時淮夷雖病把把未甚危也有何奏報之難機㑹之失不請命於王遽為之城緣陵而遷之乎杞未遷與邢以自遷為文者不同春秋所以罪諸侯之專者此也王子帶召戎伐京師事前既辨左氏之妄誕矣此言謀王室之難亦未必其果然也夏六月季姬及鄫子遇于防使鄫子來朝屬詞主左氏之說以鄫子雖娶於魯而不敢來朝者微陋不能成禮也僖公因季姬來寧責以鄫子不朝止季姬而絶之故季姬遇鄫子使之來朝明年季姬再歸于鄫又明年卒鄫君再世戕於邾人蓋小國之最微者魯後雖嘗屬鄫而卒為莒滅魯亦不能存之也魯之力不足以存姻鄰小國而唯責其不朝來朝又責其不敬觀䇿書實録僖之不仁可見矣秋八月辛卯沙鹿崩沙鹿山名陽平元城縣東有沙鹿土山陽平今大名府大名去晉地逺僖公時晉猶未至東方因左氏附著晉卜偃之言而後儒遂以為晉地爾其崩公羊以為河上之邑陷入于地中非也穀梁以林屬於山為鹿以林麓得名故不言山諸家遂以山連足而崩亦非也季氏私考以沙鹿西為衛地東為齊地其北則狄地也當三界之間故不可繫之國沙鹿之崩變之大者也然則其有關於夷夏之故歟狄侵鄭張氏曰狄數犯畿內之諸侯而齊桓不能治自入衛伐邢滅溫而至此伯圖弱而王室卑諸侯受禍著桓公之怠也冬蔡侯肸卒子甲午嗣是為莊公穆公父獻舞見獲於莘莊十九年留卒於楚而立十有五年春王正月公如齊季氏私考此齊桓明禁報成之期也張洽氏以為公十年朝齊此又朝齊純用五年一朝之制同於事天子之禮則過矣楚人伐徐吳氏曰徐夷也首僣王楚亦夷也次僣王徐楚同惡者也因齊桓合諸侯徐亦革面而即諸夏以即諸夏而為楚所伐可悲也三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡遂次于匡牡丘城在東昌府東北七十里匡杜氏曰在陳留長垣縣按長垣今屬大名府而匡則割入開封府之睢州矣胡傳楚都于郢距徐亦逺而舉兵伐徐暴橫憑陵之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見霸主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而禦夷狄安中國之志怠矣按徐近於齊楚伐徐所以震齊之鄰其為謀深矣楚若得志於徐則必乘勝造齊之南境矣然則齊救徐非專為存徐亦自為也乃盟于牡丘既見其救患之不協心又次止于匡遷延不進又見其救患之不協力至於大夫帥師而諸侯不親行又見其救患之師聊且應之而不兾其成功以此較之伐楚次陘事事相背蓋前之勤後之怠觀經所書了然自可見也公孫敖帥師及諸侯之大夫救徐夏五月日有食之秋七月齊師曹師伐厲厲神農之後楚與國也今德安府州北一百八十里有厲鄉以救徐也獨遣曹師以諸侯志怠不欲重煩而曹共公之位齊所定也故獨勞之爾後此有婁林之敗則此亦何足以解徐之困耶八月螽九月公至自㑹髙氏曰公自正月如齊因而㑹盟暴師于外已踰三時而以㑹致見救徐之無功也季姬歸于鄫季姬見止於魯為鄫子不朝之故爾鄫子既來朝歸而以季姬請故復以季姬歸鄫明前此非遂絶鄫而離婚也己卯晦震夷伯之廟夷諡伯字猶云共仲僖叔成季云爾此大夫已沒之恆稱先儒以夷伯為公子展展時尚未賜氏宜以字行何以不曰夷展乎此蓋魯大夫而不可知其為誰矣夷伯蓋大夫之始祖當有特廟者也左氏謂展氏有隱慝焉恐亦未必然胡傳震者雷電擊夷伯之廟也不曰夷伯之廟震而曰震夷伯之廟者天應之也天人相感之際微矣冬宋人伐曹李亷曰宋曹之爭始此夫伐宋非一曹而獨仇曹之深者曹在宋之宇下非他國比也十九年圍曹宣三年圍曹至曹陽之衰宋景用師尤亟哀三年有樂髠之伐六年有向巢之伐七年書人以圍八年書公以入而曹亡於宋矣鄭子産曰曹畏宋豈非壤地相接必欲吞噬而後已乎張氏曰莊十四年曹從齊桓伐宋宋至今憾之今諸侯始二曹方伐厲救徐而襄公乘虛伐之尚可繼桓圖伯乎於此見桓德之衰而襄志之私也楚人敗徐于婁林今泗州有婁亭是救徐之威不立伐厲之謀無補也屬詞徐本建國而列之于狄者其先僣叛同荆吳齊桓之伯徐即諸夏故楚人伐之陳氏曰桓公合七國之衆以救徐而徐卒敗於楚以是為盟主病矣蓋桓伯有盛衰中國之勢又將一變也故書之十有一月壬戌晉侯及秦伯戰于韓獲晉侯韓原在今同州韓城縣西南八里韓晉地古韓侯國為晉所併後為桓叔子萬所食邑秦嬴姓伯爵國顓帝之後周孝王封伯翳十九世孫非子於西戎地為秦在今鞏昌府秦州三傳而為秦仲又十傳而為穆公穆公之元年即僖公之元年也至此十五年而秦伯始見於經然則秦始封但得隴西近戎地其後浸强則盡有岐豐蓋乘周弱而請乞併兼之爾史記謂周平王以秦救犬戎難送王東遷有功賜之岐西之地則信其自文之言過矣胡傳秦伯伐晉而經不書伐專罪晉也獲晉侯以歸而經不書歸以穆公悔即釋之雖獲而未嘗以之至其國免秦伯也王氏經世晉惠公以賂求入背秦三施秦伯以責報而興戎皆失也以君子聽其輕重則晉之失許食言在先而其應於人也又甚夫名位公器而欲因亂取土地世守而許以賂人本既不正矣出因其資入用其寵饑食其粟而一旦倍之非惟秦之觖望雖晉人固不直惠公矣然則召秦師者惠公也兩國非有父兄之怨疆場之爭也彼涉吾境我固不得不應然獨不可先之以一介之使以禮義再三辨喻安知秦伯之不悔而還乎而惠公輒使請戰曰寡人不佞能合其衆而不能離也躁而用罔如此烏得不敗而見獲乎十有六年春王正月戊申朔隕石于宋五今歸德府城北有漆溝水涸時五石存焉即此一名隕石河是月六鷁退飛過宋都風也胡傳隕石自空凝結而隕也星墜於天至地而成石也退飛有氣逆驅而飛也石隕鷁飛而得其數與名在春秋時凡有國者察於物象之變亦審矣此宋異也何以書於魯史亦見當時諸國有非所當告而告者矣何以不削乎宋襄公以亡國之餘欲圖伯業五石隕六鷁退飛不自省其德也後五年有盂之執又明年有泓之敗天之示人顯矣聖人所書之義明矣可不察哉鷁水鳥髙飛遇迅風而退季氏私考鷁陽禽也雌雄相視乘風而孕者也三月壬申公子季友卒胡傳季者其字也友者其名也大夫卒而書名則曷為稱字聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之為世卿也季子忠賢在僖公有翼戴之勤襄仲弒逆在宣公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經於其卒各以氏書者志變法亂紀之端貽權臣竊命之禍其垂戒逺矣屬詞友莊公母弟季孫行父友之孫諡文子季孫宿行父之子諡武子意如宿之子諡平子季孫斯意如之子諡桓子是為季孫氏夏四月丙申鄫季姬卒季姬為鄫子不朝見止而復歸鄫歸而卒其實事也非奪其葬殆魯不往㑹爾秋七月甲子公孫兹卒其後是為叔孫氏冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮淮臨淮郡地即今泗州盱眙縣淮水所經之處也謀鄫也役人夜呼曰齊有亂不果城而還季氏私考邢侯未嘗與齊桓㑹盟而㑹淮獨忽與焉何也邢自請從於㑹爾蓋邢舊屬於衛附以共賦而自城緣陵以後供億重煩不堪而欲自當一國之賦請從㑹於齊而齊從之於是衛文公以齊為抑已而又明年伐齊之憾基於此矣然則邢之見滅於衛其無乃亦由此歟邢侯爵而序鄭許下因其賦之多寡以為差也十有七年春齊人徐人伐英氏英氏郾姓楚之與國後改為蓼在夀州霍丘縣其西南界六安州即古六國皆臯陶之後也桓為徐伐英氏其興師末矣夏滅項即今陳州之項城公穀皆以為齊滅之西亭辨疑云英項皆楚與國齊桓伐英滅項以報婁林之役承上文故不再舉齊也與四年及江黃伐陳同先儒以項為魯滅僖公在㑹季孫所為者非也季孫行父當祖友卒而父無佚早亡時尚稚年焉得擅為此事乎蓋泥於書滅而不為諱遂云然而不知項由齊滅則固無庸為魯諱也秋夫人姜氏㑹齊侯于卞卞魯邑義與㑹陽穀同按吳澄氏以為齊桓止公而姜氏要桓為㑹非也項由齊滅桓何由止公乎姜氏之兩與桓㑹殆以齊國舊嘗有此相沿襲而不知其非爾聲姜以令妻頌於魯而不免有此也習俗之移人可慨夫九月公至自㑹以去國日久而歸飲至焉非也僖十五年盟牡丘次匡救徐公至自㑹十六年㑹淮公至自㑹屬詞以公與齊桓大盟㑹書至者一范寧曰齊桓德衰故危而致之是時楚伐徐桓公盟諸侯于牡丘不親救患而使諸侯之大夫專兵其志已怠明年㑹于淮謀鄫役人夜呼不果城而還其政益荒故皆書至冬十有二月乙亥齊侯小白卒桓公卒子孝公眧立王氏經世東萊呂氏曰管仲始進說於桓公盤游縱佚之屬皆曰不害伯其深戒痛絶以為害伯者獨參用小人而已仲得政之始首與君約舉一國之樂皆歸君舉一國之權皆歸已其所以得有為者固以此抑不知名曰佚樂未有不資小人者名曰小人未有不貪權勢者已許其縱佚樂而禁其近小人已容其近小人而禁其勿侵權勢必不之能也仲急於功利亟欲得齊之柄不暇長慮而為是約至寺人貂漏師多魚恃寵干政正犯仲之約而不能誅則固已隂悔初約之謬矣逮仲將死始言竪刁開方易牙之姦欲併逐之平時則不敢排擊以為保身之計將死則盡言不諱以取知人之名卒使桓公不能自定其子區區與仲屬所欲立於宋襄公者乃內嬖鄭姬之子於次未當立者也致五公子交爭國統殆絶其亦可哀也夫其亦可鍳也夫廬陵李氏曰桓公自莊九年入國十三年始伯迄僖十七年凡三十九年吳郡李氏曰王道流行侯伯受職古未始有伯也以古之未始有伯而齊桓實造端則桓為首罪矣而春秋或豫桓何哉蓋黜其義而録其功也功義不相掩而後伯者之是非斷矣大抵春秋之勢盛衰凡三變桓公之未興與桓公之方伯及桓公之既沒世變各異也王臣下聘而不報王師出伐而無功凡伯書伐戎强于北蔡師書敗荆盛于南鄭分許鄙宋廢鄭嗣紀小而併於齊郕弱而逼於魯此桓公之未興也王禁明而王臣不下聘者六十年盟㑹同而諸侯無私爭者三十載序績召陵而荆帖矣陳旅聶北而狄退矣獻捷過魯而戎弭矣此桓公之主伯也天王出居而官守不問衛滅懿親而義師無討楚書子而主㑹矣狄書人而參盟矣此桓公之既沒也然桓公一人之身盛衰又凡三變圖伯之初定伯之日及成伯之後得失頗殊也伐郳侵宋侯度未一入蔡侵鄭戎疾未殄滅遂降鄣履事未久設施多舛遇穀盟扈閲理未熟檢防易肆蓋桓公圖伯之初也貫澤而下葵丘以前衣裳不㰱血兵車無大戰仲尼稱其一匡孟子與其為盛在是數年桓公定伯之日也九國叛而萌震矜管仲死而放繩墨城杞貶於城邢救徐怠於救許伐黃則外憂起㑹卞則家法虧蓋桓公成伯之後也驗春秋大勢之三變則桓公主伯為有功即桓公一身之三變則桓公立功為不逺功過乘除齊伯之顛末可考矣春秋事義全考卷五
