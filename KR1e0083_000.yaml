body:
  text: 春秋事義全考春秋類提要臣等謹案春秋事義全考十六卷明姜寶撰寶字廷善號鳯阿丹陽人嘉靖癸丑進士官至南京禮部尚書明史藝文志朱彞尊經義考俱載有是書二十卷而此本少四卷然檢其篇帙未見所缺佚不知目次何以不合或傳寫有誤也其書大旨以胡傳為本而間出已意以附益之襄公昭公以下胡傳多缺亦胥為補葺中間地名以今證古雖間有考訂皆無以甚異於諸家惟向來說春秋者以筆削褒貶為例故如王不稱天公不書即位之類皆謂孔子有意貶絶是褒譏之法且將上施於君父揆諸聖人明倫垂教之本意當必不然寶獨謂孔子於周王魯侯事有非者直著其非後人說經用惡字罪字譏貶字皆非聖人之意其言明白正大為啖趙以來所未及可謂闡筆削之微旨立名教之大防一善足稱毋庸槩棄故特著之於録以備參考據藝文志寶尚有春秋讀傳解略十二卷今則未見云乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋事義全考序我國家列春秋於學官主胡文定公安國所著傳俾士子肄業焉以應制舉豫寶少由業詩改業是經也且讀且心疑蓋謂孔門以來說是經者惟孟氏能得其宗㫖其言曰王者之迹熄而詩亡詩亡然後春秋作既推本春秋之所由作又述孔子所嘗自言有曰其事則齊桓晉文其文則史其義則丘竊取之矣夫聖人因史為文文在也而事與義往往多失之當時桓文以有功王室稱霸主故事屬二公將以二公該他公非謂二公之事即可盡春秋之事也事貴詳貴核詳且核又貴連絡而通貫左氏詳矣中有浮誇失實前後不相蒙者是固有待於後之人因事以考其全義而謂之竊取蓋其寓褒貶於筆削不惟游夏所不能贊即聖人亦不敢抗然自任矣義在褒善貶惡而經世之法如所謂尊君父討亂賊敦典庸禮內安外攘云者亦即於朝聘往來㑹盟侵伐郊望禘雩之類見之蓋多直書而義自見即有筆削其褒貶亦多於直書中槩見焉初未嘗因一字以求一義豫人以爵奪人以爵甚至周大君魯父母國亦例以豫之奪之如胡氏所云是又有待於後之人因文以求事因文與事以求義要之至當求其精藴之所在而兼亦有以考其全也豫寶隆慶初罷官還山時手是經因所疑求之心求之諸家之傳注以我之心求合乎聖人之心以我所自為說恭互諸家之說又以求合乎聖人之說如射覆家探物而祈中中肯窽者手録之而仍以胡氏傳為主事詳且核矣求其連絡而通貫義昔未妥今求妥傳昔闕今求不闕地里昔主指掌圖謂時代有沿革而不便稽考也今悉凖皇明輿地圖考一開卷而方輿所屬亦了然在目矣近代說春秋數家如新安趙氏汸之屬詞㑹稽季氏本之私考周藩宗正西亭公睦㮮之辨疑與金壇王氏樵之經世似能窺見聖人之心不悖謬於其說足以發胡氏及諸儒之所未明與補其所未備而王氏為豫寶姻友地相近志相同又同時去國而家居時時往來印證尤足以相發而相取也以此參訂久若有合焉乃始繕寫成帙携入留曹侍御同郡李君一陽見而謂可以傳遂鋟之梓豫惟春秋為聖人傳心之要典又百王不易之大法皆在此書而胡氏傳乃本朝所主以課士豫寶何所知敢有可否其間哉寶聞程子云春秋大義數十炳如曰星一句一事是非便見於此朱子云春秋是是非非善善惡惡誅亂臣討賊子內中國而外四夷貴王賤伯其大㫖如此未必字字有義也故豫又謂孟氏以來惟程朱二大儒能得聖人之宗㫖至於學是經而說之之法亦惟二大儒能得之程子云以傳考經之事迹以經别傳之真僞朱子云左氏史學也記事者取焉公榖經學也窮理者取焉豫寶嘗據是以求之諸家久而遂成此編也謬以為學是經者不當於一句一字求聖人之褒貶苐觀其所書之實以求是非善惡之至當考之詩所由亡由成周政治之衰而為春秋之所由作考之左之所以史考之公穀之所以經又考之經於以别傳之真僞於以求聖人所謂知我罪我者在因筆削以寓褒貶嫌於天子之賞善而罰惡為聖人所不敢當故自於其義為竊取而非如胡氏所謂託二百四十二年南面之權聖人自以其褒貶敢於代天子賞善而罰惡也如是以求庶可以得聖人之心於是是非非善善惡惡之中即是是非非善善惡惡以求聖心之所以傳王法之所以不易義其或在兹乎義其或在兹乎胡氏自成襄而後多無傳今悉纂著之庶幾未明者明未備者備因名之曰事義全考云夫謂之全考似矣若謂全考之可以傳如侍御君所云則非豫寶所能知所敢必也萬厯乙酉冬十有二月丹陽姜寶自序春秋事義全考序豫讀姜先生所著春秋考嘆其能立言不朽云先生蚤從晉陵唐中丞應德學中丞博學能文年少魁天下為一時學士宗先生受其指亦以春秋魁天下名家既晉讀中祕書益精博天下稱鳳阿先生而不名天子察先生可師遂先後勑視學閩蜀入為南國子祭酒於是先生經術傳四方先生於春秋深故其教指嚴一時師道為尊比家食日事檢閲有自得悉著於書暇則集其宗及邑中俊弟子開决之先是雲陽闕賢書者二十年自先生里居厥嗣若諸從相繼取科名里中踵興後出者濟濟郁郁人文遂為吾郡冠蓋先生在國國重在鄉鄉重則明經之教為功矣先生著書成不以陽不肖授而習之見其取核詳援引正文無遺事事無怫義間出已意悉契聖心觀其自序曰孔子作春秋義在褒善貶惡而經世之法如所謂尊君父討亂賊惇典庸禮內安外攘云者亦即於朝聘往來㑹盟侵伐郊望禘雩之類見之蓋多直書而義自見未必盡以一字求一義遂自豫奪貶絶人爵甚至周天子魯父母國亦例以豫之奪之如胡氏所云也其自謂竊取者亦因筆削以寓褒貶嫌於天子之事所不敢當亦非如胡氏所云託南面之權自以其褒貶敢於代天子賞罰也嗟乎知我者春秋千載之下先生其人與客有私於陽曰今制業春秋者宗胡氏是書將無戾邪陽應之曰康侯常以己見釋經而先生說經旁引折衷各有其本間有所異於康侯正以明經義為康侯忠臣何戾也客為解頥未幾先生進大司寇執法南中矣司馬遷曰春秋辨是非故長於治人漢庭吏重經術常以春秋尚書折大獄今先生以春秋之義平天下獄當人人自以不冤而陽故治尚書為侍御按部治獄雖有意乎伯夷臯陶未能也得先生所為說春秋者而王道之條紀法律粲然矣豈不偉與陽鄉里承學喜而贊其後不自知其言之不文也浙江道監察御史李一陽序
