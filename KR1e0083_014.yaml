body:
  text: 春秋事義全考卷十四明姜寶撰十有六年春齊侯伐徐季氏私考徐逺齊之國也而齊侯親將伐之何名哉蓋齊欲通吳而道為所閉耳觀齊景公涕出而女於吳則齊固與吳通者也申之㑹楚合淮夷執徐子所以斷吳之道也淮夷既不可伐則伐徐而已矣雖勤兵逺略非為國之道而姻邦使絶勢亦有所不得已焉耳不然晏子相齊方以君顯豈宜無以諫止哉按徐非逺齊之國伐以通吳說則是楚子誘戎蠻子殺之今汝州為周王畿地亦即戎蠻子邑也州西南有蠻中聚季氏私考戎蠻戎之别種其稱戎蠻猶赤狄之有潞氏甲氏留吁舒之有舒蓼舒庸舒鳩也杜元凱曰河南新城縣有蠻城即今南陽府汝州西南蠻中聚也西踰伊闕則為陸渾之戎矣以地在申葉許鄭之西而南界楚之白羽故楚誘蠻子而殺之左氏謂楚以蠻子無質豈非為其從晉乎誘而後殺不易屈也楚子號稱賢君而誘殺戎蠻子此其為夷狄歟夏公至自晉汪氏曰昭公去年冬如晉今夏書至踰三時而始返雖不書晉人止公考其時則微傳而事著矣胡傳左氏曰公如晉平丘之㑹故也至是始歸者晉人止公其不書諱之也昭公數朝于晉三至于河而不得入兩得見晉侯又欲討其罪而止旃其困辱亦甚矣公安於危辱無激昻勉勵之志諱而不書深貶之也秋八月己亥晉侯夷卒廬陵李氏曰晉昭立於昭公之十年在位日淺僅有厥憖平丘之㑹其餘則再伐鮮虞而已先儒李氏曰晉至平昭伯事陵遲隳廢春秋所書皆録變之大者也孟子曰晉平公之於亥唐弗與共天位弗與治天職也政在侈家賢者雍棄此其所以削弱不亢歟平公五盟六㑹服齊狄寧東夏平秦亂城淳于晉祁午數當時之功如此然內有變而不知外有患而不悟尚何有功足云哉方桓公之初每患伯權大强而王政弱文襄以後王政不必論矣惟恐伯權之不能强也權者大物也上不能制而授之下則下强而上弱中國不能制而授之夷狄則夷狄强而中國弱家有千金之利已弗能受呼庸人而分之雖三尺之童弗為豈有尊為邦君而授權於大夫此溴梁之㑹平公所謂內有變而不知者也人欲自毁藩籬揖仇讐於廡下而與之干櫓此不待智者而知其不可豈有身主夏盟而授權於夷狄此宋之盟平公所謂外有患而不悟者也蓋世有苟道自便者偷於及身之謀而忘後日之害平公則謀出於身而害見乎身何其謬歟溴梁之事諸侯在㑹而大夫實主載書是委權以與之也荀偃一怒而十二國興戎後五年欒盈之變作曲沃之民惟主欒氏不知公室晉幾分國而並立矣宋之盟晉主夏盟而挈諸侯以畀楚是棄權以假之也虢之㑹再讀舊書後八年楚靈㑹于申實用齊桓召陵之典晉蓋十年無與國之事矣此皆身致之也至於昭公之政則又微矣僅一㑹大夫一盟諸侯方楚䖍辱於乾溪諸夏庶幾復伯為晉君臣者改物厲志憤悱警懼以率舊烈猶恐不逮今也四方未觀德而虒祁崇侈以啓二列國未聞信而邾南盛兵以示汰平丘雖曰同盟齊敢拒令鄭敢爭承衛病芻蕘之擾魯困蠻夷之訴坐視諸侯之去而不之顧况能駕敵國哉宜乎晉之卑也九月大雩季孫意如如晉臨川吳氏曰卿供葬事畏晉也冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝季氏私考郯自襄七年朝魯久不來矣今以魯結婚於吳而娶孟子焉郯畏吳故來求庇也八月晉荀吳帥師滅陸渾之戎陸渾本居秦晉之西北在荒服之外自僖之二十二年晉乃與秦遷之于伊川侵逼王畿則是晉人始謀不臧之過也今也與楚爭强掩其不備而滅之蓋不足以贖前過矣又何褒之有哉王氏經世晉非為王室除患乃因其二楚而隂襲之使非萇𢎞先見戎備素警則為王室之震驚也大矣書晉荀吳帥師滅陸渾之戎罪之也無王命動大衆掩戎狄之不備不顧郊甸之震驚言滅則是利而取之非攘之也凡此數者皆不待貶絶而見矣冬有星孛于大辰胡傳大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定天之示人顯矣史之有占明矣楚人及吳戰于長岸胡傳言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而䇿士竒才為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益强而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末强弱之由其為後世戒明矣季氏私考長岸杜元凱以為楚地蓋吳兵至楚境而楚禦之水戰也言戰不言敗勝負敵也趙鵬飛氏曰吳屢受楚兵襄二十五年吳雖伐楚門于巢卒兵亦未及楚也今王僚始為長岸之戰其後楚日削而吳日張矣十有八年春王三月曹伯須卒平公卒子悼公午立夏五月壬午宋衛陳鄭災季氏私考公羊傳曰何以書記異也異其同日而俱災也劉原父曰四國同日而災非人所能為也六月邾人入鄅鄅小國姒姓禹之後也今沂州北有鄅城秋葬曹平公冬許遷于白羽今內鄉縣季氏私考白羽即析本楚西北鄙地今南陽府鄧州內鄉縣也十五年楚平王復遷邑許自夷還居葉此自葉遷也夷本閒曠無人之地許人遷焉及墾治可居則楚人於此城章華臺而有之故又為之遷白羽十有九年春宋公伐邾胡傳按左氏宋公伐邾圍蟲取之而經不書圍與取何也初鄅人藉稻邾人襲鄅盡俘之鄅子曰余無歸矣從帑於邾邾子反其夫人而舍其女夫人宋向戍之女也故向寧請師圍蟲取之盡歸鄅俘此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此善善長惡惡短之義夏五月戊辰許世子止弒其君買王氏經世張洽問於朱子左氏曰許悼公瘧飲世子之藥公羊曰止進藥而藥殺也此可以見悼公之死於藥矣當時之事雖未有明文洽嘗觀近世治瘧者以砒霜鍛而餌之多愈然不得法不愈而反殺人者亦多矣悼公之死必此類也不然當時所進非必死之藥止偶不嘗而已則公羊何以謂之藥殺進藥而藥殺可不謂之弒哉朱子曰胡文定通㫖中引曾吉父說如律中合御藥誤不如本方造御舟誤不堅固之類已有此類矣止所以稱弒以此西亭辨疑許悼公疾飲世子止之藥而卒蓋以藥弒之也不然止何奔晉也奔者懼罪而逃亦猶魯閔公薨而夫人孫于邾之類是也按三傳皆謂世子止以不嘗藥而書弒且為之辭皆妄也歐陽子之辨詳矣己卯地震秋齊髙發帥師伐莒季氏私考髙發偃之子也莒與齊密邇而不事齊庚輿又以郊公在齊之故尤不相能齊欲服諸侯當自莒始蓋欲逐庚輿而歸郊公以為利故伐之此齊景窺晉衰而為鄟陵爭霸之端也王氏曰齊景爭霸之心不下於僖桓而徒計近功汲汲焉有事於徐莒以晏子之賢為之輔佐而亦不能有所匡正則所謂以其君顯者何足稱哉冬葬許悼公季氏私考蔡般許止以子弒父事在宫中尤為隱祕則深沒其迹而以疾卒成喪一如常禮故蔡景許悼皆以葬書二十年春王正月夏曹公孫㑹自鄸出奔宋季氏私考㑹稱公孫國卿也髙閌氏曰㑹子臧之子蓋公羊之說而左氏無之未足信也㑹距子臧辭立時已五十五年宜亦老矣未必以罪致奔而况子臧之風久猶未泯曹悼公豈遽逐其子邪意必别一公孫耳按悼公即位甫及三年以㑹為强臣而逐之則强於政治者之所為似非暴君薄待子臧之後者由是觀之㑹豈子臧之子哉秋盜殺衛侯之兄縶季氏私考宗魯知齊豹之謀而不以告其主誠為食姦受亂蓋不義犯非禮然能以死自明但可責其不學無術耳與手刃殺人者宜不同科說者乃因仲尼責宗魯之言而歸獄宗魯則聖人用刑顧可舍首惡不誅而治不幸陷罪之人乎左氏序此多失其真如孟縶之殺本秋事也而傳乃序於七月之前公子朝褚師圃之奔以罪見逐也殺宣姜以子弒母也皆事之大者而不見於經安可盡據以為實邪竊意孟縶必為靈所寵而怙勢以凌羣臣故齊豹輩使人刺殺之非衆亂也胡氏家氏之說皆過信左氏矣惟榖梁與孫張三家不失經義今載於後榖梁傳曰盜賤也其曰兄母兄也目衛侯衛侯纍也然則何為不為君也曰有天疾者不得入乎宗廟兩足不能相過齊謂之綦楚謂之踙衛謂之輒孫明復曰盜者微賤之稱以衛侯之母兄而盜得殺之衛侯無政刑也張洽氏白縶疾而廢靈公得立則所以事其兄使全其身者必無所不用其至親愛之而使不得有為於其國舜所以盡恩於兄弟也靈公受國於有疾之兄乃聽其無禮於大夫且俾之預於政使盜賊竊發兄死身危故書盜殺衛侯之兄縶以深罪之也冬十月宋華亥合比弟向寧向戍子華定華弱弟出奔陳季氏私考君子違不適讐國陳宋之讐也故三大夫皆往奔焉則欲依陳以為亂而宋其危矣十有一月辛卯蔡侯廬卒平公卒子朱嗣明年朱奔而隱太子之庶子東國立是為悼公二十有一年春王三月葬蔡平公夏晋侯使士鞅來聘頃立而通嗣君屬詞晉自景而後始來聘魯文襄之伯雖受魯朝聘而不報宋華亥向寧華定自陳入于宋南里以叛胡傳按左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨言宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居廬門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君已甚之詞也秋七月壬午朔日有食之八月乙亥叔輒卒叔弓之子伯張冬蔡侯朱出奔楚季氏私考左氏傳曰費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴於楚今按楚人懼無極而出朱是朱之奔為國人所逐也朱曾祖靈公般為楚所戕祖世子有為楚所用而朱往奔焉豈其所欲哉亦懼楚之殺已信乎其往訴也朱奔楚而楚之强暴見矣公羊以朱作東而謂東即東國非也朱去而不復者也楊士勛氏曰諸侯奔死於他國例不書卒觀二十三年東國之書卒則東國必非朱也公如晉至河乃復報士鞅之聘也晉將伐鮮虞故辭公汪氏曰晉即伐鮮虞豈妨於邦交之禮况是年晉實未嘗有事於鮮虞蓋士鞅始來聘時以從鮑國牢禮加四牢而終不恱故今托辭以拒公爾二十有二年春齊侯伐莒十九年髙發伐莒矣莒猶不服故景公親將以伐之宋華亥向寧華定自宋南里出奔楚胡傳華向誘殺羣公子又劫其君取其太子母弟為質又求助於吳楚蠻夷入披其國都以叛此必誅不赦之賊也宋宜竭力必討之於內諸侯宜協心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋又從之則皆罪也故晉荀吳齊苑何忌衛公子朝曹大夫皆略而不書其曰自宋南里者譏宋之縱釋有罪不能致討出奔楚者不待貶絶而亢不衷奬亂人之惡自見矣大搜于昌間前此兩搜書不時也此搜時矣而書主刺大夫盛強公失其政兵戎是􅊰而禮防不興也夏四月乙丑天王崩六月叔鞅如京師葬景王王室亂王初愛朝將立焉未及而崩諸大夫爭立君帥兵以相攻於是大亂不曰京師而言王室主乎王之私家而言也以嫡庶並爭亂在家室而不當以京師言也胡傳景王寵愛子朝使孽子配嫡以本亂者其言王室譏國本之不正也本正而天下定矣劉子單子以王猛居于皇今鞏縣西北有皇亭由湟水而名湟即皇也胡傳猛無寵於景王不能自定其位制在劉單其曰以者能廢立之也按左氏景王太子壽以昭十五年卒至是八年矣猛與丐皆其母弟禮無疑於當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以懾羣下朝雖寵而不正其分不足以服人心二子廢立皆恃大臣强弱而後定者也故特稱曰以景王之弱其後嗣輕其宗社之罪亦著矣易曰王居無咎稱居于皇者明其有土當得位之稱也秋劉子單子以王猛入于王城胡傳猛未踰年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也再書劉子單子之以王何也春秋詞繁而不殺者必有美惡焉劉子單子蓋挾天子以令諸侯而專國柄者也書而未足故再書于䇿以著上下舛逆為後世之深戒也王氏經世王猛在喪不稱子而稱王明正也書名者别子朝也居于皇入于王城而書猛别嫌也皇城天子都而子朝之黨在焉故言入入者難詞也公羊云其言入何篡辭也榖梁云入者內弗受也皆妄季氏私考王城在今河南府城唐苑內漢為河南縣即武王定鼎郟鄏處周公營此以為都洛誥所謂卜澗水東瀍水西惟洛食者也自平王東遷以來天子世世居之乃周之京師也不言京師而曰王城者京師衆大之稱自王室之亂國內無主王族逃奔臣民離散子朝勢孤久不得立僅守一空城耳則不得謂之京師矣故王城者無主之辭也入者難辭子朝尚存亂兵相拒故耳及猛入而子朝始奔私邑則於書入之義始合冬十月王子猛卒按猛未逾年言崩則似已成尊之王言薨則似五等邦君故寧稱卒如此臨川吳氏曰子上加王字者表其為天王未踰年之子以别於諸侯未踰年之子也十有二月癸酉朔日有食之二十有三年春王正月叔孫舍如晉為武城人取邾師邾訴於晉晉人來討而往聽命也癸丑叔鞅卒晉人執我行人叔孫舍髙氏曰晉雖以取邾師為罪而執行人其實則為士鞅來聘以魯為卑已故也晉人圍郊以子朝在焉故也胡傳按左氏晉籍談荀躒帥師軍于侯氏箕遺樂徴濟師軍其東南正月二師圍郊郊子朝邑也既不書大夫之名氏又不稱師而曰晉人微之也所謂以其事而微之者也當是時天子蒙塵晉為方伯不奔問官守省視器具徐遣大夫往焉勤王尊主之義若是乎書晉人圍郊而罪自見矣屬詞子頺之亂虢鄭成復辟之功子帶之亂晉文成復辟之功雖其績甚偉然皆臣子之分所當為故皆不書子朝之亂晉籍談荀躒以十月帥師納王于王城而王師敗績于郊十一月王子猛卒敬王即位十二月晉師軍于隂于侯氏于溪泉次于社閏月晉箕遺樂徴右行跪濟師取前城軍其東南王師軍于京楚辛丑伐京毁其西南春正月二師圍郊郊鄩潰王使告間遂還亂未弭而王告間必二卿不親兵師不肅也明年三月晉侯使景伯涖問周故于介衆乃辭子朝不納其使則前是豈無觀望之罪乎既而徴㑹于諸侯則曰明年㑹于黃父謀納王則又曰明年其怠於勤王如此故經書圍郊居狄泉立子朝以著其罪夏六月蔡侯東國卒于楚東國因朝于楚而卒秋七月莒子庚輿來奔昔也魯弔去疾之喪庚輿嘗有好於我故以為託而來奔焉胡傳左氏曰庚輿虐而好劔苟鑄劔必試諸人國人患之又將叛齊烏存帥國人逐之庚輿來奔齊人納郊公三代之得失天下仁與不仁而已矣苟無仁心甚則身弒國亡不甚則身危國削庚輿免死道左而出奔於魯幸矣入國不書而書其出奔惡之也郊公出入皆不書微之也戌辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧雞父杜預云安豐縣有雞備亭在其南即此安豐今夀州南有安豐鄉乃故安豐縣也今為霍丘縣滅非滅國之滅謂身死而全軍敗沒之稱獲則見擒於戰陳之稱也胡傳吳伐州來楚令尹帥師及諸侯之師奔命而救州來吳人禦諸鍾離戰於雞父雞父似當在鍾離西州來東是時吳將伐州來而尚未至故禦在鍾離而戰在雞父也與吳戰曷為不書楚令尹既喪楚師已熸六國先敗楚師遂奔是以不書楚也諸侯之師曷為略而不序頓胡沈則其君自將蔡陳許則大夫帥師言戰則未陳也言敗績則或滅或獲其事亦不同也故總言吳人以詐取勝於前而以君與大夫序六國於後胡沈書爵書名書滅者二國之君幼而狂不能以禮自守役屬於楚悉師以出一敗而身與衆俱亡也其曰胡子髠沈子逞滅者若曰非有能滅之者咸其自取焉耳亦猶梁亡自亡也鄭棄其師自棄也齊人殱于遂自殱也或曰滅或曰獲别君臣也君死曰滅胡子髠沈子逞是也生得曰獲秦晉戰于韓原獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志雖顛沛必於是也其義行而亂自熄矣獲時亦是生獲獲後乃死爾若戰而死為死事之臣恐不當言獲矣天王居于狄泉季氏私考狄泉杜元凱曰洛陽城內大倉西南池水也時在城外今洛陽故城在河南府城東洛水北即成周也其時成周自為一城而狄泉在其西南云居于狄泉可見不在成周故城內也至二十二年城成周然後繞狄泉入城內耳按是時敬王欲入成周而成周人黨子朝故未得入欲入王城先儒謂子朝黨多在王城不知劉單已在王城矣當不復有子朝黨於此而敬王之立必自有擁之者亦非劉單所奉以為主也故亦不得入王城而居狄泉蓋畏劉單之專制而姑居此以待事定至晉納王入成周子朝奔楚後諸侯之城成周也然後擴而大之併狄泉亦入成周城內於是遂即此為王都定居焉而不復遷居前此之王城矣左氏謂敬王為劉單所立其以王如劉為避子朝也說俱未為信然尹氏名固立王子朝按子朝久未得立以人心不服而前此有劉單挾猛以相抗也今猛卒而劉單敗敬王雖立然勢未張於是始自郊入尹依尹氏得立焉其立蓋於舊都故不言地意者因敬王在狄泉藉尹氏大族為援遂乘間以入王城爾陳氏曰敬王居狄泉在王城之東謂之東王子朝在王城之西謂之西王書曰天王居于狄泉黜子朝也胡傳立者不宜立也王猛當立而未能立故稱大臣以之而不言立敬王當立又能立矣故直稱居于狄泉而不言立子朝庶孽奪正以賤妨貴基亂周室不當立者也故特稱立而目尹氏尹氏天子之卿也王朝公卿書爵而變文稱氏者見世卿之擅權亂國為後戒也八月乙未地震冬公如晉至河有疾乃復胡傳昭公兩朝于晉而一見止五如晉而四不得入焉今此書有疾乃復殺恥也以周公之胄千乘之君執幣帛修兩君之好而不見納此正憂患疢疾有德慧術智保生免死之時也而安於屈辱甘處微弱無憤恥自强之心其失國出奔死於境外其自取之哉二十有四年春王二月丙戌仲孫貜卒孟僖子也子何忌嗣是為孟懿子貜將死召其臣謂之曰吾聞孔丘聖人之後也必屬說與何忌使事之學禮焉故孟懿子與南宫敬叔師事孔子叔孫舍至自晉胡傳大夫執而致則名此獨書其姓氏何賢之也叔孫舍以禮立身而不屈於强國以忠事主而不順於强臣此社稷之衛魯之良大夫也使昭公稍有動心忍性强於為善之意舉國以聽豈其死於乾侯觀意如之稽顙於昭子叔孫之以逐君責意如其事可見矣故舍至自晉特以姓氏書其死也公雖在外而特書日以卒之所以表其節為後世勸也夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒平公卒子悼公成立冬吳滅巢胡傳巢楚之附庸書吳入州來著陵楚之漸書吳滅巢著入郢之漸四鄰封境之守既不能制則封境震矣四境國都之守既不能保則國都危矣故沈尹戌以此為亡郢之始也春秋內失地不書明此為有大國之大罪外取滅皆書明見取滅者之不能有土地人民則不君矣故諸侯之寶三以土地為首巢吳楚間小國劉氏以為伯爵國是也文十二年楚人圍巢後遂從楚杜氏注楚邑非也季氏私考州來及巢皆楚東屬國而近吳界上吳欲凌楚所必爭之地也而况襄二十五年吳子遏伐楚門于巢卒巢又吳之世讐乎吳自夀夢卒後纍被楚兵遏及餘祭之輕死寡謀宜其終身不振矣夷末圖治國力日振亦不急於復怨直待楚平王之怠始滅州來至於王僚亦勇於鬪長岸雞父之兵相繼而起尋又滅巢漸恢楚境夷末所養之鋭其在今日乎楚平王智謀才略不下於僚然而兵䪺境蹙漸非吳敵豈非委政費無極等小人用事國政日非而姑欲厭戰以息民也柏舉之大敗巳蠱於此矣葬把平公二十有五年春叔孫舍如宋季公若之姊為小邾夫人生宋元夫人生子以妻季平子昭子如宋聘且逆之汪氏曰季孫行父之如陳公孫兹之如牟嬰齊之如莒皆因聘而娶托公命以濟其私然皆自逆其妻也今意如遣公室之正卿為已逆婦專恣甚矣昔也討私邑使公室之卿圍之今也娶巳妻使公室之卿逆之則名雖為臣而實行魯君之事尚何待昭公孫齊而後專魯哉夏叔詣鞅子㑹晉趙鞅成之子武之孫宋樂大心祁黎族兄衛北宫喜他之子鄭遊吉祖公子偃字子游故以為氏即子太叔公孫蠆之子曹人邾人滕人薛人小邾人于黃父胡傳按左氏鄭子太叔如晉范獻子曰若王室何對曰王室之不寧大國之憂晉之恥也吾子其早圖之獻子懼乃徴㑹於諸侯㑹于黃父謀王室也趙簡子令諸侯之大夫輸王粟具戍人將納王夫以王猛之無寵單旗劉蚠之屢敗敬王初立子朝之衆召伯奐南宫嚚井桓公之黨疑若多助之在朝也然㑹于黃父凡十國而諸侯之大夫無異議焉是知邪不勝正久矣然則黃父之㑹王事也而無美辭何也王室不靖亦惟友邦冢君克修厥職以綏定王都非異人任亦何美之有免於譏貶足矣此春秋以正待人之體也季氏私考敬王既立召集諸侯時政在大夫故諸卿為㑹夫久而方謀謀而即散使敬王三年居外始入成周則諸大夫不能急定王都亦可見矣然十國咸集皆知有周而輸粟具戍之令猶足以係屬國人他日成周之城實基於此視前年晉人圍郊之氣勢不同矣非敬王得位以正能服人心諸國安能無異議如此哉有鸜鵒來巢西亭辨疑按羅氏爾雅翼鸜鵒江以南皆有但不踰濟生本巢居亦非穴處此義在非所有而有不以巢為義也逐君之兆亦太泥張氏曰邵子曰天下將治則天地之氣自北而南天下將亂則天地之氣自南而北禽鳥之類得氣之先者也鸜鵒不踰濟而至魯豈非氣自南而北之驗哉當此之先楚雖為中國患而齊晋猶足以抑之自此之後晉霸不競吳楚越皆以南夷迭主夏盟諸侯斂衽事之馴至大亂則知鸜鵒來巢之祥不特昭公出奔之兆而巳秋七月上辛上旬之辛大雩季辛下旬之辛又雩辛者郊之日也大雩而用辛可見其祭帝矣胡傳左氏以再雩為旱甚聖人書此者以志禦災之非道而區區於禱祠之末也昭公之時雨雹地震四見於經旱乾為虐相繼而起有鸜鵒來巢異之甚也季辛又雩災之甚也考諸列位則國有人焉觀諸天時則猶有眷顧之心未終棄也若反身修德信用忠賢災異之來必可禦矣昭公至是猶不知畏罔克自省而求於禱祠之末將能勝乎故特書此以為後世鑒九月己亥公孫于齊次于陽州胡傳內出奔稱孫隱也次于陽州待齊命也以君伐臣曷為不勝魯自東門遂殺適立庶魯君於是乎失政祿去公室政在季氏於此君也四公矣作三軍盡征其一舍中軍兼有其二民賦入於其家半矣受命救台也遂入鄆帥師取卞也不以聞軍政在其手專矣行父片言而東門氏逐南蒯一動而公子憖奔魯之羣臣亦無敢忠於公室而獻謀者所謂屯難之時也在易屯之六五曰屯其膏小貞吉大貞凶象曰屯其膏施未光也昭公不明乎消息盈虛之理正身率德擇任忠賢待時馴致不忍一朝之忿求逞其私欲而以羣小謀之其及也宜矣按意如之無君甚矣豈肯有登臺之請請察罪於沂上請囚于費請以五乘亡乎即有之亦是詐情知公必不能勝而姑為是說以相欵爾至於叔孫舍仲孫何忌皆賢大夫舍方不欲舍中軍何忌方居喪學禮未與國事寧肯縱其司馬陷西北隅以救季氏寧肯殺郈昭伯以伐公徒蓋當時季氏自文其奸有此一種議論而左氏誤信傳聞故輕載於史傳如此要未足為信據也季氏私考云意如忿然逐君無復臣禮此易明之惡也而傳皆歸咎於公若季氏本無罪者大失是非之正矣齊侯唁公于野井今濟南府禹城縣有野井季氏私考公知齊人不拒而漸進以至于野井齊果出逆而唁之亦可以見景公能不失禮矣景公自守之君也何以責其能定魯哉而况公初至之時齊亦未能遽為謀也先儒謂譏其無納公之實蓋要其終而言耳冬十月戊辰叔孫舍卒王氏經世按平子雖有異志改立君其所未敢也昭子而在則納公之事昭子以身任之通外內安衆心必克有成而後巳此固昭子之心也何至遂祈死而自裁乎此年春昭子在宋樂祁已知其將死則昭子實夀終耳季氏逐君為之徒者衆矣昭子謀歸安衆而後納公蓋欲安定季氏伐公徒之衆也無季氏是無叔孫氏也二家同情使叔孫不如闞亦必不能助公以伐季氏而可望以誅鬷戾乎愚按叔孫氏於公伐季氏時决無陷西北隅救季氏事已辨之於前矣即其司馬鬷戾有此亦决不出舍意王氏經世以為三家同情恐未然大段意如在當時權勢已盛舍欲助公以伐之恐力有所不能李氏亷欲其正鬷戾之罪而誅之恐亦力所不能也惟欲謀安衆而後納公此最䇿之善者惜乎天奪之速而不克遂其志爾十有一月己亥宋公佐卒于曲棘元公卒子景公頭曼立今開封府把縣城中有曲棘里胡傳按左氏宋元公為公故如晉卒于曲棘曲棘宋地也宋元之夫人曹氏生子妻意如或謂曹氏勿與魯將逐之曹氏告元公公告樂祁祁曰與之如是魯君必出無民而能逞其志者未之有也魯君失民久矣然則宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不匿其私親之惡者也其賢於當時諸侯逺矣故雖卒于封內而特書其地以别之也十有二月齊侯取鄆胡傳鄆魯邑也直書齊侯取之何也齊不自取而為公取鄆使居之也昭公出奔經書次于陽州見公於魯未絶而季氏逐君為不臣及書齊侯取鄆則見公已絶於魯而逐於季氏為不君君者有其土地人民以奉宗廟之典籍者也已不能有而他人是保則不君矣季氏私考齊侯取鄆取之為已有以居公也公不能取故齊取之取邑則田在其中矣及二十九年鄆潰而鄆田遂非魯有觀定十年齊人來歸鄆田可以見鄆田之在齊也故取繫於齊二十有六年春王正月葬宋元公三月公至自齊居于鄆胡傳居者有其土地人民之稱也昭公失國出奔而稱居于鄆者存一國之防也襄王已出而稱居于鄭敬王未入而稱居于狄泉者存天下之防也天子之於天下率土之濵莫非其臣非諸侯所敢擅也諸侯之於封國四境之內莫非其土非大夫所得專也故諸侯避舍以待巡守而大夫專邑是謂叛君曰居于鄆其為防也至矣季氏私考公來居鄆曰至自齊則公蓋自野井入齊國都齊既取鄆而始來居耳若本未至齊則當書至自野井與至自乾侯同例矣王葆氏謂公自野井來居于鄆非也夏公圍成季氏私考成者孟氏之邑也在魯北鄙費在魯東南而距成為逺郈在魯西北而與成為鄰公方在鄆則又近於郈南者也三家之中叔仲賦常不闕自公失國以來費倚季孫專橫而又逺絶不復能治矣雖郈成近鄆亦皆效尤不服公閔叔孫舍舊忠猶愛於郈而郈以近故亦略親焉惟成賦之不共則公之所責備者也於是親發鄆衆越郈以圍之以求遂所欲夫孟氏世忠公室而成亦素馴特以劫於季氏而仲孫何忌服喪未預國政故不暇治其私邑耳然方受學仲尼必明於事君之禮公若感之以誠待之以禮使得盡力於君臣之間或能改革意如之惡以共張公室况於成乎公不知出此輒震以威畏强臣而獨誅有禮何以服民使臣哉公之所以終於客死者亦其自取也私考又按梁丘據受季孫貨而說齊侯使不納公其事不可謂無但景公方信用晏子必不為據言所動其所以不納公者亦由其本無逺志而又見公甚失人心故但居之於鄆使不失所則自以為盡職矣於景公又何深責焉若謂使公子鉏帥師從公圍成晏子必不勸君為此而亦不合於經公圍成之書也西亭辨疑經不書齊公子鉏則公自圍成而已矣秋公㑹齊侯莒子邾子杞伯盟于鄟陵鄟陵地名即成六年齊取之鄟當在齊魯界上季氏私考按此盟蓋昭公欲齊納已勸之以糾合也而景公志不及逺雖集諸小國不過為參盟而已實不能謀納公也景公爭霸之略止於如此矣公至自㑹居于鄆九月庚申楚子居卒平王卒子壬立是為昭王改名軫平王長子建費無極譛出奔宋至是令尹子常以太子壬弱母又非嫡欲立王之庶弟子西子西不從乃立壬冬十月天王入于成周胡傳其曰成周云者黍離而次不列于雅降為國風之意而景王寵愛庶孽弱其世適之罪著矣季氏私考敬王自居狄泉至此三年矣而始得入于成周者以子朝倚尹氏為援而成周人又黨子朝以拒之也觀左傳稱王子朝入尹而成周人戍尹可知矣故書曰入入者難詞也敬王能自樹立不為權臣所以舍王城而入成周將於此别立基焉既立而王子朝奔楚王室遂定亦可謂賢矣特以威權久去勢已倒持雖有一二親臣亦皆權謀餘習故其初政雖有可觀而其後亦遂不振惜哉東萊吕氏曰漢河南縣即郟鄏周武王遷九鼎周公營以為都是為王城洛誥所謂卜澗水東瀍水西惟洛食者漢洛陽縣周公營下都以遷殷頑民是為成周洛誥所謂卜瀍水東亦惟洛食者也文武都豐鎬是西京名為宗周周公營東都于洛陽是東京東京之旁又置一邑曰成周遷殷頑民于此子朝之亂其餘黨多在東京之王城敬王畏之故定都成周也趙氏録疑臨川吳氏曰王城曰東都蓋以鎬京為周之西都東對西而言也成周曰下都蓋以王城為洛之上都下對上而言也尹氏召伯盈毛伯得以王子朝奔楚胡傳取國有五利寵居一焉子朝有寵于景王為之黨者衆矣卒不能立至于奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝將蘄於見是而天下卒不以為是疏薄子猛將蘄於見非而天下卒不以為非徒設此心兩棄之也王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉季氏私考尹氏為卿卿本子爵而序于召伯毛伯之上則二伯乃大夫之字杜元凱謂伯為爵者非也以王子朝奔楚見子朝制在三臣卒至於敗而三臣迷誤子朝之罪著矣二十有七年春公如齊公至自齊居于鄆公每如齊求納而不能也故復居鄆夏四月吳弒其君僚季氏私考左氏以為公子光使專諸刺僚也夫光既臣僚矣則宜以光為首惡而經曷為稱國以弒也稱國以弒者國人之所欲共廢而衆殺之之辭也僚越光而代札國之大臣及臣民皆欲弒僚而還國於光也故稱國弒楚昭殺其大夫郤宛郤氏宛名蓋必晉郤氏仕楚為卿者季氏私考按左氏費無極譛郤宛令尹子常召鄢將師而告之退遂令攻郤氏且爇之郤宛聞之遂自殺稱國者假國法以殺之也不失其大夫則非有先絶仕籍之罪矣凡書殺大夫者必有關於大故郤宛之殺意者以平王時屢不得志於吳而歸咎郤宛乎秋晉頃士鞅宋元樂祁犂喜之子衛靈北宫喜曹悼人邾班人滕悼人㑹于扈胡傳按左氏扈之㑹謀納公以賂故不克納而諸國之大夫皆序何也曰利於納公者宋衛之大夫也受賂而不欲納公者獨范鞅主之耳又况戍周之令行乎所以列序而不略也以此見聖人取舍之大情而輕重審矣汪氏曰此年㑹扈本非謀討意如但謀納昭公耳士鞅受意如之賄而弗克納然廢天討矣春秋序于扈之大夫而無貶辭蓋以籍秦致諸侯之戍于周猶能踐戍周之言故也冬十月曹伯午卒悼公卒弟聲公野立邾莊快來奔家氏曰庶其畀我來奔季孫宿始納之今邾快又來奔意如復納之宿意如世濟其凶不君其君又誘人之臣使之叛其君而已為之逋逃主罪可勝誅乎快邾之賤者不足録也春秋所以録之而無所遺誅季氏之無君也三十一年黑肱以濫來復受之而不疑推其無忌憚之心亦何所不至春秋詳書之非誅叛人實譏季氏也公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯今廣平府成安縣孫氏曰公一年如齊者再皆不見禮故如晉也公既不見禮於齊又不得入于晉其窮辱如此夏四月丙戌鄭伯寧卒定公卒子獻公蠆立六月葬鄭定公秋七月癸巳滕子寧卒悼公卒子頃公結立冬葬滕悼公二十有九年春公至自乾侯居于鄆以乾侯至不得見晉侯故也齊侯使髙張偃之子是為昭子來唁公胡傳遣使來唁淺事也亦書于經者罪齊侯不能修方伯連帥之職也昔狄人迫逐黎侯黎侯寓于衛衛人弗恤黎之臣子勸其君以歸而賦式微其一章曰微君之故者以事求人而人不有其事是謂微君之故若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納微君之故矣其二章曰微君之躬者以身下人而人不有其身是謂微君之躬若齊侯設禮以享而使宰獻遣使來唁而稱主君微君之躬矣諸侯失國託於諸侯禮也諸侯失國諸侯納之正也齊之先世嘗主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立於其朝曾不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎汪氏曰齊侯始親唁猶有恤患之意今使髙張來而弔其至晉不見受且比公於大夫適以耻公而已奚益哉公如晉次于乾侯按左氏載平子每嵗買馬歸之於乾侯與昭公黜務人而立公衍為太子夫公在外何暇易太子此事無有也歸馬之事出於詐容有之蓋欲齊晉知其事君如在國而然猶然前此登臺之請皆欲自文其奸以欺人爾夏四月庚子叔詣卒髙氏曰叔詣欲納公而卒秋七月冬十月鄆潰胡傳民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有矣公之出奔處鄆四年民不見德亡無愛徵至於潰散豈非昏迷不返自納於罟獲陷穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼蘄改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒屬詞昭公見出於季氏齊侯取鄆以居公四年於此矣公如晉次于乾侯而鄆潰者季氏誘鄆人脅使逃散則公不得復居魯地乃大夫據國叛君之事故特書之三十年春王正月公在乾侯鄆潰而公無所容矣故寄居于乾侯胡傳公去社稷于今五年每嵗首月不書公者在魯四封之內則無適而非其所也至是鄆潰客寄乾侯非其所矣嵗首必書公之所在者蓋以存君不與季氏之專國也而罪臣子譏諸侯之意具矣吳澄氏曰居猶吾土也曰在者非吾土矣夏六月庚辰晉侯去疾卒頃公卒子定公午立秋八月葬晉頃公鄭游吉弔且送葬魯時昭公在乾侯不得通于晉必季孫遣使以吊喪送葬也代君行事其不臣甚矣冬十有二月吳滅徐徐子章羽奔楚季氏私考左氏稱章羽斷其髮携其夫人以逆吳子則是降也既降胡為而又奔哉蓋奔者不為吳人所得而避難竊走之名也舉重而言則但當書降今書奔楚則必未降吳也其書名特以屈服於楚故耳何必附為降吳之說哉三十有一年春王正月公在乾侯季孫意如㑹晉荀躒盈之子罃之孫于適歷襄昭之際大夫無君之禍晉人為之也意如出君晉人不能討使荀躒召意如至適歷欲其奉公以歸胡傳意如出君不事專有魯國晉實主盟不能致討而寵以㑹禮不亦悖哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱於煬宫求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其從自及也陸淳以謂逐君之臣晉不之罪而反與為㑹書曰意如㑹晉荀躒于適歷晉侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而罪惡見者也得春秋所書之意矣季氏私考按適歷非晉都也意如至此待命耳是時晉定公初立有嗣霸之志觀成周之城召陵之㑹可見矣故以師納公之意不可謂無使非士鞅取貨而私於季孫則昭公豈至於客死晉侯墮其術中而反使荀躒出㑹何以為盟主此伯業所以卒不能復也歟汪氏曰意如之練冠麻衣跣行卑詞伏罪皆外飾詐僞以欺晉晉定既惑於范鞅之巧言而知躒亦墮其計而不悟非惟奉命與之好㑹又導之叛逆而不恤魯君有汲汲求哀之請不亦甚乎夏四月丁巳薛伯穀卒獻公卒子宣公定立晉侯使荀躒唁公于乾侯季氏私考晉定本欲納公特為士鞅所沮則但言唁之而已此按齊景公故事必使荀躒者荀躒方與意如㑹則同情矣不欲使他人得私於公耳此士鞅之謀也秋葬薛獻公冬黑肱以濫來奔濫城在今滕縣東南季孫當國蓋以類而至也十有二月辛亥朔日有食之三十有二年公在乾侯取闞杜元凱曰闞魯地在東平須昌縣東南有闞城按須昌即今東平州取闞不言公蒙上文也鄆潰而公寓乾侯無所仰給故取闞闞者魯羣公墓之所在夏吳伐越季氏私考趙鵬飛氏曰吳將報楚越楚之與也故先伐越然不若姑結其心以離楚黨今先伐越故入郢未返而越亦入吳矣其結怨連禍始此秋七月冬仲孫何忌㑹晉定韓不信貞子之子起之孫齊景髙張宋景仲幾衛靈世叔申儀之孫鄭獻國參子産之子曹人莒人薛人把人小邾人城成周奉天子之命以紓諸侯之戍也屬詞據傳晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面夫魏舒以國卿干盟主之位尋諸侯平丘之盟於王都禮樂征伐自大夫出其弊至此故狄泉之盟與魏舒皆削而不言季氏私考敬王以正得國而又能自樹立故既入成周即於此定都不復返王城以劉單羣族在焉逺惡黨也成周之城非為城圯以其狹小不足以容衆故擴而大之如狄泉本在城外今則繞入城內矣工役大興侯邦咸集非敬王輯和人心豈能協一如是書此以見王澤之未竭而晉定之霸猶能率諸侯也成周既城新都定焉則後遂謂之京師矣十有二月己未公薨于乾侯胡傳昭公在外八年終以客死為天下笑何也魯自季友受費以為上卿至於意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不見聼計不行也不能復國宜矣故春秋詳録其所因為後世戒廬陵李氏曰昭公在位二十四年居鄆四年客乾侯三年乃魯國衰惰不振之君也當其初年居喪無戚容而父子之親喪娶妻以同姓而夫婦之倫乖立國立身之本皆無矣季氏之禍雖積習於成襄之世然取鄆而不能正納牟夷而不能卻大雩大雨雹天戒屢見而不知警舍中軍搜于紅軍政盡失而不能收卒之得罪於伯主則五如晉而不得入十三國同盟而不得與昭公果何以保其國哉當是時齊有陳氏晉有六卿與三家聲勢相倚迭為輔車宜昭公之不入也史墨之言其論魯事則善矣毋乃速三晉為諸侯之勢乎春秋事義全考卷十四
