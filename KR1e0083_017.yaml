body:
  text: 春秋事義全考後䟦春秋事義全考乃鳯阿姜太史公所著以行於世者也公少負竒抱博綜羣籍魁南宫歴官大司冦即宦成猶志春秋不輟每公餘輒按經蒐傳齬者駁闕者補積春累秋輯成而名之曰事義全考弼嘗負笈侍逰吳門得聞其槩乃今李侍御諸君有深契焉卷分十六帙為之剞劂以永世世弼抵金陵始克覩其全每章章讀輙章章嘆曰自漢來譚春秋者亡慮數十家言人人殊即康侯説著頒置黌宫豈無闕齬者有未盡耶士習相沿乆矣疇肯一正之公獨抱遺經索奥典諸所發明炳炳足稱大義有味哉俾傳註之未備者具備考究之未詳者獨詳素王心法昭昭然與海内士共知之以補康侯之未逮者非淺尠也紹往開來詎不為魯史全經一快藉令康侯而作必為公首肯稱謝矣弼何似亦業是經嘗謬為續義為或問以酬夙志脫也早獲覯焉弼當安享其成二十年探討之力可勿事矣卓彼先覺示我周行此誠大雅宫商宜奏之清廟以和人神者也如弼云云瓦缶耳敢列之堂下哉仰企法門方圖退舍第沐公徳教有日誼難黙黙不揣僣次一言敬附之簡末以誌誦法之私云淳安鄭良弼撰春秋事義全考後跋
