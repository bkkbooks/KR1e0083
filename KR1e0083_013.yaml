body:
  text: 春秋事義全考卷十三明姜寳撰昭公上名稠襄公子母齊歸在位二十五年孫于齊在外八年凡三十二年薨于乾侯威儀恭曰昭元年春王正月公即位叔孫豹㑹晉趙武楚公子圍共王子康王弟齊國弱佐子宋向戍衞齊惡陳公子招蔡公孫歸生鄭罕虎子皮子罕孫許人曹人于虢虢今靈寳縣虢鄭地按滎陽虢都也此云鄭地則滎陽為近之公子一段分明為辨公羊貶招之説而發録疑云春秋以諸侯之弟稱公子者多矣何待至此而後發不得以屬通之例耶故知胡氏不稱弟之説尤無謂不足信據也季氏私考虢之㑹鄭為地主也是時楚公子圍執政而晉與通好也同主諸夏而交見其從皆循㑹宋故事但各守舊約而不盟耳趙武所謂以信為本者力不能敵而甘為人下之辭也豈真仁人之心哉自是楚益横而莫能制趙武不能辭其責矣按先晉自是記事之體當然此等處皆直書而義自見㑹虢之是非與㑹宋同所謂尋宋之盟而請讀舊書加於牲上可見未嘗盟也趙武能以信為本而先之之説恐非三月取鄆鄆莒邑在青州府沂水縣是為東鄆王氏經世云書伐莒是以討賊予魯也不書伐而書取則收奪而已矣按取鄆出自季孫所為故不書伐而書取自是罪之之詞非諱也夏秦伯之弟鍼出奔晉胡傳書曰弟者罪秦伯也夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰况兄弟乎兄弟翕而後父母順矣故不曰公子而特稱秦伯之弟云季氏私考諸侯地方百里者出車千乗其正卿始得百乗爾后子尚未為卿雖富安得遽有千乗逺從且人臣見逐於君雖欲竊貲懼有追奪故士㑹奔秦荀伯以同僚故為之送帑及其器用財賄見其不易能也安有自雍及絳入反歸取酬幣者哉后子多其車乗棄國適讐幾於叛矣雖有自文之辭何足以為善也而乃謂之令圖天贊天豈助惡徳者歟后子兄歿始歸此理所有但司馬侯所以過譽后子者或其為利所沒欲説其君以必納耳然實怙奸之言也而左氏遂真以后子為賢非矣按書弟見秦伯為兄寡恩以致其弟出奔胡氏後段説是六月丁巳邾子華卒悼公卒子莊公穿嗣晉荀吴帥師敗狄于大鹵季氏私考左氏以狄為無終羣狄而杜預氏謂大鹵為太原晉陽縣皆非也盖無終即山戎不應稱狄且在太原東北二千里許安得至此而鹵者地不生物之謂不可以言原竊意大鹵地當近狄狄在今廣平府北境宋地理志曰地雜斥鹵今其地尚有斥澤沙河之名此其所為鹵也狄自僖公時勢甚强悍而又有赤狄為導故雖西距晉陽五百里而敢逺至于箕為晉所敗至宣公時晉滅赤狄拓地既廣遂漸圖狄故至狄地設伏而敗之交剛交剛近沙澤之地其亦斥鹵之相連者歟自是狄勢漸衰而荀吴復即其地敗之於大鹵猶交剛之志也胡傳其過在毁車崇卒以詐誘狄人而敗之非王者之師爾使後世車戰法亡崇尚歩卒爭以變詐相髙日趨苟簡皆此等啓之矣書敗狄譏之也秋莒去疾宻州長子自齊入于莒按去疾未立而書莒去疾與齊小白同見當有莒之詞也其不稱公子程氏曰凡義當承國者名繫國而不稱公子以殊於大夫胡氏不禀命之説非也莒展輿宻州次子出奔吴胡傳展輿莒子也曷為不稱爵為弑君者所立既立乎其位而不能討賊則是與聞乎故也斯不可以有國矣按展輿已立乎位而不稱爵見不當為君之詞曰莒展輿見其為莒之展輿而非莒之君所謂與陳佗同者是也叔弓帥師疆鄆田季氏私考疆者正鄆田之界不使莒得侵之必用師備莒也葬邾悼公齊景公立齊魯之好復通邾子亦來朝故始㑹其葬冬十有一月已酉楚子麇卒葬于郟謂之郟敖季氏私考黄震氏曰經書卒而傳稱圍縊殺之經傳不同當以經為正今按春秋為誅亂臣討賊子而作弑君大惡也豈以偽訃而得免乎公子圍若果弑君春秋豈有諱而書卒之理且殺其二子亦事之大者安得併沒其實乎西亭辨疑據子夏傳靈王䖍與令尹圍本是兩人而郟敖之卒實以疾非以弑也諸儒附㑹或曰以瘧疾赴也春秋弑君之賊未必肯以弑父顯告諸侯春秋知其弑則書弑矣何獨於圍而從告乎或曰以申之㑹故為中國諱也商臣弑父使椒聘魯魯人受之春秋曷不為魯人諱而顧為列國諱乎或曰圍弑君而立恐其惡聞更名䖍商臣弑父校之弑其兄子者其惡何如不聞商臣更名衛州吁齊無知皆不更名豈皆不畏惡之播聞者乎夫聖如孔子髙弟如子夏有經與傳乃不足信而唯信左氏乎左氏載慶封之言以為圍弑兄子而代之者亦非也楚公子比出奔晉按楚國之得立常在少者是時或有欲立之心因靈王立而不安其身也故出奔二年春晉侯使韓起來聘韓宣子為政而聘與國季氏私考韓起厥之子也是為宣子晉自趙武與楚狎主夏盟諸侯由此不專事晉矣韓起代武為政欲致諸侯故親來聘魯惜乎人心已散而德又不足以服人卒不免於示威平丘耳夏叔弓如晉昭公之世三家益專公不為政其臣五如晉此報韓起之聘也秋鄭殺其大夫公孫黒季氏私考公孫黑字子晳公子騑之子公孫夏之弟也黑好在人上專肆憤心啓良霄之亂致㳺楚之爭誠足以害國事矣至謂其將作亂不過羣族之搆言耳罪狀未明可以無死者也是時子産當國苟以黑為不肖去之可矣乃使吏數其罪而以國法殺之不亦過乎故不去其大夫夫子産不以親親保全孰謂其為政專尚寛哉按是時子産當數其罪而廢之或出之不當遂致之死不去大夫而以國殺言君與用事大臣同殺之則鄭伯與子産誠過矣所謂罪累上者此也冬公如晉至河乃復季孫宿如晉致少姜之襚按晉以少姜非伉儷辭公未為不是公見辭乃復亦未為不是只當時不當親往不當失禮妄動所謂恭不近於禮不能逺恥辱者公也胡氏之説反似成少姜為適矣不可從三年春王正月丁未滕子原卒成公卒子悼公寜立夏叔弓如滕五月葬滕成公滕前此未有㑹其塟者襄公六年滕成始來朝與襄同晉悼之盟㑹且又來奔䘮於是魯亦遣大夫㑹其葬終春秋皆㑹其葬矣秋小邾子來朝小邾本魯附庸故雖從晉㑹列於諸侯而常來朝魯以此八月大雩冬大雨雹北燕伯欵出奔齊季氏私考北燕姬姓伯爵國幽州薊縣是其地也召康公奭周之支族食邑於召武王滅紂封召公於北燕胡傳按左氏燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒逺矣四年春王正月大雨雹胡傳雹戾氣也隂脇陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚于朝歸咎藏氷之失夫山谷之氷藏之也周用之也徧亦古者本末備舉燮調之一事耳謂能使四時無愆伏凄苦之變雷出不震無菑霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏氷之道合于豳風七月之詩其將能乎劉氏曰夫申豐言聖王在上無雹可也言雹之為災由藏氷故非也魯雖藏川池之氷未為不藏氷如五帝以前未有藏氷之時豈長雨雹乎且豐之為人姦佞人也黨於季氏不敢端言其罪故推雹災歸之藏氷欲以諂媚强臣抹摋災異此與張禹谷永何異哉所以使昭公死於外者未必非此人也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申申今信陽州申國地謀吳也季氏私考杜元凱曰徐在下邳僮縣東南今鳯陽府泗州北五十里有徐城是也頓在陳州之南今項城縣界内胡在漢汝隂縣西北今潁州西北二里有胡城沈即漢汝南郡平輿縣故城在今汝寜府東汝水南淮夷在今淮之南北詩宣王率彼淮浦以省徐土則主淮北言召虎浮江漢以伐淮夷則主淮南言皆一人所有之地也申即漢南陽郡宛縣申伯舊封國時已屬楚今南陽府南陽縣也季氏私考楚之所懼者吴也楚欲窺中國則恐吴擬其後故晉與吳合而楚不敢北圖矣自㑹宋以來晉楚同好而楚無晉規於是遂自為主而大合其所與之諸侯于申焉淮夷向無預㑹而亦至者以其為東諸侯通吳之道而徐頓胡沈居淮上流亦要地也則斯㑹盖為拒吴計耳左氏以為楚子使椒舉如晉求諸侯恐未必然盖盟宋㑹虢楚皆與晉同覇晉既甘心讓楚矣何必再求諸侯而盡及近淮小國邪夫齊魯曹衛諸國是時皆已通吴而其道由淮以往此楚之所急在淮也故特私與屬國為謀以斷吳通中國之道而晉自此亦不得通使於南方矣若其為㑹而用齊桓召陵之禮蠻夷妄自尊大以臨其屬國固宜有之矣按㑹吴殊㑹以中國先自為㑹而後㑹吴也若淮夷則直同㑹而已何必殊㑹為文耶楚書爵見諸國之君皆來而楚子親臨焉屬詞所謂志其强者是也楚人執徐子按史記札使北過徐還而掛劒徐君之墓可見吳通上國道必由徐今執徐子為其不能閉吳通上國之道為貳已也屬詞此申之㑹也徐既世事楚而又服於吳徐子又吳出也故楚人執之秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳因申㑹以伐吳不言諸侯者鄭徐滕小邾宋不在列故也執齊慶封殺之季氏私考齊慶封以襄二十八年奔魯齊讓而又奔吳吳雖與之朱方使居之然未仕其國故猶繫之齊楚伐吳而慶封在焉以其為齊通吴之使也故殺之非為討賊也慶封之罪楚未必知雖知之亦未必以為討也然曰慶封則誠以其人為有罪耳狥軍之説恐亦未必然遂滅頼頼即漢汝南郡褒信侯國廢城在今汝寧府光州息縣東北頼本近楚之國必依違吴楚之間而不能自立者也故楚乗伐吳而滅之九月取鄫季氏私考取鄫不繋之伐國則鄫本自為國也其非滅為莒屬明矣鄫素屬魯曷為取之始以為己邑耳冬十有二月乙夘叔孫豹卒季氏私考豹以日卒正終于位也左氏謂牛置虚命徹則過矣五年春王正月舍中軍胡傳按左氏舍中軍卑公室也初作三軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公然則三軍作舍皆自三家公不與焉公室益卑而魯國之兵權悉歸于季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫于齊薨于乾侯定公無正必至之理也已則不臣三綱淪替南蒯叛陽虎專季斯囚而三桓之子孫微矣亦能免乎書曰舍中軍微詞以著其罪也不言其故孔氏曰初作三軍季氏盡征之並不入公室也叔孫氏臣其子弟以一家之内有父子兄弟四品以父兄之稅入公子弟之稅入已大率半屬公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公公室已卑矣今舍中軍四分公室三家自取其税而隨時獻公公室彌卑矣初云作三軍今不云舍三軍者初作時三家各毁其乗足成三軍今此唯舍中軍之屬屬上下二軍季氏因叔孫家禍退之使同孟孫獨取其半為專已甚又擇取善者是專之極故傳言擇二以見之作三軍時猶是三家得其七公得其五至是則公室止有貢而無復有民矣楚殺其大夫屈申劉氏曰稱國以殺大夫者罪累上也屈申之累上柰何楚人讐吴而疑屈申謂屈申貳於吳也而殺之然屈申之為人臣也國亂不能去北面而事冦讐足以殺其身而已矣公如晉汪氏曰昭公如晉凡七至晉而見止者一及河而不至者五惟此年得善往返然以莒人之訴㡬不免於辱盖昭公習於威儀之節而不知禮之本是以晉平公雖稱其善於禮猶欲止而討之也夏莒牟夷以牟婁及防兹來奔今莒州地季氏私考牟婁本紀邑為莒所取防兹莒二邑名杜元凱曰城陽平昌縣西南有防亭姑幕縣東北有兹亭按平昌城在今安丘縣西南六十里姑幕城在今諸城縣西十五里牟婁則在防兹之間而南界於莒今皆𨽻青州牟婁防兹入於魯則地與諸城聯屬矣又云及者有别之辭地而言及所以别彼此也盖牟婁莒取於把者也防兹莒本封地也而聖人正疆理之意見矣苟謂不以私邑累公邑則於取讙及闡例可以通乎家氏曰庶其牟夷邾莒之盜也季孫宿魯之盜也襄二十一年公如晉庶其以地來奔季氏納之今公如晉在行牟夷復以地來奔季氏又納之季氏乗魯君之出招納邾莒之叛人叛邑以為己之私有不曰魯之内盜可乎襄公如楚還及方城季孫宿取卞使人以告公懼不敢入㡬欲適諸侯今公在晉而宿所為復爾盖置其君於陷穽罟獲之地將使晉人執之而已得以遂其竊國之計意如逐君之謀實兆於宿矣秋七月公至自晉按公在晉而季氏納牟夷晉以莒愬欲止公罪固不在公也故范獻子不可乃歸公戊辰叔弓帥師敗莒師于蚡泉莒師至魯地為追討牟夷也故魯人敗之秦伯卒景公卒子哀公立史失其名冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳入棘櫟麻以報朱方之役朱方今丹徒棘櫟麻楚東鄙三邑亳縣東北有棘亭新蔡縣東北有櫟亭徐始稱王楚後稱王吳越因遂稱王伯翳之子若木封於徐穆王命徐子掌徐夷得朱弓赤矢乃稱偃王楚熊渠始稱王吳夀夢稱王越勾踐稱蠻王季氏私考越姒姓子爵國夏少康之庶子封於㑹稽今紹興府古越州也二十餘世至允常盖此時越稱人微者來㑹耳蔡陳許頓沈徐在吳北素服楚威而越在吳南能為吳患楚子合此七國以伐吳夾攻之術也吳欲北與楚争則恐越人之擬其後而吳自此不易報楚矣是時季札仕吳能逺通上國而不能近結越人亦未見其謀國之善也然吳自襄十四年至是凡四受楚兵飬銳既久而州來之滅長岸雞父之兵漸奮起焉至於栢舉則一戰及郢矣然則以兵侮人者豈非自侮之道邪李亷氏曰此為楚通越制吴之始六年春王正月把伯益姑卒文公卒弟平公郁釐立葬秦景公景公之卒魯始往㑹其塟以南北之從交相見自此也夏季孫宿如晉按季氏私考謂君歸則臣往乃當時事伯之禮如此抑强臣所借以自結納於伯國也左氏以為拜莒田恐非抑或為納牟夷之故恐晉討及已而往晉欲止公而於宿反不之問也非又以晉卿者為宿地歟葬把文公宋華合比出奔衞胡傳左氏曰宋寺人栁有寵太子佐惡之華合比請殺之栁聞坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐合比於是華亥欲代為右師乃與栁比從為之徴公使代之宋公寵信閽寺殺世適痤而父子之恩絶逐華合比而君臣之義睽刑人之能敗國亡家亦可畏矣猶有任趙髙以亡秦信恭顯十常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍者不亦悲夫凡此類直書而義自見矣家氏曰伊戾與栁所以譛太子與右師皆坎用牲埋書以售其險謀後先如出一轍而華亥之比栁與向戍之比伊戾適亦相似而平公不知悟也嗟夫閹宦禍人國家必外廷臣與之合而其譛乃售伊栁戍亥之事後世往往有之可不戒哉秋九月大雩楚薳罷帥師伐吴薳罷字子蕩時為令尹楚䖍至是三伐呉矣制吳將以得志於中國也使無乾谿之弑其禍豈但已乎冬叔弓如楚是時晉益不競楚圍驕侈求諸侯于晉以㑹申而魯不至於是使叔弓聘明年薳啓疆來召公公遂親往朝楚齊侯伐北燕王氏經世左傳將納簡公按晉人納㨗菑于邾則書弗克納此納北燕伯亦不克而還不書者諸侯失國諸侯納之正也非奉少奪長之比但齊景受賂而退故止書伐耳七年春王正月暨齊平胡傳我所欲曰及不得已曰暨當是時昭公結婚强吳外附荆楚其與齊平無汲汲之意乃齊求于魯而許之平也故曰暨至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求於齊而欲其平也故曰及平者聖人之所貴然或以賄賂而結平或以臣下而擅平或以附夷狄而得平或以侵犯大國而急於平則皆罪也攷其事而輕重見矣廬陵李氏曰禮記曰戎容暨暨果毅貌也襄公之世齊數伐魯景公初立使慶封來聘而不書魯報則魯盖無汲汲於齊可知矣又曰按左氏注暨齊平者齊求於燕而與之平盖杜氏從許惠卿之説也今推之經例暨齊平之文正與及齊平及鄭平句法相似而下文又有叔孫涖盟正與叔還涖盟之事相類且左氏下文明説燕人行成而上文又以為齊求之文法自相背故服䖍亦疑之今若截齊求之也四字正解齊魯之平而以癸巳以下方終齊燕事則兩得之矣盖左氏本無誤而許惠卿之誤也三月公如楚屬詞楚靈章華之召公不敢不往晉既以諸侯予楚魯不能拒也叔孫舍如齊涖盟許氏曰始暨齊平故盟以結好穀梁曰内之前定之辭謂之蒞外之前定之辭謂之來季氏私考舍左氏作婼豹之庶子也是為昭子豹卒距此二十七月舍始見經則其初未嘗與政其亦庻㡬能行三年之䘮者歟舍以賢稱盖本於此夏四月甲辰朔日有食之秋八月戊辰衞侯惡卒襄公卒子靈公元立九月公至自楚汪氏曰自如楚今七越月危公之意可見矣冬十有一月癸未季孫宿卒宿文子之子武子也子紇嗣是為悼子悼子卒未見於經豈未為大夫抑或卒在武子之前而其子意如即以孫繼祖為平子歟十有二月癸亥葬衞襄公八年春陳侯之弟招殺陳世子偃師陳哀公元妃生偃師二妃生公子留二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾招過殺偃師而立留哀公憂恚而死按哀公以憂恚而速死則有之左氏以為縊杜氏以為自殺恐未然王氏經世孔氏曰招與公子過共殺偃師而立公子留及楚殺干徵師留出奔鄭招乃歸罪於過而使陳人殺之及楚師來討又推過為首得免重責焉不死而放之於越是以招為從罪也若其從招之詐如楚之意則宜書過殺偃師今書陳侯之弟招殺陳世子偃師是仲尼知其深意以招為首也今按稱弟以殺世子叔父之親加戕于國儲君貳之重以立庶孽致楚滅陳其惡甚矣哀既有世嫡又屬其嬖孽於二公子戕其國本哀自為之也書曰陳侯斥君之辭餘如孔氏説夏四月辛丑陳侯溺卒哀公卒是年楚滅陳十三年楚平王復封陳惠公吳立按哀公雖欲立留然不謂招遽殺偃師也故憂恚而死叔弓如晉賀虒祁也楚人執陳行人干徵師殺之陳以殺偃師而立公子留干徵師赴于楚且告有立君故楚人執而殺之陳公子留出奔鄭留招所立也秋蒐于紅自根牟至於商衛革車千乗皆三家之師也自是而屢蒐三家所以耀武焉爾是故桓莊之狩必言公昭定之蒐不言公矣王氏經世此三家既分公室假蒐禮以數軍實隂擇其材勇之士以强私黨耳春蒐者獵之淺秋獮者獵之深此秋而行蒐禮姑淺獵而寡獲示不貪於從禽其實則數軍實而已諸家非時之論殆未盡其情也王氏曰根牟魯東界商宋地魯西界與宋衛接境則其地亦廣矣四蒐皆書大而此獨不稱大者首著公不得與而歸惡於三家也此年蒐紅十一年大蒐比蒲二十二年昌間定十三十四年比蒲屬詞是時三家分魯假春蒐之禮以耀武示强又與非時非地之蒐不同故悉書之定十四年比蒲之蒐經書邾子來㑹公則凡大蒐皆公在可見而不書公者師乗非復公有史不虚餙也陳人殺其大夫公子過臨川吳氏曰按哀公屬留於招與過故招過同殺太子二人之罪均也招畏國人公論懼楚人來討故歸罪於過而欲免已人其可欺乎季氏私考國亂無政歸罪於公子過而衆殺之歸罪於過者以立留之罪歸之盖將以自解於楚也公子招賣國之情於是乎見矣大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐孔奐公子招之黨按楚子志在取陳故不能正其罪而殺招之黨孔奐失其用刑之輕重而亦不顧如此謂奐與楚通謀以滅陳而旋以不忠見戮非也楚子豈能及此乎季氏私考偃師之殺奐亦預焉故併見殺楚師既入陳而始討殺偃師之罪其志本在滅國豈真為討賊哉招專權亂國自知有不赦之罪必有二心於楚故以殺偃師之罪歸孔奐而已反為從得免於死其賣國賣友之情具可見矣放者覊置之而不使得復國也是時楚越方通故放之於越葬陳哀公屬詞哀公卒塟於輿嬖殺馬毁玉加絰於顙而逃豈有㑹塟之事盖楚既滅陳以放陳子招殺陳孔奐塟陳哀公來告而書黎氏曰書塟陳哀公非謂我往㑹而書時陳已滅矣國為楚師所據魯豈於其塟而使臣往㑹之盖楚入陳自以其君在殯因取而塟之與莊四年齊侯塟紀伯姬同彼目齊者盖上文無齊滅紀之文故下文云爾今已書楚師滅陳則下云執公子招殺孔奐塟哀公皆䝉上文云九年春叔弓㑹楚子於陳季氏私考八年叔弓如晉已貳楚矣至是楚子滅陳告魯使㑹塟且言將親臨其地盖欲致魯也叔弓不得已而往㑹之亦見魯之不立矣許遷于夷汪氏曰夷一名城父本陳地楚滅陳遂遷許於此季氏私考夷即城父本陳之閒地在淮北晉屬譙郡在今鳯陽府亳州東南七十里成十六年許已遷葉至是楚以葉為方城外蔽欲兼有其地故遷至夷耳夏四月陳災胡傳凡外災告則書今楚已滅陳夷於屬縣使穿封戍為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之䇿乎當是時叔弓與楚子㑹于陳則目撃其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳仲尼作經存而弗革者盖興滅國繼絶世以堯舜三代公天下之心為心異于孤秦罷侯置守欲私一人以自奉者所以歸民心合天德也榖梁以為存陳得其㫖矣按王氏經世以為陳未嘗滅非也盖經文明書楚滅後公子吳歸陳實由棄疾封之安得謂楚未滅陳乎季氏私考又謂叔弓春㑹楚子而陳災在夏未嘗目擊其事按春不言月而陳災在夏四月則叔弓此時尚或在陳未可知即不在陳或聞之於途次歸而語其故亦未可知也故知當從胡傳為是秋仲孫貜如齊羯之子也是為孟僖子報襄末年慶封之聘也叔孫舍如齊以暨齊平故往蒞盟而非聘今始聘云冬築郎囿屬詞昭公擁虚器而築囿盖三家分魯而以此娛其君惜乎昭公安之而不悟也䇿書實錄其鑒戒昭矣定公築蛇淵囿同十年春王正月夏齊欒施來奔季氏私考施公孫竈之子公孫欒之孫施嗜酒多怨同列惡之故出奔此晏嬰為政而去不肖也秋七月季孫意如叔弓仲孫貜帥師伐莒胡傳前已舍中軍矣曷為猶以三卿並將乎當時三軍固在其曰舍之者特欲中分魯國之衆為己私耳以為復古則誤矣是知雖舍中軍而三卿並將舊額固存矣王氏經世按舍中軍是借三軍復古之名以掩中分魯國之實耳其平居也四分其民季氏擇二二子各一至其出軍則季氏專將一軍身為元帥而孟仲各將一軍之半以為之副此所以雖曰舍中軍而三卿帥師蓋舊額固存也八年蒐于紅自根牟至於商衛革車千乗邾人告吳曰魯賦八百乗則魯軍制非能復古可見矣叔孫婼居守故叔弓所將者叔孫氏之兵也取郠不書公見討於平丘故諱之季氏私考按魯之三軍既掌於三家矣叔孫不預而叔弓代將者見舍中軍在豹卒之後乃季氏所欲自專而舍則不欲專掌其軍也故獨居守不出此舍之所以為賢歟自舍外其後非三家不將兵矣戊子晉侯彪卒平公卒子昭公夷立九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒平公卒子元公佐立十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申蔡般嘗弑父故書名以明當見殺䖍以蠻夷肆欺詐欲殺般而滅其國明非討罪兩皆有罪之辭也楚公子棄疾帥師圍蔡王氏經世按楚奉孫吴討陳名將定其國陳人聽命而遂縣之今又誘殺蔡般而圍其國其辭於人人必曰是討其弑君也春秋深惡之故名䖍於誘般殺之上言罪與般等耳夫般弑其君諸侯與通㑹盟者十三年于兹以楚子為之㑹主也以弑君之賊同惡相求諸侯非惟力不能討亦勢不敢討矣今楚得陳又欲舉蔡故為此詐諼固惡人之常態也是烏可於十三年之後以倡義致討責之懐惡之人哉楚子未暇治也而責其討般胡氏之義踈矣季氏私考以棄疾圍蔡繼之楚䖍誘殺蔡侯之下見楚欲滅蔡之謀本主於䖍也棄疾特不當為䖍盡力耳五月甲申夫人歸氏薨季氏私考歸胡女歸氏者齊歸也齊歸乃襄公之夫人而子野昭公皆其所出也其始至不見於經者為公子時娶也左氏以襄夫人為敬歸而齊歸乃其娣非矣大蒐于比蒲季氏私考黄震氏曰諸家皆以大蒐為越禮非也謂譏昭公居母䘮而蒐亦非也兵已不屬昭公矣趙鵬飛氏曰大蒐田獵之名三家數軍實以傾民心非為供家廟賔客充君庖也仲孫貜㑹邾子盟于祲祥季氏私考汪克寛氏曰自邾倚齊靈屢致兵於魯魯藉晉覇之力溴梁祝柯兩執邾子又取其田既而魯納庶其畀我之奔邾受臧紇之奔讐隙益深至同盟重丘齊晉既睦襄二十八年邾君來朝昭元年魯㑹悼公之塟是以此盟祲祥以脩好也秋季孫意如㑹晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憖王氏經世按蔡世子有與楚義不同生堅守不下其志亦可閔矣厥憖合天下之兵畏而不敢救遣使丐請於楚卑辱已甚夫宋之盟以弭兵召諸侯故諸侯從楚致其背盟肆暴欲逞無厭於陳蔡晉不能以義責之而反以姑息含忍兾保前好豈不悖哉春秋備書諸國之大夫罪之也胡氏謂心欲救蔡而力弗加春秋恕其不能而不求其備失聖人之意矣襄陵許氏曰蔡能嬰城堅不下楚此易助也厥憖合天下之兵畏不敢救遣使請命示之不能使楚益驕有以量中國之力而卒取之此韓起之罪也九月己亥葬我小君齊歸按叔向以為有三年之䘮而無一日之慼此公之罪其以為君有大䘮國不廢蒐不忌君者此則三家之罪也總之以殆其失國專指公則非矣冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之王氏經世按楚誘蔡侯般而殺之其世子有痛父飲血誓不與讐賊俱生被圍八月抗敵不下力盡勢竭終不肯屈服故為賊䖍所執而虐用之怒其拒師之久也有之於世子之道得矣故書之以閔而賢之也有受命居守父殺國圍窮迫之中捍敵不暇固未暇立乎其位則世子者其本稱也公羊以為未踰年之君非矣又謂不君靈公不成其子尤非也不羮城定陵西北有不羮十有二年春齊髙偃帥師納北燕伯于陽齊景貪而無信以燕君與燕人市然後納諸燕邑季氏私考杜元凱曰偃髙傒𤣥孫陽即唐燕别邑中山有唐縣今按唐縣屬直𨽻保定府北燕伯播越于外至是十年藉齊之力僅能納於别邑盖為强臣所拒不能得國也三月壬申鄭伯嘉卒簡公卒子定公寜立夏宋公使華定來聘通嗣君也公如晉至河乃復昭公如晉者再五年十五年如晉至河乃復者五二年是年為十二年十三年二十一年二十三年屬詞晉平末年再如晉辭弔少姜一不納三朝晉昭再不納再朝晉頃復不納則以晉政多門而魯之土地人民皆三家有之晉人謂公不能為有無也據昭十二年左氏謂南蒯公子憖謀季氏憖告公而遂從公如晉晉人以取郠故辭公南蒯懼不克以費叛如齊子仲還及郊奔齊使晉人但以莒故二子何懼之甚唯季孫覺二子之謀恐公愬已于晉故私屬晉人使不納公此二子者所以叛且奔也後公孫于齊再如晉次于晉地之乾侯而晉終不肯助公返國則由晉大夫知有季氏而不知有公故也家氏曰魯受莒之叛臣叛邑敗其師伐其國又取其地然皆季氏之所為明年晉人執意如亦知罪之所在而公每至晉輙為所卻豈晉之諸臣曲為季氏之地公有辭而不能以自伸歟五月葬鄭簡公三月而塟以楚方滅蔡而國有大䘮懼生變故也楚殺其大夫成熊成熊即成虎左傳楚子謂成虎若敖之餘也遂殺之初或譛成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懐寵也家氏曰䖍以猜忌信䜛殺無罪之大夫故以累上之辭書之秋七月冬十月公子憖出奔齊憖字子仲襄公弟季平子立而不禮于南蒯故蒯與憖謀之既告公而憖遂從公如晉及郊聞費叛遂奔齊髙氏曰季氏之臣南蒯將去季氏而立憖不克而以費叛憖遂奔齊是以君子譏其妄而哀其志也楚子伐徐徐吳姻國楚疾吳故遷怒於徐既執其君而又伐其國為其通吳而不閉道也晉伐鮮虞季氏私考鮮虞子姓國狄之别族也在今真定府新樂縣漢志所謂中山新市縣有鮮虞亭中山今為定州其東南為下曲陽今之晉州也是為鼓子國下曲陽之西南為肥子國在中山新市南三百餘里後漢下曲陽屬鉅鹿郡鉅鹿本治廮陶縣即今順德府平鄉縣也按地理志云下曲陽有鼓聚故狄鼓子國則中山鉅鹿之地皆狄區杜氏以鮮虞肥鼓皆為白狄别種失之矣白狄自為一種在今延綏葭鹿之地與中山鉅鹿相去甚逺安得同為一種也晉陽城在今太原府樂平縣東五十里狄之諸國其西南則邢衛其東北即冀燕皆先王封國而羣狄得以雜處其間皆先王所置使之並生而漸中國之化者也狄雖為患今亦衰矣而鮮虞未見侵擾何以伐為晉之為此不過闢土服逺之計而自此狄地漸為晉有矣晉以號舉者以詐用兵亦狄道據實而書見其異於中國也屬詞晉雖不競猶稱盟主楚合諸侯于申伐吳滅陳誘蔡侯般殺之滅蔡而晉人方以詐滅肥伐鮮虞甘心於羣狄故伐鮮虞稱國責其棄中國於楚聽其吞滅非復諸侯之盟主也十有三年春叔弓帥師圍費王氏經世按南蒯之叛雖以不見禮之故然其謀一則曰歸其室於公一則曰我以費為公臣盖亦不平季氏之所為而不忘乎公室未始欲以邑附他國也故後雖以費入齊而君子不名其叛惟於此書圍費則其罪之在季氏可見矣公山弗擾以費叛召子欲往夫子若往豈使弗擾效順於季氏而已哉反之正必使公室與季氏與家臣各安其所是春秋書圍費堕費之意也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿乾谿杜元凱以為在譙國城父縣南按城父在今亳州東南七十里本陳之夷邑盖楚滅陳以乾谿為南北要地而築章華臺於此以時駐師游觀焉漢志汝南郡下所載城父縣故夷有章華臺註云有乾谿在縣南者即其地也季氏私考比稱公子本楚卿也自晉者因晉力也歸者易辭内有應也歸不言復其位未絶也此去國十三年矣位猶未絶何也見楚䖍以兄弟故而不收其田里不繫纍其族屬則猶存卿禮於義未絶耳歸于楚者歸至其國之辭也若未至其國則當書楚公子比自晉歸弑其君于乾谿不得以至國之辭言矣又云楚䖍暴蔑小國虐殺大臣而又築章華之臺三年不成國人怨之羣失職者皆有亂心觀從本蔡故臣志尤不靖而䖍又常至章華荒於逸樂人莫以告也晉昭嗣世承父乆衰欲合諸侯衆皆畏楚厥憖之㑹計無所施故乗楚有隙而奉公子比以歸則羣小開門延納而即鼓衆以至乾谿道自蔡都而觀從在蔡亦從亂焉棄疾時為蔡公倉卒不能禁止孫辭自溷使惡黨不疑則或有之但棄疾素有才智又握重兵必非亂衆所能刼持而觀從以亡國遺纍勢亦孤立豈能倡亂於蔡公之側故楚䖍之弑公子比倡亂而弑也其歸晉人奉之而歸也則主此謀者專在晉矣考之書法其義自見左氏乃曰觀從召子干子晳强與之盟入襲蔡公因四族之徒以入楚蔡公使殺太子禄公子比為王公子黑肱為令尹公子棄疾為司馬先除王宫使觀從從師於乾谿告之曰先至者復其田里師及訾梁而潰楚子縊于申亥氏如此則弑䖍由亂衆而所恃以為主者棄疾也比特為人所脅耳於法應書楚人弑君以著衆亂之實豈得專歸大惡於比且比之歸本因晉力而國中應之傳載叔向之言曰去晉而不送則與經文書自晉之意不合矣又曰歸楚而不逆則與經文書歸之意不合矣太子禄既為棄疾所殺則大事也亦應與陳公子招殺陳世子偃師同例烏得沒而不書也故凢左氏之説類多輕聽傳聞君子於此亦信其可信者而已矣楚公子棄疾殺公子比季氏私考比稱公子卿而未君也比弑䖍而即見殺其未君可知但曰公子比而不成之為君則有罪之辭也棄疾雖不能止奸禦亂然實未嘗預弑䖍也隨能以賊討比雖云假義亦可以免矣比之死棄疾之所手刃左氏以比為自殺非也上文正比弑君之罪而於此特書公子棄疾殺公子比與棄疾之能討賊也棄疾若果立比為王而已為司馬於法自應書棄疾弑其君比矣烏得隠晦其辭而曲為之説乎又云棄疾代䖍而立是為平王左氏曰棄疾即位名曰熊居豈以舊名人所常稱而既為君則不欲復用邪熊居既立既施舍寛民宥罪舉職復封陳蔡修好邊疆志在息兵不輕用武終其世諸夏帖然雖嘗殺戎蠻戰長岸未免爭强然蠻性無常而易亂則北方利害之所闗吳兵無故而逺來則東境安危之所繫猶為靖國計耳視陵虐中華暴蔑小國者異矣雖其用意本欲自私非亦楚君之賢者歟按棄疾未嘗立比為王盖比自立爾比為王而稱公子乃有罪之詞棄疾殺比而得稱公子則亦討有罪之詞胡氏以為歸獄棄疾誅其意在於代比而非討之者非也秋公㑹劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘平丘在今開封府陳留縣西北九十里張氏曰晉平主盟内惑於寵嬖以女色蠱其心外崇建宫室以侈麗誇諸侯故楚䖍盡召諸侯肆為宗主吞滅親姻坐視不救及平公卒昭公立而楚䖍斃乃幸楚亂欲立威以服諸侯而不知大勢已去徒治親暱本末倒置内外離心諸侯益貳此平丘之㑹所以益隳覇業也季氏私考晉平公時與楚並主夏盟自宋虢二㑹以來晉多讓楚繼以熊䖍暴虐遂無忌憚晉之失諸侯盖已久矣豈為成虒祁之故哉昭公嗣位欲復覆圖而又畏楚强不敢大合厥憖之㑹救蔡不能晉亦無如之何矣不得已而奉公子比以歸假手殺䖍以除中國之患而昭公始得大合諸侯劉子亦預假王臣以為重盖仍成襄時尹子單子㑹盟諸侯故事也據左傳㑹以取郠故而將討魯盟以投壺故而將服齊則恐未必然耳盖魯之伐莒於經本無取郠之書齊之代興於傳徒有投壺之戲安可據以為平丘㑹盟之實哉若夫諸侯既散而欲示以威此則勢之所必至也但不能修德以一人之心而徒恃甲車之盛則何以使人心服邪八月甲戌同盟于平丘家氏曰自晉楚為成晉之君臣自謂天下無事媮惰苟安無復自强之志楚由是竊覇權虎視中夏晉君臣鼠伏而不敢出㡬二十年今楚䖍罪盈惡稔自底覆亡晉昭乃復為㑹于平丘號召諸夏是㑹也齊不肯受盟晉人治兵邾南大陳戎馬脅而與之盟晉亦可鄙甚矣書同盟譏王臣不當下同列國之盟且譏晉人不當以兵脇諸侯而與之同盟是所謂一書再譏也公不與盟季氏私考去年昭公如晉至河乃復魯以南蒯子仲之憂正卿未往致謝此晉人怒魯之本也邾莒自㑹虢以來亦未與晉通好至是晉合諸侯而以威責貢邾莒無以諉罪乃乗晉怒魯而曰我之不供魯故之以晉於是乎拒公使不與盟且執季孫意如以歸夫以貨財之故而威之所加先及於魯雖人望弗恤焉何以使諸侯有固志哉戴溪氏曰桓文之覇先屈意交魯今昭公欲復覇最先治魯晉之盟主止於此亦理勢然也晉人執季孫意如以歸汪氏曰沙隨不見公則執行父平丘公不得與盟則執意如晉人固知季氏之專魯政矣惜乎汨於私欲但知以覇令威魯而不能以覇政治季氏是以徒能辱魯君而季孫得逭其討由晉之諸卿專權而芘强家故也公至自㑹吳澂氏曰公雖不與盟然已與㑹矣故以㑹致蔡侯廬歸于蔡陳侯吳歸于陳髙氏曰楚靈不道暴滅陳蔡而平王始依陳蔡之靈藉以發難今既得位遂復陳蔡以暴其功暴靈之惡而歸恩於己以説中國春秋不言歸自楚者見二國之復乃自當復非夷狄得滅而復之也冬十月葬蔡靈公陸淳氏曰國復乃塟凡三十有一月公如晉至河乃復王氏經世按先是公子憖欲去季氏以告公而從公如晉事雖不遂公之欲除季氏明矣季氏見執而公復如晉人皆以為請季孫而譏其失進退之義以吾觀之公之意殆謂此除季氏之機也邾莒之事托於請之隂欲以明之然晉之執意如本以我之不共魯故之以之一言而已未暇深問相犯之曲直也晉之大夫亦魯之季氏豈有為魯討不臣之事哉吳滅州來傳曰蠻夷屬於楚者吳盡取之則州來夷國也屬於楚者也髙氏曰成六年吳入州來盖本楚屬也至是取之春秋詳楚伐吳畧吳伐楚而志其甚者滅州來是也吳人以州來封季子之後又以遷蔡焉十有四年春意如至自晉胡傳其始執之為乏邾莒之供而非有扶弱擊强之義也其終歸之為土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣三月曹伯滕卒武公卒子平公頃立夏四月秋葬曹武公八月莒子去疾卒著丘公卒子郊公立是年奔齊著丘之弟庚輿立是為共公胡傳卒自外録者也莒人來赴故魯史書其卒葬自内録者也魯人不往是以闕其塟若意如者其傲狠修怨敢施於昭公與莒子及其在晉聞除舘西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是耳苟不逺之其能國乎冬莒殺其公子意恢莒著丘公卒郊公不慼國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善於庚輿郊公惡公子鐸鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之時莒君卒大臣各專廢立至於相殺如此而莒著丘公不足善其身後可見矣左傳蒲餘侯兹夫殺公子意恢郊公奔齊公子鐸逆庚輿於齊十有五年春王正月吳子夷昧卒姪王僚立二月癸酉有事于武宫籥入叔弓卒去樂卒事胡傳縁先祖之心見大臣之卒必聞樂不樂縁孝子之心視已設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之也夏蔡朝吳出奔鄭季氏私考朝吳名蔡卿公孫歸生之子歸生父字子朝而吳以王父字為氏朝吳之奔以罪黜也蔡平公之歸也未必吳能復之當時必有以忤楚平王方救患詰姦亦同惡焉故啖叔佐曰凢奔皆惡也不然則吳乃平王所信蔡侯豈敢逐之其奔鄭鄭方從晉可以知吳有所避矣王氏經世按朝呉於蔡亦有功於平王費無極害之者害其寵也朝吳安於下位似非貪寵利者惜乎復蔡之後不蚤自謀焉推朝吳之心内不忍逺於其君外不敢自踈於楚王有此兩難則勿居其位可也張子房韓讐已報不頼漢寵翩然物外得其道矣朝吳有功兩國見信兩主而身兩事焉此費無極所以來位下之言在其上者所以生及難之慮楚王所以信速飛之謗也費無極固巧於䜛然在君子亦豈可不審於自處乎書朝吳出奔以名利累其心以至於此亦見吳之不智也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞鼓人以城叛鼓地在今真定府晋州季氏私考左氏載荀呉圍鼓以鼓子鳶鞮歸其事經文所無晉於鮮虞伐之又伐盖本以殄滅為期者也此皆廣地之計豈有不納叛不受降之心者耶左氏好為迂談説盖不足信也冬公如晉左氏曰平丘之㑹故也臨川吳氏曰平丘之㑹公不與盟大夫被執公既往朝而不見納辱亦甚矣至此又往朝焉盖畏大國不敢以辱為耻也春秋事義全考卷十三
