body:
  text: 春秋事義全考卷十一明姜寳撰襄公名午成公子母定姒因事有功曰襄元年春王正月公即位仲孫蔑㑹晉欒黶宋華元平衞獻甯殖殖俞孫相之子曹人成莒人犂此邾人宣滕人成薛人圍宋彭城胡傳楚已取彭城封魚石戍之三百乘矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖專其地君子不登叛人所以正疆域固封守謹王度也季氏私考按桓文盛時凡諸侯㑹盟惟八大國而小國各相附屬皆不預焉今邾莒滕薛皆預于㑹者則以賦役日煩小國附於大國不若親供一國之賦者之為簡便故因晉悼興而更制也自是小國多列于諸侯矣又按莒邾滕薛毎預諸侯之㑹多以人書者盖小國一卿其大夫亦多不備故常以士攝行抑或下大夫或初試為大夫者止可當大國之士故以列於微者而名遂不登於史䇿歟當時主㑹者亦不以此為慢也夏晉韓厥穿之族帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人把人次于鄫鄫在今睢州宋地也傳東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援王氏經世按楚大夫既禽五大夫於是伐鄭以討其從楚納魚石之罪然不重勤諸侯使韓厥將偏師而東諸侯次于鄫以為之援楚兵不出則韓厥足以當鄭楚兵出則五國之師足以撓楚此皆放於義合於節制而不輕用者也秋楚公子壬夫帥師侵宋傳楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘按救鄭而侵宋攻其所必救侵宋即所以救鄭也胡傳謂傳書子辛而經不書似以壬夫子辛為二人救鄭侵宋為二事誤矣九月乙酉天王崩簡王崩子靈王立邾子來朝通嗣君也冬衞侯獻使公孫剽獻公從弟黑背子來聘聘新君晉侯悼使荀罃來聘通嗣君胡傳簡王崩赴告已及藏在諸侯之䇿矣則宜以所聞先後而奔喪今邾子方來脩朝禮衛侯晉侯方來脩聘事於王喪若越人視秦人之肥瘠曾不與焉而左氏以為禮此何禮乎屬詞襄公即位悼又先來聘故公朝悼者四三年始朝四年朝而聽政八年聽朝聘之數晉侯亦使士匄來拜公之辱蕭魚之後晉來拜師公復往朝悼公待諸侯有禮故公謹於事晉如此二年春王正月葬簡王五月而葬速矣鄭師伐宋楚令也夏五月庚寅夫人姜氏薨姜氏襄公嫡母也齊姜娶未及七年而薨未聞有所出六月庚辰鄭伯睔卒成公卒子僖公髠頑立是年晉楚争鄭晉乗鄭䘮而伐之諸侯之大夫㑹于戚以謀討鄭國方有難不備禮故不書葬晉師悼宋師平衞獻甯殖侵鄭蘇氏曰鄭雖有叛中國之罪然伐其䘮非禮也秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人成邾人宣于戚謀討鄭也季氏私考㑹戚將以謀制鄭也而諸國大夫多有不集故至冬又㑹則告以城虎牢之謀晉之為㑹每就戚焉可以見孫林父之倚晉也深而晉之親林父也至矣己丑葬我小君齊姜叔孫豹得臣次子僑如弟如宋宋平公立於今五年而公亦新立豹如宋通嗣君也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢傳鄭人乃成晉知武子從孟獻子之言奪其險而城之所以逼鄭也本孟獻子之謀見晉悼能用謀也季氏私考虎牢巖險之地即虢之制邑而為鄭所併在漢為成臯今鄭州汜水縣也其地在鄭之西而楚在鄭南非能斷楚爭鄭之路但鄭人得之則足以挾楚而抗晉者也夫鄭之所以常服楚而不畏晉者亦料諸侯逺來致討兵不能久留耳故晉人特設此謀先為城守以偪之鄭見虎牢城而諸侯之師常在焉則必不敢棄晉南向而自當仗信以守其國矣然晉城虎牢非欲助鄭以與楚戰也特偪鄭而使之不敢貳耳此即知武子不與楚戰之計也晉以虎牢本虢舊封非鄭分地與衆共之不令鄭有故不繫之鄭王氏經世虎牢方為伐鄭不服而城其巖邑以制之豈可曰城鄭虎牢也耶况晉必以師取之而後城之則版築興之日虎牢固非復鄭虎牢矣此所以不繫之鄭胡氏以為責鄭之不能有非也汪氏曰自平王東遷鄭武公入為卿士王賜之虎牢以東後失其地鄭厲公納惠王而王復與之焉然齊桓之覇説申侯而與之虎牢則固未嘗以虎牢為中國之輕重也迨悼公之覇則近楚㣲國若江黄弦庸六蓼羣舒之類吞噬靡遺中國諸侯若陳若蔡若許亦已服役於楚夷於屬縣而鄭以王室懿親畿内大國又屈而從楚苟非扼虎牢之險以制其棄同即異之心則楚將越鄭而東蹂躪中華之境其不淪胥以敗者㡬希矣故虎牢之城不繫於鄭責鄭而與中國也楚殺其大夫公子申楚司馬晉城虎牢有以勝楚矣楚人以連年不得志於宋謂司馬不能振兵威也故殺申三年春楚公子嬰齊帥師伐吳季氏私考是時吴與中國合好楚人患之欲先滅吴以服中國故公子嬰齊以重兵伐之而不知吴方强盛非可以力屈之時也又趙鵬飛氏曰自是天下之勢遂成鼎足晉吴楚是也吴既附中國則楚實孤終春秋之世楚無一日安枕者吴掎其東也公如晉季氏私考觀襄公如晉而能與晉侯盟于長樗則左氏所謂㑹于沙隨之歲始生而説者遂謂四歳即位者妄矣按髙氏謂襄於是始七歳童子侯不可接以成人之禮非也襄能逺如晉又如衛自逺同盟雞澤必已長非童子侯矣夏四月壬戌公及晉侯盟于長樗是時孟獻子相公稽首知武子謂天子在而君辱稽首寡君懼焉者所以為知禮也晉侯去其國而與公盟長樗盖近晉地於此見悼公之謙宜其能復伯也公至自晉六月公㑹單子晉侯悼宋公平衛侯獻鄭伯僖莒子犂比邾子宣齊世子光己未同盟于雞澤即今廣平府雞澤縣王氏經世按前年城虎牢鄭人請成故今年合諸侯鄭列于㑹而同盟以堅服鄭也堅服鄭以同外楚也單子與盟盖自齊桓假王人為重然首止葵丘㑹王人而不敢援與同盟世變日降王人之同盟屢矣習俗既成雖以悼公之賢而亦不知革也而其失亦難掩矣季氏私考晉厲公時始假王臣為重而要之同盟悼公嗣興猶循故事故亦要單子以與此盟自此平丘召陵凡大㑹諸侯率以要王臣為常矣晉悼有志復覇人心信從雖久叛之陳亦使袁僑如㑹則其事與厲公異矣胡傳其同欲柰何同病楚也㑹于柯陵之嵗夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師于汝上而諸侯還雞澤之盟陳袁僑如㑹楚師在繁陽而韓獻子懼平丘之行楚棄疾立復封陳蔡而中國恐是知此三盟者諸侯皆有戒心而脩盟故稱同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣廬陵李氏鄭子展曰五㑹之信今將背之盖鄭之從晉始于雞澤故三年雞澤五年戚又㑹城棣救陳七年鄬八年邢丘皆鄭與㑹也于鄬雖未至已致其意矣自邢丘之後子駟不從子展之言而鄭從楚故五㑹始雞澤終邢丘皆鄭故也陳侯成使袁僑如㑹杜氏曰陳侯疾楚政而來屬晉本非召㑹而自來故云如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟傳楚司馬公子何忌侵陳季氏私考趙鵬飛氏曰悼公晉之賢君也其所以覇諸侯之效在得陳得鄭而已陳鄭即楚久矣今與虎牢之役隻矢不遺而鄭來陳見鄭來而恥獨為夷亦遣袁僑如㑹然鄭以君㑹而陳以臣至雞澤之盟以諸侯盟鄭之君戊寅之盟以大夫盟陳之臣盖鄭伯之來既與盟矣袁僑至而無以質之則懐附之心不固苟復自與之盟則袁僑實抗而覇權不尊故以大夫盟之則晉無屈己之辱僑無抗君之罪禮甚安而分甚明此所以見悼公之賢也論者乃謂諸侯在而大夫盟為大夫之專殊不知大夫奉君命而盟袁僑又何得為專乎王氏經世按榖梁氏曰諸侯盟又大夫相與私盟是大夫張也故雞澤之㑹諸侯始失政矣啖子曰諸侯盟已畢而袁僑至故大夫與之盟耳無他義也愚謂大夫奉君命而盟袁僑非大夫相與私盟也非大夫張也晉君方明六卿皆民譽諸侯和協何得因一盟而失政自是始乎但踐土之盟陳穆公如㑹文公未嘗再要以盟而陳服于晉厯三世而不叛袁僑受陳侯之指而來苟有誠服之心又何必汲汲以盟誓結之哉則悼公不知本之過也秋公至自㑹冬晉荀罃帥師伐許以不㑹雞澤也四年春王三月己酉陳侯午卒傳夏楚彭名侵陳胡傳午者襄公名也孔子作春秋在哀公之時襄公哀公之皇考也曷不諱乎夫子兼帝王之道参文質之中而作春秋以法萬世如公薨不地滅國書取出奔稱孫之類所以放其文也莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人之類所以從其質也從其質此陳侯午所以不諱也夏叔孫豹如晉報元年荀罃之聘也秋七月戊子夫人姒氏薨成公妾襄公母姒把姓葬陳成公八月辛亥葬我小君定姒西亭辯疑公羊本姒作弋不然此既稱定姒不應哀公時復稱定姒當以公羊本為正姒字誤冬公如晉本為晉謀合諸侯也而善道㑹吳之議亦始於此矣陳人圍頓傳楚人使頓間陳而侵伐之故陳人圍頓髙氏曰頓子恃楚而不事陳今陳復從中國而頓為楚間故圍之自雞澤之㑹而書伐許圍頓見晉興而楚詘矣五年春公至自晉夏鄭伯僖使公子發子産父來聘僖以二年即位今來聘通嗣君也鄭聘魯唯此終春秋魯未嘗聘鄭叔孫豹鄫世子巫如晉豹覿鄫世子於晉託世子於晉也而鄫卒為莒滅悼亦不能庇鄫豈逺故歟仲孫蔑衞孫林父㑹吴于善道鳯陽府盱眙縣地在淮水南鍾離東本屬吴者也晉將邀吴為戚之㑹而魯衛近吴且俱同姓故命以通好焉懲前此吴子之不至也許翰曰晉楚争衡權在吴故晉急於㑹吴如此秋大雩楚殺其大夫公子壬夫子辛黄震氏曰楚忿陳之復歸晉也咎令尹子辛侵欲于陳故殺之公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子犂比邾子宣滕子成薛伯齊世子光靈吴人鄫人于戚吴何以稱人來㑹不為主也石氏曰成九年為蒲之㑹將以㑹吴而吴不至故十五年諸侯之大夫㑹之于鍾離前三年悼公盟雞澤使荀㑹逆吴子而又不至故此年使魯衛先㑹之于善道凡此皆往㑹之也至秋戚之㑹序吴於列而不復殊者因其來㑹也凡序吴者來㑹我也殊吴者往㑹之也季氏私考夀夢方强懼與楚合故悼公逺與吴通使為楚憂亦制强夷紓近患之微權然不脩德息兵柔逺能邇而又結一强夷苟紓目前忽逺圖而忘後害此䇿之下者也公至自㑹冬戍陳程子曰陳附中國而楚爭之則戍之者在於助陳而距楚與之可也楚公子貞子囊帥師伐陳以陳從晉也公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳十有二月公至自救陳楚伐而晉即合諸侯以救之其勤如此陳之服晉宜矣辛未季孫行父卒髙氏曰自文子卒而魯有城費作三軍事則知文子雖專而猶忠慎僣亂未啓也其子宿嗣是為武子於是始營私家矣六年春王三月壬午把伯姑容卒桓公卒子孝公匄立夏宋華弱來奔左傳弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之來奔秋葬把桓公滕子成來朝始朝公也莒人滅鄫廬陵李氏曰四年公如晉請屬鄫晉以鄫屬魯其冬邾莒伐鄫臧孫紇救鄫侵邾五年叔孫豹覿鄫世子巫於晉九月㑹戚豹以屬鄫為不利使鄫大夫聽命於㑹今年莒滅鄫晉人來討季武子如晉謝亡鄫此左傳鄫事之本末也西亭辯疑先儒多宗公榖之説獨陸氏不取謂定六年鄭滅許哀元年許復見於經則鄫之滅而再見亦何足怪若鄫人實取外孫以為國嗣罪自在鄫非莒之過經文又當如梁亡之類而言鄫亡不得書莒滅也且鄫雖小國亦有君臣社稷豈肯居然取異姓為後乎按廬陵李氏取趙伯循之説謂莒人以兵破鄫立其子使守之而為附庸其子又鄫之外甥令奉鄫祀神不歆非類是使鄫絶嗣也故須書滅公榖但傳得立鄫甥守祀之説而不知莒實滅鄫使為附庸後至昭四年魯復取鄫鄫再見于經以此立異姓以為後之事誠有之然春秋書莒滅鄫實以莒是時取鄫為附庸故書滅非是莒女為鄫夫人立其出而即為滅亦非立異姓即為滅亡之道之謂也胡傳引黄歇吕不韋進妹獻姬之事則更逺於事情矣冬叔孫豹如邾報邾子之朝也屬詞邾自宣成以來世朝于魯襄四年魯屬鄫而邾莒伐鄫侵邾敗于狐駘至是莒滅鄫魯知外患未已故釋怨以脩好于邾時襄公幼孟獻子叔孫穆叔為政庶能克己者矣季孫宿如晉左氏晉為鄫故來討故宿如晉當時魯屬鄫而晉以鄫故來討魯謝亡鄫事情亦當然但宿之往也殆宿初嗣似亦託使事以求見伯主爾十有二月齊侯滅莱萊姜姓子爵國於東夷傳謂裔夷之俘以此齊圖萊乆矣至是滅之七年春郯子來朝郯久事吴晉悼公既以諸侯㑹吴人于戚於是郯子始來朝夏四月三卜郊不從乃免牲小邾子宣來朝城費胡傳費季氏邑也按左氏南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費夫文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至於帥師墮費其越禮不度可知矣然則書城費乃履霜堅氷之戒强私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉季氏私考費魯東鄙邑僖公以賜季友今屬兖州府沂州沂州即臨沂也臨沂故城在州北五十里水經注曰洛水出冠石山東南流注于沂沂水則自中丘城西而南逕臨沂城東合汶水而又南逕啓陽城東者也啓陽之西南為邾地中丘之東北為莒地費在顓臾祊田之間而界於邾莒季氏以為要地故宿初嗣位而即城之不言季孫宿城者當時大夫食邑猶屬於公城以國事舉也然私邑自專之禍於此實造端矣秋季孫宿如衞襄元年衛公孫剽來聘宿如衛報剽之聘也通衛好也時仲孫蔑執政務在睦隣故多通使於隣國如此八月螽冬十月衞侯獻使孫林父來聘壬戌及孫林父盟其來聘報季孫宿之聘其盟尋孫良夫之盟也楚公子貞帥師圍陳十有二月公㑹晉侯宋公陳侯衞侯曹伯成莒子犂比邾子宣于鄬季氏私考鄬鄭地盖在鄢陵之間近陳者也鄵亦鄭地當在鄬西楚公子貞用大衆以圍陳其勢盛於伐矣然以十二月將厯一冬民朝夕急而悼公始㑹諸侯于鄬遷延鄭地是有畏楚之心而不能急救陳也夫陳之所以從晉恃其能救己耳楚患曰迫何以能存此陳侯之所以逃歸也而晉人緩師畏敵之罪見矣陳既失恃而晉遂無以宗諸侯自是終襄昭之世中國盟㑹非晉楚之從交見者無復有陳而晉亦不復致討此豈真有意於懐陳者哉鄭伯髠頑如㑹未見諸侯丙戌卒于鄵僖公卒子嘉嗣是為簡公季氏私考諸侯已至於鄬越鄭都矣而鄭伯不㑹則有疾可知如㑹而卒于鄵以疾卒也三傳皆以弑言不經之甚矣榖梁曰未見諸侯其曰如㑹何也致其志也禮諸侯不生名此其生名何也卒之名也卒之名則何為加之如㑹之上見以如㑹卒也此數言已足以見其從中國之善矣何必附㑹為不言弑之強詞也歟西亭辯疑諸侯不生名此名鄭伯者何以鄭伯如㑹而卒也一事故不得雨舉其名若曰鄭伯如㑹未見諸侯髠頑卒于鄵則辭不順所以首志其名也三傳見其文異乃以為弑弑而書卒趙鵬飛曰春秋庇逆賊矣豈理也哉陳侯哀逃歸榖梁子曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以固守親聽命於諸侯謀禦敵之䇿當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衛而逃歸此匹夫之事故書逃歸以罪之可謂深切著明矣八年春王正月公如晉朝且聽朝聘之數也夏葬鄭僖公鄭人侵蔡獲蔡公子燮季氏私考公子燮蔡司馬國卿也鄭人恃晉故侵蔡而獲其公子所謂不脩文德而有武功者也蔡楚之與也能無致楚之討乎子耳子國之為政於是乎失謀矣季孫宿㑹晉侯鄭伯簡齊人靈宋人平衞人獻邾人宣于邢丘胡傳蘇轍曰晉悼公脩文㐮之業改命朝聘之數使諸侯之大夫聽命於㑹大夫稱人衆詞也朝聘之節儉而有禮衆之所安也臣則以為大夫稱人貶之也朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由德乎使政在大夫而諸侯失國又豈所以愛之也後此八年湨梁之㑹悼公初歿諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿㑹見魯之失政也諸侯之大夫貶而稱人謹其始也廬陵李氏曰左氏疏昭三年鄭子太叔云文襄之伯也令諸侯三嵗而聘五嵗而朝自襄以後晉徳少衰諸侯朝聘無復定準今晉悼復脩覇業更合諸侯故公朝晉而禀其多少如公朝者盖亦非一晉侯謙不敢在國約束故出外合之又難煩諸侯使大夫聽命故為邢丘之㑹以命朝聘之數耳其數盖亦同文襄也汪氏曰悼公復伯業而虚朾同盟首以仲孫蔑齊崔杼厠乎其間繼㑹雞澤又以諸侯之大夫盟陳袁僑焉今而㑹邢丘且曰重煩諸侯而使大夫聽命然則諸侯之失政實悼公為之也春秋人諸侯之大夫而不貶季孫宿盖不書季孫則疑於諸國之微者人諸國之大夫所以人宿也公至自晉莒人伐我東鄙髙氏曰鄫田接于魯而疆界不明故興兵伐魯以正之鄫遂屬於莒矣秋九月大雩冬楚共公子貞即子囊帥師伐鄭討侵蔡也胡傳鄭介大國之間困强楚之令而欲息肩於晉若能信任仁賢明其刑政經畫財賦以禮法自守而親此四隣必能保其封境荆楚雖大何畏焉而子耳子國加兵於蔡獲公子燮無故怒楚所謂不脩文德而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚之争鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服於楚而不信也犧牲玉帛待於境上以待强者而請盟其能國乎廬陵李氏曰此鄭又從楚之始也至十一年蕭魚始從晉晉侯悼使士匄來聘拜公往朝之辱也九年春宋災夏季孫宿如晉報士匄拜朝之聘也五月辛酉夫人姜氏薨成公母秋八月癸未葬我小君穆姜四月而葬速矣冬公㑹晉侯悼宋公平衞侯獻曹伯成莒子犂比邾子宣滕子成薛伯把伯小邾子齊世子光靈伐鄭簡十有二月己亥同盟于戲胡傳善為國者不師善師者不陣善陣者不戰知武子明於善陣之法以佐晉悼公屢與諸侯伐鄭楚輙救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之㑹以美之季氏私考鄭之見伐於楚悼公不欲勞民以與楚戰故常不救及其從楚則伐之而已矣此虎牢偪鄭之計也是時晉因鄭服復以虎牢與鄭故鄭又從楚雖諸侯伐之猶不心服所使來請成者微者耳而晉亦姑聽之姑退師以示柔服然諸侯恐有怠心也故復同推晉覇盟戯以明不貳之意左氏謂此盟為鄭服若鄭伯親至則當書鄭伯如師矣啖叔佐曰經書同盟自是晉與諸國同盟鄭不預也此説得之然下書楚子伐鄭則鄭與晉成可知矣永嘉吕氏曰晉師敗邲之後楚復陵駕中華既縣陳入鄭又滅蕭圍宋于蜀之㑹奄然以蠻夷之大夫主盟諸夏而聽命者十有一國卒之保鄭以為已有厲公敗之於鄢陵三假王命以伐鄭而終不服悼公復覇鄭與於五㑹之信而猶叛焉悼公欲直擣方城漢水之境繼齊桓帖荆之績則楚寖强盛未肯服義而昔者處父之伐不足以屈其力也欲與之决勝復文公舘穀之捷則暴骨以逞勝不可知而先君鄢陵之勝不足以服其心也於是數伐鄭而不與楚戰使楚人疲於奔命而莫能爭鄭既有以剉其暴狠之鋒又有以推其慿陵之志桓文以降於斯為盛故于戯亳北雖書同盟以惡鄭之反覆而㑹于蕭魚特筆以著其美也然悼公四駕伐鄭唯盟戯不致者因子駟之言而未得志於鄭是以不書至榖梁子所謂恥不能據鄭是也亦猶㑹鄬謀陳不成救而不書至㑹耳悼公九合諸侯獨於于鄬于戯不致春秋豈無意哉悼公九合諸侯㑹戚一㑹城棣救陳二㑹鄬三㑹邢丘四戯五柤六戍虎牢七亳城北八蕭魚九晉語以為七合盖不數救陳與戍鄭也楚子共伐鄭楚莊王夫人卒王未能定鄭而歸季氏私考虎牢之城鄭既從晉而楚以晉人為能庇鄭亦不争矣及鄭人侵蔡怒楚而楚公子貞來伐以晉人不救知鄭之無所恃也故鄭復從晉則楚遂加兵焉此舉是也十年春公㑹晉侯宋公平衞侯獻曹伯成莒子犂比邾子宣滕子成薛伯把伯小邾子齊世子光靈㑹吴于柤柤古偪陽國地在今沛縣界盖吴晉往來處季氏私考是時晉方與楚争鄭悼公懼吴之有異志也則楚無擬其後者將悉力以抗中國矣故晉率諸侯又往㑹吴盖㑹夀夢也凡諸侯往與之㑹而以之為主常在吴地今諸侯親往而吴亦就之則于柤亦吴所便也吴可謂倨傲自尊矣而晉覇甘心焉盖不得已而為中國屈耳屬詞殊㑹者以其稱號不典未能以中國諸侯之禮相接故諸侯自相與為㑹然後㑹之所謂㑹又㑹也晉厲以大夫㑹吴悼遂以諸侯㑹之皆欲通吴以撓楚也夏五月甲午遂滅偪陽偪陽在今兖州府嶧縣西南五十里季氏私考偪陽妘姓小國子爵其地在沛縣一統志云在嶧縣西南五十里則亦沛之東北界也觀晉以偪陽予宋公盖本宋之屬國也偪陽去晉甚逺素無得罪而楚師每至宋境亦未聞其有異心於楚也苟有異心於楚則偪陽在彭城之上悼公必於發兵圍彭城時明大義以伐之矣而何待今日邪然則何為而滅之也盖偪陽近柤必閉道不與吴通中國而諸侯所欲為吴甘心者也今諸侯親至其地㑹吴燕享日久而偪陽地主之禮闕焉又以是為慢也故遂滅之遂者急辭見其滅偪陽之速也晉欲親吴而滅無罪之國以悦其意豈所以懐諸侯威天下哉偪陽子不知所終故不錄其末云汪克寛氏曰偪陽居吴入中國之要衝悼公之㑹吴于柤盖謀滅偪陽而通吴也此通吴晉往來之道也公至自㑹為吴滅偪陽亦魯所恥言故不致滅而致㑹楚公子貞鄭公孫輒帥師伐宋傳六月庚午圍宋衛侯救宋師于襄牛鄭皇耳帥師侵衛秋楚子囊鄭子耳伐我西鄙還圍蕭克之九月子耳侵宋北鄙季氏私考鄭之從楚以鄢陵之戰其君為鄭而親集矢於目也晉之伐鄭以鄭人從楚助魚石而伐宋也故晉兵加鄭則報必及宋鄭之恃楚而不知自反久矣今楚子伐鄭鄭之從楚復堅故楚又助鄭伐宋以報去年伐鄭之役宋惟從晉不貳是時宋樂喜又以賢臣當國故其謀定於先禦備於預完壁以守不與交鋒楚雖加害卒亦無如之何矣晉師伐秦是時秦人南交於楚而秦景公妹又為楚共王夫人悼公懼其為楚出師故先伐秦識者以為晉欲通吴莫若求成於秦之為得䇿也秋莒人伐我東鄙莒間諸侯之方有事故伐我其無忌憚亦甚矣公㑹晉侯宋公平衛侯獻曹伯成莒子犂比邾子宣齊世子光靈滕子成薛伯把伯小邾子伐鄭此悼公三駕之一也師于牛首季氏私考此因鄭人從楚伐宋而伐之自此晉人凡三伐鄭皆因楚鄭加兵於宋而後動則亦不得已而應之者也冬盜殺鄭公子騑子駟公子發子國公孫輒子耳張洽氏曰鄭之從楚以勞中國皆公子騑之罪也鄭成公卒之初諸大夫欲從晉矣騑以官命未改止之及鄵之役僖公如㑹以從中國而騑不從及楚子囊伐鄭子展欲堅守以待晉而騑請從楚故騑者從夷之人也而發輒惟騑是從此所以不稱殺其大夫也歟戍鄭虎牢楚公子貞帥師救鄭林堯叟楚數救鄭矣宣元年蒍賈二年闘椒九年子重十六年楚子十七年子重公子申皆不書於是始書救鄭以為晉悼復伯楚始救而不能也是故書救陳見晉之終失陳書救鄭見楚之終失鄭云爾王氏經世云城虎牢不繫之鄭者時鄭從楚中國取其虎牢而城之為中國守險以制鄭非為鄭而城之也戍虎牢而繋之鄭者時鄭已從晉中國恐楚伐鄭故置兵守衛以拒楚是為鄭而戌之也按鄭及晉平于戍虎牢之後則為鄭已從晉恐楚伐鄭為鄭而戍者似未合左氏曰非鄭地也言將歸焉盖既欲駐師阨險以偪之亦兼欲斷荆楚之路為鄭屏蔽鄭服則將歸焉徳威並行以示懐納於鄭故春秋原其志而書之城而不戍猶不城也楚來争鄭徐合諸侯以救之無及於楚而徒勦民猶不救也此戍虎牢之意也戍則常宿兵峙糧㨿險退可守進可戰鄭服則保鄭以拒楚鄭貳則我扼其要而制其肩膂南向足以禦楚而反向足以臨鄭徒城以偪之志於困鄭而已鄭不心服也置戍示將為之捍禦若曰虎牢非吾利之也為鄭而已公至自伐鄭十有一年春王正月十一年傳宋向戍侵鄭大獲作三軍屬詞魯地方百里其初封之時有三軍後舍其一軍止有二軍作三軍者復舊制也然其時三家專國非有意於復舊也但借改作之名而分公室之民為私家之民分兵既定則復舍中軍矣王氏經世按杜氏謂魯舊二軍今增立中軍縁三子各毁其乘舊軍盡廢而全改作之故曰作三軍依周制則魯侯國止有二軍耳僖公之車千乘徒三萬亦僣也此作三軍盖承乎自减為二之後杜氏謂增立中軍其説是也增立中軍正可謂之作中軍矣而曰作三軍者三家欲專其民人各毁其乗盡廢舊制而全改作之孔氏之説是也夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋從子展之謀欲以致諸侯乃固與晉也公㑹晉侯宋公平衞侯獻曹伯成齊世子光靈莒子犂比邾子宣滕子成薛伯把伯小邾子伐鄭此三駕之二以前伐未得志而鄭復來侵宋故也觀兵於鄭南門西濟于濟隧秋七月己未同盟于亳城北公至自伐鄭亳即湯故都今偃師是也公榖皆以亳為京謂今京索之京近則近矣其如經之本文何偃師即百里之逺亦豈謂之迂途哉亳北乃諸侯推晉為盟鄭尚未與也西亭辯疑同盟亳城謀楚也先儒皆以鄭服而盟及考左氏記盟誓之辭祗言十二國而無鄭者何盖晉二駕之兵皆為鄭出也一以公子貞公孫輙伐宋一以公孫舍之侵宋一以楚子鄭伯伐宋苟以此盟為鄭服而鄭何為又從楚有伐宋之師邪楚子鄭伯伐宋攻其所必救欲致晉師而晉亦不救宋但出虎牢之兵以伐鄭而已公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚此三駕之三蕭魚之㑹晉將為㑹以説鄭歟盖鄭連嵗疲於兵人將悔禍晉欲有以堅其從也故為此㑹以開諭之而鄭之誠服猶在既㑹之後不從楚上見之此時鄭亦尚未在㑹左氏以為鄭服而請㑹與所謂伯駢行成者皆未然也公至自㑹楚人共執鄭行人良霄即伯有公孫輒之子其祖公子去疾字子良故以王父字為氏良霄如楚告將服于晉而見執書楚執良霄見楚之力盡於是矣髙氏曰楚不能得鄭故執良霄自是不復出師與晉争鄭於是堅從晉矣成十八年楚鄭伐宋冬楚鄭侵宋襄元年圍宋彭城韓厥伐鄭次鄫壬夫侵宋二年鄭伐宋夏晉宋衞侵鄭城虎牢雞澤袁僑如㑹及袁僑盟荀罃伐許四年陳圍頓五年戍陳貞伐陳救陳圍陳㑹鄬陳逃侵蔡獲燮貞伐鄭九年㑹伐鄭楚伐鄭十年貞輒伐宋秋㑹伐鄭冬貞救十一年夏舍之侵宋㑹伐鄭秋楚鄭伐宋㑹伐鄭蕭魚屬詞晉悼公復伯十有一年之中再合大夫九合諸侯始於救宋終於服鄭當楚鄭之侵宋也晉侯師于台谷以救宋楚師還雖君將不書楚每得鄭然後圖宋悼之興楚卒失鄭何宋之及圖故救宋無關於伯體不書而以圍彭城伐鄭序績當務為急也次鄫之役晉師自鄭以鄫之師侵楚及陳晉侯衛侯次于戚皆不書者悼之伯略未足以侵陳伐楚也范宣子曰陳近於楚民朝夕急有陳非吾事也無之而後可不待陳侯逃歸而晉人已置陳於度外矣故鄫之次徒以吾大夫㑹外大夫存䇿書之大體而已楚何忌侵陳彭名侵陳皆不書者下書伐陳圍陳舉重鄭子然侵宋不書下書伐宋子耳侵宋不書上書伐宋皆舉重也鄭皇耳侵衛衛人獲皇耳不書與成十五年楚伐鄭不書侵衛同撥亂之機務當其㑹也冬秦人伐晉猶是為楚救鄭也十有二年春王三月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆台魯邑今費縣南有台亭胡傳鄆莒邑也遂者生事也入者逆詞也大夫無遂事受命而救台不受命而入鄆惡季孫宿之擅權使公不得有為於其國也台在邦域之中而專行之非有無君之心者不敢為也昭公逐定無正夫豈一朝一夕之故哉其所由來者漸矣晉悼力衰於伐鄭蕭魚甫㑹莒已背盟矣髙氏曰文十二年嘗帥師城鄆矣魯不能守為莒所取今復欲取之故季孫因救台而遂入鄆夏晉侯使士魴來聘為蕭魚之役拜師也屬詞成公之世晉始通吳鍾離於中國晉厲晉悼皆與吳㑹晉平遂嫁女於吴雖同姓而不顧皆欲結之以撓楚也故夀夢以後弔䘮之禮遂交於魯至昭公亦取於吴其後魯賦於吴八百乗職貢同於事晉則以晉伯既衰欲倚吴以敵齊楚也不書葬義與楚同秋九月吴子乗卒吴至夀夢始僣稱王夀夢卒子諸樊立冬楚公子貞帥師侵宋楚以晉得鄭必欲得志於宋故也然楚兵自是亦不至宋矣盖為晉不戰所屈而宋樂喜謀國之功亦不可少也公如晉朝且拜士魴之辱也十有三年春公至自晉夏取邿濟南府濟陽縣傳曰邿亂分為三師救邿遂取之秋九月庚辰楚子審卒共王卒子康王昭立冬城防季氏私考防在齊南而近於莒是時已為臧孫氏邑去年春莒伐魯明年夏莒侵魯則城防所以備莒莒隂與齊合亦以備齊也十有四年春王正月季孫宿叔老嬰齊之子以祖叔字為氏㑹晉悼士匄齊人靈宋人平衞人獻鄭簡公孫蠆曹人成莒人犂比邾人宣滕人成薛人把人小邾人㑹吴人于向季氏私考曰杜元凱曰譙國龍亢縣東南有向城按譙國即今亳州龍亢城在今懐逺縣西北八十五里俱屬鳯陽府盖吴楚界上地大夫㑹吴也義亦與柤同私考又云是時夀夢已卒而中國復往㑹吴者盖鄭人雖已服晉而悼公尚欲報秦故親吴不絶使楚不敢為患耳然諸侯不親行皆使大夫㑹而禮殺于柤則見夀夢既卒而諸樊威望亦不及其父矣自是吴楚交争晉亦不復與吴為㑹而至於黄池始見焉魯為晉求吴欲以取媚而叔老亦以卿為介幸於得親尚為能自立哉二月乙未朔日有食之夏四月叔孫豹㑹晉悼荀偃齊人靈宋人平衞獻北宫括鄭簡公孫蠆曹人成莒人犂比邾人宣滕人成薛人把人小邾人伐秦荀偃庚之子是為中行獻子屬詞伐秦之役晉衛鄭大夫皆從其恒稱而齊宋大夫稱人者傳以為齊宋大夫不進師也自令狐以來晉與秦交兵大夫將皆稱人而荀偃獨從其恒稱者悼公以諸侯之師伐秦庶幾能張中國之勢討秦人黨楚之罪而齊宋大夫不進師則悼公之令外不行於列國矣荀偃欲進而欒黶先歸則悼公之令内不行於臣子矣故荀偃得從其恒稱譏不在荀偃也諸侯大夫知有伯之無益於己而不知無伯之禍又有甚焉故惰慢不攝如此譏不徒在晉也季氏私考秦與晉兵争已非一日晉之世讐也故悼公修復伯業復鄭駕楚後即合十三國之大夫伐秦盖自文公以來出師未有若此之衆也然秦關河四塞食足兵强豈易攻之國哉雖將帥輯睦未必能成功也悼公智豈不及特欲假諸侯之兵以示威耳而秦果閉關自守終春秋之世不復與晉争秦自此蓄威養銳至孝公時内修耕稼之政而其後世卒併天下葢實肇基於此已未衛侯出奔齊季氏私考衛獻公以正得國君衛一十八年與晉悼盟㑹未有失焉本無大惡也特以在位日久燭乎孫氏之專林父懼其害己也故倚於晉援不恤其他遂假暱羣小蔑冢卿之罪而出衛侯盖公孫剽者子叔黑背之子也非次而立其私事林父何所不至固林父之所易制而欲立之者也其逐獻公意可知矣師曠之語晉侯者亦以君道言也若為權臣而發則豈聖人之言哉要之定姜數獻公之語皆林父假託自文之辭而晉人蔽於林父之奸信之獨切故雖師曠亦以此而戒晉侯也使無蘧伯玉之言則亂臣之逆節㡬於伊尹放太甲之忠矣但考蘧伯玉仕靈公朝與孔子為友不應此時已列諸卿能與林父相抗或其言出於他人之賢者而左氏誤記其名也歟又云林父逐獻公而立剽剽本無有簒國之意制於林父而不能以禮自持然亦難免於簒矣蔑視冢卿則為不君僕妾定姜則為不子王氏經世胡氏謂舊史書孫林父寗殖出其君而仲尼筆削稱衛侯出奔恐無此理出之為言不容而見逐之謂也臣子施於君父而史官直書于䇿則非辭也故但可言出奔而已言出奔則或君無道或臣强皆可推其上下比事而見之矣專以為歸罪其君者害教之言也師曠之言足以警其君而不足以訓其臣信如其言是君可出矣曰君神之主也民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為是何言哉殆亂臣賊子之口實也莒人侵我東鄙報入鄆也秋楚公子貞帥師伐吴季氏私考吴夀夢既卒晉人特以伐秦之故㑹吴于向以資其制楚之力自後亦遂與吴不通好矣楚無晉規於是使公子貞伐吴而二十四年楚子又親伐之亦可見諸樊之時吴勢稍衰矣制吴而後可以圖中國也冬季孫宿㑹晉悼士匄宋平華閱衞殤公剽孫林父鄭簡公孫蠆莒人邾人于戚戚孫父邑林堯叟云於是衛孫林父立公孫剽而㑹晉于戚以定之襄昭之際大夫無君之禍晉為之也悼公之德衰矣季氏私考黄震氏曰左氏載衛孫林父逐衛獻公衎而立剽晉侯以問荀偃對曰不如因而定之衛有君矣故㑹于戚以定剽春列國之㑹于向者大半不至亦可見人心之公而晉悼聼荀偃之言誤矣自是至剽弑而衎歸衛有二君者十年皆晉為之也以悼公之賢而有此惜哉盖公怠矣明年遂薨十有五年春宋公使向戍來聘二月己亥及向戍盟于劉戍食采於合是為合左師杜氏曰報二年豹之聘尋十一年亳之盟劉夏逆王后于齊劉夏天子大夫劉采地緱氏西北有劉亭緱氏省入河南偃師縣胡傳劉夏何以不稱使不與天子之使夏也昏姻人倫之本王后天下之母劉夏士也士而逆后是不重人倫之本而輕天下之母矣然則何使卿往逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿往逆公監之禮也春秋昏姻得禮者常事不書夏齊侯伐我北鄙圍成公救成至遇書至遇公畏齊不敢至成也髙氏曰衛侯在齊季孫宿為戚之㑹以定衛而齊不與焉齊固有憾於諸侯矣伐我北鄙以此之故也魯於是時三分其民而公室卑弱已不足以當敵故書公救成至遇季孫宿叔孫豹帥師城成郛張洽氏曰先事無備敵去而後城亦已晩矣秋八月丁巳日有食之邾人伐我南鄙髙氏曰邾貳於晉以與齊黨於莒故來伐間我有齊莒之難也冬十有一月癸亥晉侯周卒盧陵李氏曰悼公立於成十八年凡十六年起四公之衰而復文襄之盛入國之明日逐不臣者七人即位之一月取六官於民譽盖晉賢侯也先儒李氏曰晉悼公其猶有君子之資乎不獨伯功之美也齊桓厯變履險以數十年之經營而行事未免過舉晉文老於奔走晩而復國然血氣之驕悍未除悼公之齒淺矣乃能忠厚而不迫堅忍而持重有回顧却慮之謀無輕逞輙快之舉豈亦稍知以道養心歟八年九合則勤於安夏也三分四軍則謹於用民也六卿選徳則用人有章也騶御知訓則教士有法也此其所以能得諸侯服鄭而駕楚也歟使晉以詐力相長未必能服諸侯也悼公先以謙徳臨之雞澤之召諸侯曰寡君願與二三兄弟相見以謀不協故十三國相與周旋不令而從無滅譚滅遂執曹執衛之事使晉以盟誓為信未必能得鄭也悼公純以誠心行之鄭子展曰晉君方明必不棄鄭故五㑹之信終於不盟無逃盟乞盟之煩使晉以戰伐為威未必能駕楚也悼公一以容量處之楚子囊曰晉不可敵事之而後可故三駕之烈不交一旅無城濮鄢陵之勞是三者非有君子之資乎然能服諸侯而不能杜大夫用事之漸能得鄭而不掩失陳之責能駕楚而不能盖誘吴之非夫諸侯盟誓之權非大夫敢干也蕭魚已後凡三大㑹荀偃士匄儼然臨之諸侯雖合大夫浸分何謹於諸侯而縱於大夫乎陳不可棄猶鄭不可舍也戍鄭之役以為有陳非吾事無之而後可鄭雖向晉陳竟歸楚何工於撫鄭而拙於懐陳乎吴不可啓猶楚不可釋也㑹向之役欲數吴不徳以退吴人亦已晩矣楚患雖弭吴憂尤甚何明於治楚而暗於治吴乎不然悼公之覇過桓文矣十有六年春王正月葬晉悼公逾月而葬速矣晉平初立見悼公時諸侯尚多不協而齊與邾莒皆隂為黨而伐魯以撓伯圖故汲汲焉欲合諸侯䘮未三月而速葬也卿共伯主之葬自襄公之葬悼公始然不經見惟鄭子西弔子蟜送葬見大夫弔卿共葬為當時所通行故知之三月公㑹晉侯平宋公平衞侯殤鄭伯簡曹伯成莒子犂比邾子宣薛伯把伯小邾子于湨梁戊寅大夫盟胡傳湨梁之㑹諸侯皆在是若欲使大夫盟者則宜書魯卿及諸侯之大夫盟可也而獨書大夫何也諸侯失政大夫皆不臣也上二年春正月㑹于向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹于戚七國之大夫也此三㑹皆國之大事也而使大夫皆專之而諸侯皆不與焉是列國之君不自為政弗躬弗親禮樂征伐已自大夫出矣况悼公既没晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晉靖公廢趙籍韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也悼為邾莒連伐魯將為㑹以討之遇疾乃止今平公欲成父志故㑹湨梁湨水之梁梁堤也在今懐慶府濟源縣按左傳大夫晉荀偃宋向戍魯叔孫豹衛寗殖鄭公孫蠆皆强家專國者故雖君㑹而大夫自盟以其君不能為有無也王氏經世平公初立以父志欲討邾莒兼虞諸侯有異志故為是㑹以嗣覇而合諸侯也然踰月而葬改服而烝其不懐親也甚矣方在䘮稱子之日而合諸侯接㑹享使諸大夫歌詩必類其越於禮也亦甚矣國君風化之本人倫政事之基而所為若是奚待大夫專盟而後為可罪乎張氏曰自桓文繼覇中國之政齊晉專之然猶在諸侯也至今年以後則皆自大夫出矣故於此書大夫盟著世變之益降也晉人平執莒子犂比邾子宣以歸為我故執之屬詞莒邾屢加兵于魯晋因其來㑹而執之於既盟之後則二國亦非叛伯者也齊侯伐我北鄙髙氏曰齊既叛晉聞公在㑹將討莒也故復來伐夏公至自㑹五月甲子地震叔老㑹鄭伯簡晉平荀偃衞殤甯殖宋人平伐許髙氏曰許欲棄楚請遷於晉既而不果也故晉伐之鄭與許有宿怨故君親行焉中國無伯齊將叛盟主志在於争伯也後此圍桃圍防同秋齊侯伐我北鄙圍成大雩冬叔孫豹如晉㑹平公湨梁之後聘晉且以齊伐北鄙圍成言故也十有七年春王二月庚午邾子牼卒宣公卒悼公華立宋人平伐陳哀髙氏曰鄬之㑹陳侯逃歸自是不復與諸侯㑹而楚鄭連年侵宋宋於是請於晉而伐之書伐許伐陳皆著楚之詘也夏衞殤石買石稷子帥師伐曹衛孫蒯越竟田獵而遭曹人之訽辱不能自反挾貴卿將重兵以攻其國亦甚矣秋齊侯伐我北鄙圍桃今泰安州東南有桃墟齊髙厚帥師伐我北鄙圍防九月大雩宋華臣元之子閔之弟出奔陳臣之出奔盖子罕為國因事以去不肖其實以抑華宗也歟髙氏曰華臣賊殺其宗室華吴而亂宋政不有國討失政刑矣君子違不適讐國陳乃宋讐而奔焉尤可誅也冬邾人伐我南鄙與齊更伐我也齊未得志於魯故邾助之十有八年春白狄來胡𫝊劉敞曰蕃服於中國無事焉其於天子世一見則諸侯雖善其交際不得而通也是以春秋亦不與其朝不與其朝者懲淫慝一内外也周公致太平越裳氏重九譯而獻其白雉公曰君子徳不及焉不享其贄此乃天子而讓也况列國之君乎守藩之臣乎廬陵李氏曰王者正朔不及外裔豈責以行朝禮哉然則不書朝者以彼不當朝魯亦不當受其朝也屬詞外裔不能以朝禮見魯不廟受故不言朝介葛盧同夏晉人執衞行人石買買即是伐曹者以伐曹見執晉知買伐曹之為惡矣而未能知孫氏逐君之為惡也况行人非所當執乎秋齊師伐我北鄙冬十月公㑹晉侯平宋公平衞侯殤鄭伯簡曹伯成莒子犂比邾子悼滕子薛伯把伯小邾子同圍齊胡傳凡侵伐圍入未有書同者而獨於此書同圍齊何也齊環背盟棄好陵虐神主肆其暴横數伐隣國觀加兵於魯則可見矣諸侯所共惡疾故同心而圍之也同心圍齊其以伐致何也見齊環無道宜得惡疾大諸侯之伐而免其圍齊之罪辭也春秋於此有沮横逆抑强暴之意孟子曰國必自伐而後人伐之自作孽不可逭其齊侯環之謂矣尚誰懟哉齊已貳於晉伐我圍成悼公卒復伐魯不已此諸侯所同疾也曹伯負芻卒于師成公卒子武公滕立楚公子午帥師伐鄭間鄭伯之出也蕭魚之後於是楚師又至鄭此見公子嘉欲起楚師以去諸大夫謀國之非其終有殺身之禍宜矣十有九年春王正月諸侯盟于祝柯祝柯今濟南府禹城縣在府城西北一百里謀齊之不服也其後衛伐晉侵則祝柯之謀也欲以是服齊其䇿下矣晉人執邾子悼亦為我故執之屬詞隠桓之世其曲在魯以衆暴寡也襄之初年其曲在邾恃齊也邾既削而其臣如畀我如快如黑肱多叛齊亦日衰邾自是不敢窺魯矣公至自伐齊取邾田自漷水漷水出東海合鄉縣西南經魯國至髙平漷陸縣入泗水合鄉在今滕縣東漷陸即湖陵城在今魚臺縣東六十里今滕縣有漷陽里漷上村以漷水為界取以歸魯盖著其取之多也自漷水者田在漷水之西者也至哀二年取漷東沂西田則又盡其東界以至沂水矣髙氏曰邾之病魯信有罪矣魯以諸侯之力前既執其先君此又執其嗣君取其田盖已甚矣書取田於至自伐齊之後明公獨取之非諸侯取之專罪公之意也季孫宿如晉同圍齊之後拜師且疆邾田也葬曹成公夏衛孫林父帥師伐齊林父逐衛侯衎奔齊而又獨伐齊其不知自反甚矣秋七月辛夘齊侯環卒靈公卒子莊公光立晉士匄帥師侵齊至榖聞齊侯卒乃還胡傳榖齊地也還者終事之詞古之為師不伐䘮大夫以君命出境有可以安國家利社稷者則專之可也世衰道微暴行交作利人之難以成其私欲者衆矣士匄乃有惻隠之心聞齊侯卒而還不亦善乎故至榖聞齊侯卒乃還善之也八月丙辰仲孫蔑卒季氏私考此孟獻子也大學記其國不以利為利以義為利之言而孟子亦稱其友五人而忘家之善此誠魯之賢大夫而春秋中所僅見者也故雖與季孫行父同朝而不與同惡觀其始得預政即請如京師而戰鞌之師四卿並出蔑獨不預焉亦可以見其有特立之志矣其後莊子速僖子貜懿子何忌武伯彘皆能世其家法三家之中獨忠公室而南宫敬叔之賢又有出於流俗之表者豈非蔑之遺教流風足以淑後如此哉但成六年蔑與僑如侵宋一事似非賢者所為然宋人貳晉而晉命討之則亦當時諸侯事覇之常也晉方責魯不從禍將及國矣而從於强命何多尤焉所少者不能為宋釋解紛之䇿耳然蔑自襄公六年即不經見豈尋以老疾在告而政皆委於叔季二孫歟考其所為有不類者如三軍之作大抵非蔑意矣齊殺其大夫髙厚季氏私考髙厚髙固之子髙無咎之弟崔氏之讐族也靈公末年漸用事矣今靈公卒崔杼以往年伐魯致圍之咎歸於髙厚故殺之汪氏曰微崔杼之力莊公固不得立然杼殺髙厚慶封討夙沙衛明年復使慶佐為大夫而誅公子牙餘黨崔慶自是專權而射股之禍兆於此矣鄭殺其大夫公子嘉即子孔胡傳按左氏初盜殺鄭三卿於西宫之朝公子嘉知而不言既又欲起楚師以去諸大夫故楚人伐鄭至于純門而返至是嘉之為政也專國人患之乃討西宫之難與純門之師子展子西率國人殺嘉而分其室不稱鄭人者嘉則有罪矣而子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意由是子展當國子西聽政立子産為卿子産與國政自是鄭治漸有可觀矣冬葬齊靈公城西郛盖城壊而修築也叔孫豹㑹晉士匄于柯柯衛地今大名府内黄縣東北有柯地士匄與豹㑹謀所以結齊也豹為之通意於齊於是乎有澶淵之盟城武城今費縣西北七十里有武城城子㳺為宰即此其地近莒城之所以備莒也春秋事義全考卷十一
