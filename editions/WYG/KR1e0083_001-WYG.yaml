body:
  text: 春秋事義全考卷一明姜寳撰魯隱公公名息姑魯惠公之子姬姓侯爵自周公子伯禽始受封傳世十有三而至隱公攝主國事諡法不尸其位曰隱元年按垂編年之法在此明體元之義亦在此胡氏於隱言體元於桓言編年者互見爾盖從一累數乃史氏編年之法然一年而謂之元年者則祖述舜典商訓元日元祀之説以立文而見人君當體元以出治也自隱之後他凡稱元年者義皆同春王正月按周在當時實是改時改月盖以建子之月爲正月以仲冬爲孟春三正迭用於古有之今春正月乃夏之十一月周實改之爲正月矣因魯史故謂之王正月即左氏所云王周正月明非魯正月也夏時冠周月之説恐未然子月爲一歳之始猶子時爲一日之始也隱攝君位不行即位禮故不書公即位屬詞即位乃見羣臣因有所隱避則其禮可廢朝廟告朔乃新君見祖禰奉王教之始禮不可廢故書王正月以此三月公及邾儀父盟于蔑邾曹姓出自顓帝陸終第五子曰安周武王封其苗裔挾于邾子爵國邾國北界於魯而南連滕薛葢在今曲阜滕嶧之間蔑姑蔑杜預云魯國卞南有姑蔑城在今兖州府泗水縣界左氏曰公攝位而欲求好於邾也髙氏曰隱自謂爲桓而立内慮國人之不已恱外懼屬國之不已從而邾以附庸未通和好故與邾首結私盟胡傳魯侯爵而其君稱公此臣子之詞春秋從周之文而不革者也春秋大義公天下以講信修睦爲事而刑牲歃血要質鬼神則非所貴也今既與邾盟而後又伐邾盟不足貴審矣故知凡書盟者皆非也書及彭山季氏本私考引孔頴達之説謂魯事以公爲主故言公及及者言自此及彼據魯爲文也桓十七年公㑹邾儀父盟于趡彼言㑹此言及者彼先行㑹禮而後盟此惟盟而不行㑹禮故也由此言之及者兩相欲之詞而盟以公及則以内外别賔主之謂非是欲在公而不在儀父之謂也趙氏謂儀父亦邾君之名與季孫行父晉荀林父父字並同縁未得王命故其卒不見於經至莊十六年名克者乃其嗣君自以王命爲子而書卒爾附庸之君縱能自通於大國有何可嘉而字以褒之乎胡氏以爲中國附庸例稱字亦未必然葢自從載書書名名之也夏五月鄭伯克段于鄢季氏私考宣王封母弟友於鄭即今陜西西安府華州城北古鄭城幽王無道友爲司徒遷其民於虢鄶之間死犬戎難其子武公定平王於東都亦爲司徒因分其地遂國鄶都焉在濟西洛東河南潁北四水間今爲開封府鈞州新鄭縣意者友之初封本以王子食采畿内而鄶都之遷則因其有功而徙封也鄢鄭地今潁川鄢陵段本居京京在今鄭州滎陽縣本鄭大邑也而段又多才不義其逆謀勢所必至今段不書叛鄢不書圍必事在春秋之前不可得而詳矣然謂之克則見段强得衆亦待久而後克爾故段不稱弟謂絶其屬籍而以罪討齊履謙氏以爲討罪之辭是也段既得罪於國則宜稱國以討而專目鄭伯責在鄭伯也段之惡鄭伯養成之也胡傳後段說是其說云姜氏當武公存之時常欲立段矣及公既沒姜以國君嫡母主乎内段以寵弟多才居乎外國人又恱而歸之恐其終將軋巳爲後患也故授之大邑而不爲之所縱使失道以至於亂然後以叛逆討之則國人不敢從姜氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也王政以善養人推其所爲使百姓興於仁而不偷也况以惡養天倫使陷於罪因以剪之乎又云仁人之於兄弟不藏怒焉不宿怨焉親愛之而已矣象憂亦憂象喜亦喜恩掩義也使吏治其國而象不得有爲義勝恩也恩義並立而中持衡焉段雖凶逆焉敢作亂此春秋責莊公之意也秋七月天王使宰咺來歸惠公仲子之􅈖按仲子乃惠公嘗請命于周而繼娶爲夫人者故王來􅈖惠公并及焉左氏以贈死不及尸弔生不及哀􅈖惠公爲緩以􅈖仲子爲豫凶事以此問天王使宰咺來歸惠公仲子之􅈖傳謂豫凶事此非人情朱子曰天王正以此厚魯古人却不諱死愚謂造生棺生墓即今人亦何嘗諱死耶按稱天王是春秋特筆盖以天道奉大君欲其奉行天道而然也胡氏以天自處恐非春秋之㫖孔子於春秋之義曰竊取曰罪我惟春秋此尚謙不敢當何敢軒然自侈以天自處耶至於宰咺之歸􅈖則固直書于策而是非自見矣當時惠公既甞請命而娶仲子則謂之爲妾不可也但於諸侯不再娶上斷論其是非則可咺之書名季氏私考謂咺小臣攝冡宰以行故從天王命辭而稱名觀今之使外國者假一品服色以重其事則此容或有之不然三公稱公如州公祭公之類六卿稱爵如蘇子尹子單子劉子之類三公兼冡宰如宰周公之類皆未有稱名者若以爲春秋特貶而書名當時不以名來便訪問其名而書之於策恐聖人不如此也九月及宋人盟于宿武王封㣲子于商丘之墟商丘今歸德府宋國所受封地也宿今宿州左傳惠公之季年敗宋師于黄公立而求成焉盟于宿始通也季氏私考是時齊鄭合黨而魯有内憂故及宋盟以結隣援亦盟蔑之意也胡傳内稱及外稱人皆㣲者其地以國宿亦與焉㣲者盟㑹不志於春秋此其志以後此伐宋志也春秋之時㑹而歃血其載果掌於司盟猶不以爲善也又况私相要誓慢鬼神犯刑政以成傾危之習哉今魯既及儀父宋人盟矣尋自叛之信安在乎故知凡書盟者皆非也凡惡字罪字譏貶字施於魯於王皆不可謂見其事之非則可盖聖人於君父不應如此僣據也冬十有二月祭伯來季氏私考曰王朝三公稱公卿士稱子若侯伯之爵畿内未嘗以封祭伯之稱伯與凡伯毛伯之稱伯同皆畿内大夫之字非爵也胡傳左氏曰非王命也祭伯畿内諸侯爲王卿士來朝于魯而直書曰來不與其朝也按祭之先出自周公第七支子而食邑於祭盖與魯同宗者也故爲王卿士而來朝于魯書此亦不是貶但以明王臣無外交之義爾公子益師卒益師卒不日胡氏以爲見恩數之有厚薄竊恐不然西亭辨疑云嘗考内大夫卒者自成公以後皆書日以前間有遺者歴年逺而簡編脱故也胡氏盖因後此公子彄之卒公有葬之加一等之説而偶書日遂以爲然爾呂伯恭謂内大夫之卒益師自以公子書所以譏魯之用人不以賢而以親也程氏謂以公子故而自爲卿亦非謂益師自爲卿盖謂魯不請命於王而自使之爲卿爾意亦同二年春公㑹戎于濳杜元凱謂陳留濟陽縣東南有戎城季氏私考謂濟陽舊城在兖州府曹縣西南五十里則戎在魯之西南界者也濳魯地盖在南鄙近戎者按戎不當㑹即惠公有舊好亦不當修春秋直書于策而其失自見矣戎自是當舉號即舉西方蕃國之總名亦非以是爲貶也夏五月莒人入向今莒州南七十三里有向城又濟源縣亦有向城向後爲鄭所取則似濟源者是武王封少昊之裔兹輿期于莒今山東青州府莒州是也自兹輿期十一世而兹平公卒始見春秋陸氏曰經中一字徧施於諸例而義不同者唯人字爾國而稱人衆詞也師稱人則寡詞也名爵不貴而稱人則㣲詞也黜其名爵而稱人則貶詞也今莒稱人當是寡詞與無駭帥師相反無駭帥師入極極附庸國今兖州府地入極無事實今不可考季氏私考造其國都曰入莒本利向故入其國所謂向姜不安莒而歸事實不必論其有無但莒入向而無駭入極則俱逞忿之兵爾侵人之境且爲暴况入其國乎胡傳云非王命而入人國邑逞其私意見諸侯之不臣也擅興而征討不加焉見天王之不君也據事直書義自見矣秋八月庚辰公及戎盟于唐今魚臺縣東有武唐亭季氏私考春與戎㑹矣此何以復及之盟懼其有所不協也盖㑹所以决疑盟所以固信心相信則無待於盟矣事不疑則無待於㑹矣太叔所謂有事而㑹不協而盟者也書日者約日而往有定期者也陳氏曰魯望國之君諸夏所視儀而聽倡者也春而㑹戎秋而盟戎既爲特㑹又爲特盟春秋一歳再書所以見其非也九月紀履緰來逆女紀姜姓侯爵國炎帝之後今青州府夀光縣西三十里有紀城紀所受封當在此冬十月伯姬歸于紀伯姬惠公女也按渭在歧周境内文王又世子也故可以親迎韓侯因入覲故于蹶里亦便道而親迎爾若國君禮所當然遣卿逆而至矣則親迎於所館爲宜今紀婚未必是刺不親迎得非爲伯姬今歸紀而他日遭去國之變聖人有所感慨於心於紀事獨詳歟紀子伯莒子盟于宻宻在今萊州府平度州昌邑縣東南二十五里即髙宻縣北界地盖本紀邑故與紀境相連後爲齊有而封晏平仲於此杜元凱謂爲莒邑非矣按以子伯是子帛爲履緰字者非也盖紀大夫無先莒子理又載書大夫登名亦決無稱字理也以子伯二字即侯字之誤者近之其以莒魯有怨紀昏魯而欲結好以和解之者此或然也十有二月乙卯夫人子氏薨隱攝而桓爲太于故成其母喪稱夫人以赴于諸侯子氏仲子也左氏之說盖嘗見是於朱子矣今從之鄭人伐衞衛姬姓侯爵國武王封其同母少弟康叔之國今衛輝府淇縣衛始封地也胡傳按左氏鄭共叔之亂公孫滑出奔衛衛人爲之伐鄭取廩延至是鄭人伐衛討滑之亂也征伐天子之大權今鄭無王命雖有言可執亦王法所禁况於修怨乎春秋罪鄭之意如此但程氏以爲不書戰衛已服可免恐未必然要是衛完守不與鄭戰鄭自不得不退如陸淳所云主人不出戰客軍殺人掠物而還是已謂能徵詞郤敵及引咎以諭敵恐衛未必能然也三年春王二月己巳日有食之按土能掩日之光計者土之餘亦能掩日之光此明入地中所以爲明夷日有食之者正與土計二星相值光爲所掩若有食之者爾星命家説如此似不足據然却與明夷卦義相合故志之於此胡傳經書日食三十六去之千有餘歲而精厯筭者所能考也其行有常度矣然毎食必書示後世治厯明時之法也有常度則災而非異矣然毎食必書示後世遇災而懼之意也日者衆陽之宗人君之表而有食之災咎象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣凡經所書者或妾婦乗其夫或臣子背君父或政權在臣下或呉楚侵中國皆陽㣲隂盛之證也是故日有食之春秋必書以戒人君不可忽天象也季氏私考上古陽盛日恒不食故食即爲異觀春秋二百四十二年之間而止三十六食則其時猶有不食之日也公羊曰記異其以此歟三月庚戌天王崩史記曰平王崩太子􅂥父早死立其子林爲桓王桓王平王孫也季氏私考凡天王崩未有不赴於諸侯者盖含禭賻􅈖之禮必有待於諸侯之所供也至於送葬則天子當以禮待賔客而無所利焉故賻􅈖之禮至則雖㣲者弔喪而亦不之校惟其先至則遂辭㑹葬而諸侯之使亦不再往此所以志崩不志葬也平惠定靈是也若及葬期而賻􅈖之禮始至則遂㑹葬此所以志葬也桓襄匡簡是也莊僖頃崩葬皆不志胡傳以爲王室不告魯不往固非季氏以爲三王皆未嘗立而以嗣王故追稱王者亦非也史傳明言莊立十五年僖立五年頃立六年安得以爲未嘗立而追稱王也然則當從屬詞無疑矣今錄其説於左屬詞以莊僖之時齊桓方假王命以示大順周無不告魯無不往之理頃王之立嘗遣蘇子與公盟魯嘗有請于王欲以王寵求昭姬於齊亦無不來告往㑹之理要是春秋削之見桓文不能率諸侯享覲于王庭而徒以弔送爲尊王虚文其後晉伯中衰齊執天子之使楚僣號加中國無有能正之者王室以無伯而愈卑矣雖弔葬猶不弔葬也是故削此三王之弔葬所以定伯者之功罪也其法與正月不書王相表裏葢屬詞比事之教如此夏四月辛卯尹氏卒尹本尹吉甫之後食采於尹故因以爲氏左氏以爲君氏卒隱公之母聲子也資中黄氏亦以爲然據經文還主尹氏爲當盖左氏事雖可信而經文尤不可改故也胡傳尹氏天子大夫世執朝權爲周階亂家父所刺秉國之鈞不平謂何者是也因其告喪與立子朝以朝奔楚皆以氏書者志世卿非禮爲後鑒也季氏私考卒稱辛卯赴有的日矣然氏豈可以自赴之辭盖尹氏之黨素與魯通如祭伯者懼魯失禮而爲之赴也雖因時所稱謂之尹氏而世權因可見矣書魯往弔也盖其後嗣方隆禮不可慢是爲生而弔豈爲哭死哉隱公媚於權勢非禮義之交亦可見矣秋武氏子來求賻子者父在之詞父在而子世其官者武氏子仍叔之子是也當喪遵諒隂古制未有使命之詞及於魯若武氏子自來求賻者然其失在周不可來求魯不可待其來求上見之八月庚辰宋公和卒廬陵李氏曰宋鄭之爭始於此故四年宋殤㑹三國伐鄭爲公子馮在鄭也五年邾鄭伐宋其冬宋圍長葛六年取長葛八年盟瓦屋而不能成十年于防中丘之師鄭又挾齊魯以報宋雖鄭莊之姦雄然亦宋殤公忌馮之一念啟之也卒至與夷見弑然後已焉由此則知殤忌克之罪大矣當時穆公之以殤公爲後盖知殤公若不得立而立馮必不靖自以爲智而不知鄭莊奸雄非可以託馮之人馮居其國實開宋後來兵爭之端故禍宋者鄭莊而致鄭莊之爲宋禍者穆也季氏私考書卒者紀死者之常也春秋中惟天王書崩魯君書薨乃臣子尊稱其君之辭其稱隣國之君與本國異矣盖古人以死爲終事故卒者通於天下之恒稱也禮記諸侯曰薨大夫曰卒之說恐非胡傳盖亦本此而失之爾冬十有二月齊侯僖鄭伯莊盟于石門齊姜姓侯爵國出自四岳其初本爲吕侯後裔吕望佐武王號師尚父定天下封于營丘爲齊侯其故城在今青州府昌樂縣東五十里傳六君至獻公而徙治臨淄今青州府臨淄縣古齊城是也石門今兖州府東平州平隂縣地廬陵李氏曰齊鄭之交始此當是時鄭以小人之雄因是春交質之故有志于叛王而合諸侯始欲挾公子馮以謀宋而宋魯之黨方固無間而入因齊僖有小伯之志於是黨齊以仇宋此石門爲東諸侯合黨之始而實齊伯之權輿也左氏於是年首序周鄭交惡之事亦爲有見然則王伯消長之機其不在兹乎癸未葬宋穆公魯往㑹故書按宋殤齊昭弑因告亂而書遇弑必不以禮葬葬未必告此魯所以不㑹討其賊之説非也屬詞宋桓公迫於葵丘之㑹不及以禮致諸侯送葬襄公兵敗身傷而卒成公卒後國亂皆不備禮禮不備不敢以葬期告諸侯故不往㑹然則謂桓不討閔公之賊襄失民亡衆成國亂無政治其罪之說亦非也四年春王二月莒人伐把取牟婁今莒州地有婁鄉杜氏曰把國本都陳留雍丘縣桓六年淳于公亡國把始并之遷都淳于僖十四年遷縁陵襄二十九年晉人城淳于把又遷鄀胡傳上二年擅興入向而天討不加焉至是伐國取邑其暴益肆矣戊申衞州吁弑其君完州吁衛莊公庶子桓公完之弟也程氏曰自古簒弑多公族盖自謂先君子孫可以爲君國人亦以爲然而奉之春秋於此明大義以示萬世故春秋之初弑君者多不稱公子公孫盖身爲大惡自絶於先君矣豈復得爲先君子孫也春秋書此所以爲後世之深戒歟夏公及宋公殤遇于清今淇縣界清水合淇水入衛河之南近牧野處即其地盖在衛南而近於鄭便於謀衛以伐鄭者也是時宋殤公初立忌弟馮在鄭懼鄭挾以爲亂也而與魯合黨謀伐之時適州吁弑君兾得其從必易故同履其地陽若偶遇者然其實欲結州吁説以修先君之怨和民定位而伐鄭之謀定矣先君之怨謂鄭嘗修廩延之怨而伐衛也胡傳遇者草次之期古有遇禮不期而㑹以明造次亦有恭肅之心春秋書遇私爲之約自比於不期而遇者直欲簡其禮爾簡略慢易無國君之禮則莫適主矣故凡書遇者皆見其無人君相見之禮也宋公陳侯蔡人衞人伐鄭陳嬀姓侯爵國武王封舜裔孫滿於陳是爲胡公以奉舜祀其地爲宛丘今開封府陳州是也蔡出自文王第五子叔度監殷以叛誅成王復封其子胡於蔡是爲蔡仲今汝寧府上蔡縣西南十里故蔡城是其地張氏曰宋自殤公立公子馮出居鄭之後馮以穆公不立巳爲恨謀反取其國鄭莊又從而佐之於是宋鄭爲仇及是衛州吁欲定其位告宋求伐鄭陳蔡亦地與鄭隣而畏其虐者也夫宋殤怵於邪説合陳蔡以助逆賊使宋國之人不復知君臣順逆之正理自是日從事於兵而弑逆之事卒及其身皆殤公不能早辨於此役也據事直書罪自見矣秋翬帥師㑹宋公陳侯蔡人衞人伐鄭翬葢孝公之子惠公弟隱公時止爲大夫故稱名桓公時爲卿然後稱公子屬詞夏伐鄭秋翬復㑹伐鄭是四國再舉兵明矣先儒誤通前後爲一役故有詞重義復變文特筆之說非事實也九月衞人殺州吁于濮濮衛地衛有城濮宛濮皆以濮水得名濮在今大名府開州東南六十里南經長垣縣而東南至鄄皆衛地以水經考之盖流經鄄城雷澤郕鄆之地以東合於濟者也賈逵以爲陳地者非此與蔡人殺陳佗齊人殺無知同屬詞諸簒立者諸侯定其位則列于㑹而稱爵故未㑹諸侯者皆名之不成之爲君也皆稱人以殺者以其弑君代立非有司法守之所能治而國人得而討之也又曰春秋君弑而能以義討賊者唯衛人爲正金壇王氏樵經世衛人殺州吁于濮衛人立晉連書衛人而二事之是非曉然矣何也衛可以討罪不可以置君州吁爲僇而晉受之春秋以是爲無君父也冬十有二月衞人立晉晉亦莊公之子桓公弟季氏私考衛自州吁見殺至是逾三月矣莊姜在内大臣無權久猶未定豈以晉本淫人不欲使君國乎晉見其遲疑如此必隂結國人而衆共立之爾家氏曰衛人以晉爲賢而立之而晉也志得而驕晚焉獸行新臺之刺作焉是以於其始立而去其公子以見衛亂之所從始也五年春公觀魚于棠今兖州府魚臺縣北有武唐亭即此魚與漁同觀取魚以爲樂也胡傳諸侯非王事則不出今隠公慢棄國政逺事逸遊僖伯之忠言不見納亦已矣又從而爲之辭是縱欲而不能自克之以禮也能無鍾巫之及乎特書觀魚非之也夏四月葬衞桓公屬詞時衛人既討州吁又能以禮葬其君㑹諸侯之送者故雖君弑而書葬詳胡氏傳以德言之則失位而見弑不應諡桓以爵言之則本侯爵不應稱公見其臣子因私諡而稱公皆罪臣子之意也胡氏之意是如此按私諡稱公者國國皆然不止衛之臣子也前此於葬宋穆公已當發凡例矣何至此然後言及耶秋衞師入郕郕文王第七子郕叔武所封國其地在今兖州府汶上縣北三十里有郕鄉臨川吳氏曰衛與郕皆文王之子所封郕乘亂侵衛已非衛又報復而入其國莒入向魯入極且不可况以師入兄弟之國乎胡傳衛宣繼州吁暴亂之後不施德政固本恤民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也九月考仲子之宮資中黄氏曰據左氏惠公末年失禮再娶娶而生桓公未幾而公薨盖隠攝而俟桓長隠攝之明年桓母卒隠將成桓之爲君故於桓母之卒用夫人禮及免喪則考仲子之宮而獻六羽焉此最可信可據者也初獻六羽胡傳初獻六羽者始用六佾也不謂之佾而曰羽者佾干羽之總稱也羽以象文德干以象武功婦人無武事則獨奏文樂故謂之羽而不曰佾也初者事之始魯僣天子之禮樂舊矣用於太廟以祀周公已爲非禮其後羣公皆僣用焉仲子以别宮故不敢同羣廟而降用六羽書初獻者明前此用八之僣也邾人鄭人伐宋家氏曰邾序鄭上著其爲兵首所以貶也邾見侵於宋當告之天王請之方伯聲其罪而治之不當因鄭宋之隙而偕鄭以伐宋因彼之憾復已之私春秋所不與也是故邾爲首鄭次之鄭以伯爵之國而序乎邾之下亦所以貶也季氏私考鄭莊奸雄挑邾讎宋而推以爲主邾人不自量力而爲其所愚如此觀長葛之役宋人報鄭而不報邾則以鄭怨爲深而邾不足責故爾螟胡傳蟲食苗心曰螟國以民爲本民以食爲天書螟記災也冬十有二月辛巳公子彄卒胡傳公初如棠觀魚僖伯諫而不聽則稱疾不從可謂忠臣矣葬之加一等夫是之謂稱然隠公不敢忘其忠而不聽其言與郭公善善而不能用至於亡國一也其及宜矣屬詞彄孝公子也諡僖伯臧孫辰彄之孫哀伯逹之子諡文仲臧孫許辰之子諡宣叔是爲臧孫氏宋人伐鄭圍長葛即今許州長葛縣張氏曰宋殤以邾鄭伐已之故報怨於鄭聲其罪而圍其邑踰年乃取著其暴虐阻兵之甚也六年春鄭人來輸平胡傳輸者納也平者成也鄭人曷爲納成於魯以利相結解怨釋仇離宋魯之黨也公之未立與鄭人戰於狐壤止焉元年及宋盟于宿四年遇于清其秋㑹師伐鄭即宋魯爲黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失辭公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乘之隙也是以來納成耳然則善之乎曰平者解怨釋仇固所善也輸平者以利相結則貶矣曷爲知其相結之以利也後此鄭伯使宛來歸祊而魯入其地㑹鄭人伐宋得郜及防而魯又取其二邑是知輸平者以利相結乃貶之也故特稱輸平陳氏曰春秋之初魯宋衛陳蔡爲一黨今鄭先來與魯平就合齊魯之交自此以後魯合於齊鄭而離宋魯之交矣夏五月辛酉公㑹齊侯盟于艾今沂州西二十五里有艾山即此實魯地非齊地齊侯至此與魯盟爲鄭結魯也按齊僖方合諸侯以樹黨故隱公㑹之盟明年又使其弟年來聘以結之則艾盟齊志也廬陵李氏曰齊自師尚父十二世至釐公巳稱東州之小伯然是時宋亦以先代之後爵居上公方與魯爲好未可間也故假鄭以求魯魯一溺於輸平之利再狥于艾之歃三誘於祊田之歸四惑於不王之告而魯與齊鄭之交固矣秋七月胡傳四時具而後成歳故春秋雖無事首時過則書一時不具則歳功虧矣既書時又書月者時天時也月王月也書時又書月見天人之理合也冬宋人取長葛糓梁曰此其志何也久之也爲圍之逾年而取也陳氏曰春秋之初猶以取邑爲重自齊鄭入許而後外取邑不復書傳曰疆場之事一彼一此何常之有書之則不勝故書其重者而巳張氏曰宋自去冬圍長葛經年不解志在必取鄭莊不求保其土地人民反交結於魯爲後日報復之計而委長葛於宋宋殤雖若得志而後日終受鄭莊報復蹙國喪師以及其身愚按由此言之鄭固姦人之雄而宋亦可謂愚矣七年春王三月叔姬歸于紀胡傳後此叔姬不歸宗國而歸于酅以全婦道賢可知矣賢而得書亦春秋之法也程氏曰伯姬爲紀侯夫人叔姬其娣也待年于家今始歸娣歸不書今書憫其無終也滕侯卒胡傳滕侯書卒何以不葬怠於禮弱其君而不葬者滕侯宿男之類是巳晉北國也楚南邦也地非同盟而親往俟其葬滕隣境也宿同盟也訃告雖及而魯不之恤豈非以其壤地褊小乎怠於禮而不往弱其君而不㑹無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其葬義自見矣卒自外録不卒非外也葬自内録不葬非内也夏城中丘今兖州府沂州北有中丘古城季氏私考中丘近莒之地莒雖小國而界于東夷隠公之時怒向服魯則入其國都既又取杞牟婁駸駸乎爲魯疆場之憂矣故城以備之且以爲向之外應也按此與後此之城郎皆言夏若舉首時則夏之二月中時則三月爾即四月亦不得全謂之使民不以時胡氏之説非也齊侯使其弟年來聘結艾之盟也杜氏曰凡聘皆使卿執玉帛以相存問廬陵李氏曰年之再來齊僖糾合之時也胡傳兄弟先公之子不稱公子貶也僖公私於同母寵愛異於他弟施及其子猶與嫡等而襄公絀之遂成簒弑之禍故聖人於年來聘特變文書弟以示貶焉鄭語來盟黒背帥師皆罪其私也秋公伐邾左傳秋宋及鄭平七月庚申盟于宿故公之伐邾爲宋討汪氏曰公拒宋而與鄭平今鄭復與宋盟故懼而伐邾欲以求宋胡傳奉詞致討曰伐按左氏公伐邾爲宋討也宋人先取邾田故邾人入其郛魯與儀父則元年盟于昧矣邾人何罪可聲特託爲辭説以伐之爾傳曰欲加之罪何患無詞魯爲宋討非義甚矣而稱伐邾所謂欲加之罪者也而不知渝昧之盟不待貶而自見矣冬天王使凡伯來聘凡周公第二子所食采邑因以爲氏在畿内以爲在今輝縣西南二十里之凡城則畿外地矣恐非戎伐凡伯于楚丘以歸胡傳國而曰伐此一人而曰伐見其以徒衆也楚丘衛地以歸易辭也于楚丘者罪衛不救王臣之患以歸者罪凡伯失節不能死于位也董子曰執天子之使與伐國同罪汪氏曰裔戎朝于天子王臣雖不以禮貌加之不過失象胥之職特小過爾今王臣御天子之命聘於望國過衛而戎報私怨以兵衆劫之彼獨不念天子之命乎戎不足責衛人坐視王臣之俘於戎而不能救患尊君之義安在哉此書戎伐非以其執詞而與之著其率兵徒之衆凌虐王人是横行中國不特無天子而亦無諸夏矣愚按既云戎不足責而又有此説見此事可爲王室憂又可爲諸夏憂也八年春宋公衞侯遇于垂垂一名犬丘今曹縣東北有垂亭髙氏曰殤公嘗從州吁之請伐鄭以圖馮矣州吁誅衛宣公立馮不可不終圖而未知宣公之從否故宋衛遇垂以謀鄭十年入鄭盖垂之謀也季氏私考宋衛本與魯爲黨以魯既許平而二國將要齊以絶鄭故爲此遇而瓦屋之盟議在此矣其以遇禮見恐泄所謀欲宻其迹爾三月鄭伯使宛來歸祊祊在今費縣東南費縣今屬沂州張氏曰東遷以來諸侯不朝王天子無復廵狩遂各以所近之邑相易此謀始於鄭伯輸平之時先以祊歸魯以固魯之好而未敢及許其不憚委先祖所受王邑於人所謂將欲取之必固與之卒使魯隱間齊於宋以成敗宋入許之計又終得許田於魯見鄭莊爲小人之雄罪之不可勝誅也庚寅我入祊胡傳鄭伯欲以泰山之祊易許田前此來輸平者以言請之矣未入地也至是來歸祊者其地既輸矣未易許也祊近於魯許隣於鄭各以其近者相易用是見鄭有無君之心而謂天王不復能廵狩矣用是見鄭有無親之心而敢與人以先祖所受之邑矣屬詞言入者公羊曰難也祊在泰山之下去鄭逺而近魯必鄭人不能有而後歸於魯也魯以其民不服故以兵入焉祊歸我而許田未易豈非以其難歟按祊民之不服於魯必又以祊之近魯恐其所取之貢賦不若鄭前日所取之輕而不樂歸之故以兵入之而後祊始爲我有也夏六月己亥蔡侯考父卒宣公卒桓侯封人立辛亥宿男卒宿㣲國而服於宋其卒以嘗受地主之供而備禮以弔也胡傳春秋之時諸侯凡赴者皆不以名經書其終雖五霸强國齊桓晉文之盛莫不以名者是仲尼筆之也赴不以名而書其名者與魯通也已通而不名者舊史失之爾未通而名者有所證矣秋七月庚午宋公齊侯衞侯盟于瓦屋瓦屋即瓦亭盖南燕地而北近於衛者也杜氏以爲周地恐非陳傅良曰有參盟然後有主盟然則盟主之興其亦有感於私黨分而約劑亂歟其後盟主不作而諸侯之盟復相參錯矣故參盟耆無主之盟也非以三國爲限也但始於宋齊衛之三國故相仍以爲參爾胡傳春秋革薄從忠於參盟書日謹其始也季氏私考是時宋衛一黨也齊鄭亦一黨也宋衛欲致齊以絶鄭故爲此盟然齊方雄長山東不爲宋下陽示腹心而巳不逾年而即㑹防以謀伐宋要盟何益哉按程子以此盟爲與鄭絶是也然是時鄭莊固挾齊以自强齊亦資鄭以糾合故瓦屋雖與宋衛盟而明年宋公不王之罪又發於鄭人而齊從之是齊僖陽尊宋衛而隂固鄭黨苐宋衛自不悟爾八月葬蔡宣公程子曰諸侯五月而葬不及期簡也九月辛卯公及莒人盟于浮來今沂水縣北有邳鄉西有公來山號曰邳來即此此莒地也以爲紀邑者非左氏以成紀好也家氏曰魯莒自春秋以來有未平之怨怒向服魯而入其國前此紀人爲之平之今隱公欲降心以消二國之患故及其臣爲盟胡傳莒小國人㣲者而公與之盟故特言及以見失禮螟冬十有二月無駭卒汪氏曰傳稱司空無駭而又帥師出境其爲大夫明矣特未賜族爾無駭公子展之孫故爲展氏盖卒而後賜氏展氏展禽之先也胡傳未賜族而身爲大夫則稱名無駭挾之類是也古者置卿必求賢德不以世官至於三家專魯六卿分晉諸侯失國出奔者相繼職此由也九年春天王使南季來聘南氏南仲之後姓也季字也汪氏曰隱公之立既不稟命於周宰咺祭伯接踵魯庭而不類見於平王武氏子來求賻又不奔喪㑹葬及桓王即位又不入覲而奄然王臣之兩聘終其世而不遣一介行李造于京師苟曰攝而不君則若何比歳出㑹諸侯耶春秋録王臣之聘惟隱世最數隱不克終有由矣三月癸酉大雨震電庚辰大雨雪胡傳震電者陽精之發雨雪者隂氣之凝周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也夫隂陽運動有常而無忒凡失其度人爲感之也今陽失節而隂氣縱公子翬之讒兆矣鍾巫之難萌矣春秋災異必書雖不言其事應而事應具存惟明於天人相感之際響應之理則見聖人所書之意矣挾卒魯大夫未賜族者夏城郎今魚臺縣有郁郎亭盖近宋之地也魯將北㑹齊鄭伐宋擣其虛故城以備之屬詞春秋之世魯人日不暇給不能及閒暇以修保障遇有外憂往往城要害以備難如城中丘城郎而後城邑二十一城中城二城西郛二築邑一或爲懼齊或爲懼晉或備莒邾或帥師而城或强家專邑而城或爭外邑而城之故雖非時而不得顧雖得時亦不足稱也然冬月興工爲多而無書秋城者則猶不以盛暑農事方殷時勞民也廬陵李氏曰郎魯近邑隱再城之而桓之世三國來戰于此莊之世陳蔡之俟亦次于此齊宋以兵窺魯又宿師于此則郎豈非魯之要地乎厥後築臺築囿又皆在此始也猶有警懼之心終也遂爲逰觀之地矣秋七月冬公㑹齊侯于防防魯北鄙近齊之地莊二十九年所城者即其地也以爲宋地者非胡傳左氏稱宋公不王鄭伯以王命討之使來告命㑹于防謀伐宋也于中丘爲師期也夫始則私相㑹爲謀於防中則私相盟爲師期於鄧終則乗敗人而深爲利以取二邑歸諸已奉王命討不庭者果如是乎經之書㑹書伐而不異其文以此家氏曰魯與宋未嘗有怨齊與宋爲同盟今魯㗖於歸祊之利齊背瓦屋之盟將連兵以伐宋内揣有愧而鄭適以王命來告故相與假王命以興師春秋書㑹于防誅始謀也伯者挾天子以令諸侯實昉於此季氏私考春秋之初齊鄭爲黨及六年鄭來輸平而齊亦結魯艾之盟年之聘皆爲鄭也八年齊雖與宋衛盟瓦屋然亦陽示腹心而已豈真與宋合哉至是將謀伐宋即魯㑹防盖先堅魯黨鄭之志爾明年與鄭盟中丘乃始定議而伐宋之兵舉矣此皆鄭莊挾馮傾宋之計而齊則協成之者也按爲周司徒者乃莊之祖桓公父武公而莊蓋假借其虚聲稱王命以恐動隣國爾是時實未嘗爲王卿士有王命令伐宋也張氏曰魯隱自六年受輸平八年入祊志於昵鄭而仇宋故外爲平宋之形鄭復以不王之罪加于宋則興兵有名而其義可以招齊矣此㑹防之謀所以爲明年伐宋之地也左氏見其名而不察其實故録之如此不知鄭莊特假此以誑齊魯爾觀繻葛之役則宋殤之不王豈至如鄭莊之甚乎屬詞鄭人以王命來告伐宋而王臣不出王師不行故但書公㑹齊鄭翬帥師㑹伐而已十年春王二月公㑹齊侯鄭伯于中丘中丘地臨沂水順流而下可至宋之東鄙自郎而西以逹于菅即宋之西北鄙也翬伐宋由東道入正兵也公敗宋由西道入竒兵也盖謀定於此而齊鄭以利㗖魯苟有俘獲盡許歸之使專致力爾汪氏曰防之㑹魯始與齊謀伐宋之舉至中丘之㑹復偕鄭合謀而决出師之期經備録之著伐宋之兵所由合也此乃直書而義自見者也夏翬帥師㑹齊人鄭人伐宋季氏私考翬不稱公子猶未爲卿也掌兵日久而不得爲卿翬於此不能無怨望矣憾而能聄者鮮况兵權在其手乎故桓之弑隱翬成之也資中黄氏曰魯隱公居攝凡事謙讓號令亦往往不行如翬帥師是也無駭入極無駭卒挾卒皆無諡此皆謙不敢自謂爲君所以如此髙氏曰齊侯鄭伯貶稱人者齊渝瓦屋之盟鄭乃造兵之首春秋深惡之公元年及宋盟宿四年又遇于清和好非一日矣今一旦以兵加之始爲宋謀鄭既得鄭利今爲鄭謀宋又欲得宋利也惟知貪利不復顧義矣六月壬戌公敗宋師于菅齊鄭後期故公獨敗宋師書敗宋未陣也辛未取郜辛巳取防郜文王第十一子所封即取郜大鼎之郜盖先爲宋取而遷其君於南以爲附庸其地亦在城武當北郜之南謂之南郜僖二十年郜子來朝是也郜故地是爲北郜宋實邑之故魯取郜與取邑之辭同防宋北鄙邑近緡胡傳内小惡直書而不隱故取郜取防直書而不隱也其不言戰而言敗敗之者爲主彼與戰而此敗之也皆陣曰戰詐戰曰敗家氏曰魯與宋本無纎芥之隙徒以歸祊故爲鄭所役翬既帥師㑹二國公復自出奇兵以襲人之虚而取其二邑秋宋人衞人入鄭髙氏曰宋又連衛以報鄭鄭幸菅之敗而不備故師還及郊宋衛已乘其虚而入之矣宋人蔡人衞人伐戴鄭伯伐取之外黄縣東南有戴城今開封府睢州考城縣是也程子曰戴鄭所與也故三國伐之鄭戴合攻盡取三國之衆其殘民也甚矣愚按取之盖取其車徒與輜重也廬陵李氏曰程子以爲鄭戴合攻盡取三國之衆此説爲當胡氏謂一舉而兼四國恐非冬十月壬午齊人鄭人入郕郕近于衛乃衛之與國故齊鄭入其國以報衞也趙氏録疑云程氏此傳本説伐宋事非解入郕然知伐宋之非王命則知入郕之非討違王命矣此書入所以爲不順之詞廬陵李氏曰鄭莊假王命之事自隱之元年以王師虢師伐衛則猶爲王卿士也至三年有交質之惡周巳畀虢公政矣六年鄭始朝周而不見禮八年夏虢公忌父始作卿士於周而鄭又以齊朝王九年然後有宋公不王之師而傳曰鄭伯爲王左卿士是時鄭伯實未嘗爲王卿士不過矯假以爲報復之私爾十一年之入許傳又曰君謂許不共亦假飾之詞也卒之敗宋入郕入許納馮之後志得意滿而有繻葛之戰矣故諸傳惟程氏得之左氏得其事而不究其情是爲鄭伯之所欺也十有一年春滕侯薛侯來朝滕侯爵國文王第十四子叔繡之後也其國在今兖州府滕縣西南其薛任姓本亦侯爵國黄帝裔孫奚仲之後也國在今滕縣東南四十里屬詞隱桓莊之世小國之君往往來朝于魯而魯未嘗往朝大國以當時大國皆齊等故也傳言滕薛爭長明非旅見隱以攝君衛侯來㑹葬不敢見而謂隱僣天子之禮受滕薛之旅見非也啖助曰凡朝聘同時至同行禮則列序之滕侯薛侯是也一前一後不同行禮則各書之穀伯鄧侯是也此只罪滕薛不朝王而朝魯魯亦不朝王而受滕薛之朝爲是不必更在旅見不旅見與魯受朝不報上纒擾也夏公㑹鄭伯于時來時來郲也滎陽縣東南有釐城鄭地也今屬開封府鄭州臨川吳氏曰鄭莊以小利餌魯隠既與之伐宋爲鄭報怨矣又將與之同伐許爲鄭益地許與鄭接壤齊魯無與焉者也鄭伯以計鈎致齊魯之君而借其兵力吞併小國以利益於已甚哉鄭之不仁而齊魯之不智也秋七月壬午公及齊侯鄭伯入許許姜姓男爵國炎帝之後堯時爲四岳周武王封其苗裔文叔於許以續太岳之嗣地在許昌縣今開封府許州也臨川吳氏曰欲得許地者鄭之本謀遂破許國者鄭之專功特以借齊魯以同伐齊以國大爵尊爲主兵既入許鄭莊陽不有其功而讓於齊齊侯以克許非已功而不受乃以讓魯魯又以克許非己功而不受乃以與鄭鄭即受之而不辭竟得遂其貪土地之志書入不書滅者許君既奔他國鄭雖專有其地而使許君之弟奉其宗廟不絶其祀也故書入以爲猶愈於取其土地而併絶其宗祀者爾季氏私考許田先王所削於許以賜魯爲朝宿之地者也故其地在許謂之許田世爲許治而納貢税焉隱公時必以地逺而不能控制鄭利其近已也欲得之且長葛近許而爲宋所取宋恃以能守則鄭於許有隙焉故啟魯爲時來之㑹而連齊以入許許既定而許田復於魯矣夫鄭之歸祊但資魯以爲讎宋之計未言欲得許田也及魯取郜防獲利已厚於是始有取償許田之意且以報許此鄭莊之奸計也魯於許田本非所急但以其近鄭欲索髙價故未即與爾廬陵李氏曰許與鄭爲隣鄭莊併吞之志久矣特以三國共伐難於專利故外假存許之義内結許人之心而又使公孫獲以鈐制許叔則許固鄭之内臣矣未幾莊公薨許叔因鄭亂以入許於是鄭許釁復啟然齊桓既伯許一從於㑹盟三從於征伐許之事齊尚謹齊之救許亦至則雖有楚人之圍鄭人之侵無能爲也及晉伯以後許專心事楚無復中國之顧故晉文圍以諸侯晉襄伐以三國悼有荀罃之伐平有荀偃之侵以區區之鄭一歳而再用兵於許春秋雖狄鄭而許亦不能以自存矣故成十五年以後一遷於葉再遷於夷又遷於白羽又遷於容城越二年而滅於鄭游速之手是則今日之入許乃後日滅許之開端也然首謀在鄭書公以及無亦見公有黨惡之非歟冬十有一月壬辰公薨胡傳隱公見弑魯史舊文必以實書其曰公薨者仲尼親筆也古者史官以直爲職而不諱國惡仲尼筆削舊史斷自聖心於魯君見弑削而不書者盖國史一官之守春秋萬世之法其用固不同矣不書弑示臣子於君父有隠避其惡之禮不書地示臣子於君父有不沒其實之忠不書葬示臣子於君父有討賊復讐之義非聖人莫能修謂此類也夫賊不討讐不復而不書葬則服不除寢苫枕戈無時而終事也以此法討賊至嚴矣故曰春秋成而亂臣賊子懼據左氏使營菟裘吾將老焉之説則隠之攝了然矣盖位本非其所有因讒言交搆而始欲還桓也惜乎晩矣廬陵李氏曰隠公立十一年自六年以前黨于宋自六年以後黨于齊鄭原其即位實由於攝故元年盟儀父其秋盟宋二年盟戎四年遇清春秋皆書及盖隠欲結諸侯以自安也雖然自安而大夫之專迭見於無駭翬帥師之時矣輸平以後隱漸得志故伐邾而忘蔑之信伐宋而棄宿之盟入祊入許無所不至而有寪氏之禍使隱公初立上請王命則長幼之義自明君臣之分自定又何必屈已於諸侯委權於大夫以成後日之變哉杜氏以爲讓國之賢吾未之見也春秋事義全考卷一
