body:
  text: 春秋事義全考卷九明姜寳撰成公名黑肱宣公子母穆姜十二公惟莊與成爲適安民立政曰成元年春王正月公即位二月辛酉𦵏我君宣公無冰桓公無氷傳云政治縱弛不明之所致是人事在天變之前成公即位之初則政事舒緩紀綱縱弛其人事在天變之後胡傳寒極而無氷者常燠也按洪範傳曰豫恒燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見故當涸隂沍寒而常燠應之雨雹氷雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虗此制治於未亂慎於㣲之意也每慎於㣲然後王事備矣王事即燮調之事慎於㣲㣲乃隐㣲之㣲如雨雹氷雪之類皆慎其所感如此則為能燮調愆伏而王事備矣三月作丘甲胡傳作丘甲益兵也古者九夫為井四方共一里四井爲邑四方各半里共二里四邑爲丘四方各一里四丘爲甸四方各二里甸地方八里旁加一里爲成所取於民者出長轂一乗此司馬法一成之賦也爲齊難作丘甲益兵備敵重困農民非爲國之道其曰作者不宜作也周制一乗步卒七十二人甲士三人以二十五人爲一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乗耳今作丘甲者即丘出一甲是一甸之中共百人爲兵矣賦雖不同其實皆爲益兵其數皆増三之一耳屬詞周制四井爲邑四邑爲丘四丘爲甸軍政起於井而成於甸故周官謂甸爲乗其車人卒伍之數皆以甸爲率也魯至成公以齊難故創制益兵遂毁甸賦而以丘賦與鄭子産作丘賦同故曰作丘甲不曰賦者其制以甲士爲主也汪氏曰兵政之變始壊於齊之内政而家一人焉繼壊於晉之州兵而家五人焉長勺之戰桓公自謂帶甲十萬車五千乗楚薳啟疆謂晋十家九縣長轂九百其餘四十縣遺守四千叔向亦謂寡君有甲車四千乗則兵制之増益於古可知矣循襲效尤遂致魯以秉禮之國亦増丘甲而不以為嫌也詹氏道傳曰書孔䟽凡出車一乗有一正一副一曰輕車即兵車二曰重車即大車兵車七十五人如靖之說大車另有牛十二頭炊家子十人固守衣装五人廐飬五人樵汲五人共二十五人以佐兵車兵車以戰大車以載輜重兩車總百人靖盖專舉戰車爾按丘甲之說胡傳已明屬詞於丘賦丘甲之辯亦得之汪氏乃舉齊晋兵政以見例而詹氏本孔䟽立論則當時兵制之全也故並録以備覧云夏臧孫許及晋侯盟于赤棘季氏私考左氏曰齊將出楚師爲齊難故盟晉景結好求援也王氏經世云是時齊少懦矣三家本欲叛齊而事晉宣公薨於是追治襄仲之事而逐歸父此其所以叛齊之决而從晉之堅也秋王師敗績于茅戎季氏私考云茅戎亦允姓戎之别種也杜元凱不詳其處當在畿内諸戎之間今按水經注盧氏縣東有蠻谷水東流入伊度其地必即今之茅峪也豈因茅戎而得名也歟不言戰者季氏私考謂爲戎所邀不戰而自敗也當時劉康公乗戎不備而伐之反爲其别種徐吾氏所邀而敗其實不及陳而敗季氏之說是已所謂直書而自見者胡氏謂經不書戰辨華夷之分立中國之防恐未必然屬詞夷狄不可以君臣治故直書不必諱可也冬十月二年春齊侯伐我北鄙胡傳初魯事齊謹甚雖易世而聘㑹不絶也及與晉侯盟於斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞌之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣盟于斷道魯絶齊再盟于赤棘魯背齊而從晉齊於是遂即楚而伐我夏四月丙戌衞孫良夫帥師及齊師戰于新築衞師敗績胡傳齊師侵虐而以衞主此戰何也衞侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衞主之也春秋善解紛貴逺怨而惡以兵刃相接故書法如此季氏私考曰春齊既伐魯夏遂至衞是齊興此役也而衛人不思啟釁之端乃在衞世子臧之伐不務反躬而必欲一戰豈解紛逺怨之道乎故書及在衞見衞師之敗乃其自取也六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊叔肸子是為子叔聲伯帥師㑹晉郤克缺之子是為獻子衞孫良夫曹公子首及齊侯戰于鞌齊師敗績書㑹四卿是各自爲帥也胡傳成公初立主幼國危爲季孫一怒掃境内興師而四卿並出肆其憤欲雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥畧其副屬詞之體也而四卿皆書者豈特爲詳内録哉堅氷之戒亦明矣經之大例受伐者為主而此以四國及之者以一笑之㣲殘民毒衆幾獲其君而怒猶未怠故以四國主之為憤兵之大戒見諸行事深切著明矣季氏私考曰魯晉衛曹同盟于斷道者也齊頃驕蹇自恣拒晉致讎而又伐魯挑衛以致四國忿怒加兵此又取敗之道也行父以四卿並出而合晉與曹衛之卿必欲一戰而敗之自癸酉至乙酉凡三十七日而兵在齊郊大肆忿慾強暴甚矣四國雖同讎而行父以歸父奔齊之故不遺餘力故以行父為首當時魯卿尚有仲孫蔑獨不與此師汪氏曰憤謂怒婦人之笑辱欲謂貪取汶陽之田秋七月齊侯使國佐如師己酉及國佐盟于袁婁袁婁齊地去齊五十里齊季氏私考張滄氏曰齊國治臨淄縣西有袁婁按國漢名臨菑今屬青州府臨淄縣北有古齊城胡傳齊國佐如師與楚屈完來一也然陘之役則曰來盟于師盟于召陵鞌之戰則曰及國佐盟于袁婁何也荆楚暴横慿陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人帖服其書來盟于師者楚人自服而求盟也盟于召陵者桓公退舎禮與之盟也在春秋時斯為善矣若夫袁婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊強扶弱之心國佐如師將以賂免非服之也晉大夫又不以徳命使齊人盡東其畝而以蕭同叔子為質夫蕭同叔子齊君之母也則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克使魯衛之使以其詞爲之請逮于袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣王氏經世云按鞌之戰當用左氏說盟于袁婁當用公羊氏說鞌與袁婁相去逺近不可知榖梁之説恐未可信齊之四竟不應過遥鞌已是齊地未必竟上之邑豈得去齊有五百里乎榖梁云一戰緜地五百里又云侵車東至海皆侈詞也然國佐如師不盟于師而盟于袁婁則明是郤克恃戰勝強力以非義要齊至欲質其君之母故國佐得以正義直辭折之郤克語塞國佐揖而去之郤克使魯衛為國佐之辭以爲之請追及乎袁婁而與之盟此則公羊之説爲可信也蕭同叔子公羊作蕭同姪子盖謂蕭同為國名姪子者姪娣之子嫁於齊而生頃公榖梁作蕭同姪子之母似又謂蕭爲國同爲姓姪子爲字其母更嫁齊惠公而生頃公二家皆傳聞有誤左氏是也鞌戰之由亦惟左氏得之宣公十也年郤克徴㑹于齊跛而登階婦人笑於房郤克怒出而誓曰所不此報無能涉河歸而請伐齊晉侯弗許盖已知興師之無名矣斷道之盟執齊三子爲見侮故也宣公薨季文子欲叛齊事晉作丘甲盟赤棘皆爲齊也齊伐我北鄙釁於是乎遂搆而不可解矣衛孫良夫以新築之敗亦誓欲必報乎齊故與季文子皆因郤獻子以請師于晉以郤克憾齊而未有名以興師故也郤克之答齊師一則曰大國朝夕釋憾於魯衛二則曰寡君使羣臣爲魯衛請是知是役也以魯衛之請而魯衛之請自各以見侵之故耳二傳増魯衛亦有見笑之事妄說也豈有三國因一笑之恥謀之三年始空國以伐人之理乎蕭同叔蕭君之子齊侯外祖父也子女也難於斥言其母故云八月壬午宋公鮑卒文公卒子共公固立庚寅衞侯速卒穆公卒子成公臧立取汶陽田在今泰安州境内胡傳汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎此所以書取也季氏私考云汶水名自萊蕪縣發流詳見定十年齊人歸鄆讙龜隂田及桓三年公㑹把侯於郕下水北曰陽按水經註汶陽之田在汶北平暢極目盖汶水自漢鉅平縣界西南過剛縣北剛今爲寧陽縣寧陽縣有剛城屯即魯闡邑也水北爲漢蛇丘縣即定十三年所築蛇淵之囿也又西南逕下讙城南即桓二年齊侯送姜氏之處也讙北爲棘即成三年叔孫僑如所圍之邑也棘南去汶水八十里與蛇丘下讙連界棘之西南為遂城則荘十三年齊滅遂而戍之者也其地東與棘連當在今肥城之界内蛇丘也讙也棘也皆所謂汶陽之田也蛇丘本鑄國古未有蛇丘名必通謂之讙讙曰下讙則蛇丘為上讙可知故定十年歸讙而蛇丘在其中矣據孔䟽魯在汶南則汶陽之田北與齊界本非魯田必侵小所得如鑄亡之地而齊魯互爭者也故不繫之國左氏於僖元年季犮敗獲莒拏之時即云賜犮汶陽之田而說者遂以汶陽爲魯故田失之矣按田在汶水之陽者多矣賜季犮者亦其傍近之田非謂即此所取者是也冬楚師鄭師侵衞季氏私考云宣公末年陳鄭宋皆從楚矣惟魯衛曹推晉為斷道之盟而諸侯尚合故楚兵猶有所畏而不敢加於中國者四年至戰鞌敗齊之後人以晉爲不足與矣楚人窺見晉失諸侯無逺志也故遂乗間與鄭侵衛雖其有䘮而不顧則是慿凌諸夏之兵也而其心實欲因此而得諸侯左氏以此役爲救齊豈其然哉楚之肆如此而晉覇之不振可知矣十有一月公㑹楚公子嬰齊于蜀季氏私考云公子嬰齊字子重時爲楚令尹杜元凱曰蜀魯地盖楚公子嬰齊以大衆與鄭師臨衛乆未退兵而嬰齊實先至蜀以魯之素有舊好而相親亦逺交之術也故成公特親㑹之夫楚雖強横於魯實親故僖公出盟而宋襄釋歸父徃㑹而宋圍平凡有所言無弗聽命魯雖失禮罪不加焉而左氏以此爲侵我師於蜀經文所無則附㑹之說爾然成公以周公之裔中國諸侯之望降班失列下與夷狄之大夫㑹以求免焉辱已甚矣而曽無憤悱自強之志則亦何以善其後哉丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀季氏私考盟而魯與必先書公次書主盟者衆所推也書公及楚人則知主盟者楚也盖此盟成公因楚嬰齊侵衛欲爲楚致諸侯以求成也秦於中國無事焉然内界於楚是時已與楚合而又方通好於魯故亦來與盟與楚並序諸侯之上秦強可知矣而中國諸臣不敢先魯公以諸侯之望親共地主之禮曽莫之恥是雖晉不足恃姑以免一時之急而中國諸侯之衰弱盡爲楚人所窺矣豈不傎哉私考又云邾薛鄫親來與盟漸非桓文之舊晉景亦聽其自至未有改焉至悼公時則遂以爲定制而小國多不附大國矣按㑹盟皆嬰齊在而前書嬰齊後書楚人與諸國之卿大夫皆稱人見嬰齊與列卿其為盟于蜀也盖羣然人而已矣嬰齊與列卿並以㣲者之詞稱乃所以示貶既以㣲者之詞示貶而公與之盟則公亦與貶焉可知矣所以不諱公而自見其義如此也三年春王正月公㑹晉侯宋公衞侯曹伯伐鄭胡傳遂東侵鄭公子偃帥師禦之覆諸鄤敗諸丘輿皇戍如楚獻㨗夫討邲之役則復怨勦民非觀釁也遂東侵則潜師掠境非以律也覆而敗諸則專用詐謀非正勝也度彼參此皆無善也畧而不紀勝負㣲也晉侯稱爵而以伐書何也初為是役必以鄭之從楚也附蠻夷擾中國則盟主有詞於伐耳宋衛未𦵏曷爲稱爵背殯越境以吉禮從金革之事也王氏經世云按前年冬楚師鄭師侵衛故晉今討之左氏以爲討邲之役非也邲之役晉救鄭而自敗於楚非鄭之罪也奚討乎若曰討貳我克則來不克遂徃我固知之矣不能爭於當時而討於今鄭豈受治乎使晉有志於抗楚而服鄭曷若移鞌之役於今日乎移七百乗之兵以拒楚楚必却移七大夫之心同志堅以爭鄭鄭必服今兵力既盡於齊而區區摟諸侯於從楚之餘宜其不能得鄭也乃若鄭恃夷而抗中國蔑親暱覆敗晉師夫晉獻齊㨗於周天子猶以爲奸先王之禮况敗盟主兄弟甥舅而以爲功乃獻之於夷狄冦讎以取媚乎鄭之罪不可勝誅矣季氏私考以覆諸鄤敗諸輿丘等事皆經所無固不足據也按晉侯曹伯稱爵是君將之恒稱若宋衛在䘮當稱子而亦稱爵則以背殯越竟爲罪之說胡氏得之矣辛亥葬衞穆公髙氏曰見衛侯背殯出師不臨先君之䘮王氏曰六月乃𦵏非禮也二月公至自伐鄭甲子新宫災三日哭西亭辯疑云公自鞌之戰勝侈欲頗萌故别築新宫如晉虒祁楚章華之類是也以新書非舊有明矣杜氏謂宣公之廟主未入故曰新宫按魯侯國宗廟之建已乆即宣公祔廟自有昭穆之次安得爲宣獨立宫也設爲宣宫災三日哭此爲得禮亦何用書書者以侈欲之奉所不當哭而哭者也乙亥葬宋文公胡傳按文公卒始厚𦵏益車馬重器備君子謂華元樂舉於是乎不臣文公之卒國家安靖外無危難曷爲越禮踰時逮乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而爲之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚𦵏其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳春秋據事直書豈不爲永戒哉夏公如晉屬詞成公如晉者四是年朝景拜汶陽之田四年特朝景景見公不敬歸而欲結楚以叛晉季文子不可而止盖以齊侯既朝晉晉厚齊則薄魯也十年弔䘮晉厲新立疑公貳於楚止公送𦵏俟使楚者還以驗實公請受盟而歸十八年晉悼公立聞其賢遽徃朝之甫歸而士匄來拜朝鄭公子去疾帥師伐許季氏私考曰鄭本事楚之國豈敢責許之恃楚苟爲其事楚而伐則楚必有爭矣左氏之說非也盖是年春諸侯伐鄭而許不救又不爲鄭謀禦敵之䇿故耳然則許盖恃楚以自保者歟公至自晉胡傳宣公薨至是三年之䘮畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之重而不朝於周以拜汶陽田之故而徃朝于晉其行事亦悖矣此春秋所爲作也公行多不致其書公至自晉何其至也必有以也秋叔孫僑如帥師圍棘棘汶陽田之邑在濟北蛇丘今兖州府定陶縣季氏私考云按蛇丘故縣在兖州寧陽縣北南臨汶水而􅁄在其北則與齊連界之邑也今當為肥城縣地胡傳按左氏取汶陽之田棘不服故圍之復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初稅畆作丘甲稅役日益重矣棘雖復歸故國所以不願爲之民也歟成公不知薄税斂輕力役修徳政以來之而肆其兵力雖得之亦必失之矣大雩晉郤克衞孫良夫伐廧咎如季氏私考廧咎如杜元凱以爲赤狄别種然經不繫之赤狄盖本一種而别分爲族如狄之有鮮虞也咎與臯同閔二年晉太子申生伐東山臯落氏杜元凱亦謂赤狄别種而後漢志壺關故黎國註引上黨記曰東山在城東南晉申生所伐今名無臯其即古所謂廧咎如歟又按黎侯故城在潞州黎城縣東一十八里則廧咎如正當晉東衛西故克與良夫同夾攻也以其未嘗爲患故不至於滅耳茅堂胡氏寧曰晉嘗滅赤狄潞氏甲氏及留吁矣其餘黨散入廧咎如又欲盡殄滅之非仁人之心也段紀明請滅羌種羌雖滅漢亦亡後世豈嘗絶羌患哉惟不使之侵擾華夏斯止矣冬十有一月晉侯景使荀庚來聘尋盟衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟季氏私考云自同盟斷道以來魯衛與晉爲黨而魯事晉甚謹故晉使荀庚來聘衛藉晉威欲與魯同好亦舉甯俞故事而使孫良夫同時至焉外大夫來聘而盟者五荀庚孫良夫郤犨孫林父向戌皆強族也其親來魯盖皆求厚贈焉而魯遂隂結之故各願爲盟以成宻約私交之迹著矣此庚與良夫所以為生事專命干先王之典也歟魯人隂結以利欲宻其迹而使㣲者盟君大夫不預焉故稱及觀庚與良夫同時至魯而盟不同日私交可知矣先儒以為諱公言及見二卿之抗則公及莒人盟於浮來抗為尤甚而書公不可通矣鄭伐許陳氏曰狄鄭也楚之伯鄭為之也由齊桓以來爭鄭於楚桓公卒鄭始朝楚諸夏之變於夷鄭為亂階也至辰陵鄭帥諸夏而事楚矣敗晉於邲盟十四國之君大夫於蜀皆鄭為之是故狄秦而後狄鄭㣲秦鄭則中國不淩替矣胡傳稱國以伐外之也晉楚爭鄭鄭兩事焉及邲之敗於是乎專意事楚不通中華晉雖加兵終莫之聽也至此一歳而再伐許甚矣夫所利在晉則從晉人所利在楚則從楚人而不擇於義之可否以為去就其何以自列于中國也况又慿弱犯寡一歳之中而再動干戈於鄰國不既甚乎春秋之法知利而不知義者則外之所以懲惡也屬詞自晉楚爭鄭鄭受兵無虚歳辰陵竊盟於楚而又徼事於晉既従楚以拒晉又一歳中再伐許以怒楚其反覆乎晉楚之間誠狄道也故再伐許稱國言非復中國諸侯也四年春宋公共使華元來聘通嗣君也爲共公謀婚張本三月壬申鄭伯堅卒襄公卒悼公費立把伯來朝爲叔姬欲歸魯故也見家氏吴氏説在後夏四月甲寅臧孫許卒許文仲之子宣叔也子紇嗣是為武仲公如晉連歳如晉以嘗即楚故也其取傲忽之辱豈非禮愈繁而身愈卑歟葬鄭襄公二月而葬必襄公以弟代兄其後嗣子有爭也秋公至自晉景見之不敬公欲求成於楚季文子不可乃止冬城鄆此魯西鄆即今鄆城縣屬濟寧州季氏私考鄆本在濟西田内宣十年齊人分其地以歸於我者也田歸而鄆邑亦來附矣第以取汶陽田之故懼齊復來爭鄆故特城之以備齊也鄭伯伐許傳晉欒書荀首救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉胡傳前此鄭襄公伐許既狄之矣今悼公又伐許乃復稱爵何也喪未踰年以吉禮従金革之事則忘親矣稱爵非美詞所以著其惡也季氏私考云鄭伯喪未逾年急於伐許以修先人之怨而令國人也鄭與許皆附楚之國也去年春諸侯伐鄭許人旁觀而不救又不為鄭謀所以禦敵之䇿故夏使公子去疾伐許楚人不問其冬又伐之又不問今年冬又伐之盖示許以楚人之待己厚也鄭介晉楚之間國尚不能自立而乃屢年用兵爭勝於鄰國豈固本保邦之道乎盖楚之用兵亦有節制自宣十四年圍宋之後至成二年始一侵衛又四年而公子嬰齊伐鄭亦以蓄威息民不輕用也故諸侯伐鄭而不爭鄭三伐許而不問而鄭遂以楚為可玩也豈不愚哉然恃楚而無憚於晉之情亦可見矣五年春王正月把叔姬來歸家氏曰此與悖義而出者不同必叔姬自不安於把或以疾而求歸非把絶之也臨川吴氏曰僖三十一年把伯姬為其子求婦而僖公以次女叔姬與之歸爲把桓公夫人至今四十四年夫婦年皆六十之上而姬始被出而歸疑叔姬無子杞桓别有妾子為太子叔姬心不自安而願歸魯故叔姬既卒而把桓復逆其喪以歸也仲孫蔑如宋報華元之聘也夏叔孫僑如㑹晉荀首于榖榖管仲采邑今東阿縣南十二里有榖城荀首如齊逆女僑如餫諸榖季氏私考云荀首林父之弟别食於知號曰知荘子又云榖齊地非過魯之道而荀首至此僑如徃㑹焉見荀首之返自齊也盖自戰鞌以來齊晉未嘗通好至是晉欲求諸侯故使荀首如齊以講而僑如㑹之則因齊好之成而定議焉於是有蟲牢之盟矣梁山崩季氏私考云梁山即漢志所謂夏陽有梁山者也註云梁山在西北水經註亦云梁山在夏陽之西北臨於河上今夏陽故地西北為韓城則當梁山之南矣梁山本古韓鎮也雖韓為晉滅而梁山之東南則為晉地西南則為秦地西北則為白狄當壤地三界之間則不可繫之國也先儒専指晉地豈非知其一而不知其二邪梁山山之大者也又當限隔中外之處而崩則為變不小矣梁山之崩必無告者此以其變為大據所聞而書耳秋大水冬十有一月己酉天王崩定王崩子簡王立十有二月己丑公㑹晉侯景齊侯頃宋公共衞侯定鄭伯悼曹伯宣邾子定把伯桓同盟于蟲牢鄭地在今開封府陳留縣北有桐牢即其地也胡傳按左氏許靈公愬鄭伯于楚鄭伯如楚訟不勝歸而請成于晉盟于蟲牢鄭服也鄭服則何以書同盟天王崩赴告已及在諸侯之䇿矣以所聞先後而奔喪禮也而九國諸侯㑹盟不廢故特書同盟以見其皆不臣春秋惡盟誓於惡之中又有惡焉者此類是也王氏經世季氏曰鄭自邲之役後皆従楚至此始従晉而晉人不能明尊王之義以示之汲汲於要之以盟此所以終不能定鄭雖再救而卒無功也六年春王正月公至自㑹二月辛巳立武宫胡傳武宫武公之宫立武宫非禮也喪事即逺有進而無退宫廟即逺有毁而無立故二昭二穆與太祖而五者諸侯之廟制也曰考廟曰王考廟曰皇考廟皆月祭焉曰顯考廟曰祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱則祭無禱乃止去墠為鬼諸侯之祭法也武公至是歴世十二其毁已乆而輒立焉非即逺有終之意故特書曰立立者不宜立也季季私考趙鵬飛氏曰禮記者出於春秋之後見魯立武宫遂有武世室之語盖不經矣寄於祖廟而不得祭於廟故曰去祖先在壇而今不得祀於壇故曰去壇若又有従壇遷來墠者則前在墠者又為鬼矣汪氏曰武公名敖乃伯禽之𤣥孫隠公之高祖傳懿孝惠隠桓荘閔僖文宣成凡十有一君宣王與仲山甫爭魯侯戯括之事即武公也取鄟今兖州府境内地季氏私考鄟近魯㣲國而素屬於魯者也必困於強令而悖慢不恭故盡収奪之以為己邑耳觀鄫屬魯而卒取之可見矣凡脅其國使服己者則曰降収之為己邑者則曰取取非滅也義與宣九年取根牟同衞孫良夫帥師侵宋季氏私考晉命也按蟲牢之盟左氏以為諸侯復謀㑹宋使向為人辭以子靈之難此晉之所欲討也晉景之徳本不足以服諸侯徒以戰鞌有功虚聲亦足恐衆而華元方以平楚為功志亦不為晉下則其不欲再㑹盖有由然良夫止於淺侵則見其無辭可執而晉之令人如此亦不足以昭霸業矣夏六月邾子定來朝繼好也汪氏曰盖成公即位而始朝也公孫嬰齊如晉嬰齊即子叔聲伯前以晉命伐宋不徃而良夫獨侵故晉責魯而嬰齊往謝焉則復使之伐以補前過爾壬申鄭伯費卒悼公卒弟成公睔立是年冬楚伐鄭冬晉救鄭以難故不備禮故不書葬秋仲孫蔑叔孫僑如帥師侵宋胡傳魯遣二卿為主將動大衆焉有事於宋而以侵書者潛師侵掠無名之意盖陋之也於衛孫良夫亦然上三年嘗㑹宋衛同伐鄭矣次年宋使華元來聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背楚求成於晉而魯衛與宋又同盟于蟲牢矣今而有事於宋上卿授鉞大衆就行而師出無名可乎故特書侵以罪之也左氏載此師晉命也後二年宋來納幣請伯姬焉則此師爲晉而舉非魯志明矣兵戎有國之重事邦交人道之大倫聴命於人不得已焉將能立乎春秋所以罪之也楚公子嬰齊帥師伐鄭鄭従晉故也冬季孫行父如晉賀遷新田之說未必然以事不經見故也盖報侵宋之成爾晉欒書帥師救鄭鄭人因晉救囚鄖公鍾儀不可謂救無功然鄭終叛晉觀悼公既戍陳又合諸侯以救之而陳侯逃歸豈非晉之伯畧苟未能服楚則諸侯之従晉者終不敢恃以為安乎然伯者救中國之名義則有不可泯者功有小大屬詞比事可知矣王氏經世按晉師救鄭與楚師遇於繞角則非不及事也楚師去我是晉無亡矢遺鏃之費而救鄭之義亦申矣於是全師而退三卿之善謀欒書之知擇而有㫁均之乎不可掩也故春秋書以與之欒書盖有懲於邲之敗而不狃於鞌之勝者夫有懲於敗而戒不狃於勝而驕君子之心王者之道也聖人於書取節焉雖然晉不班師于繞角楚即既還之後乃遷戮而侵蔡則無名矣再致楚師不亦危乎使無知荘子范文子韓獻子三耉成人者力主之則邲之覆轍未必不蹈之矣然則師固忌於衆主而衆謀亦不可以不擇欒子曰善衆之主也三卿為主可謂衆矣斯言也其可為聴謀用衆之法矣七年春王正月鼷鼠鼠之小者食郊牛角改卜牛欲以稷牛為帝牛也鼷鼠又食其角乃免牛而不郊以將祭之犧皆繫於牢設楅衡制其角故鼷鼠得以制之胡傳榖梁子曰郊牛日展斛角而知傷展道盡矣其所以備災之道不盡也改卜牛鼷鼠又食其角則亡乎人矣非人之所能也所以免有司之過也有司免過則變異也其應云何許翰曰小害大下賊上食而又食三桓子孫相繼之象也宣公有虞三桓之志至成始弗戒矣理或然也吳伐郯胡傳稱國以伐狄之也吳本太伯之後以族屬言則周之伯父也何以狄之爲其僣天子之大號也按國語云命圭有命固曰吳伯不曰吳王然則吳本伯爵也後雖益熾浸與中國㑹盟進而書爵不過曰子亦不以本爵與之也季氏私考此夀夢之始事也夀夢立二年矣吴始益大稱王又云吴距郯稍逺而越江淮二水以伐之則爭中國之端也而晉宋齊衛之道亦自此遂開矣西亭辨疑胡氏曰四夷雖大皆曰子此春秋之法仲尼之制也愚按四夷稱子此成周之舊典也春秋有取焉是故吴王稱子楚王稱子夫子嘗曰吾従周吴本伯爵今改為子是制度自己出矣烏得為従周乎當是時諸侯強大夫僣不復知有周矣夫子於是作春秋以誅僣亂尊王室而已乃自違之其何以訓天下故曰四夷稱子皆成周之舊典也否則春秋安得謂正名之書乎廬陵李氏曰吴自太伯奔吴五世至周章而武王克殷因封之吴又十四世至夀夢而始大僣稱王此即夀夢之二年也盖成公二年楚申公巫臣奔晉求通吴以罷楚於是吴兵始及上國此為書吴之始終春秋書伐郯伐陳入州來入郢滅州來滅巢滅徐戰長岸雞父皆書國雖㑹鍾離㑹善道㑹柤㑹向㑹鄫㑹槖臯亦書國惟襄五年于戚始書吴人襄十二年始書吴子卒二十九年始書吴子使札聘至柏舉書子已同於中國至黃池書子則主諸侯之詞矣後七世而亡於越夏五月曹伯來朝汪氏曰盖成公嗣位而始來朝也不郊猶三望胡傳吴郡朱長文曰禮天子有四望諸侯則祭境内山川而已魯當祭泰山泰山魯之境也禮所得祭故不書三望僣天子之禮是以書之汪氏曰宣三年書牛死乃不郊而繫以猶三望不言免牲者牛死無牲可免故必言不郊此年既書免牛又書不郊因間有吴曹二事不可但言猶三望故以不郊起之也四望謂五嶽四鎮四瀆秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衞侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵莒子於是來従盖前此小國多附大國以省勞費今或以屬人而重煩也故又親行如此季氏私考馬陵鄭地按河南志開封府中牟縣西南有馬陵岡是也漢河東郡平陽縣及魏郡元城縣各有馬陵皆非諸侯同盟處也盖平陽晉地元城衛地諸侯救鄭不當逺去盟于晉衛地耳胡傳楚人軍旅數起頻年伐鄭以其背己而従諸夏也與荘之欲討徴舒而入陳亦異矣書大夫之名氏書帥師書伐而無貶詞者所謂不待貶絶而罪自見者也晉合八國之君親徃救鄭則攘夷狄安中國之師也欲著其善故特書救鄭以美之言救則楚罪益明而鄭能背夷即華善亦著矣前此晉遣上將諸國不與焉此則其君自行而㑹合諸國則楚人暴横慿陵諸夏之勢益張亦可見矣故盟于馬陵而書同盟者同病楚也季氏私考蟲牢既盟而諸侯尚多不協故復合諸侯救鄭而同盟于馬陵晉侯見欒書之救列國不至故特親徃公至自㑹呉入州來季氏私考杜元凱曰州來淮南下蔡縣按下蔡即今鳯陽府潁上縣一統志下蔡城在壽州北三十里潁上之連界也家鉉翁曰州來楚要害之地吴得之可以制楚也高氏曰吴楚爭強始見於此冬大雩酉戌亥之月時方盛隂而亢陽為災害及於物此非常之變也衞孫林父出奔晉林父良夫子是為文子髙氏曰衛定公惡孫林父故逐之林父亡七年而恃晉反衛復專衛政又十九年遂逐其君卒以邑叛則定公可謂知所惡矣杜氏曰春秋中年諸侯之大夫外交強國以伉其君衛之孫氏魯之季氏其尤也林父自結於晉之權臣爲衛國患㡬四十年晉黨叛臣為之羽翼衛獻魯昭所以失國晉實為之也八年春晉侯使韓穿萬之後來言汶陽之田歸之于齊胡傳齊人貪得晉有貳命穿也列卿無所諫止皆罪也來言者緩詞也歸之于者易詞也為國以禮者無憚於強而魯侯㣲弱遂以歸齊而不能保罪亦見矣季氏私考齊自㑹温盟翟泉之後不復與晉㑹盟至蟲牢始服而猶未協也故馬陵之後晉使魯反汶陽之田以媚之覇者之所為如此何以令諸侯哉此晉意也故稱歸之于齊歸之于齊者不以自得之辭也汪克寛氏曰晉人徒知蟲牢馬陵之盟齊既従晉俾魯歸田所以堅齊也曽不知失信於魯是失信於諸侯一齊聽命而四方解體悔而尋盟惡足以邀人心之強同乎春秋書戰于鞌取汶陽田韓穿來言汶陽之田歸之于齊傷晉覇之益偷也晉欒書帥師侵蔡左傳遂侵楚獲申驪鄭伯㑹晉師門于許高氏曰晉得齊之後冀盡得諸侯也蔡則畏楚終不與晉自翟泉以來不與中國盟㑹者四十有八年文十五年郤缺入蔡至是欒書復加兵然非執辭討罪之舉故書侵公孫嬰齊如莒逆也汪氏曰行父如陳公孫兹如牟嬰齊如莒皆因遣聘而請昏納婦春秋止書曰如不與其託於公以遂其私也宋公使華元來聘聘共姬為將納幣因聘而納采也夏宋公使公孫壽來納幣胡傳納幣不書此何以書公孫夀卿也納幣使卿非禮也禮不可畧亦不可過惟其稱而已矣畧則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女皆致其厚者也而不知越禮逾制豈所以重大婚之禮哉經悉書之為後法也晉殺其大夫趙同趙括同括嬰兄胡傳按左氏趙荘姬爲趙嬰之亡先是嬰通於荘姫原屏放諸齊至是姬譛於晉侯曰原屏同括邑將爲亂欒郤爲徴晉討趙同趙括以其田與祁奚韓厥言於君曰成季之勲宣孟之忠而無後爲善者懼矣乃立武而反其田然則同括無罪爲荘姬所譛而欒郤害之也故稱國以殺而不去其官以見晉之失政刑矣王氏經世據左氏則趙氏之禍由荘姬據史記則趙氏之禍由屠岸賈其説牴牾不可強而合然嘗深考之則屠岸賈殺趙朔自一事也趙荘姬譛殺同括又一事也觀鄭人追討歸生弑君之罪斵其棺而滅其族則屠岸賈之事豈可謂無崔杼弑君慶封黨之而滅崔慶之族者盧蒲嫳及荘公之嬖人盧蒲癸王何也屠岸賈亦由是也但史記謂同括嬰同見殺於下宫之難則傳聞之誤耳至於趙武畜於公宫則左氏史記又無不脗合夫晉殺同括因荘姬之言同括雖死趙盾之室自在使無他外患荘姬何至無依乃將武畜于公宫乎景公何不念荘姬趙武之尚存忍即以其田與祁奚乎盖朔死於下宫之難盾之系幾絶而盾之異母弟同括嬰専趙氏之政趙嬰通於荘姬同括因而逐之雖曰以罪然中心未必不由於爭權故内則荘姬怨之外則欒郤疾之因得以合而行其譛焉趙武之匿始則虞屠岸賈之害終使武而尚存必亦非原屏所利也故従姬氏畜於公宫及原屏既死韓厥始言於公而立之此事之實也邲之役趙朔將下軍宣十二年晉景三年屠岸賈之難在此鞌之役欒書將下軍代趙朔成十二年晉景十一年朔死矣秋七月天子使召伯來賜公命胡傳諸侯嗣立而入見則有賜已修聘禮而來朝則有賜能敵王所愾而獻功則有賜成公即位服喪已畢而不入見既更五服一朝之嵗矣而不朝京師又未嘗敵王所愾而有功也何為來賜命乎召伯者縣内諸侯爲王卿士者也來賜公命罪邦君之不王譏天子之僣賞也臨諸侯曰天王君天下曰天子盖一人之通稱吕氏曰天王制治天下而主乎法天子養天下而主乎恩在詩賞善罸惡之事多稱王恩賜宴好之事多稱天子冬十月癸卯把叔姬卒屬詞把叔姬歸老於魯非把絶之故書國魯君為之服而喪以夫人之禮故書卒把伯來逆其喪以歸而不書葬魯不㑹也晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯胡傳按左氏士燮來聘言伐郯也以其事吴故公請緩師不可吴初伐郯季孫固曰中國不振旅蠻夷入伐而莫之或恤亡無日矣當其時既不能救及其既成豈獲己也而又率諸國伐之何義乎前書來聘下書㑹伐晉侯之為盟主可見矣魯既知其不可従大國之令而不敢違其不能立亦可知矣家氏曰不能治楚而徒欲服鄭不能制吴而反欲責郯晉之君臣無能甚矣先書吴伐郯此書四國㑹伐郯不能救之又伐之著晉之罪所以貶也衞人來媵胡傳媵者何諸侯有三歸嫡夫人行則姪娣従二國來媵亦以姪娣従凡一娶九女所以廣繼嗣三國來媵非禮也夫以禮制欲則治以欲敗禮則亂而諸侯一娶十有二女則是以欲敗禮矣備書三國以明逾制為後戒也春秋事義全考卷九
