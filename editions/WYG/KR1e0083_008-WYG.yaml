body:
  text: 春秋事義全考卷八明姜寳撰宣公名接文公子母敬嬴善問周逹曰宣元年春王正月公即位宣書即位與桓同說已見前矣公子遂如齊逆女胡傳逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也季氏私考敬嬴欲結齊惠懼為出姜所謀故喪娶其女如此之急按請齊立接其謀已露於二卿並使之時矣今遂如齊逆女盖以赤齊之甥懼齊為赤有所討於魯而急欲昏於齊以免討爾公穀謂譏喪娶不知喪娶固可罪然尤可罪者所以喪娶之故也胡傳喪紀廢意似説較寛緩矣三月遂以夫人婦姜至自齊書遂以夫人即遂不當以夫人見公喪娶而不親迎而所以喪娶之故則縁弑逆急於昏齊以免討也書婦姜至婦有姑之詞見敬嬴欲速以姑自居而所以欲自為姑之速者則亦縁子弑逆急於得婦以為姑而當尊用事且亦免於其子之見討也上罪宣公下罪敬嬴為是遂之罪自於宣公一邊見之不稱公子則以一事而再見故單稱名非别有意義也若不稱氏以罪夫人之說則未可據以為確論盖稱婦姜則不必更言氏矣胡氏夫人與有罪一段似亦牽強難従夏季孫行父如齊胡傳經書行父如齊下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請盖以賂也諸侯立卿為公室輔猶屋之有楹也而謀國如此亦不待貶絶而惡自見者也不然以行父之勤勞恭儉相三君而無私積必能以其君顯名與晏嬰等矣高氏曰公既昏矣然後季文子如齊納賂請列於㑹假大國之權以定宣公之位宣公之位定則一時臣子黨惡誤國之罪皆可以逃矣季氏私考行父魯之所謂賢大夫也公子遂弑赤而亦與之為黨盖與聞廢立之謀因與之比周共事也然則行父之罪其即次於仲遂者歟晉放其大夫胥甲父于衞按趙穿獨出盾慮失穿而遂出戰不肯薄河敗秦以甲穿軍門之呼而止皆盾不能節制諸帥之過不應自發其事且事已八年不應至此然後討甲要是晉靈漸長察知河曲無功由於撓臾駢之事故不得不致討而盾以胥甲父為穿之黨也但放而不當以重辟姑以解説而已焉盖靈於此已有疑盾之心矣盾於此舉不但庇穿為私是時衛善於晉其放甲父於晉亦猶是盾之私也公㑹齊侯于平州平州在今泰安州境内胡傳按左氏曰㑹于平州以定公位夫簒弑之賊毁㓕天理無所容於天地之間身無存没時無古今其罪不得赦也以列於㑹而不復討是率中國為戎夷棄人類為禽獸此仲尼所為懼春秋所以作也然欲定其位者魯宣宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤也汪克寛氏謂齊惠因逆得立故於宣之納賂以請㑹驩然而従於事容有之至謂魯因齊之強大冀其能庇已故曲意以結之不知魯自為齊為其鄰為其為出姜之母家不専為其強大而已也公子遂如齊胡傳宣公簒立之罪仲遂主謀為首惡其請於齊遂及行父則一再見於經矣如齊拜成雖削之可也又再書於䇿者於以著其始終成就弑立之謀凡此皆直書於䇿而義自見者也前書遂得臣如齊以著逆謀之始此書遂如齊以著逆謀之終所以能始終成就此謀者以内有敬嬴為之主外有齊人為之援也後世人主可不以為戒哉六月齊人取濟西田胡傳魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寧魯亂首與之㑹是利其為惡而助之也弑君簒國人道所不容而貨賂公行免於諸侯之討則綱紀等于弁髦人類㓕為禽獸其禍乃自不知以義為利而以利之可以為利而為之也孟子為梁王極言利國者必至於弑奪而後饜盖得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無後而亂少弭矣秋邾子來朝邾子貜且齊出也雖為魯附庸而常屬於齊毎視齊為向背今魯與齊通好所以邾子亦來朝其黨惡之罪與滕子朝桓同楚子鄭人侵陳遂侵宋以陳靈公宋文公皆受盟於晉故也遂繼事之詞按齊桓侵蔡而遂伐楚以蔡近而楚遠有事於楚道先由蔡也楚荘侵陳而遂侵宋以陳近而宋遠有事於宋道先由陳也侵蔡伐楚盖齊桓圖伯之舉侵陳侵宋盖楚荘圖伯之舉也以天下之患莫大於楚以中國之樞實在於宋故也後十五年而宋楚平後五十年而晉楚同盟于宋然則楚之有事於宋也非楚荘所以爭伯也歟書楚子傷荆楚之欲執伯權鄭伯稱人貶鄭伯之従楚以亟病中國其罪直書而並見矣晉趙盾帥師救陳王氏經世據經文盾實未嘗救宋左氏意之爾上書楚子侵陳遂侵宋則楚師已在宋矣盾始帥師救陳明不與楚師相及也盾師至陳楚已掠境而過盾不過揚兵而還耳盖自陳而即次于棐林㑹四國以伐鄭矣盾必不又尾楚師而至於宋也遙以為名而左氏誤信之經安得書救宋哉宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭棐林郷杜預云榮陽宛陵縣盖在今陽武中牟之間此晉師即上趙盾所帥救陳之師諸侯就而㑹之於棐林以伐鄭書法似當如此不必别生意義也季氏私考㑹則稱師者盖一事再見則従略之常詞觀昭十一年楚棄疾帥師圍蔡而下書楚師㓕蔡齊履謙氏所謂承上省文而稱師是已按是時趙盾帥師救陳而四國之君帥師以徃及而㑹之於棐林故曰㑹晉師則是役似是伐鄭有疑須㑹乃定故㑹而後伐如此既而伐鄭又不能服鄭與楚蒍賈有北林之遇而致解揚被囚焉其不競於楚眀矣盖亦直書而自見者胡氏以為著其美非也冬晉趙穿帥師侵崇崇即今西安府鄠縣王氏經世是時晉已不競於楚故𫝊生求成于秦之說夫秦強國與晉又深讐也以好結之猶未易成乃伐崇以怒之而曰以求成不亦遠於為謀乎趙穿雖狂趙盾雖惛或不為是也趙盾以驟諌激靈公之怒公潜使人賊之不克又伏甲將襲殺之於庭陛之間盾倉皇脫免趙穿遂有桃園之逆起於一時非素謀也趙盾自以無罪而不直在君故未出山而復所謂不知春秋之義而陷於簒弑之罪蒙首惡之名者也按王氏此說是然則侵崇之謀何自而起乎當時盾驟諫而不入靈公疑盾之心萌矣盾借侵崇之名授其子弟之親信者以兵權殆將以自固也而靈公屢欲殺盾盾出走而穿遂弑公非由兵柄在手何以能如此胡傳謂穿欲得兵權托於伐國以用其衆是已謂穿於此已有逆心則恐未必然也伐與國以求成事亦未必然要亦左氏傳之者誤爾晉人宋人伐鄭王氏經世棐林之伐無功不思修其未至而又興不戢之師挾有瑕之宋欲以伐人不亦難乎書人書伐交罪之也是時楚師去宋乆矣故伐鄭而宋與焉榖梁伐鄭以救宋之説大非世未有國方受兵乃伐他國以自救之理也二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大􅁄宋師敗績獲宋華元大􅁄城在今開封府寧陵縣西南七十里按鄭之従楚侵宋也宋既為棐林之役以報之是冬又以晉人伐鄭一怨而兩報之今致歸生受楚命來伐宋不能奉詞令以諭鄭又不能固封守以待鄭華元遽出師與戰敗獲乃其自取若斷罪則鄭輕而宋重矣春秋紀勝負但縁師先敗身乃見獲故依次第書之兼重之意恐亦不當如胡傳専主以立説如此也秦師伐晉吕氏曰晉文之欲與楚争也必得秦而後敢戰殽函之役晉襄度淺而先軫諸人見利乗便自是報復無已楚今方有陵駕中國之心鄭復背晉従楚以侵陳宋晉將與楚争則通秦以軋楚可也否則置秦而勿問可也而盾族子興侵崇之謀盾也聽之是又啟秦之爭也宋方敗于鄭而晉復病於秦非自致之而誰耶按春秋直書自見盾疎於謀以致秦報如此秦以問罪為名故書伐非是予秦亦非是誅穿盾上侵弑逆之萌所謂直書而罪自見焉耳夏晉人宋人衞人陳人侵鄭王氏經世鄭之受盟于楚而侵宋以晉為不足與盖有所侮也晉乃庇宋以伐鄭是時趙盾攬權而偷於為政實無鬬心故棐林之役楚囚解揚晉師即還鄭歸生受命于楚以伐宋聲其罪曰伐而直詞以責其曲宋負瑕而敵為戰之主遂至師崩將獲為效如此亦可創矣乃趙盾復因救焦而侵鄭潜師掠境稍欲洗大􅁄之恥塞宋意而還耳而不虞楚師之遽出也鬭椒次鄭以待晉師先我師之未至也先人有奪人之心於是趙盾者氣消意沮謬曰彼宗競于楚殆將獘矣復引而去之夫以全晉之強合諸侯之師遇一鬭椒而不敢交綏事之不收一至於此皆起于受賂釋宋不討而已是時盾避鬭椒以本無欲戰之心故不競于楚而又方有弑逆之禍不但理曲而已也於是楚遂益張明年且有問鼎之舉矣不可謂非盾有以致之也胡氏但追論取賂釋宋而不及於此恐未盡且謂楚人有詞於宋似許楚與鄭之従楚皆非也謂鄭罪稍輕於宋謂晉事更曲于楚則可爾秋九月乙丑晉趙盾弑其君夷臯初盾之外求君也欲廢靈公公雖幼寧不知之乎既立乎位而盾也又當國政而専其權者二十餘年之乆境内外皆知有盾而不知有公公以盾欲廢己既不相能後又以盾專恣積不能堪而欲殺盾及鉏麑提彌明靈輒等皆為盾而不為公君臣相為仇敵勢不兩立如此則盾有殺公而已矣穿其族子所愛信穿之弑為盾弑也亡不越境謂行未逺而君被弑反不討賊謂不討穿寧獨不討而已乎且使穿逆成公於周使得以固新君之寵則盾非但與穿同謀盖實主謀者矣此趙盾弑君之斷案也冬十月乙亥天王崩匡王也三年春王正月郊牛之口傷改卜牛牛死乃不郊家氏曰此魯宣除喪始郊而天示之譴如此也胡傳乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪於魯史䇿已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事禮乎春秋備書其義自見猶三望胡傳三望者公羊曰祭泰山河海河海非魯之封内其不得祭亦明矣猶者可已不當為之詞葬匡王胡傳四月而葬王室不君其禮畧也㣲者往會魯侯不臣其情慢也楚子伐陸渾之戎陸渾戎允姓初在秦晉西北僖公二十二年為秦晉遷于伊川遂従陸渾戎號其地即今河南府嵩縣古伊闕地窺周室也胡傳外域相攻不志此其志何也為陸渾在王都之側戎夏雜處族類之不分也楚又至洛觀兵於周疆問鼎之大小輕重焉故特書於䇿以謹中外之辨禁猾夏之階夏楚人侵鄭胡傳按左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往従楚非矣今晉成公初立背僣竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣秋赤狄侵齊季氏私考赤狄隗姓别為一種隗俗尚赤衣者也在山西潞州以北而東界黎城即古黎侯國其種有潞氏甲氏留吁壤地相連者也赤狄距齊甚逺而連年侵至齊國未有不由狄境而往者然而狄不為規盖自叔孫得臣敗狄于鹹之後狄勢稍衰而赤狄浸強則取道于狄而無忌矣許氏曰楚侵其南狄侵其北此中國棟撓之時也宋師圍曹按二族雖非討罪之師然在宋有不赦之罪亦因此而自反可也今乃不能反躬自治而徒恃衆強以報之豈端本清源之道哉此春秋所以書宋師圍曹以責文公也冬十月丙戌鄭伯蘭卒穆公卒靈公夷立葬鄭穆公吴氏曰葬速禮不備也四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向今兖州府郯城縣與淮安之海州皆郯子國地郯少皥之後已姓國莒郯二國相怨故公與齊侯共平之胡傳以齊魯大國平郯莒小邦宜其降心聽命不待文告之及也然而莒人不肯則以宣公心有所私係失平怨之本耳故書取以著其罪屬詞後此郯伯姬來歸則郯嘗結婚於魯故宣公為之伐莒取向按榖梁云取向乗義而為利也則向魯取以自益初非為郯取也今既無以得莒後書郯伯姫來歸郯亦無以固其好矣夫以偏心失莒又以貪心不能固郯之好是不惟無以平莒且亦無以結郯盖兩失之春秋書不肯書取以著其罪以此及字平字取字不肯字俱是解事之說書法重書取以著其罪句秦伯稻卒共公卒子榮嗣是為桓公夏六月乙酉鄭公子歸生弑其君夷弟堅嗣是為襄公靈公見弑不以禮葬也故不書葬王氏經世事不可考止據經文可也左氏所載子公之黿不類羊斟之羊乎公食大夫君臣禮會豈得遽有染指於鼎之事靈公初立豈應即以小故欲殺大夫借曰一時之怒言非不可解之罪子公何至遽與子家歸生謀先乎懼者子公也子家無罪何事而與之謀子家聞此狂謀寧不駭異而顧曰畜老猶憚殺之而况君乎此與殺老牛莫之敢尸悖語同必其君素無道之甚積憾不堪而有之靈公初立子家無怨聞謀不詰而驟出此言尤非人情也又謂子公反譛子家子家懼而従之譖者托何事以取信懼者因何危疑自度必不免而遂見従乎歸生貴戚之卿當國秉權君臣無釁謂其自有妄圖猶不可知而謂其以嘗黿之故従人弑逆雖病狂者亂不至此雖至愚者信不至此矣胡氏惑左氏而曲為之説非也季氏私考歸生自大􅁄戰勝必恃功驕恣而見疑於嗣君者也故假手於公子宋以弑之而歸生實造此謀故以歸生主乎弑與趙盾同赤狄侵齊髙氏曰以齊之強而連年為狄所侵惠公之無政可知矣秋公如齊公至自齊毎行必飲至不知當時何所喜而如此胡傳君行告至常事不書宣公此年如齊而皆致者危之也夫以簒弑謀於齊而取國以土地賂齊而請會以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎髙固之事亦殆矣故比年如齊而皆致以戒後世之欲利有攸往者惟義之與比為可安耳汪氏曰盟會之書至始於桓公之盟唐朝大國而屢書至始於宣公之如齊春秋盖危桓宣之不得返而又嘆其不見討也冬楚子伐鄭王氏經世晉救不書晉若討鄭之賊楚師不禦而自去矣若楚能仗義亦孰能與之爭惟志不在於討賊而在於争強交罪之也前年楚侵鄭不獲成故曰未服而今又伐之胡氏以稱爵為予楚恐非五年春公如齊夏公至自齊秋九月齊高固來逆子叔姬胡傳按左氏公如齊髙固使齊侯止公請叔姬焉書夏至自齊秋齊髙固來逆子叔姬罪宣公也其曰來者以公自為之主也諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣宣公以魯國周公之後逼於高固請婚其女強委禽焉而不能止惟不知以禮為守身之幹是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄説不近於禮奚足逺恥辱哉按高固以大夫抗禮於國君齊侯容其臣以大夫抗禮於國君固皆不為無罪然所以致此者公也公屢年如齊不知有守身為國之禮以至於見止而請婚自為婚主不知有壓尊毁列之嫌以至於卑朝廷而慢宗廟始既不能辭婚終又不當主婚其取此辱也公實自致之爾春秋詳書為後世鑒以此叔孫得臣卒汪氏曰荘叔也子僑如嗣是為宣伯胡傳君臣父子妃妾適庶人道之大倫也方仲遂以殺適立庶往謀於齊而與得臣並使也若懵然不知其謀或知之而不能救則將焉用彼相矣春秋治子赤之事専在仲遂以其内交宫禁外結強鄰大惡無所分也而叔孫得臣有同使於齊之罪故特不書日以貶之若曰大夫而不能為有無者不足加以恩數云爾冬齊高固及子叔姬來胡傳左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則高固親來非禮也又禮女子有行逺父母者歳一歸寧今見逆逾時未易歳也而叔姬亟來亦非禮也故書及書來以著齊罪也齊均也言均著其罪也楚人伐鄭傳楚子伐鄭陳及楚平伐鄭所以脅陳也故陳及楚平晉荀林父救鄭伐陳楚兵於是三至鄭矣書罪其數犯中國也六年春晉趙盾衞孫免侵陳胡傳按傳稱陳及楚平荀林父伐陳經皆不書者以下書晉衛加兵於陳即陳及楚平可知矣以趙盾孫免書侵即林父無詞可稱亦可知矣愛人不親反其仁治人不治反其智晉嘗命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於已有闕盍亦自反可也不内省徳遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也伐者有詞之稱侵者無詞之稱不書伐而書侵皆無詞可稱之詞也家氏曰陳之叛晉即楚以鄭故爾鄭穆暮年棄楚而托身於晉望晉有以大拯其危急也曽未期年而有歸生之亂晉坐視莫之顧陳叛而與楚良以是爾晉成孱君政在趙氏豈能為鄭討賊然陳鄭毎相視以為向背鄭賊之不討無以服陳人之心陳雖受伐而終不為晉屈也夏四月秋八月螽胡傳傳謂螽為穀災虐取於民之效也宣惟伐莒於前伐萊於後用兵不息虐取於民此戾氣所以應之而有螽而助法之所以改也經書於䇿見天人感應之理不可誣示人君當慎其所以感之者冬十月七年春衞侯使孫良夫來盟胡傳來盟為前定者嘗有約言矣未足效信而釋疑又相歃血固結之爾是盟衛欲為晉致魯而魯專事齊初未與晉通也必有疑焉而衞侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見矣夏公㑹齊侯伐萊秋公至自伐萊大旱伐萊是齊主兵虐小而公従之竭力従人而不顧力之已困聲罪為名而不思已之負罪兵出踰時勞民毒衆身方冐危而至又以軍旅之後歳大旱而凶年焉公之病國病民如此其罪直書而自見矣雩不雩之說似多冬公會晉侯宋公衞侯鄭伯曹伯于黑壤公之見止以専朝齊而不事晉公有以致之公之罪也晉之止公但以不朝已之故而責賂於公曽不問及其簒立之大惡晉亦非所以行乎諸侯晉之罪也春秋書會不書盟見公以行有不慊而不得與於盟又見晉以責賂之故而不使之與於盟盖兩譏之胡氏以為非晉人之咎恐未然八年春公至自會公止於晉逾年始返其書至危之也夏六月公子遂如齊至黄乃復胡傳至黄乃復壅君命也有疾亦不復可乎大夫以君命出聞喪徐行而不返未致事而死以尸將事乃者無其上之詞其曰復事未畢也何氏曰聞喪徐行而不返聞喪者聞父母之喪徐行者不忍疾行又為君當使人追代之以喪喻疾者喪尚不當返况疾乎辛巳有事于太廟仲遂卒于垂合享則書有事于太廟時祭則書四時祭名書辛巳有事而仲遂卒見遂以祭之日卒也仲是遂之字死而以此賜氏故稱仲遂此處重在猶繹說下志變法之端恐當他處見之為是屬詞仲遂荘公子也字襄仲仲嬰齊遂之子歸父之弟壬午猶繹萬入去籥胡傳繹者祭之明日以賓尸也猶者可已之詞萬舞也以其無聲也故入而遂用籥管也以其有聲也故去而不作仲遂國卿也卒而猶繹則失寵遇大臣之禮矣聖人書法如此存君臣之義也萬文武二舞之總名籥舞文舞之别名盖文舞吹籥秉翟羽也萬入去籥盖文武二舞俱入於二舞中去羽舞吹籥者爾按尸者主也繹者繼也賓尸謂出主於太廟合享後歸主於太廟而繼昨日事行小祭之禮以安之爾非是以賓客之禮燕為尸者之謂也諸侯以大夫為尸則君當拜臣王父以孫為尸則父當拜子世寧有是理乎即如大夫為尸孫為尸當祭之日儼然坐於上而君若父者従下拜而獻之亦當有不安於其心况明日又拜祭焉可乎故知尸従木主之說是也孟子弟為尸則誰敬亦謂弟捧主出廟之時爾非是弟真自為父祖尸也戊子夫人嬴氏薨王氏經世汪氏曰春秋既書夫人姜氏薨于夷又書夫人風氏薨則知哀姜為荘公夫人而成風乃妾也既書夫人姜氏歸于齊又書夫人嬴氏薨則知出姜為文公夫人而敬嬴乃妾也直書於䇿讀者比事以考之雖㣲傳而嫡妾之分明矣宣公以夫人之禮喪妾母其失與僖公同所謂直書而自見者也晉師白狄伐秦胡傳晉主夏盟糾合諸侯攘夷狄安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責己可也既不知自反釋怨修睦以補前過已可咎矣乃復興師動衆會戎狄以伐之獨不惡傷其類乎直書於䇿貶自見矣季氏私考白狄别為一種俗尚白衣者也在西河秦晉之間故秦晉相攻皆連白狄成十三年左傳載晉吕相絶秦書云白狄及君同州則白狄與秦相近當在晉西趙鵬飛所謂介秦晉之間者也史記亦載晉文公攘戎翟居於河西圁洛之間圁今之神木縣洛今之洛川縣皆屬延安府盖延綏葭鄜諸州悉其地也李氏曰晉絶秦書曰白狄及君同州君之仇讐而我之婚姻也晉與秦自侵崇起釁七年而未巳晉昏狄而結以伐秦其罪大矣故自此至成十三年吕相絶秦皆連兵之事秦康共晉襄靈之後晉成秦桓之交兵又始於此季氏私考此趙盾當國之事也結白狄以伐秦而秦自此不敢加兵於晉者七年於憤泄矣然必於報怨而不顧自傷其類尚為能善其後乎楚人滅舒蓼蓼先滅於楚者其地即今固始縣按地譜上義陽之蓼文五年先已滅於楚此即如舒鳩舒庸盖羣舒别種非二國也胡傳按詩稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與焉然春秋書而不削者是時楚人疆舒蓼及滑汭盟吴越勢益強大將為中國憂而民有被髮左袵之患矣經斯世者當以為懼有攘卻之謀而不可忽則聖人之意也趙鵬飛氏曰舒地逼近中國舒滅則中國失南門矣秋七月甲子日有食之既冬十月己丑葬我小君敬嬴胡傳僖公享國八年然後致成風而敬嬴之亟也雖云援例魯君臣之責亦可知矣象山陸氏曰襄仲殺太子惡敬嬴為之也敬嬴非嫡而薨以夫人葬以小君魯君臣之責深矣雨不克葬庚寅日中而克葬譏無雨備也城平陽平陽今泰安州新泰縣髙氏曰懼晉故也方舉大喪又城平陽重困民力也季氏私考平陽在魯北鄙近根牟城之以為逼根牟計也楚師伐陳髙氏曰陳以晉衛見侵復棄楚而従晉故楚以為討然晉不能救陳陳遂復即楚九年春王正月公如齊公至自齊孫氏曰公有母喪而逺朝強齊無哀甚矣夏仲孫蔑如京師蔑公子慶父之孫公孫敖之子是為孟獻子盖慶父荘公庶兄故為孟氏以庶長不可先嫡而字曰仲其後因氏仲孫云王使先來徴聘故也胡傳當歳首月公朝於齊夏使大夫聘於京師此皆比事可考不待貶絶而惡自見者也宣公享國九年於周纔一往聘其在齊則又再朝矣經於如齊毎行必致深罪之也經書君如齊臣如周而特書春王月以表之以此王氏經世勤齊至矣今又冐哀而往於京師缺如也乃因徴聘而大夫黽勉於一行象山陸子曰直書於策比而讀之而無懼心者真不知矣以厚薄言則君朝齊而臣聘周以緩急言則歳首朝齊而夏乃聘周以疎宻言則於周纔一往聘而於齊則又再朝經於如齊既毎行必致以著其罪而又春正月書王於蔑如京公如齊之上見其奉天子之正朔為周之臣子而不知有周所以表其罪如此若比事以觀則又不待貶絶而惡自見矣齊侯伐萊李氏曰東萊有萊山従齊之小國也齊自七年會魯伐之今年又自伐之卒於襄六年而滅之矣秋取根牟季氏私考根牟小國漢為泰山郡牟縣今泰安新泰縣嬴愽之間牟汶出焉者其西境也顔師古曰桓十五年牟人來朝即此是以為牟子國也則非矣盖牟子城在今登州府福山縣西北三十里漢為東萊郡東牟而距根牟逺矣魯越齊萊之境而往取之一千五百里而遙勢之所不便也且根牟與牟異名顔説悞也或根牟乃牟支庶所分而别為一國如小邾之於邾則不可知耳夫根牟在魯東北界者也杜元凱以為根牟魯東界琅琊郡陽都有牟鄉乃因漢志於陽都之下載有牟䑓之言故謂牟縣在此盖陽都屬琅琊屬泰山求之水源限隔山谷是以各分所𨽻豈根牟界居其間水西流出魯北界者為牟汶其東境入陽都界者為牟縣歟故牟䑓牟鄉之名遂因牟縣而沿及陽都之境爾至鄭漁仲又以根牟為都安丘則又以隋嘗於此置牟山縣而誤也汪氏曰諱滅書取與鄟邿同昭八年蒐於紅自根牟至於商衛即所取根牟也私考根牟盖屬魯小國而北界於齊必困於強令而悖慢不共者也是時齊方善魯故聽魯取之八月滕子卒昭公卒文公夀立九月晉侯宋公衞侯鄭伯曹伯會于扈晉荀林父帥師伐陳荀息之後是為桓子以其嘗將中行故又為中行伯而氏曰中行云按胡傳會於扈以待陳而陳侯不會然後林父帥師則諸侯之師不與可知而以為林父兼將誤矣凡列國統於一將者皆書如隠十年翬帥師會齊人鄭人伐宋是也此不書安得以為林父將諸侯之師乎故知季氏私考是當時陳之棄盟主而即楚也於従違之義已非而又背晉救陳之施罪可伐矣晉會扈以待陳陳不至然後林父伐之可謂得聲討之宜者矣此則文定說當従觀春秋所書而自見者也辛酉晉侯黑臀卒于扈成公卒子景公獳立冬十月癸酉衞侯鄭卒成公卒子穆公速立胡傳晉成公何以不葬魯不會也衛成公何以不葬亦魯不會也衛成事晉甚謹而魯宣公獨深向齊衛欲為晉致魯故謀黑壤之會而特使孫良夫來盟以定之也及會於黑壤而晉人止公賂然後免是以扈之㑹皆前日諸侯魯獨不往而二國繼以喪赴亦皆不㑹此所謂無其事而闕其文者也宋人圍滕季氏私考文十二年膝昭公背宋而朝魯宋人内有國亂外有楚兵故不暇討至是昭公卒乃因其喪而圍之胡傳圍國非將卑師少所能辦也必動大衆而使大夫為主帥明矣然而稱人是貶之也滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比事以觀知見貶之罪在不仁矣王氏經世伐滕之喪不仁間晉有喪以侵小不義曰圍非師少可知直書宋人圍滕而其罪自見矣楚子伐鄭晉郤缺帥師救鄭王氏經世按自厲之役鄭南北無屬楚未得志七年鄭又及晉平㑹於黑壤故楚今年伐鄭不以黑壤興戎遠稱厲之役者志恨在厲役也是時晉景方立郤缺救而不能定是以十一年辰陵之盟鄭子良曰晉楚不務徳而兵爭與其來者可也乃従楚然楚荘之立加兵於鄭者凡四而兩書楚子說凡例者紛然愚意書楚子者君為將也書人者大夫也夷狄猾夏何可褒而以書楚子曲生意義耶按楚莊即位以來毎窺伺中國以圗伯如連年伐鄭是也實未有討鄭賊之誠心春秋以其君將故書爵實亦未嘗予之若晉郤缺之救則以為與晉可也盖伐者惡則救者善矣據明年傳載鄭討歸生之罪斵其棺而逐其族盖此時歸生已斃故書救以與晉此汪氏之說可従也陳殺其大夫洩冶胡傳稱國以殺者君與用事大臣同殺之也稱其大夫則不失官守而殺之者有専輒之罪矣洩冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弑君之禍故書其名為徴舒弑君楚子滅陳之端以垂後戒此所謂義係於名而書其名者也見陳因殺此人而有此禍所謂義係於名而書名者非貶也胡氏前段是後段過求洩冶處未妥王氏經世云君子之道或出或處或黙或語惟其時而已必於㓗身遠患非也必於出身犯難亦非也觀洩冶之能諫知其非貪乎寵禄見幾而不去者如皆欲為子哀叔肸則亂世何賴於有君子乎此說是當従之十年春公如齊公至自齊公至是四朝齊矣齊人歸我濟西田季氏私考濟西田即今鄆范二縣之地盖齊魯之所互爭僖三十一年魯既取之而宣二年又為齊取者也今齊與魯厚故中分以與魯范近於齊則齊有之鄆近於魯則以歸魯田之分屬於魯者謂之我濟西田齊履謙氏曰我者對彼之稱濟西之地魯不盡有者是也何以知鄆之屬魯盖鄆即成四年所城之邑知其當分於魯者以此胡傳宣公於齊順其所欲既以女妻其臣又以兵㑹伐萊之舉又毎歳往朝於齊庭雖諸侯事天子無是禮也歸讙及闡直書曰歸此獨書我者乃相親愛惠遺之意深著齊人助成弑逆之罪也以柔巽卑屈事人不以其道而得地與恱人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣按我字連下讀當由我故疆而言胡文定以為親愛惠遺則以我字粘上文讀矣恐非夏四月丙辰日有食之己巳齊侯元卒惠公卒子頃公無野立齊崔氏出奔衞家氏曰是歳至杼弑君盖五六十年使杼得年七十此時方在弱冠不應權勢已盛為人所畏疑非杼之身或其父但不可考爾王氏經世按自此至崔杼弑莊公凡五十一年古者四十而仕五十而爵使為一人則崔杼盖百歳矣以棠姜亂國以崔明滅家必非耋耄之人所為然則非一人也季氏私考齊惠公繼諸兄而立羣従不能無爭崔氏於立君之際意或不同而髙國則擁立頃公懼其逼已所以逐之故穀梁子曰氏者舉族而出之之辭也舉族可出其無根據難除之勢可知矣至成公末年出髙無咎連及國佐而崔杼以慶氏之黨復歸其國亦非如欒盈之以宗強而入曲沃也公如齊五月公至自齊胡傳文約而事詳者經也春如齊朝惠公夏如齊奔其喪若是雖不致可也而皆致者甚之也天王之喪不奔欲行郊禮而汲汲於奔齊惠公之喪天王之葬不㑹使㣲者往而公孫歸父㑹齊惠公之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺聖人之情見矣癸巳陳夏徴舒弑其君平國靈公弑子成公午立胡傳陳靈公之無道也而稱大夫之名氏以弑何也禍莫大於拒諫而殺直臣忠莫顯於身見殺而其言驗洩冶所為不憚斧鉞盡言於其君者正謂靈公君臣通於夏徴舒之家恐其及禍不忍坐視故昧死言之靈公不能納又従而殺之卒以見弑而亡其國此萬世之大戒也特書徴舒之名氏以見洩冶忠言之驗靈公見弑之由使有國者必以遠色修身包容狂直開納諌諍為心也六月宋師伐滕季氏私考滕被圍不服至再見伐亦見其善於守國矣自是以後國日強諸侯日親孟子他日謂可以為善國其基不立於此乎滕人恃晉而不事宋故也胡傳宋大國爵上公霸主之餘業力非不足也今鄰有弑逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃已徳猶有所闕而滕何尤焉故特稱宋師伐滕以著其罪而汲汲於誅亂臣討賊子之意見矣公孫歸父如齊葬齊惠公字子家其後為子家氏胡傳歸父仲遂之子貴而有寵宣公深徳齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱没則親往奔喪而使貴卿㑹其葬亦不顧天王之禮闕然莫之供也比事考辭義自見矣季氏私考齊惠公卒三月爾而葬太速者必以孝昭懿惠兄弟相及國内羣従有争也觀崔氏見逐於君終之際而嗣子稱侯於未逾年之前則必有故而倉卒即位以治喪矣晉人宋人衞人曹人伐鄭黄震氏曰前日楚子伐鄭郤缺之救不能得鄭故鄭服於楚而晉又伐之胡傳按左氏鄭及楚平諸侯伐鄭取成而還其稱人貶之也居大國之間従於強令豈得已乎不能以徳鎮撫而用力爭之庸何愈於楚自是責楚益輕罪在晉也鄭従楚不為無罪要豈得已而為此家氏曰剪簒鋤兇伯政之最先自趙盾為政宋齊魯皆弑其君盾内有所歉置而不問今郤缺為政又不能治侯國之賊其君者乃率三國爭鄭而以討逆遺楚遂使夷國挾仗義之名以風示天下晉伯自是愈衰矣秋天王使王季子來聘胡傳公羊傳曰王季子者王之母弟也王有時聘以結諸侯之好禮也宣公享國至是十年不朝於周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不震矣自是王聘春秋亦不書矣公孫歸父帥師伐邾取繹繹今鄒縣北嶧山下地胡傳當此時陳有弑君之亂既來赴告蔵在諸侯之䇿矣曽不是圖而有事於邾不亦傎乎故魯人伐邾特書取繹以罪之也高氏曰自文公時邾魯有隙宣公簒立而邾子首朝焉自是絶迹魯庭者又十年故歸父伐之汪氏曰宣公簒立惴惴然惟恐諸侯問子赤之故其不能討陳冝矣而猶稱兵於邾以奪其地者以晉伯不振而強齊為之援故爾不猶碩鼠欺人之不見而竊食於盆盎之間乎下書歸父為邾故如齊則魯之為魯可知矣大水家氏曰宣即位以來六年螽七年大旱今復大水咎徴頻仍未有甚於此時旱而書大水而書大以變常書也宣嘗以臣弑君以子逐母罪大惡極天討未加發而為水旱之災民受其虐書以示戒也季孫行父如齊冬公孫歸父如齊胡傳按左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿㑹葬矣若待逾年然後修聘未晚也而季孫亟行歸父繼徃則以宣公君臣不知為國以禮而謂妄說取人可以免於討也歸父貪於取繹畏齊而徃盖理曲則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也季氏私考歸父繼徃左氏曰伐邾故也盖魯因齊而得邾者也惠公卒而即伐之以取其邑則足以取怨於齊矣故懼邾之愬而先往說焉明年歸父㑹齊伐莒其亦因是始謀而許與為役歟齊侯使國佐來聘季氏私考國佐國歸父之子齊之貴卿也宣公時魯君臣事齊甚謹而絶無一使報聘今國佐親來豈特為行父之賀嗣君哉盖齊頃公之立亦因嗣子有爭國中未靖而髙固既逐崔氏亦恐其愬於諸侯也故其禮獨異以固魯交耳自此魯使不復如齊豈亦有以㣲見其情實歟胡傳葬之速也太不懷也又未逾年而以君命遣使聘於鄰國則哀戚之情忘矣齊頃公嗣位之初舉動如此喪師失地幾見執獲豈特婦人笑客之罪哉已失守身之本矣饑按大水之後特書饑見宣公煩於事大上下用竭故一遇水旱遂致乏食爾春秋書饑以此楚子伐鄭楚子親將故稱爵其親將而頻年伐鄭也可謂肆行而無忌矣晉實不競於楚故雖有救鄭戍鄭之舉皆不足為輕重所以不見於經者此也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵辰陵陳地杜氏以為潁川長平縣東南按長平故城在今陳州西華縣東北胡傳晉楚爭此二國為日乆矣今陳鄭背晉従楚盟于辰陵而春秋書之無貶詞者盖經之大法在誅亂臣討賊子今魯與齊方用兵伐莒晉與狄方㑹于櫕函而不謀少西氏之逆也而楚人能謀之所謂禮失而求之野夷狄之有君不如諸夏之亡也辰陵之盟所以得書於經而詞無貶乎聖人討賊之意可謂深切著明矣張氏曰楚莊於是合二國為盟而欲討陳夏徴舒也公孫歸父㑹齊人伐莒汪氏曰伐邾伐莒皆以歸父將重兵而後此㑹齊侯㑹楚子皆歸父特㑹國君以見宣公之徳仲遂而寵其子使専權於魯也至笙之逐得非肇端於此歟書㑹可見是齊為主以伐邾之故恐齊以為討遂従之伐莒焉甚矣魯之懼齊也秋晉侯㑹狄于櫕函胡傳中國有亂天王不能討則方伯之責也又不能討則四鄰諸侯宜有請矣而魯方㑹齊伐莒晉方求成於狄不亦傎乎凡此直書其事不待貶絶而義自見者也晉景㑹狄攅函則楚盟辰陵之歲也按得狄是晉之所圗徇齊是魯之所圖也所以晉㑹狄櫕函魯㑹齊伐莒不顧陳有弑君之難以此髙氏曰陳鄭諸夏之國而従楚衆狄夷狄之國而従晉狄在櫕函而晉侯親徃㑹之夫中國諸侯所恃者晉爾齊方伐莒晉方㑹狄而使楚人為伯者之事此反道也王氏經世比事而觀上則楚子陳侯鄭伯盟于辰陵成乎伯主矣下則楚人殺陳夏徴舒行乎伯討矣而魯方㑹齊伐莒晉方㑹狄于櫕函其言外之意可謂深切著明矣冬十月楚人殺陳夏徴舒陸氏曰使楚荘真有討賊之心則辰陵之盟執徴舒而誅之一匹夫之力奚待以重兵造其國都而後戮之乎由其本無是心而假其事以為功故不足以進於此吕氏曰楚人殺徴舒討賊之辭且衆同欲也故曰楚人入陳非衆志也故曰楚子按楚荘本欲縣陳其縣陳也固以申叔時之言而止然實陳成公在晉恐晉率諸侯内其故君而陳人應之楚終不能有陳故不若以復封陳為名而其實非其本心如此也觀復封為名之後而猶鄉取一人為夏州其不忘取陳一念可知矣當時其實亦未嘗滅陳書入陳乃實録也丁亥楚子入陳先書殺後書入春秋以討賊之義為重故先之亦非是予楚真能討賊也所謂似予而實不予也納公孫寧儀行父于陳胡傳此二臣者従君於昏宣淫於朝誅殺諫臣使其君見弑盖致亂之臣也肆諸市朝與衆同棄然後快於人心今乃詭辭奔楚託於討賊復讐以自脱其罪而楚荘不能察其反覆又使陳人用之是猶人有飲毒而死者幸而復生又彊以毒飲之可乎故聖人外此二人於陳而特書曰納納者不受而強納之者也為楚荘者宜柰何瀦徴舒之宫封洩冶之墓尸孔寧儀行父於朝謀於陳衆定其君而去其庶幾乎季氏私考孔寧儀行父不繫之陳以其従楚而絶於陳故従畧爾王氏經世夏徴舒不勝忿恥以弑其君其賊易知也而孔寧儀行父之為賊難見也何則公告洩冶之諫寧行父請殺之公弗禁遂殺之然則躬殺洩冶者二賊也徴舒之恥發於似女亦似君之言然則激自廐之射者亦二賊也平國既弑不他奔而奔楚盖志在以陳餌楚而殺徴舒爾楚荘動於利而興師非申叔時之言則陳遂縣矣然則致胡公大姫幾不祀者又二賊也使盡乎天討則二賊之誅不當在徴舒之後而反納之楚荘之志可知矣十有二年春葬陳靈公胡傳徴舒雖楚討之陳之臣子亦可以釋怨矣故得書葬君子詞也楚子圍鄭季氏私考圍鄭者本止於圍未入其國也自左氏附為入自皇門至於逵路之説世儒因之遂謂末减而書圍則事亦可以不従實録乎且楚之入陳本圖其國非真為討賊也乃欲縁此併圗鄭之罪而减之是聖人論事不究人心術之㣲也其不至於長奸者幾希矣若以為退師與鄭為盟其情可恕則凡楚兵所加之國如此類者亦多矣何不悉従末减乎故書圍鄭者直著其慿陵諸夏之罪耳鄭既與楚盟于辰陵矣楚又曷為圍鄭邪盖鄭用子良之謀與其來者而又徼事於晉故也然則鄭之不信乃其累世相沿故智豈待子駟而犧牲玉帛有二竟之待哉此非效死守國之道其得罪於晉而見侮於楚冝矣陳鄭既盟辰陵又不忍叛晉楚於是入陳圍鄭王氏經世陳鄭二國楚盖幾於有之矣然而人心未去故家巨室猶存先聖神明之冑數百年有奉之社稷未易變而除之也故釋之以陽存厚道此楚荘之諼也實不能有故録其卒而畧其始其文則實録其義則存中國不使夷狄盡其虐之辭也若曰與其能有討於中夏故末减其慿陵之罪而曰入曰圍則大乖聖人之意矣夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績季氏私考邲鄭地在敖山之東衡雍之北大河之南今當為滎澤河隂界上地一統志以為在鄭州東六里非也按春秋内晉而外楚故凡中國與楚戰皆以中國為主然而息爭之道則亦當責之於中國焉邲之戰楚討陳亂師既似乎有名而所以施於鄭者又得退師之宜矣林父上不能輔其君討亂以行盟主之大義此行本為救鄭而鄭既服楚謂宜觀釁而後動也乃輕與楚戰此已非所以待敵之道况身為元帥既不能禁副屬之違令而專行又不能躬帥士卒冐矢石而力戰乃先備歸舟鼓於軍中倡為棄甲曵兵之舉則喪師之罪不於林父而誰責乎經不以救鄭書但書及楚戰敗而林父之罪自見矣胡氏以書及為罪又謂楚真能討賊而不貶似亦未必然也又按辰陵之盟為服陳鄭然陳鄭猶未心服也故楚入陳圍鄭晉既不能有陳而僅爭鄭邲之戰夷夏勝負之一决也自邲之敗而楚滅蕭圍宋遂横行於中國而莫制矣春秋寧肯遂予楚乎以是知胡氏之説非也秋七月冬十有二月戊寅楚子滅蕭楚將以脅宋也蕭宋附庸國楚雖滅之而不能有其地猶屬於宋觀宋十一年辰佗彄地入蕭以叛猶為宋地可知矣胡傳假於討賊而滅陳春秋以討賊之義重也末减而書入惡其貳已而入鄭春秋以退師之情恕也末减而書圍與人為善之徳宏矣至是肆其強暴滅無罪之國其志已盈雖欲赦之不得也故傳稱蕭潰經以滅書斷其罪也建萬國親諸侯者先王之政興滅國繼絶世者仲尼之法今乃滅人社稷而絶其祀亦不仁甚矣况又以滅蕭告赴諸侯矜其威力以恐中國乎此春秋所以深罪楚莊之暴且横也愚意當如此說方是故為刪補之如右汪氏曰楚莊滅蕭所以逼宋而脅中國諸侯之服已也晉人宋人衞人曹人同盟于清丘今開州西南有清丘故址胡傳書同盟志同欲也楚既入陳圍鄭大敗晉師伐蕭滅之慿陵中國甚矣為諸侯計者宜信任仁賢修明政事自強於為善則可以保其國耳曽不是圖而刑牲歃血要質鬼神蘄以禦楚謀之不臧孰大於是故國卿貶而稱人譏失職也原縠違命喪師乃晉國罪人而主兹盟約所信任者皆可知矣是時晉伯不振楚入陳圍鄭敗晉於邲至是又滅蕭以脅宋而宋與曹衛皆唇齒之國猶欲推晉以禦楚晉實不能也而徒為此盟以塞責竟何益於事乎列卿稱人以示貶胡傳說是也季氏以為㣲者稱人恐非王氏經世原縠先軫之後先軫或稱原軫原其食邑縠食采於彘故稱彘子今又稱原縠襲其先世之稱也宋師伐陳衞人救陳宋既與晉同盟故為之盡力以討陳而不知晉之不足恃也其卒蒙楚伐以此胡傳陳有滅君之亂宋不能討而楚能討之其従楚而不貳未足責也宋人不能内自省徳遽以大衆伐之非義舉矣衛人救陳背盟失信而以救書者見宋師非義陳未有罪而受兵為可恤也且謀國失圖妄興師旅無休息之期則亂益滋矣其以救書意在責宋也若衛叛盟則不待貶絶而惡自見矣按楚實未嘗縣陳封陳故改胡傳一二為此宋以清丘載書有討貳約言而伐陳宋於是挑楚釁矣按衛之此舉恐以與宋同盟見討於楚而􅂓出單師以圗解塞觀宋以師伐而衛以人救可見其實非欲與宋為敵也孔達自謂巧於謀國而卒罹身禍如此季彭山以調停之術不得不然說恐非然則宋之伐陳固失策而衛之救陳亦未為策之得也書衛救以責宋叛盟意衛亦不得而辭胡文定說是苐以為惡則過矣十有三年春齊師伐莒莒恃晉而不事齊故也夏楚子伐宋楚人滅蕭將以脅宋諸侯懼而同盟矣宋不惟固本之圖而輕為兵先攻楚與國是自挑楚爾故書楚子伐宋以罪宋也以其救蕭又伐陳也伐之為言盖楚自以救蕭伐陳為宋之罪聲而討之而其實不可以言有詞書爵莊自將爾莊之罪所謂不待貶而自見胡氏之說非也李氏曰楚有事於中國皆自鄭及宋楚成之爭伯敗宋於泓楚穆之爭伯弱宋於厥貉楚莊之興挾鄭以侵宋卒之今年之伐明年之圍又朙年之平而南北之勢成矣成十八年彭城之役楚又挾鄭以圖宋向非悼公之盛則於宋之盟不待襄公之末年而天下分伯矣季氏私考楚本欲圖宋者也而去年宋師伐陳攻其與國則楚人有辭於伐矣書爵楚子親行也楚既屬陳尋又服鄭惟宋未服故欲圖之觀其初滅蕭以脅宋可知矣盖陳鄭宋皆在河南而中國之要樞也鄭處其西宋處其東而陳則介乎鄭宋之間者也得鄭則可以致西諸侯得宋則可以致東諸侯而得陳則可以致鄭宋者也陳鄭既皆歸楚若復得宋則河南之地盡為楚有自是將圖天下矣而為世道計者未見有人焉使非宋人猶足以自守中國幾何而不淪于楚邪秋螽冬晉殺其大夫先縠胡傳兵者安危所係有國之大事也將非其人則敗雖得其人使親信間之則敗以剛愎不仁者恭焉而莫肯用命則敗凡此三敗君之過也河曲之戰趙穿獨出而臾駢之謀不用濟涇而次欒黶欲東而荀偃之令不行今林父初將中軍乃以先縠佐之使敵國謀臣知其従政者新未能行令誰之過歟故稱國以殺不去其官罪累上也左氏秋狄伐晉及清先縠召之也冬晉人討邲之役與清之師歸罪於縠而殺之盡滅其族焉髙氏曰釋趙旃魏錡不討而獨誅先縠為政不平殺者不受治矣又族之惡之甚者也張氏曰越椒將攻王而楚莊尚思子文之治楚而復克黃之所先縠先軫之孫而滅其族盖晉之徳刑皆不足以敵楚矣季氏私考赤狄伐晉及清經所不載未必有此事而戰邲至此已年餘先縠乆同列卿用事矣何為始討之意縠為人好剛任直多為同列所排適又楚人伐宋欲救不能則追咎前敗以中縠如此爾此一說姑識之十有四年春衞殺其大夫孔達胡傳稱國以殺不去其官罪累上也春秋端本清源故法如此陳氏曰達自殺而稱國以殺其君意也見君用其言以干盟主而尋殺之以是為君之過矣當時楚伐宋晉不能救歸咎於同盟之不協而謂衛有貳於楚討衛救陳以失清丘之信也衛人懼晉之討歸罪於達而達自縊既又以為成勞復室其子而復其位焉刑不亦頗矣哉以為成勞而室其子可見衛侯亦以達之救陳為忠於謀國而殺之則由晉討而出於不得已也夏五月壬申曹伯夀卒文公卒子宣公廬立晉侯伐鄭胡傳按左氏傳為邲故也比事以觀知其為報怨復讐之兵詞無所貶者直書其事而義自見矣十二年晉救鄭不及鄭已従楚而晉敗于邲也故今又責服於鄭而有此師秋九月楚子圍宋胡傳宋人要結盟誓欲以禦楚已非持國之道輕舉大衆勦民妄動又非恤患之兵特書救陳以著其罪明見伐之由也始謀不臧至於見伐見圍幾亡其國則自取之也春秋端本故責宋為深若蠻夷圍中國則亦明矣汪氏曰楚荘始而滅蕭以逼宋繼而伐宋以聲其救蕭之罪又遣使過宋不假道以激怒於宋而使宋殺之於是國君親將環其邑而攻之然則楚子之志在於陵暴中華以取威爭伯其惡甚矣文定屢責宋而不責楚楚人慿夏之罪顯而易見而宋有致兵之由其罪未著也故備論之王氏經世是時楚已得陳鄭許蔡非得宋不已故滅蕭以偪之不假道以挑之厯三時而圍不解卒得宋平而後已宋服則齊魯可搖矣此楚圖中國之序也鄭在楚之彀中未易旦夕爭也是時急莫先於救宋宋救捷則鄭亦可招矣而晉不知所先後勞師於鄭而緩於救宋乃比之雖鞭之長不及馬腹不知宋既去則楚威振及齊魯而南北之勢成矣豈但失鄭而已甚矣晉人之顛冥也胡氏以端本為說專一責宋夫宋伐陳固有啟釁之道然清丘之盟晉宋衛曹咸在以同懼楚為志而相要以恤病而討貳其策未為不善但諸侯不同心而遂敗此盟耳春秋之義志中國盛衰之大機均責諸侯而首罪晉其所關者天下之勢周公懲荆舒以寧百姓非為一國謀也葬曹文公冬公孫歸父㑹齊侯于穀季氏私考宋之東北界即魯地也楚人圍宋則魯有剥􅇃以膚之慮矣歸父㑹齊侯咨於齊以謀其不免也而齊侯不任其事此魯所以遂使歸父親㑹楚子於宋以求免也歟或曰此㑹盖謀楚也按謀楚之說楚方圖宋魯恐不免以為憂故與齊㑹謀所以待楚而明年㑹宋之舉要是齊侯許之而然爾十有五年春公孫歸父㑹楚子于宋胡傳楚子不假道於宋以啓釁端而圍之陵蔑中華甚矣諸侯縱不能畏簡書攘夷狄存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乘之國謀其不免至於薦賄不亦鄙乎若此類聖人不徒筆之於經也比事以觀則知中國大勢盛衰之由春秋經世之畧矣時楚在宋歸父先㑹齊侯而後㑹楚子於宋者宣公方事齊故先謀於齊而後㑹楚也楚子圍宋蠻荆之盛也宋見圍而魯至於薦賄中國之衰也其由則在楚能討陳中國不能討陳爾前既失於討陳至此若能救宋則亦不失為經世之畧此春秋之㫖也趙鵬飛氏曰當時宋與魯為鄰宋去則楚兵至魯矣魯見宋之危而諸侯畏楚莫敢有救者故懼而求服迎楚子之意而預弭其兵爾有謂宋楚之平歸父為之釋憾而結好者非也歸父盖自謀不暇决不暇能為此謀也夏五月宋人及楚人平卿稱人是春秋常事以為貶恐未必然也永嘉吕氏曰晉與楚爭陳楚討少西氏之亂而陳在楚宇下矣晉與楚爭鄭邲之戰敗而鄭又在楚宇下矣宋伐陳而衛救之則衛又貳於楚歸父㑹宋而魯又即楚楚之圍宋也軍罷食盡將去矣宋人告急晉不能出師以援之宋及楚平豈得已哉書曰宋人及楚人平以見蠻荆之恣横中國之無伯與夫諸侯之畏楚而莫有能救之者也王氏經世楚之圍宋九月於此不惟宋之憊也甚楚亦兵罷食盡而將去矣凡外平不書彼既事解不來告也此書者宋幸得平以告諸侯故魯史有其事耳夫宋之急至於易子而食析骸而炊其望援如在水火而四鄰環視莫之動心楚軍亦止有七日之糧爾而晉不能出一師以撼之待其威單力盡徐自解罷書曰宋人及楚人平傷中國之失道也明王不興賢伯不出強者恣其力貪者滿其意人之類不將胥而盡乎此春秋書宋人及楚人平之㫖也按春秋書宋人及楚人平平者兩相欲之辭而宋人為主見楚將因宋以為中國患今華元子反相告語而結平也中國之患當且従是而息矣所謂直書而自見者也胡氏謂貶二卿季氏私考謂稱人為衆詞以見人情同欲者恐皆非六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸潞地即今潞安府是胡傳赤狄未嘗侵掠晉境非門庭之㓂而恃強暴以滅之其不仁甚矣春秋所以責晉而畧狄也又有異焉者夫伐國之要討其罪人斯止矣按左氏潞子夫人晉景公之姊也酆舒為政而殺之又傷潞子之目則酆舒者罪之在也為晉計者執酆舒轘諸市立黎侯安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土滅潞氏以其君歸何義乎春秋所以責晉而畧狄也王氏經世楚為封豕長蛇以蠶食上國天下岌岌乎有胥而為楚之勢不此之懼而以廣地於狄為得計悖亦甚矣荀林父敗軍之將不克報於楚而徒逞志於狄方以為功而受狄臣千室之賞春秋畧而不書而書晉師以見其勞民動衆縱大敵棄諸夏而施侮奪於狄人為可恥也秦人伐晉乗晉兵畧狄土而窺其虚也書以貶之王札子殺召伯毛伯何氏曰王札子天子之庶兄與召氏毛氏爭政而矯王命以殺之以是為無君矣王不能正其將何以令天下乎春秋直書而其失自見矣秋螽胡傳人事感於此則物變應於彼宣公為國虚内以事外去實而務華煩於朝㑹聘問賂遺之末而不知務其本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五年復螽府庫匱倉廩竭調度不給而言利尅民之事起矣仲孫蔑㑹齊高固于無婁齊魯既皆通楚而晉將徴㑹於諸侯也故蔑㑹髙固以謀之魯初欲㑹楚既謀之於齊而使歸父㑹齊侯于穀今聞晉以齊魯通楚將徴㑹又謀之於齊而使蔑㑹髙固于無婁可見魯於此時一惟主齊行事如此大夫㑹大夫自叔仲彭生㑹郤缺于承筐始胡傳意非以為始於此也按歸父始㑹齊侯于榖為楚也而齊侯不任其事今仲孫蔑復與髙固為此㑹為晉也而齊侯亦不任其事斷道之盟所以従晉徴㑹而歸父之如晉以結好非亦由於此歟初稅畝胡傳初者志變法之始也其後作丘甲用田賦至於二猶不足則皆宣公啓之也故曰作法於凉其獘猶貪作法於貪獘將若何有國家者必欲克守成法而不變其必先務本乎屬詞通一井言之曰田去公田言之曰畝稅畝者以畝為率也古者井田之法十取其一宣公又履私田之畝復十取其一則十取其二自宣公始也公田之入薄所以廢助用稅民不盡力於公田所以公田之入薄宣公煩於力役之征所以民不盡力於公田其原由是如此冬蝝生胡傳始生曰蝝既大曰螽秋螽未息冬又生子災重及民也而詳志之如此者急民事謹天災仁人之心王者之務也饑胡傳宣公為國務華去實虚内事外煩於朝㑹聘問賂遺之末而不敦其本府庫竭矣倉廩匱矣水旱螽蝝天降饑饉亦無以振業貧之矣經所以獨兩書饑以示後世為國之不可不敦本也十有六年春王正月晉人滅赤狄甲氏及留吁胡傳甲氏潞之餘種留吁其殘邑也必欲盡殄滅之無遺種豈仁人之心王者之事乎書此自見其不仁之甚矣卿大夫將稱人是春秋常事以稱人為貶詞恐亦未盡然也季氏私考是時晉畏楚強不能攘却而威加赤狄聊以闢土爾謂諸侯何夏成周宣榭火成周洛陽也王氏經世爾雅室有東西廂曰廟無東西廂有室曰寢無室曰榭楚語云榭以講軍實故知榭是講武屋竊疑宣王南征北伐講武於此遂以為廟故其制如榭書稱王在新邑烝祭文王武王則洛邑鎬京皆有廟可知矣胡傳宣榭火何以書以宗廟之重書之也貴戚擅殺大臣而天子不討王室不復能中興矣人火之天所以見戒乎宣王周室中興之主也以毛召之獄而天子不能討周不再興之兆固於是乎在矣此宣榭之所以火也使定也不以人火之而廢乎天之所以見戒之意因宣榭之災而得乎宣之所以遇災而懼之心庶其猶有興乎秋郯伯姬來歸汪氏曰春秋書郯伯姬來歸所以譏父母之訓育弗至致内女之婦徳有虧而亦責郯君失齊家之道而棄其伉儷也冬大有年以宣侈為盛事告於廟而書與桓同說已見前矣可見他年之多歉也記異之說亦不然十有七年春王正月庚子許男錫我卒昭公卒子靈公甯立丁未蔡侯申卒文公卒子景公固立夏葬許昭公葬蔡文公凡訃不往葬者為失禮則此訃而往葬不可一例責之也胡氏以不月為畧恐未然六月癸卯日有食之己未公㑹晉侯衞侯曹伯邾子同盟于斷道王氏經世按郤克徴㑹本為謀楚榖梁之說是也胡氏謂謀伐齊誤矣徴㑹在未見笑之先豈預知其見笑故為之㑹以謀之耶左氏載婦人笑於房自為鞌之戰張本耳斷道之盟同志於外楚此天下之大計也因小忿而忘大計舎攘夷匡世之功而雪一笑之恥晉之所以可罪也秋公至自㑹冬十有一月壬午公弟叔肸卒稱字以其不仕待之以不臣也胡傳稱弟得弟道也稱字賢也何賢乎叔肸宣弑而非之也非之則胡為不去也兄弟無絶道故雖非之而不去也與之財則曰我足矣終身不食宣公之禄君子以是為通恩也論情可以明親親言義可以厲不軌所以取貴乎春秋書曰公弟而稱字以表之也屬詞主俾世其卿之說盖見肸後世為大夫遂與季友仲遂為一例不知即宣公俾世其卿當是肸身後事肸不與知也觀其不受財不食禄於生前則可見矣公孫嬰齊與叔老皆肸之子叔弓叔老之子輒叔鞅皆叔弓之子叔詣輒之子十有八年春晉侯衞世子臧伐齊汪氏曰齊自翟泉以來不與於晉之㑹與盟而恃其強大侵暴小國是以晉景欲振奕世之伯業始則君率衛以伐齊既而正卿舉合境之兵偕魯衛曹以戰齊盖非専以婦人笑客之故也按晉侯與衛伐齊未必為其臣雪婦人見笑之恥而然要是為齊不與盟㑹汪說可従後此鞌之戰則晉侯意在治齊而郤克䓁自以己之私忿而甚焉爾前後合二說始備公伐杞以杞不朝也髙氏曰杞自文十六年來朝而不復至故伐之已不修徳而欲人朝已亦不思之甚矣夏四月秋七月邾人戕鄫子于鄫胡傳邾人盖嘗執鄫子用之則不共戴天之世讐也既不能復又使邾人得造其國而戕殺其君曰于鄫者所以深責鄫之臣子不能救君難至此極也甲戌楚子旅卒舊以楚荘為五伯之一恐非孔子嘗曰其事則齊桓晉文而不及於荘與宋襄秦穆盖以桓文嘗有功於王室有功於中夏故也若宋襄欲圖伯而無成秦穆楚荘皆嘗為中國患聖人豈應許以伯乎孟子所稱五伯未見有眀訓有以夏昆吾商大彭豕韋併桓文為五伯者亦未敢據以為是也季氏私考楚荘之興志欲圖中國但以能審形勢故先為務本息民之計不汲汲於兵爭即位三年而始滅庸秦巴既合足以制中國諸侯然後漸圖陳宋動必相機辭足以屈中國亦一時之雄也然滅庸滅舒蓼滅蕭肆其強暴而宋陳鄭聖賢之後無不皆被其毒凡其所為皆貪慾之事非有假仁義以正天下之功說者乃以列於五霸而與桓文並稱豈不誤哉公孫歸父如晉季氏私考歸父以父仲遂之故素謹事齊今魯自斷道之盟已改従晉特令歸父如晉以聽晉命盖季孫行父當國實主此謀欲使歸父必與齊絶之計也左氏以為歸父欲去三桓以張公室與公謀而聘於晉欲以晉人去之殊不知魯之於晉初交未固此豈遽與謀腹心時哉且歸父志本向齊不在晉也事晉乃三桓之意特懼歸父有異志故使之奉使耳歸父欲去三桓不謀於素厚之齊而謀於初交之晉智者不如是也盖行父本忌歸父有寵於君而欲以計傾之使處齊晉相疑之地不待宣公薨而歸父危矣謀去三桓以張公室之說得非行父誣加歸父之辭而左氏誤信以為實乎冬十月壬戌公薨于路寢廬陵李氏曰宣公即位十八年乃不義之君也大畧與桓公相類除即位有年書法同桓公外其餘事同則従同可矣宣公因齊得國終身事齊自黑壤見止之後南逋於楚當是時晉之伯事不振故魯亦得以自縱數侵犯小國以自益而晉問不及焉直至十七年斷道之盟始背齊事晉則以季孫之憤也於是歸父逐而三家之張甚矣先儒李氏曰賂田求昏君大夫奔走無寧嵗以為媚齊之謀不㑹于扈不􅉀于清丘而無事晉之志一逞於兵則伐莒伐邾猶未巳也而伐萊伐杞一放於利則取向取繹猶未厭也而取根牟此宣之所以無良圖也斯言得之矣歸父還自晉至笙遂奔齊季氏私考歸父自仲遂以來得君専寵而是時季孫行父當國所深忌也今歸父使晉而還適遭公之變行父欲自文預聞弑赤之故於是誣加謀去三桓之罪以激衆怒而實以向不事晉之罪歸之謂其有事於齊也則歸父懼罪於晉勢無所歸有奔於齊而已遂者急於後事之辭見歸父之志在齊也左氏以墠帷復命於介為善而胡康侯遂許其志仁則過矣不自位奔故不言出杜元凱曰笙魯境也按歸父如晉奔齊二項事従季氏私考為是盖謀去三桓欲仗晉以行事使果有此則歸父被逐當奔晉不當奔齊也左氏載此事後來不見晉人従否如何要是左氏以傳聞為實然竟不審其後如何爾歸父即顛沛患難時但依齊而不向晉可見心不在晉但以君命奉使於晉不得不一行而所恃惟齊益見仗晉以去三桓無有此事明矣當時若果有此晉若許之則三桓乃晉所欲去之人行父當首先被斥何與同伐齊戰安革於後來即晉不之許而宣公君也君所欲去之人晉亦何至遣其臣與之連兵結好反若親厚於前日乎要是晉徴㑹為㫁道之盟魯不得不往既受盟魯又不得不一修好此歸父所以如晉而歸父之見逐則又以其貴而有寵行父輩始嘗忌之今於宣公之薨行父又將自文其謀弑子赤與仲遂同使於齊之故故因公薨而追治子赤之事若以為罪止於遂當罰及於其子孫故致其以家遣如此而歸父之奔齊則以其父嘗謹於事齊齊為可依故也胡傳信左氏以立說恐未然春秋事義全考卷八
