body:
  text: 春秋事義全考卷四明姜寳撰閔公名啟方莊公子九歳即位諡法在國遭難曰閔母哀姜之娣叔姜元年春王正月般卒當以莊公諸子之長者聞于王請所以立今也驟扳幼子而授之國以其爲齊之甥奉桓公意而立之也閔幼未嘗行即位之禮故不書即位齊人救邢胡傳凡書救者未有不善之也兵者春秋之所甚重獨至于救兵而書法若此聖人之情見矣其稱人將卑師少也夏六月辛酉葬我君莊公亂故是以緩秋八月公及齊侯盟于落姑落姑齊地是時魯亂閔公幼季子在外齊桓以伯令召閔至齊地盟以復季子季友在陳閔公及齊侯盟落姑以復之于是季子來歸而齊仲孫即來省難時哀姜慶父決不欲季子之歸公亦未必知友當請復其能以宗社大計謀于伯主未知何人爲之既而閔公弑成季以僖公適邾而哀姜孫共仲奔於是季子以僖公歸立之而齊髙子即來盟然後知季子之出入皆有請于伯主齊桓所以始復季子而終定僖公者皆季子在外之所爲也故春秋不書季子與僖公之出入以别于有罪而出者而特書其始頼盟以歸以見季子深謀圖國之患而齊桓之能從友以定魯于此亦可見矣季子來歸胡傳按左氏盟于落姑請復季友也其曰季子賢之也其曰來歸喜之也魯國方危内賊未討國人思得季子以安社稷而公爲落姑之盟以請于齊則是賢也春秋欲旌其賢故特稱季子聖人之情見矣按季友此以伯令歸則慶父之不敢去季子誠以齊桓爲季子所倚重也王氏經世按是時慶父最强莊公屬疾慶父有代立之勢然不能遂有魯國者國人未之與也故如齊自託不擇立莊公諸子之長者而立閔公一利其幼二以其齊之甥也哀姜無子而欲立慶父其名不順又弑閔公國人所不容故季友乗其後而定立僖之䇿所謂後出者勝也冬齊仲孫來不稱使魯無君季友接之以二臣相見故不言齊侯使無所致命之辭也髙子來盟同魯在當時雖立閔公而慶父久執兵權齊桓恐其生亂故使仲孫來魯省難因以覘之有惓惓爲魯之意焉仲孫之覘盖覘慶父也其曰不去慶父魯難未已又曰難未已將自斃盖真見慶父之能爲魯難既作難則法所不赦故曰將自斃至謂君其待之亦謂待其難作而後致討桓公仲孫皆善意無他也胡傳信左氏之説以爲桓使計謀之士窺覘虛實有乗亂取國之心仲孫不勸其君討賊不惟不知桓公于仲孫亦責之過矣資中黄氏曰仲孫志欲存魯亦賢者不書名亦所以嘉之桓公終存魯有存亡繼絶之德故亦終善其辭二年春王正月齊人遷陽陽即漢時陽都縣地當在今沂州之北境盖在齊穆陵闗南而四面皆近魯地陽小國盖齊人廹而遷之强移其民人社稷于他處而取其地曰遷夏五月乙酉吉禘于莊公資中黄氏曰據禮記夏商諸侯皆有禘祭禘是時祭之名周始廢諸侯禘祭而獨周公得行此禮者是以殷諸侯之盛祭與之所以示不臣周公用殷禮則于周不爲僣也魯頌曰白牡騂剛白牡是殷牲周公所用騂剛是周牲伯禽所用因此又知魯太廟祀周公伯禽以下皆與諸侯三歳一祫若魯則當祫之歳禘于周公或云魯三歳一祫五歳一禘但魯公以下雖皆與祭其禮秩視周公皆降周室既衰羣公始皆用僣禮孔子稱魯之郊禘非禮者爲此也愚按喪畢之明春將致新主於廟廟之逺主當祧因是大祭以審昭穆此既行之太早又不禘于周公而禘于莊之寢主未祔而禘此則尤爲非禮矣其時閔公幼事出亂臣淫妻所爲秋八月辛丑公薨季氏私考弑閔公者慶父也慶父權寵過重得以内交宫禁而國母隂主其事是以易動于惡如此此可爲專授兵權于匪人者之明戒矣左氏載公傅奪卜齮田事非經意也胡傳君薨諱而不言弑也何以傳信于將來曰書薨以示臣子之情不地以存見弑之實何爲無以傳信也凡君終必書其所獨至于見弑則沒而無所書薨諱不言弑其情厚矣不地其事亦白矣非聖人能修之乎九月夫人姜氏孫于邾姜氏所恃者慶父慶父不安故姜氏孫時魯人猶未正名姜氏之罪稱夫人故春秋亦因而稱夫人文姜同臨川吳氏曰哀姜不奔齊而奔邾者盖有淫行與弑謀身負大惡自歉于心而畏齊桓故不敢歸齊也春秋雖不去姓氏而直書孫邾絶之之意已著矣公子慶父出奔莒弑閔公故也其後爲孟氏與叔牙之後爲叔氏同按慶父弑君本欲代立其出奔莒爲魯人所逼也當時魯人以其久掌兵權而力未能討如季友者必將仗齊威以除之逼之者衆于是慶父不能自安故逃于莒盖畏桓討而去也齊桓可謂能知義矣若季友計安社稷使賊無所容其忠亦安可少乎孫明復以爲惡季子緩不討賊胡傳以爲譏失賊皆責之過矣冬齊髙子來盟髙子即髙徯也季氏私考自慶父弑閔公與夫人俱出奔矣而魯人猶懼見討于齊人心洶洶故齊桓特遣髙子以安魯髙子嘗來魯盟防有素望焉魯人所信服也因與僖公盟以定之而魯人遂無疑焉許髙子之能安魯所以善齊桓也按自髙子來盟之後遂平魯難定僖公髙子之善即齊侯之善也直書而義自見矣權在髙子之説恐未然王氏經世云齊桓因仲孫省難歸從其言專意于寧魯之難故繼使髙子來圖之定僖公而城魯如公羊所載盖有所傳矣乃曲爲之説美不歸于齊侯而歸于髙子特稱髙子以著其善不曰齊侯使之者權在髙子也斯論亦近于舞文矣十有二月狄人入衛是年懿公敗不知所終張氏曰衛之滅非特懿公好鶴失人心自惠公即位宣姜淫恣躭樂忘政習以爲常公又重之亡形已具故狄人一至而遂渙然離散爾是時衛亂懿公卒𦵏皆不書彼不來告故此亦不往弔也按詩稱歸唁衛侯可見衛未嘗滅苐以殘破之餘城郭室廬未能完繕而野處于漕邑爾齊桓此時但救邢而未救衛以衛自盟幽之後背齊不㑹及齊伐猶抗不從此桓公所以緩爲之圖也至衛文公經營復國而于齊遂心服焉此楚丘所以卒爲之城也歟鄭棄其師是時狄入衛而鄭與衛隣其地以河爲界故使髙克將兵禦狄狄久不退故鄭師亦久不還此其所以潰而髙克所以奔也左氏惡克因久不召之説恐未然鄭之君臣以禦狄使克而實無却狄之志以至于衆潰而不可收故書鄭棄其師見鄭之君臣不當以髙克一人之故而棄其民如此也陳氏曰髙克奔陳不書不足書也家氏曰不責克而責鄭君與其用事之臣以克不足責也胡傳或曰髙克進不以禮曷不書其出奔以貶克爲人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵生殺予奪惟我所制爾使克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀于君協志同力黜逐小人乃畏一髙克不能退之以道而使國事至此書曰鄭棄其師君臣同責也春秋事義全考卷四
